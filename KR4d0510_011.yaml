body:
  text: 禮部集卷十一元吳師道撰書與許益之書僕生幼而讀書為文盛氣而鋭思貪博而騁能自以為適也既而悔之聞義理之學聖人之道于是乎在時則仁山金子講道淑婺之人而弗果從家貧無書里良師友又少閉門矻矻弗知所向切自念道散于羣經會于四書周程朱張諸儒又表章發揮之微言精義抉露無餘矣遂慨然曰吾他無書獨無四書乎吾無所與遊獨弗能尚友古人乎于是誦其書思其人優遊涵泳乎性命道德者幾時始而茫乎其失也繼而粲乎其明也久而確乎其信也嗚乎道迄孟氏不傳毅如荀謂性惡慤如揚謂善惡混醇如董子謂性者生之質懿如王通以性為五常之本正如韓愈氏言性有三品斯五人者其絶類離倫非不卓卓然著矣而皆昧于論性今豫之愚一朝而識之天之豫我者如此先儒所以啓我者又如彼奈何忍而棄耶然聞之不如見之之親見之不如授之之精無師友以為資亦終焉寡陋是懼環視當世汙染淪胥訕笑迂濶友且未多見况于師乎足下早登仁山之門深探王何之傳質純而氣清道信而學篤于僕則又道先齒長實師而非友也比嘗幸得見退而迫困世故弗獲有請一年于兹足下又警迪之以文字者屢矣僕誠不佞試以所得于先儒而欲終身行者誦言之涵養須用敬進學則在致知學者工夫惟居敬窮理二事正容謹節存心主一敬之事也讀書問道應事接物窮理之方也二者皆主于敬焉斯言也先儒所以會聖賢之精微而示人以約者與備體用本末而入德之要與僕之生也愚而師之求也久方將請事于敬未能習而安也而缺焉親炙復若是如進學何足下倘嘉其志矜其愚而辱教之賜一言以自證則先儒之啓我也足下之成我也幸孰大焉幸孰大焉謝趙子英憲副書蓋聞公卿大夫求士士不敢求于公卿大夫古之道也後世失所以求而干進眩名者靡不至上之人惟樂于諂佞者之已售其道遂大壞若夫窮居草茅修已俟命非其人不見非其招不往終身無聞而不愠者彼孰從而求之幸而在位者以道德學問接天下之才進忠實而黜浮華奬退靜而抑躁競則向所謂士宜投足乎其間然而勢分之不可干介贄之不可以易猶有不得而進者欲為善而有遇不其難哉某竊伏窮閻粗知讀書學古道才品不異乎凡庸術業不企乎髙明吾斯之未信而奚知之求生三十年不一登貴人之門道不同者州里或未之識非敢為亢也士當如是焉爾乃者閣下持節浙東聞其以道得君以正學用世以崇化厲賢為心其所設施卓卓乎古人之風一道之士顒然作興如某之愚亦將刻厲思奮終恐非才望其門而無以進也一旦閣下招而見之豫而進之衆人之上譽之而不置閣下求士同異世俗而某奚以得此哉退省其私戰掉而弗寧因自誓曰繼今以往蚤夜孜孜慎厥身修佩服敬義循蹈中正窮不失守逹不悖道惟孝與忠則為之以無負閣下之知又進而祝曰惟閣下益近天子之光大究所學正誼明道使吾君為堯舜之君斯民為堯舜之民功施當時澤被後世以慰天下士大夫之望幸身親見之閣下或有問焉亦將有以自復矣答謝君植書往承寄示詩文繼以鄙作為復此亦書生習氣思少自見非能有所開發于足下也使來辱書稱許甚盛且謂古今文人才士不乏而患不知道若僕議論胸中必出于正又惜其浮沉無聞不汲汲于世好而為是也伏讀以還愧不敢當而又有不敢不勉者願略陳其愚夫古人之子文率皆德盛而立言中積而外形愚何敢希望萬一文固所好而不可名能為文也名能為文且不可而可謂之知道乎雖然名不能文可也謂不知道則不可人不知道則無以充其形而號稱為人况于文乎昔人謂文為貫道之器自今觀之道能貫文非文能貫道也使其心果有得于道所發必出于正則不待求工于言語文字之間是惟無作作則必傳僕雖不才切有志于是若其不合于世好則已知之蓋昔者上以文取人士以文致顯耀舉世翕然而豪傑特起之士獨深愧之曰是科舉之文而非古文之文也于是立意追古若韓退之蘇明允之徒然以逸羣之氣蓋世之譽公卿將相之知或所至炊不及熟或老死布衣繼而作者亦有人焉通顯又無幾為古文于用文之時猶如此其不遇也為古文于不用文之世直將何所望哉君子之于衆人固有分矣所貴乎君子能篤于自信不肯毁行􅐩操以隨俗而已僕之愚非徒欲古其文而欲古其行古其行者志在古道耳生二十有九年束髮以上即嬰世故危苦迫厄沛然而安之天分狷狹所向少諧自度與人無求亦弗以為意獨念朋友道息居無與言出無與遊闕失誤疑無所與正平生知已數人散在四方貧弗能遠遊以相從若足下者風聲意氣未嘗不曠千里而相接然後知僕雖不合于俗而合于當世磊落之人使纍千萬而皆磊落之人則我輩奚足道哉足下與僕視世之奴顔婦膝口行蛇蝎胸腑蛻糞而志得意滿者肯為之乎雖萬死不與易也竊觀足下髙􅐩明雋文行著于西州而落落弗偶優遊嘯歌其自信亦篤矣顧與僕同病而益以是勉焉方將共此道以為千載之期凡窮逹毁譽乖合尚何言哉上趙侍御書當今天下之官朝廷之所甚尊宰相所不得而治貴臣大職莫之與抗者風憲而已士之仕者必此而行志凡國家利害民生休戚官吏賢否無不得言而行者號令所加如迅風奔霆無有嬰其勢而逆其指焉然君子居其官則思盡其職職風憲者宣教化肅紀綱而已寬𢎞清淨化之所以宣也採察彈劾綱之所以肅也後先雖異而體用相資而世之為者多失之天資險薄好為苛細者網羅文深鷙忍毛擊而失之過矣反是者又以姑息為仁含糊為量保全祿仕為德其長暴縱貪積寃壅善尤有甚者是皆不知正道而乖離于風憲之職也惟閣下則不然曩者起布衣草廬之中擢在此位踐中外任數十年弗絶天下咸信其有道比者按節東方環轍海上荒陬窮垠之民歡傾相告復見成周盛漢使臣之風蓋其清心以省事而察姦不遺敦化以弭刑而懲惡不貸體用之間坦然一出于正若閣下者可以為法矣天子嘉其功升之臺端其儒巨人之澤將演溢于無窮夫南臺監攝天下之半閣下當登進之初其設施必有非常者愚不得而知也今風俗弊壞莫甚于南貪汚窟穴其中民之寃苦失職何可勝數夫堯舜知仁猶不能遍物而急于親賢天子選擇而任閣下閣下所得薦黜者諸臣憲臣耳是不可以不急也總而計之幾何人向也閣下之在浙東雖一人而足于此得數十輩參峙而錯布之必能以閣下之心為心而奉揚閣下之政使東南數千里皆若身履而親臨之守約施博者在此道也竊觀閣下平居議論未嘗以位為樂其愛君憂民之念忠誠懇惻上通于天天將大其為而不止是也以區區之意輒因其職之所在而薦其説焉惟進退之幸甚上敬威卿參政書某聞天地間有清明正大之氣不在人則在物故在天為列星在地為河海泰華在飛動為龍鸞麒麟皆拔類而出羣者乃若鍾而為人其姿必魁梧而磊落其量必𢎞廓而淵深其德必敦厚而粹美其文學渾以雄其議論閎以實其功業雋偉而滿盛聲昭當時澤流無窮莫不稱其氣之為愚生讀書上下數千百年得見若人者少矣方今際一元之會宇宙混同君明臣良意必有當其數者焉而不可以泛泛遇也比者閣下之使浙東竊嘗聞其為人慨然起而往拜之向之所謂清明而正大者真有以得之于心目之間為之欣然而自慶今閣下起拜大參揚舲東下又有亟見之機焉夫區區之愚願亟見于閣下者非他也嗟賢哲之靡常樂盛德之可慕平生之志思少自見遡餘波而挹流風以沾被其終身夫天之星辰遠而不可即也河海泰華足迹有不至也龍鸞麒麟曠世或弗之識也而某也方承教于大人君子之門非徒一識之而已又何幸歟謹奉書以聞伏惟鑒納焉謝傅知事書十一月草六日某稽顙再拜奉書嘗謂士有切身之憂則于其所樂為者有不暇顧處甚難之勢則其于知已者有不得伸由古以來所為發憤而太息者此也某生無他長以家世儒粗知讀書為文其始也未嘗不欲慨然自奮于古人而自十五六時即苦憂患廢格其後日愈甚挈身外依而復孑孑其獨也家有數老人下而昆弟無田以為資飢寒亂心纎悉營給嘗痛其業之不修而挾册之無所也里中有屬以子而教者遂往而從之殆亦逃其膠擾以補其空疏修已及人未能有益惟幸其甚近而朝夕之養得以不廢計出此而已比承傳命者謂閣下欲延致而館之私竊念矣閣下清名美政表儀臺府某誠駑下固將扳光榮以自附答知遇之萬一環顧其私如沐漆以求解重以母氏初喪神志迷瞶雖欲往有不得而往者其命也夫而聞惓惓未已今復以訓導之職處之將優之以廪粟寵之以生徒以致其來夫以雄城名區耆俊林立豈乏其人而使庸陋者超躐其不可一也某于世素疏樂放曠而習偃蹇也久使之應公家之程督事上官之將迎必闕敗而不支其不可二也然又有大不可者訓導雖小職列在學宫而可使被衰絰者于于然居之乎雖然閣下之愛我者至矣某之所以感者深矣畸人窮士之于世或對面千里或白頭如新甚則鳴號于其前而不一顧省者不少矣某也前無介紹之素後無左右之譽而何以致此哉有一于此環堵且成將以定其居而寧其親不祥之服有時而除天幸惠浙河東閣下未即還朝某將叩門曳裾奔走俯伏惟所命之其何辭以為讓區區所懷恐言者不能悉用敢干冒罪戾奉書以聞伏惟矜察不宣謝李溉之都事書蓋聞修其實而不求人之知古之道也然彼誠衆人耶不知吾夫何愠誠大人君子耶不吾知吾愧焉幸而吾知則天下之樂孰大于是科舉方興士投牒自進操數寸之管書數幅之楮以角一日之長謂之不求知可乎雖然易有之君子以同而異同于求知而固有不同者焉蓋自唐虞敷納以言非言固不能以知人也彼其抱美懷竒因以自見篤學信古不阿時好者豈無出于其間因其言而得其人則非賢且明者不能也某南方之鄙人也少而嗜學習為文詞當未設科之時日夜刻厲以庶幾乎古人素非志于求也其抱負篤信雖不逮夫向所云者然亦頗知自異于衆人家有垂白之親覬其成名而償其夙昔業儒之勞也是以冒昧而來獲偕貢於京師京師鴻儒碩士比肩立而稱執事者則曰是博學善古文才氣超邁鑒裁精絶樂善而不遺者也及試于有司執事實贊持衡而愚不才置諸選執事誦其文而賞之識其名而稱之傳者藉藉而某初未之知執事誠賢且明而某不足以當之也嗚呼人固未易知而知人亦未易某之此來厠名英俊之後諸公之知也而執事獨賞之至稱之篤知我為最深使其聲流于時而其歸也將以白于親誇于鄉終其身以為榮其報宜何如也輒奉書以道其區區之私其詩文一卷或賜觀覽亦足以得其所存唯進退之幸甚上袁伯長學士書古之學者必有師其授受之次可歷數雖去之數十百年談其道德論其文章宛然如其人之在目何哉以其傳之真也後生小子不幸不及見而知又不幸而不遇其所傳授之人則雖接其居誦其書終不足以得其似焉東萊吕子之在乾淳間而婺實其僑居流風遺化深矣易世搶攘衣冠淪謝雖欲考德問業而求之故老皆無存者矣先生世鄞中大家聞人與吕子輩行言論風旨相及先生漸漬其淵源而博聞精藝之學親從其徒而得其書又嘗憩金華之下坐麗澤之上致其景行之思而修其教育之方得之于吕子者多矣以先生家世之懿天分之髙充而大之閎中而肆外是以流聲天朝與掌帝制當代所倚重而天下之士莫不以為宗師况于並浙河之東而夙昔所向慕者哉當先生在麗澤時某猶童孺其後益逺而足迹不能以自致今年春以鄉書上禮部先生實考第之而綴名選中遂獲出于先生之門自謂才質凡下寡陋無所承重以衣食憂患纍其心年四十而不加進科舉之求偶然得之滋愧焉耳比嘗承末光而聼緒論茫乎其自失若河伯之向海若窶人子之見陶朱也然先生惓惓于婺其言藹如某又幸為門生事分之厚不儷他人倘辱教之廓其隘昭其蒙滋其稿實其虛導之入其藩而庶幾窺其室堂以其所得于婺者還以淑婺之人先生之賜也是亦吕子之心也聞旦夕超上京而某亦且南還將俟他日而卒業其所為詩文先生已嘗見之矣謹復録數篇為贄誠知戞甕釡于金石之側為不知量然舍是則無以為承教之基惟采納焉答傅子建書薦被手書佩意深至去秋場中竒寶橫棄暗陋罪無所逃足下不以見尤而猶勤勤懇懇欲帥用其言不敢當既嘗以語余生知已復于足下今又枉之以髙文請益未巳念不可不一白所懷嘗謂今科舉之制先之以四書五經傳注主某氏某氏所以明義理正學術次之以賦詔誥表欲其為古文章終之以䇿觀其器識果能是則其才品亦不卑矣况又本之以德行乎二十年間所得亦可睹矣竊怪比年義理之學日以晦堙文章之體日以骫骳士氣日以衰苶懈怠豈無故哉大抵司文衡者不肯心服前儒好持偏見詖説迷謬學者敢于違明制而不懼此最大害也又有専泥一經不知兼之六藝參之賦䇿以觀其全而摸擬夙搆之弊得以售又有好取俚拙不文之作以不拘格律為工僕每與劇辨者此也慎選主司其責固不在我學者但當潛心經文篤守傳説融會而發明之至于文非賈馬朝董班揚韓栁陸宣公歐陽子王蘇曽不觀自然追配古人度越流俗遇明有司不患于不見取彼區區括套之編揣摩之術君子之所不道也間嘗有問于僕者以是告之往往迂其言遲其效啞然而笑望而去之是以門稀請業之徒口絶決科之習又安有可為足下矜式者哉所欲獻者不過如前之説而已足下倘以為然循而行之自當有得于褒然之舉舍足下而誰哉與榷茶提舉書元凱布衣韋帶之士誦詩讀書嘗念有以濟物異時被一命效一官撓于事勢之難而在上之人莫可告語則亦末之如何若乃事之可為言之可進自遏其志而止不亦甚可愧哉某與閣下同出科目昔在里中閣下來長鄰邑實相聞知重以枉顧之勤不以流俗遇我也今兹典領榷司某適在臨蒞之下事關民瘼而荒山瘠土物不産一焉而茶尤絶少商賈之所不至木苖草葉足以代茗飲非民用之所急也舊來嵗辦甚微兼有門擁已為重困近年頓增引目六百外有帶辦日加于前細民無由赴訴有司莫敢一言峻責刻期倚箠朴以濟一邑之害莫甚於此某之來也親見今嵗租賦猶且釜懸而金紙絲纊雜色之徴交至沓出怨咨滿前所不忍聞竊祿於此固亦何顔伏惟仁人君子重哀斯人之窮而察愚言之非誣惻然救之頓減數百道之引蠲數十錠之鈔使是邑之民世世子孫毋忘閣下之賜某雖無他長亦能相與頌贊謳吟以誇詡其事於無窮豈不美歟事已具公牘此復以申言之而非私也伏惟垂聼而細加裁察焉不勝幸甚與劉生論易書承寄周易會通一部番陽董真卿所編集者并令獻其所見某何人而敢與此伏讀以還竊嘆其規模之廣大引援之洪博茫乎其自失也徐而察之則有深疑而未安者欲隱而弗白則非朋友之義而失所以命之之意欲言之則其書已成流布方盛區區之愚乃敢誦言其失無乃不可思之遲回遂復數月念與其得罪於斯人孰若使斯人不得罪於前儒我嘗謂著書立言必有大綱領今董氏之書所以為綱領者首條凡例是也以伏羲之畫文王周公之辭標曰經夫子大象彖小象文言兼標傳字謂如此庶幾經傳不相混而相統可以合四聖人之書程朱之傳義而觀之又序其所以作之意則曰今易自費直鄭玄以孔子彖象傳附釋正經之末而參解文王周公彖象經文之間并附文言則始於王弼程傳主理義而仍其舊古易自吕微仲朝以道始復而未盡吕伯恭復分上下經六十四卦為經二篇而以孔子十翼為傳十篇各為卷以合於古朱子本義主象占而用其本朱子所謂宗朝吕者不過欲學者分别四聖人之易以求之古耳若例以古人著書經傳各自為卷竊意解經者之謙德若以孔子之傳附羲文周公之經亦猶程朱子之傳義附四聖之書未見其不可也董氏之説甚美而慨然欲任會通之責其志甚大獨惜其于朱子之説著之不詳而所以論諸儒之亂古者誤至其求欲自異則又蹈于前儒亂古之轍而不自知何以言之朱子嘗謂朝吕之議費鄭王互有得失蓋先儒雖言費氏以彖象參解易爻初不言其合傳以附經也自昔多謂亂古自費氏始其實非是可見朱子之精鑿吕子謂費氏經與古文同此名之得也魏志謂鄭康成始合彖象于經甚明孔疏謂夫子象辭元在六爻經辭之後王弼分爻之象辭各附當爻下今王弼注本之乾卦存鄭氏所附之例也坤以下六十二卦弼之所自分也朱子此言亦甚明矣而董氏乃通謂費鄭以彖象附釋謂王弼并附文言而不及其以象附爻可謂誤矣程子據王弼本而為傳時未見復古之易朱子後出而始明豈得謂程子主義理而仍舊朱子主象占而用吕乎此亦誤也羲文周孔因時之教變通作用不同固難執彖徇卦執象徇爻以求其必合復古者正欲救學者支離牽合之弊非若程朱傳義専解經旨可相附也以今董氏所編乾卦觀之即鄭氏附彖象之舊但移天行健君子以自強不息一句置于彖傳之上其後文言則亦王弼之舊自坤以下則又改弼之例而從鄭氏耳去彖曰象曰而加以大象傳彖傳小象傳字部位如故而改立標幟其得失又何相逺哉易董氏于吕氏易下明載朱子辨説而略不知考何耶其大綱領如是他固無以議為且朱子本義自與程傳體例不同而程傳發明之義理雖自為一經可也不當強求其通天台董楷集程朱傳義而附以門人所録已有可議况近世談易者紛紛外二家而自為説者多矣若取其議論之優長理象之的當足相發明非卓然絶識未易鑒擇彼新竒穿鑿者祇以汨亂何有于發明耶今之纂注政未免此欲言甚長非頃刻可了若其名字義例之未安因革等列之未當中間引朱子欲因邵子大易吟以方圖分作四層云云誤以為董楷其愚謂之説如睽旅喪牛以有離之類又未可一一縷數也董氏自云學有淵源而師新安胡一桂氏自言得于胡為多用功此書蓋非一日意其篤于自信未嘗從人商確而又習見近日易通四書通等作遽欲傳世垂逺似太倉卒世有識者必能辨之豈待愚言適先之耳信筆疏列幸勿以示不知者唯以轉叩諸宗人仲退文然與不然還以一言見教幸甚與孔用道都事書孔子德為聖人其後世復多顯而賢司馬遷史記列于世家遷之絶識蓋此類也因是考之漢自安國而下在東都則若僖若融在唐則若頴逹若戣戡在宋則若道輔若文仲兄弟皆以儒學名節相望不絶天朝崇德紹封褒用聖裔必有名世者出焉而今見閣下則其稱首也今之省臺要官中州士大夫居之者必其學足以濟時謀足以經國才器足以服百司聲望足以動一世然後人莫得而間之閣下向為材御史風采振中外邇者晉陟都司適當聖君賢相更化勵精之初綜理贊決浩然而歸重聖朝之所以處閣下將有大于此者矣某南方之鄙人也以家世儒弗能他業遭逢科典得官歷更丞佐令録雖無他長而頗知自愛不為大人長者所棄絶數年在江東小邑閣下時以行部出境上蒙察于衆人之中而置之文墨議論之末然俄頃别去不復相聞矣今嵗里居忽被助教之命暨來京師始知閣下之在臺府也屢薦其名而兹又以告之台衡特與此選嗟乎某何以得此哉閣下心誠好賢不遺小善哀于汨沒而抆拭之使修其初服以從縉紳先生之後而發攄其誦讀之素為賜甚厚然成均天子之學首善四方者也助教秩雖卑掌佐博士教令前之處此者多方聞博習之師某何敢望其萬一况閣下以聖人子孫紹百世之傳任斯道之重區區獲遇以為已知固此生之深幸而迂狷狹滯之資職業之不稱以上纍髙明不得而不懼也到官三月矣於閣下之門不敢進為私謝念將祇承督教以免於戾亦不可無以自白謹録其舊所為詩文一卷而以書道其惓惓伏惟裁察焉表賀建儲表恭聞濬發淵𠂻升崇上嗣三靈宅命兆姓繫心中賀伏以天作之君必有聖人之繼父傳之子是為古今之常理蓋順于人情事尤關于國本周后詒謀最久咸遵世子之方漢帝即位未幾勉徇有司之請蓋以嗣不足者望不屬教不夙者德不成究觀往猷卓有先見恭惟皇帝陛下持盈以道慮逺惟明謂丕承列聖之休已恢𢎞業而蚤建萬年之策宜在青宫上祇母訓之慈下叶宗藩之議曰嫡曰長所以正序惟德惟賢可以君邦本之至公斷以已志爰畀承祧之重用新授册之儀繼明以照四方具瞻令質元良以貞萬國永固丕基某等忝預廷臣幸逢慶典守宗廟社稷欣聞大器之置安學羽籥干戈願謹正人之遊習國子監賀親祀禮成表庚辰十月四日伏以聖治尊親丕顯徽稱之薦齋宫藏祀幸嚴吉禮之成喜協神人光生宗祏欽惟乾綱執柄渙號揚庭謂帝王之道相承必先報本而祖考之傳有在莫大正名於昭鏤玉之文甚盛奉璋之士誠既孚于廟假慶庸展于朝儀某等叨處膠庠與觀餘典推仁錫類允懷兆姓之心紀德報功願上萬年之頌賀聖節表伏以乾始統天育聖協純剛之月泰元授䇿發祥當至正之年光被堪輿祚綿宗社恭惟宅心立事繩武繼文復科目以賔興求賢致治開經筵而典學遜志務修幸逢熙洽之期茂介延長之慶某等職諧舜樂身際堯封蹈舞朝班瞻威顔而下拜咏歌儒館頌福祿之來崇針齋居四針豫幼而志學行年三十而業不加進過未能寡其于成已之道可憾多矣端居深念因為四針以自警曰學曰思曰言曰行庶乎約守近修交至互發以適至善之歸云爾汝之向也靡靡乎騁外今也知反乎內吾幸汝之悔也汝之向也剛鋭以日倍今也不加進而苦退吾懼汝之怠也勉之哉志不可隳資不可恃工不可畫效不可覬若是不至則非汝之罪矣右學針心虛而靈思睿以通廓然心量非思曷充知由爾精義自爾窮審意之發決志之從弗昏以繆時乃之功聖人不思吾則豈同動而無邪靜儼其容敬以一之齊聖之終右思針汝言好直直則取憎衆人好諛諛則汝弗能雖然吾弗患汝之弗直而患汝之弗慎其出也人言萬端巧佞詭欺隂餂而試陽導而隨汝直弗悟亦害之貽嗚呼察之幾反之思思而得之言然後時右言針力行天下之獨奮志百世之上不知者以為愚未信者以為妄嗟嗟君子惟病夫已究觀汝昔亦允蹈已先民有言靡不有始敬之敬之往慎汝止聖賢同歸天地是似謂豫何人為之則是右行針勿齋針視聼言動天則自然已私一萌遂與物遷制之伊何曰惟此勿能勝彼私乃全其德昔顔氏子篤于求仁博文既極約禮斯循嗟後之人語勿毋易明察其機先審非是知之斯勿既勿乃誠子欲希顔視此為程進修齋針為舒城汪仲暹作德期于崇不崇則圮業要于成不成則毁山虧一簣止也吾止敷災既勤敢怠疆理是以君子乾乾不已不已伊何聖師有旨忠信修詞一誠表裏知至知終有條終始願言體之忱信實履刋落枝葉屏黜口耳不諧于時乃有諸已以是進修去道孔邇述古獻規用相吾子靜心齋針人之一心至妙以神乘氣而動易失其真乃放以逸乃昧以昏雖有視聼而弗見聞彼氣發機若馬驟奔制之尼之則惟天君聖賢有訓曰操則存繄歟之子出佐長民萬變糾紛方寸經綸揭名靜心思義以循兹靜非寂致力惟勤能靜其心理得氣馴太極之分隂陽互根厥義自殊請毋汨陳正齋針乾道變化命自天各正其正天乃全或罔而生理豈然中扃之中本不偏端居守一靜以専百體順令供周旋有動斯直道平平出為民表身帥先如以繩墨齊其愆允哉君子希聖賢配名思義恆勉旃銘刀筆銘刀筆吏具也人情孰不玩筆而畏刀然吏之刀削簡而已吏之筆民命繫焉自後世易簡以楮刀之用廢而筆尤重且専可不慎歟文學王君為其友作刀筆賦甚美而復求益于豫因托其所棄者而為之銘銘曰刀以利筆以鋭二物類相似也以言其形則秋毫之末不強于百鍊之鋒以言其用則削割誅刈操制生殺刀與筆有以異乎吁刀莫惜于筆也筆莫忍于心術也有形之刀易識而無形之刀不可測也使凡為吏者外不舞其手內不欺其心挺而不摧委而不撓至公付物而賞罰各適其重輕庶乎可以寄衆民之命而司三尺之平矣樂善堂銘至治元年春豫與松江趙德瑞偕舉京師一時江淅之士惟德瑞妙年而大父母父母具在尤相欣羡瑞之父以樂善名堂集賢學士袁公為之記道其處家居鄉之懿備矣諸公復為詩文贊之而吳某為之銘銘曰善根厥初帝降𠂻樂而自得乃其終欲消私絶雲卷空靈扃涵漾春融融不參以人天與通泰然動靜常從容曲肱飲食舞雩風聖賢殊詣極則同後有學者兹其宗誠身本自明善功似是而非審所從願柔俗習失正中福利攝誘欺兒童秋毫辨晰瞭不蒙知之貞固樂且充趙君名堂踐于躬上希聖武追賢蹤天爵不倦方崇崇餘慶垂後昭無窮儼思齋銘為三衢程國表作儼若思敬之容儼以思敬之功思有時儼無間表裏一動靜貫嗟程君敬自持純不已夫何思在止齋銘萬殊紛綸卓有則至精無形儼為極昭昭人已均是德兩還厥初會於一行者之家射之的計功先後知乃得先民詔學垂世式片辭指示如皎日揭之齋顔踐其實念兹在兹永無斁九思齋銘心官思睿作聖思不存為乃病物有則事有理弗昏繆由思耳視聼色貌言事則之循好是懿疑忿得恆自審理之從安以順昭訓言凡目九各専一非雜揉學思誠兹其要猗馬君揭自詔嘉爾名踐爾實非思勉功乃極靜學齋銘由靜而學先也既學而靜後也栁君道傳以靜學名秦景桓甫之齋自其先者言之也吳某輒申其義而并以後效為景桓勉焉銘曰皇錫靈明衆理森具匪敬以存曷制其騖爰植我本以考以思博極窮深鈎玄析微彼微既彰靡動非定衆止攸宗萬變斯應泰宇發光物意同春實踐兹境聖賢其倫先民之言揭自我友朂哉秦君視此座右思勉齋銘建陽蔣師文從京兆杜伯原徵君學以思勉扁其讀書之齋不鄙命豫申述其義輒求正于杜君且以師文共勵焉銘曰非思非勉心之真不思不勉德之純真昧弗知等愚民純而不已斯聖人去愚希聖思勉遵學者務此宜循循惟皇降𠂻布彛倫先哲謨訓日星陳學思兩若翼與輪服膺敢有怠弗勤造微極睿通鬼神眀擇衆理區以分允蹈同執誠其身終以勇繼知與仁從容聖域坐自臻蔣生氣質清且淳從遊碩師蚤有聞心解不但占畢呻已功百倍猶勤詢嗟愚何知義同申按常托實非竒新與子共勵堅書紳蘭溪州新刻漏銘自序至元重紀之五年嵗在已卯七月蘭溪州新刻漏成先是監州貫某首輟餐錢以率同僚市銅募工鑄為圓器浮箭識刻至是竣事顧惟舊樓旦暮警致板級頓撼懼失常節乃闢屋於大門之左以安處之惟州縣之政固非一端正時示民實急先務故挈壺廢職詩刺其非更鼓分明人知其政所繫豈小哉蘭溪由縣內附二十年而為州為州四十有五年而刻漏始有修廢舉墜民聼用新邦侯之績不可無紀乃述而為銘銘曰範金為壺斷木置箭節度以水晷刻斯辨惟國有制莫先正時號令興居是用不迷猗歟賢侯廢典肇舉爰度爰謀處以新宇匪宇之崇器則惟新匪器之尚存乎其人昭以啓昏順以正忒作此銘詩以示無極思容齋銘臨川危太朴合魯論禮經之旨以思容名齋有志於學者也東陽吳某謹歷稽經傳而為之銘曰人心通微主攝是身以內齊外粵惟天君不莊則漫致肅則一以外養中粵惟天則昔者子淵復禮勝私當非而勿其要在思亦有子輿所貴在道正辭近信動逺鄙暴子思一言蔽以思誠耳目勿思孟訓是程恭惟五事禹本天授疇數冥符聖衍至九合思與容互出略同各専其一並致爾功惟疑忿得視餘稍異事理無遺知行俱至聖謨有赫哲人在前嗟爾危子毋怠勉旃存誠齋銘存誠繫乾本文言中庸誠以天人論七篇要在存不存洛儒四勿旨不煩晞顧用工亦同原間邪隱若崇墉垣中有安宅天地元聖謨賢訓昭匪昏寥寥此道今誰敦子名其堂允知尊贊宋中丞孔公擊蛇笏贊古先聖王之治天下也驅禽獸而逺之使民得安居鑄鼎之懼神姦使不逢不若時則政教修明志行順正人物異方妖淫不興世衰道微民辟其𠂻氣類感召春秋而下妖異始不絶書傳曰人無釁焉妖不自作夫人者物之君也靈明主攝之具顛倒迷瞀物既得而執之故羽毛鱗介之或變化人為而不安其類則具耳目口鼻為人者失其常性以淪于禽獸又何疑哉余讀孔道輔在寧州時以笏擊蛇事未嘗不撫卷太息夫蛇之為物眩怪厲毒人不常見今也以當晝為隂暮以庭除為窟穴以牲醪為飲食吏民奔走傾向而神之恬弗怪也公抽笏一擊衆惑氷解抑何偉哉公之平生大節剛毅忠徑得之深而養之熟矣當其擊之非笏也其氣也非氣也其義也義以決勝氣以直前笏以逹其至而已吁邪不勝正妖不勝德孔公施之之效捷若響應則夫君四海長兆民任位育之寄者果能此道將見山川鬼神莫不寧草木鳥獸咸若三辰循軌萬有遂性斯民夀考富樂終身不見異事孰謂太古之治不可復哉公之八世孫某寶藏其笏追懷髙風因述梗槩而為之贊曰有妖惟蛇民亂厥志諤諤孔公奮擊斯斃公笏盈尺義烈萬鈞遂開羣疑以生我人公在朝廷崇議徑色用雖勿究舉為世則凡百君子正直是將式爾珍藏惟德之光伏羲畫卦圖贊并引有太極而後有天地形有天地而後聖人生天地不形其化息聖人不生其道隱大哉羲皇其天地之會而聖人之宗歟蓋自鴻蒙肇分化育絪緼神用顯行無所不在而未有發其祕者惟皇含德淳厚聰明睿智神武而不殺俯仰察觀逺近交取固已契乎其中而龍馬之圖適贊其決時無聖人則已聖人出焉則雖微斯圖八卦之妙吾知其弗終祕已天地不能言聖人言之天地不能畫聖人畫之森然未畫之前粲然既畫之後冥合夙成自然而然夫豈人之為之哉吁聖人之生也天地無心而有心卦之畫也聖人有心而無心明乎天地聖人之心者可與論卦畫之原矣敬贊曰大化不言至道誰陳肇開人斯篤生真淳既錫我圖爰假我手契由石持圖以石剖由一而根有萬其支靈明所流何慮何思權輿人文昭晰天祕窅乎孰名鬼神上帝髙下未淪萬世未終全像巍巍曷其有窮自贊圖像汝氣頗清汝貌多骨塊處乎冷淡之場蟻旋乎艱險之域雖非富貴姿亦無貧賤色胸涵天和足蹈聖則持身璧完秉志山立夫惟有道好學之士與之千里而神交不然則對面而弗識也北野兀者贊并引郡帥蕭侯家北野之區嘗因以為號復繫之曰兀者以自狀異哉侯之為名也夫名之由生以其實也無其實而蒙其名不可得也今人有珍器焉目以毁惡猶怫然色變况乎以殘形加全人哉侯獨欣然自居又何故蒙莊多寓言侯亦寓耳士之生世孰不志于行也彼疾足跌奔猖狂自恣抵冒險巇顛踣頓仆卒陷于辟後雖欲善補末矣其有挾用世之資而或利于位沮于勢蹈武旋跟不敢以趨蹩􅍷趦趄踸踔泥塗是亦無足俱故云流放士冥乎自然遺形而蹈實擯美而蒙汙樂虧而惡成嘗遊內以葆真不衒外以賈禍潰然而全肆然而安役一世命萬物而衆莫窺其所以然斯不亦兀之善者乎是數者之操不同由前之為侯固弗類由後之稱亦近乎私智而非吾所謂道也侯世勳庸家先御史之聲聞天下子孫襲總戎政建藩屏卓為虎臣今侯名德才業蔚然于時將有移之而佐國子民者瞻周道之砥平曠海表以方行忠信篤敬惟聖則是循無往而不自得願有取于是者持戰兢惕厲不忘居安之戒云爾因為之贊以申其義贊曰兀名則殘伊實匪完人兀而名恃懼于安廢形損外務専其內孰與中行心體俱泰廓然康衢義蹈仁趨動與天隨貞吉無虞王玉淵畫龍贊天雲垂海水立震萬里雨八極神哉沛斂復寂淵清泠玉一滴髙馬小兒圖贊易不云乎小人乘君子之器盜思奪之矣龔開聖豫作髙馬小兒圖蓋出于此其自為詩則姑文致委曲而略于末語見意不敢盡也愚輒不揆申極其詞以著戒且以贊竒産之不終厄云爾龍之媒挺權竒嗟不逢制小兒眇童頑爾何如樂騰凌傲以嬉聖有戒垂訓辭據非宜或奪之彼雖奪亦莫羈充帝間屬鸞旗願托身奉明時賈刪定畫像贊并序君臣父子之義不明於天下姦臣倡邪説以誤其國賢人君子力爭而不勝固末如之何然其正大之情英偉之氣千載而下聞者猶感憤激烈則民彛天典之重豈不足以有所助哉宋靖康之祻酷矣髙宗脅於秦檜之謀忘仇請和屈膝請命紹興戊午遣羣臣交口合辭以為不可而胡公銓上書言尤真切金人購以千金讀之驚嘆東陽賈公廷佐時為迪功郎嚴州桐廬縣主簿一再上書纍數千言劇論讎恥之不可忘名分之不可貶和約之不可信請誅王倫拘敵使決意用兵其激切之詞有曰陛下為戎人諸侯臣為犬馬陪屬曰此天也祖宗之天此地也祖宗之地一朝而化為金人之天地可乎無天可戴無地可履不如無生曰陛下委靡從敵則天下將圜視而起不怨敵而怨陛下劉豫之禍可為寒心陛下尚何面目戴黃屋王天下邪烏乎其言一至此哉大略與胡公同皆其君所不能堪又謂今有將可使有兵可戰直為壯曲為老毋以強弱多寡論是又本乎義理之正而深識事勢之宜非區區較計利害之間者也胡公既逺竄而公顧弗及豈以其猶不直斥檜而獲宥歟考之宋史當時內外之臣如李綱王庶曾開張燾晏敦復魏杞許欣趙雍胡埕朱松張廣凌景夏常明范如圭李彌遜方廷實梁汝嘉蘇符蕭振薛微言之徒章疏略見一二而廷佐曾不得齒名其間豈又以小邑下官在所略邪魏杞之集讜議今亦無考世知誦胡公之書而不知有公惜哉公字子野世居東陽之蘭隰宣和中入太學登紹興二年第升朝嘗為大理司直通判湖州台州遷詳定一司敕令所刪定官後薦起知處州辭遂致其仕今其鄉猶稱賈刪定子孫多以文學顯者七世孫權出公二書及家譜示豫併獲拜其畫像英風義槩凛焉如存吾鄉有人如是而忍使之泯泯湮沒哉竊不自揆表而著之復為之贊曰昔在紹興屈身和仇嗟嗟賈公獨為已羞越職扣閽攄憤陳義子房之忠仲連之志天地與立曰惟綱常二書之存千載有光其官則卑繄節甚偉遺像凛然孰不敬企僧復庵贊往過來續化沕穆兮而曰輪回逝者復兮靜極動生斯道云亨兮而曰根塵絶弗萌兮人來問豫復有何義一編在前毋落吾事淡樂齋贊為蕭存道元帥作軒冕組圭盛貴服兮綺疏華榱麗居室兮八珍九鼎僣玉食兮歌鐘美人侈聲色兮貝玉珠金富藏積兮嗟嗟世人寧有極兮君子之心不留一兮天機嗜欲相出入兮惟淡于彼樂斯得兮元戎英英裔述律兮爾公爾侯常布匹兮淡不自知樂匪物兮真適自然非有激兮又奚區區較得失兮孔顔在前昭哉遺則兮沃哷典簿名字贊海夀字允常仁者樂山體則似之靜而有常其夀也宜夀繫海名允常維字揆以格言兹毋乃異仁由知發動自靜根二者則一或義所存先生命辭既戒既具豫言非贅亦德之助天馬贊并序至正二年秋七月上在灤京拂郎國來獻馬長丈一尺有三寸髙六尺四寸昂首復增三之一焉身純黑後二蹄白食芻粟倍常間以肉湩竒偉驍駿真神物也拂郎在西海之西去京師數萬里凡七渡巨洋歷四年乃至上御慈仁殿受之後月乘以歸燕既敕畫工為圖仍命詞臣贊之臣某具員學館目睹盛事謹百拜稽首而獻贊曰房星降精龍出水中挺生雄姿西極為空聖人御天臣不敢駕四年在途祗獻墀下玄雲披身白玉並蹄昂首如山萬驥讓嘶神物應期振古無匹不命自來懷逺之德省方時乘一日兩京吉行無驅永奉皇明大蘇公自畫背面圖贊畫舉扇障面并作元祐罪人寫影示邁八字楊廷秀有跋元祐罪人東坡居士面有何羞作此舉止疾走避影息隂則已胡蓋而章猶書邁子頌汪氏宜人不用緇黃頌釋老氏之教震動四海其言死生輪回入地獄受諸苦狀尤能懾怖愚俗從之者如水趨下非一日矣男子剛明者間不惑至于婦人女子隂暗荏弱其誤而溺焉毋怪也昔有治喪不用浮屠而其母欲用之者問于朱子朱子告之以當委曲開釋必不可回則亦不得拗而咈也夫懼于咈親而從非禮過不在其子而母之賢為難得也新安吳諡以其母宜人汪氏墓銘示余讀之知其臨終戒不用緇黃作而嘆曰向所謂賢母不可得而見者豈不在兹乎雖其他懿行甚悉而此為卓卓特異因特為之頌云頌曰異端惑世崇誕誣張皇鬼伯司幽都婦柔惟怯尤易趨原始反終本不殊指往為復理所無昧迷日月舍正途傾資諂俗反詬儒吳母絶識超羣愚訓行厥後垂世模偉哉果勝大丈夫禮部集卷十一
