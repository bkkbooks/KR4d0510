body:
  text: 禮部集卷二元吳師道撰古詩五言秋懷二首江南木葉飛江北百草黃風煙淡莽蒼悵望川途長寒魚聚其羣鴻雁忽成行俯仰念時物索居耿凄涼昔我二三子敦好攻文章漂零時相失尺素不得將人生四方志企爾揚聲光登山豈無車涉水亦有航真誠諒不隔離别庸何傷忽忽意不懌獨步登髙丘羣山紛糾蟠前當大河流八月草木凋萬里風雲愁寒晶蕩白日孤鴻去悠悠鴻飛不可極其下禹九州古來英雄士百戰橫戈矛念我當壯年弗獲兹地遊豈無干時略欲往誰見收君看天馬駒失足羞氂牛和李坦之二首白雲滿蒼梧黃葉墮瀟湘九疑青峰下水冷孤祠荒漠漠帝子魂千載懷故鄉秋風吹落日猩鼯嘯幽篁瑟聲杳何處臨江思茫茫倚楫欲弔之南望涕霑裳又中原帶黃河大行卧嶺崟寒空渺萬里日暮愁雲隂髙鳥飛不度狐兔餘哀音英雄百戰地意氣俱銷沉秋風舊城闕野草荒煙深興亡不可極北望涕沾襟李龍眠蓮社圖逺公廬山下手種玉色蓮清修香火社雜遝山林賢龍眠弄筆墨貌出晉宋前橫橋虎溪水古木東林煙須眉䇿遺老瓶磬趺枯禪石壇花雨落稽首西方仙休吟散梵帙風罏薦寒泉矯矯靖節翁歸心赴斜川分手溪上笑攢眉社下緣淋浪漉酒巾籃輿搖醉眠止飲諒匪難恥受異教牽空山舊行迹寂寞餘千年竟令妄庸兒攝誘紛相傳陶翁我尚友掩卷心茫然浩然觀分得浩字過雨秋正佳出郭山漸好松門表靈宫石澗緣細道空壇故葉積深殿隂色早丹遺井水香仙去庭柏老伊昔崇玄元搆祠始天寶靈風却緇塵金幢飛翠葆猶餘千年像遂走羣吏禱我生無俗情道妙窮深討天根息綿綿虛白生浩浩永懷潔身私非關恨枯稿緬邈鸞鶴翔空山動秋草和黃晉卿效古五首美人隔雲端可望不可隨天秋光景暮青鳥倐何之明明不識察耿耿長相思合離諒有分素志誰能虧又士生一失勢忽作鴻毛輕悠悠百年間臨河俟其清黃塵漲白日古道無人行衰榮迭代謝故新更送迎惟有達識者振古流芳聲又升髙望廣野遊氣紛飛揚海嶽潛銷變金石何能長英英冠蓋區覆手狐兔場富貴奚足道俯仰令人忘又天氣無停吹北鴻復南飛鴻飛有時息遊子去不極淹留轉憔悴緇塵化衣色散樗有髙枝芳桂無完皮多才祇自纍不隱知何為又生抱世外姿與世鮮所歡同心久契濶歲晏凄餘酸安得子歸來製芰紉秋蘭散髮笑明月行歌采琅玕超然息萬慮冥合造化端上巳日水西紀遊今歲仍癸丑佳辰况清明天空朗遐矚及此新雨晴會心得良彥飛蓋背層城始循長溪轉復傍清林行沖湍起亂響秀嶂巉孤橫邂逅見漁翁徘徊聽鶯鳴步入松寺小坐逢僧話清洗鉢罷幽饌出門有餘情候暄覺風快隂移知景傾前登古廟髙俯睨春蕪平泛泛下白鳥冥冥飛落英揮觴復臨流放歌聊濯纓境幽賞彌勝神怡體自輕緬懷宇宙間兹日多合并五侯競豪靡晉人悲死生豈若吾遊佳蕭然淡無營夢先大父有感死别一紀餘故迹隨流波哀端在腸臆慘若嬰沉疴昨夢臨我前儼服冠峩峩手持一卷書授我仍長哦覺來驚且悲庭樹酸風多惝恍送歸魂冉冉荒山阿永懷鍾愛心生死耿不磨保躬蹈前訓沒世期無他奈何人事乖志願嘗蹉跎平生素無淚此夕如傾河題東吳謝氏春草池塘江山富詞藻謝公劇清妍偶緣春風夢爭咏池草篇冥搜諒亦苦神助誰云然情鍾同根愛妙契天機全西堂渺風流東吳盛才賢烏衣鬱髙門冠蓋何聨翩看花玉缸飲聽雨書床眠會心得妙唱馳譽誰後先飛亭壓野木極目春無邊幽芳動纎緑湛影搖清漣時令塵中客浩蕩寄所宣徘徊不能句返棹下蒼煙清明哭暄風吹陌塵野哭紛四起人哭尚可忍我哭那可止哀哀兩年間竒禍不少俟哭母哀未終哭弟仍哭子生來亦何娛展轉荆棘裏慰眼骨肉完豈恨同飲水春陽遍羣動虐厲劇孤卉呼天自難噤尤怨寧昧理灑飯迫兹辰淺壤魂猶寄泪竭眼欲枯沉痛徹心髓送人貢粳米之京后皇制任土職貢來四方珍異匪余求服食乃其常金華有嘉種玉粲含芬香土人昔肇端每歲賦其鄉頗聞播種初行者避畎疆斂收畢徴納老稚不敢嘗擾擾府中集數日何奔忙珠璣歷萬指錯落照九光圓好中式度緘封謹縑囊矧今歲旱乾彌望茅葦荒野人懼不供挈瓶越林岡及兹幸充數揚帆上天倉惟民秉恆性食芹猶不忘勤動非所辭有司貴循良賢侯重承命護視嚴周防行行不可遲去去凌風霜玉食倘見登仁恩沐汪洋願推及物心共樂斯時康陳風以為贈别意何悠長和張同父感興五首逺役嘉定居沉思惜流景秋風從何來脫葉下髙嶺更長夢屢斷月墮窗已冏感時增隱憂撫躬發深省幽姿豈解媚窘步何能騁迂踈性彌篤紛華念終冷聖門有真樂妙理存至靜玉韞山自輝錦粲衣須絅又驅車遊中原北渡臨大河縱觀岱宗雲却挹東溟波廓此隘陋胸萬象何森羅祇恨苦匆匆急步無委蛇八極浩無垠熙運當泰和遍遊尚有期慨然發長歌又我家城南陬門徑深緑蕪每受俗子憎終歲誰窺𨵦張公數相過不憚百里途髙談振風雅攜袖光驪珠頗令好懷開有若沉疴蘇謬陪冠蓋遊浪迹九軌衢回首江南春晴煙暖枌榆同心各有適嗟我寧非圖又我生苦無才振步強追古寧堪侣簮組但可投農圃一經業三世顧恐忝厥祖免俗正未能用時終何補誓言終弗畔惇志希曽魯又嚴霜知蒼松盤根識利器駑蹇混驊騮同驅不同至頽波漫滔天投足幾無地栖栖抱孱質岌岌抗獨志萬鍾與千金何與平生事金華觀分得琴字春晏踐宿期雲間陟髙岑獲從勝友俱遂此物外心月窟探萬仞龍淵測重隂盤坐白石臺長嘯青櫟林莫探虛皇居急雨含蕭森松風飛淙合終夜凄笙琴何能發孤咏千載同遺音溪山仙館圖平川漾輕舟蒼石擁高樹煙中連嶂斷林際飛甍露兹宇誰所營列仙實來聚我生戀溪谷忽去踏塵路坐恐孤夙期臨風恍延佇合歡木合歡愛嘉名矧復知昏旦淮土産特多蔥蘢蔭溝岸離離青葉解冉冉紅茸散靜和宿露卷動與微風戀物意豈恱人和樂自堪玩蹇豫寡所諧觸事多忿悁亦擬學嵇生植根向庭畔追和黃晉卿北山紀遊八首靈源昔從招提遊春投上方宿池光蕩寒煙月挂深巖屋夜久僧不歸無人話心曲草堂秀巘擁翠屏飛樓納遐景幽泉雲根出峽雪漱清冷誰知一源微流潤被千頃三洞遙遙覆盆山千重萬重翠洞門春正間丹光夜非祕如何安期輩可聞不可遲鹿田山空鹿不來玉女孤墳古雲林暗白日空翠灑飛雨黃精苗正肥滿地無人取寶峰草深山徑微宿雨含沮洳憑雲陟層宫盤石翳幽樹未遂邱壑棲悵然還獨去潛嶽潘公舊遊處清風滿林壑院古春苔生巖空夜泉落惟餘一鉢在上有塵漠漠山橋巉崖插澗立飛梁倚空上雲湍挂逺白風林含餘響之子有髙懷獨恣山泉賞寶石春山花亂開野水被行路僧居不得到歷歷知佳處有時夜深夢踏雨穿雲霧休日雨下曹窘將迎休日仍不休今晨雨勢急暫爾散羣騶解衣東軒下卧聽浪浪流豈不厭煩溽所欣稍優遊素琴試一彈書卷開復收蕭然淡飲水兒女更啞嘔始知一日間未易千金酬我非適時才分當老林邱失足墮塵網憔悴祇取羞逢人數言歸人復笑我留我留意誰會作詩聊寫憂九日登響山奉呈同遊者響山臨響潭曽識太白來我欲遊其間却愧非仙才况乃博微官終年走塵埃幸兹九日至獲與羣彥陪高秋慘雲物薄日翳復開駐馬青松隂披襟上崔嵬前睨孤城低下瞰清溪回諸峯送逺色攬結何雄哉野菊半含英濁醪初發醅且盡一笑歡良會不易諧溪聲宛如昨斯人化飛灰想見登臨時逸氣橫九垓寧知千載後我輩兹徘徊呼之倘可作相共揮于杯凄其暮色合颯颯疾雨催扶攜下登舟水竹沿灣隈仰看千仞壁浩歌散餘哀廬山紀遊贈黃伯庸昔聞匡廬名今睹雄秀姿我舟薄其趾隂雨深蔽之平生潔清念諒受廬君知寧辭三日淹未恨一見遲邂逅得佳士欣然即追隨晴雲散諸峯攢青逗參差五老太古色相對心融怡披襟尋鹿迹抉洞徵賢祠風雩杳餘韻書臺抗層基前瞻辨五乳仰顧指狻猊却招白鶴仙下瞰神龍陂飛橋度三峽艤棹凌深危噴濤電雪眩轉石雷霆馳薄暮不可留淅淅山風悲明發開先遊寒溪涉清漪入門雙劒色夾道萬虬枝飛虹瀉青嶂漱玉下深池竹亭敻幽闃四壁多殘碑出林送落日踏月仍遨嬉移舟星子灣回首煙霧時歸來記所歷一一天下竒兹山信綿邈覽勝猶多遺簡書屬有程逼仄嗟絆羈悠悠此時路依依後來期巢栖雲松間瓢飲澗水湄昔賢有髙躅安用微官為望九華山輕舟下池口遙望青陽郭雲間見九華爭先出鋒鍔參差敔背缺峭鋭圭首削竹箭拔春芽芙蓉攢秋蕚竒姿信明麗逺勢仍聯絡下有巖谷幽真靈諒兹宅詭哉末世士強以名號託丹崖不受滓青鋒鎮如昨千載知屬誰含情寄冥漠宋齊丘號九華先生魯港支港分江流長煙接淮岸青山暮隱隱白波寒漫漫津鼓迎過船客子暫休館蕭瑟蘆葦叢酒家亦相喚按行值遺老話舊仍永嘆當時一聲鉦散卒十三萬嗟哉彼孱庸勤闕比姬旦十二月二十二日宿七里寺書壁微宦不適意一身抱長憂况此凶歉年餓者擁道周及物豈無念越職非所尤博濟古云難勸分動成仇荒村走風雪破寺寒颼颼中夜耿不眠胡為此淹留四月二十六日即事竹光含積雨滿室青沉沉階除無行迹時有幽蟲吟淡然終日間飲水弄書琴感慨復長歎誰共語此心逺聲起天末門外江波深聳身上髙閣晴雲出孤岑南風一何佳遙遙披我襟薔薇花詩為監州貫子素作紅刺綴修條清隂羃髙架植根向來誰依此絃歌舍使君有雅懷在泮樂休暇挹翠開新軒爛錦迎初夏香隨夜露發色許晨霞借孤葩殿竒絶衆目共驚詫柔枝貫當中纎葉紛垂下生生無窮意心本滋萬化至理諒斯存悟領復誰訝今年歌鹿鳴行將勸乃駕明倫崇振厲淑士勤慰藉英華豈無徴燁燁動光價寧殊當窗草未遜同穎稼歌吟侈篇什宴賞飛盞􅕌更托丹青傳千春不凋謝百尺山圖為輝東陽賦峩峩大雄峯故是洪都望若人真有力獨坐不復讓穹崇搆臺殿金碧開巖嶂天華百谷滿鐘唄層雲上緬懷季唐主詩語留竒壯至今昭回光草木變姿狀上人東陽秀法筵擁龍象縮地入秋毫銜袖有百丈山川稟瑰異宅據神滋王矧復此道崇奔走有信向弱質阻攀緣披圖自惆悵唐宣宗題册禮部集卷二
