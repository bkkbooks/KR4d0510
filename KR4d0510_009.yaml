body:
  text: 禮部集卷九元吳師道撰七言絶句山行林中禽語意相關池上魚遊心共閒忽到水窮雲起處悠然回首見南山桐江道中二首東風緑水動微波晚泊灘頭理釣蓑喚起江湖昔年夢一㠶寒雨聽漁歌又連山紅緑照清溪倚棹行人思欲迷多少鳴禽好音語止嫌杜宇作哀啼病起單衣小立怯西風病骨詩愁冷淡中一片清秋在何處豆花籬落雨濛濛追凉書所見三首小風不掃晚來雲天色澄澄紺碧痕囘首銀盤孤湧處火峰化作雪濤奔又沙渡歸人已罷船石樓遙樹自生烟溪囘路轉知何處一塢斜陽數萬蟬又凉風瑟瑟響千崖漸出平原草樹開欲墜飛螢已無力瞥然數丈過池來秋江晚渡圖十年呉楚客西東展巻高歌興未窮渺渺孤舟呼不得好山無數夕陽中烟寺晚鍾圖半空孤塔擎飛杵四壁長烟漲白波落木踈林秋色老㫁鍾殘磬暮樓多郊行浴鳥翻晴日色暄平蕪千頃豁春烟何時擺落窮愁事濯足清江藉草眠杜鵑春風望帝寂餘魂臣甫離愁錦水濱千載此禽同姓杜哀吟唾血定前身元夕桞臺梅巷鎻春晴酒思燈光負賞心聽徹宣和太平曲獨看明月到更深赤松二仙圖四海弟兄誰慰眼半生書册政亡羊赤松有路不歸去花落春山百草長夏夜江上二首繞屋清江竹萬竿水風蕭瑟竹光寒夜深月上門不掩卧聽釣歸船過灘又洪濤半夜發前山月明風急魚龍翻呼兒江邉縛艇子蒼藤白石青楓根溪上栁花漠漠杏花乾一寸青蒲刺碧漣春色滿溪人不到野鳬背上小雛眠次韵黄晉卿清明遊北山十首千峰烟雨亂崢嶸中湧芙蓉一朶青想見登高能賦客吸呼山氣聚英靈又幽賞𤣥談總背時青山自識我曹竒不知同結東林社還有當年遠法師又蘭若青林數里程孤峯當道送還迎歸來寒食清明夜猶夢松風澗水聲又珠懸黍米容千衆芥納須彌等一塵始信約師瓶浴事故將靈幻駭庸人又煜煜丹光澗壑紅牧羊先在嶺雲東赤松花落春風老未得相逢一笑同又仙佛偏于勝處多飛空金碧倚峩峩白雲深鎻藏深屋誰記北山人姓何又林間尊宿澹衿期不減當年許與支十載相思不相識雲山應笑俗縁卑又藥草生苗宿雨微梢梢野筍脱斑衣桐花開盡櫻桃過山北山南謝豹飛又行歌共訪採芝翁絶壑層雲一盪胸誰念愁吟溪上客落花微雨獨搘笻又一壑風烟自可留十年湖海漫狂遊短衣射虎真堪樂莫恨將軍老不侯輓車圖短轅長馭後先驅逐利奔名恣所如落日中原天萬里我貧正坐出無車讀陳后山詩有感我名異世偶然同身迹沉微轉更窮寄食尚憐從郭槩賞音未易見蘓公和陳景傳寄方韶文韵四首北里髙樓笛夜吹酒懐詩夢與秋宜惠連無限凄凉思獨背寒燈聽雁時又風流文采弟兄難落月懐人㡬夜闌俗子寜堪披牘對俊㳺聊作采詩看又黄塵那解汚清流客裏千尊莫負秋閒采芙蓉弄江水笑攜凉月上沙頭又風流遺老曙星殘湖海知心夜夢間欲訪𤣥英向何處猿聲木葉滿秋山山雞斕斑五色出深叢顧影徐行氣自雄飛去漢廷應作鳯野人慣見任西東偶題塵土侵懐屋打頭出門市道摠悠悠南山萬古長青眼莫怪相看不下樓眀皇聽笛圖小立華清院宇春側身横玉笑迎恩秋風吹斷歡娛曲凝碧池頭急管喧羣雁圖飛影成行止共餐稻梁易足水雲寛誰知江海離羣客獨對秋風不忍看孟浩然跨驢圖二首風雪蕭蕭破帽敧玉堂囘首夢應非鹿門松徑寒門裡擁鼻微吟定憶歸又直語無因住禁垣清游随意蹋寒原風流鄭五雖相似應愧詩庸位轉尊班姬吟扇圖二首已信當年有緑衣漫將團素寫新詩才眀自斷衰榮夢肯對西風作怨悲又當暑提攜識暫憐安身篋笥任長捐昭陽極寵昭君怨得似斯人晚自全息齋墨竹三首長憶東陽舊使君秋風吟倚瘦休文石根數葉蕭蕭碧長伴幽人一壑雲又碧鮮迎舞翠華臨一日清風滿禁林得士雖聞諸老薦報恩誰識此君心又彭城一派接洋州千載真傳屬薊丘舉世随風翻墨水凝神誰識與天游春日獨坐二首茶煙澹澹風前少庭葉沉沉雨後添何處楊花念幽獨殷勤入室更穿簾又幽禽著樹一兩語小雨隨風十数番無酒無詩亦無客澹然終日自清歡次韵七夕二首織女黄姑有定居河梁底處度空虚世兒擾擾寜知此應笑書生苦信書又流俗無知祗陋愚矜能於道亦浮虚鄰衣自富何關我不用逢人詫腹書除夕瘦竹蕭蕭一樹梅閉門俗客少曽來眀朝遮莫新元日不用山童掃雪開昭君出塞圖二首平城圍後㡬和親不斷邊烽與戰塵一出寜胡終漢世論功端合勝前人又巫峽故山花樹紅村村婚嫁樂春風琵琶馬上無窮恨最恨當年誤入宫楊妃上馬圖花擁金鞍歩歩遲君王别殿待多時延秋門外驚塵起夜半無人見疾馳秋日二首酷暑煩蒸日望秋耳根恨不聽颼颼夜來庭樹秋風起獨覺却添無限愁又少時倔强不知愁每笑詩人嘆白頭四十行年還自笑風前梳墮一莖秋霓裳圖一曲霓裳衆樂催相傳親聽月宫來當時果有飛神術末路因何厄馬嵬即事三首日炙風吹野岸傍形容塵土汗如漿平生三伏寜知此髙竹當門獨倚牀又解衣坐憇野人家滿樹紅茸夜合花河水悠悠纓可濯我來非是羨魚蝦又離家始識家居樂渉世深知世法疎豈是一行能作吏已慚數月廢觀書堯民醉歸圖騎行巾服俱非古儀狄以前誰飲醇寫出太平真樂意陶然如此即堯民七夕木槿籬邉絡緯哀卧看河漢遶天迴西風不管扁舟客吹下樓頭笑語來春暉堂草心何此報春暉游子遠游歸更遲甘旨髙堂日娛飬願君不識孟郊詩芙蓉翠羽圖一幅宣和舊畫圖芙蓉紅擁翠禽梳龍沙萬里秋風道此景君王夢見無紫極宫太古圖突兀眼前安得堅人生變幻等飛煙混成有物知誰識長向千秋萬古傳漁樂圖罾網縱横來去船老妻含笑小童顛旁人競羨漁家樂不道羣魚正可憐吳城山阻風吳城堤下放船初津吏催程畏簡書却謝北風多雅意留人兩日看匡廬留李王河驛宦况不如歸興濃何人知我愛疎慵江濵荒話三更月聽說松楊夘酉峰集句二首贈荅潘季通江上春風送客舟鳥啼花落水空流勸君更盡一杯酒與爾同消萬古愁又梅花梨花參差開如何不飲甘心哀百年莫作千年調二月已破三月來還里二首鄰屋荒塘巷陌非故廬在眼獨依依祝融回禄偏憐我莫恨知心一世稀又東家滿装千斛船西家腰纒十萬錢我歸無物堪誇客方寸夜光長炯然寒村雪暮圖木杪棲鴉景已殘沙邉落雁雪猶寒江南江北曽行路今日山窻借畫看桃源圖翠嶂清溪遠近春柴荆鷄犬接比鄰花開酒熟身無事便是桃源畫裡人玉澗禪師山水玉澗詩多畫上題如何此畫不題詩依稀樹石皆遊戯一筆全無却更竒雨中即事山雨冥冥水滿溪倚闌望斷轉凄迷黄鸝不管人愁緒盡日髙林相對啼贈醫者陸生三十年前識乃翁鳴絃釃酒近隣東閉門秋院梧桐雨却話人生如夢中邯鄲灼黍圖勇棄功名一覺餘千年重有此翁無昏昏醉夢人間客争向君家看畫圖大洋灘漠漠青煙障白陂遶船千百雁聲悲喚醒羇旅十年夢似泊高沙湖裡時凍蝇僵不能飛静若痴忽敲窻紙戀晴曦主人偶見猶憐汝不念營營擾擾時題陶士元䨇溪櫂歌二首緑蓑青蒻老𤣥真流水桃花曲尚新故里雙溪誰復識櫂歌今喜見斯人又漫郎孤唱發清妍甫里豪吟思傑然更聽正音韶濩曲武夷山上有飛仙蘭亭圖二首京洛銅駝草莽深春風脩竹滿山隂右軍憂國心如許也伴蘭亭醉客吟又觴咏餘情落筆時後來感慨已先知山隂道士衣冠少竹裡荒祠澗水悲西江圖西山翠湧大江流歴歴開圖記昔游寂寞滕王舊時閣秋風斜日下城頭磧雪騎竹圖桞道傳提舉自作此圖并題其所爲詩有百年行役今如此安用文章氣吐蜺之句自寫新篇自製圖記曽萬里從鑾輿莫嫌不得文章力風雪詩人老跨驢題山水圖送人歸仙居仙居直接天台路無數青山與雲樹行人已在畵圖中又復攜圖入山去正月六日七日舟中即事雨聲入夜波翻天梦回月出春風顛雪香亂落衣被濕知是梅花吹滿船又江清日净午風柔潑眼煙嵐紫翠浮楊桞未描花未動無人來共早春舟贈虚舟道士我愛虚舟豈浪名無心隨處任流行抱琴却出龍門峽眀日江湖春水生唐陳宏畵眀皇擊桐圖三郎半醉玉顔開手戞青桐舞節催老樹無情應解笑曲成那得鳯皇來贈日東僧清無夢萬里滄溟斷去途閒雲野鶴共羇孤祗應清夜禪床月解照平生夢有無葉敬甫所得息齋墨竹爲火燎其半李侯妙畵奪天機回禄祝融將取之頼是清風滿盤谷不令虐燄盡髙枝捕魚鳥翻身舞影瞰重淵百計求魚飽爾咽巧拙並生還自足何曽饑死信天縁春日雜書澹無宦况有詩情馬上微吟太瘦生楊桞杏花山市閙一畨風雨近清眀是時僧志南有沾衣欲濕杏花雨吹面不寒楊桞風之句止建德梅山寺四首玉峰春色動晴煙白白紅紅取次妍病眼却無看花分卧聽簫鼔度山顛又清眀長是雨綿綿今日晴光勝去年山縣閉門花事過正愁無水救春田又黒蟻蠶生桑葉小河豚魚上荻芽肥雨晴野外人聲動吏㪚庭前燕子飛又山藥甞多心共苦案書抛乆眼渾迷舍南舍北團團樹無奈子規朝暮啼雨宿招賢寺二首山路殘春已厭行僧房今夜有餘清岩前流水窻前雨兩耳一年無此聲又招賢寺裡解招誰笑我今年兩度斯山雨留人行不得憂民心事有誰知村行煙樹交交桑扈嗚雨泥滑滑竹雞聲青畦白水迷漫渡幽徑濃隂詰曲行禹栢圖漢陽縣大别寺中栢貢荆州任土風漢陽遺樹尚葱蘢休誇此是親曽植四海青青盡禹功梅聖俞四禽言此建德爲令時作也官舍四周皆山春夏之交禽聲喧然因感梅公詩集爲一絶餅焦亦足療朝饑止飲壺盧豈用提風雨蕭蕭泥滑滑不如歸去去來兮贈郷人說相者秋浦相看眼爲開與談鄉井㡬時回故吾骨相應難改祗有新霜上髩來題梅溪詩畵卷淮海張公昔好竒畵圖一幅寫清溪慿誰添取詩人屋更看梅花雪壓堤玉腕騮圖滿身霞彩尾蕭稍玉腕騰凌意氣驕率向赤墀人駐目只疑踏雪未曽消逰赤壁圖燒天烈火萬艘空横槊英雄智力窮何似扁舟今夜客洞簫聲在月眀中秋江獨釣圖峩冠古服理絲綸恐是𤣥真軰行人今日官征筭舟舫水雲莫倚自由身清溪道士㸃易圖二首圖像堙微乆失傳或從方外得先天姓名不落人間世亦有清溪㸃易仙又每愛研硃滴露篇飄然清氣已如仙時人不悟仙人術木鶴何曽得上天子昻蘭竹圖湘娥清泪未曽消楚客芳魂不可招公子離愁無處寫露花風葉共蕭蕭揚州四首畵鼔清簫估客舟朱竿翠幔酒家樓四城列屋數十萬依舊淮南第一州又長壕如帯故城荒猶說英雄李與姜唐人愛向揚州死爾死何曽有耿光又后土祠前走鈿車無雙亭上看仙葩一年聞道開三度不是春風玉蝶花又富貴驕奢志已迷無端更欲上天梯庭前木鶴真兒戯况說雲中犬與鷄腰纒十萬貫騎鶴上揚州昔人以爲戯言譏兼得之惑盖誠有是事也劉安髙駢是已張子固秋泉卷麗澤盤溪記昔游白雲人去自悠悠秋風何處寒泉路應有清泠一勺流曽游益之門胡古愚後京華雜興詩京華風物太平時瘦馬青山髩欲絲二十年來留滯客祇應䞉公槖中詩十一月十二日崇文閣下祗試二十三日出和張仲舉宫燭風簾徹夜眀屋髙人静易寒生不知卧聽蕭蕭雪何似山窻洒竹聲又棘鎻深闈夜不歸宫庭步遶月輝輝書床塵動牙籖亂茶鼎聲喧蚓竅微𤣥教堂獨坐二首槐栢成行擁緑陰鈎簾獨坐屋深深日長清思無人共祇有黄鸝送好音又庭下髙槐葉乍張風吹嫩緑有㣲香忩摇簾動玲瓏影付與羇人一夏凉唐馬圖飽食天閑逸氣生只愁伏櫪誤長鳴青絲挽入奚官手俛首何妨逐隊行段節婦南國征人去不歸春妍懶著舊時衣至今門外冬青樹不與風花上下飛劉節婦醫者妻勤苦良人學煉丹丹成早已攝飛鸞姮娥亦仗刀圭力不恨單栖向廣寒趙節婦縣尹妻夫子曽彈單父琴琴聲忽斷杳沉沉夜深一掬寒窻淚莫聽秋風别鶴吟送夏學正赴奉聖州書巻囊衣共一車出關千里漫風沙祥雲五色天西角喜及髙秋望翠華又弓刀射獵古雲中聲敎明時萬里同莫向果園誇異品䞉栽丹桂待秋風趙子固畵梅千樹西湖浸碧漪醉拈玉笛遶花吹祗今無限凄凉意留得春風雪一枝方方壺道士為危太朴畵雲林圗二首抱朴先生學大還偶然為客未歸山迎陽坊里看圗罷夢遶白雲青樹間又海上三山樓觀開壺仙早晚御風囬畵成定勝人間境為問何因寄得來崇術堂前棠梨西廡棠梨一樹遮諸生長候夕陽斜清明休暇無人過落盡風前玉雪花張果對御圗多欲求仙亦已痴老翁幻怪等兒嬉騎驢却向何山去不救青螺蜀道時送人歸宣城聞道宣城刼火餘城東民屋半蕭疎舊時録事今頭白自寫平安父老書旴江朱孟章母壽詩卷杏園晏罷三春雨萱草歸看五月花想見瑶池迎阿母麻姑山下擁雲車送人之蘇杭江國蕭條刼火餘繁華無復似當時西湖依舊青山色莫向秋風咏黍離又吳鄉水落稻平疇蓴菜鱸魚滿意秋為問西風斜日裡有誰能泛五湖舟郭天錫雲岫圗撩亂春雲雜曉嵐時于湧雪出青藍依稀一筆誰傳與北固山前海岳菴送人之宣城昭亭山下宛溪頭楊栁芙蓉岸岸秋總是舊時迎送處夢魂猶逐故人舟宋高宗書杜陵騘馬行江沱燕息共恬熈無復中原壯志馳眼見騏驎死刀下不須更寫杜陵詩賜志忠宋顯夫司業出乃兄誠夫尚書中秋五首并逹兼善侍郎詩因次其韻良夜清尊一笑開水邊亭榭禁城隈祗今惟有青天月曾照當時太白來又曲江聮轡踏春雲二十年前逐後塵今日重來隔存沒相看祇有兩三人又宋公髙製擬昌黎筆勢雄竒見怒猊短氣祗令人物𣺌狂瀾誰障百川低又翠華南下拂秋天龍虎臺髙古塞邊誰料江南白頭客連宵清語對床眠又㑹稽太守出清朝追逐揚鑣過㶚橋想見相思浙江夜月眀酒醒卧聞簫憶建德五首茹蘭溪頭春水生玉峯髙下雜花明縣廷清坐無公事閒聽游人鼓吹生又石佛巖前山逕幽曾因禱雨得清游至今六月夜深夢長見飛泉兩派流又石門相向立東西側過行人踏峻梯山下鴛鴦忽飛起風吹草樹見清溪又水澹山平石潭曙記向城中舊時路秋風吹雨破寺凉數日吟哦不能去又父老依依想未忘我無遺愛比甘棠兩亭手插閒花木五六年來幾許長元旦朝回書事四首朱衣髙唱御樓東清漏遲遲畵景中黄繖寳幢㣲影動一時吹面受東風又𥘉聞觱粟叫雲清次第春雷萬鼔鳴最愛鳳笙形製别衆中不識是何聲又金犀千列照春雲綴迹猶容蟣虱臣白獸尊前那得到遥看拜舞但隨人又朝散紛紛下紫微揮鞭争道疾如飛同來各向朱門去祗有西山伴我歸閏二月朔日病過春光兩月程幾番風雨幾番晴不知開到何花樹今日纔聞燕子聲三月十六日至二十一日雨不止閉關因病得深居客至猶嗔禮缺疎連日雨深無屐跡且拈丹筆了殘書禮部集卷九
