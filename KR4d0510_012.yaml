body:
  text: 禮部集卷十二元吳師道撰記雲石山房記吳興望西浙今集賢趙公以詞翰著又為郡之望而一門俊秀林立播風流而挹芳潤往往絶類他族莫之抗吾友明仲其一也明仲于公為從子其序益親人益勝萟事賞好尤異間嘗語余曰昔先大父蓄一異石髙數尺廣如之素質浮瑩竒勢層涌如片雲然不知何從得也易世來故家遺物此猶獨存吾嘗葺藏修遊息之所而植于其前因以雲石名之子能為吾述其槩乎余觀萬有在天地間一物自為一形而不能以相混惟雲與石也不然雲之行空也浮遊歘忽而不主一體石之在地也殊詭錯雜而不限一態千變萬化獻巧出竒隨衆形以為形而無窮今君之所蓄其雲邪其石邪孰得而定之也然而雲氣也聚有而散無石質也一成而不潰立而不改是雖無情而氣行乎中安知其非雲之所附歟夫天地之道一動一靜而已動資乎靜靜主乎動互根而不相離子不觀夫雲之起石膚寸之觸毫縷之泄蓬然而垂天油然而雨天下渙然而解寂然而無而石固自若以為石靜而未始不動也以為雲動而未始不靜也子于其間亦知其所以然之故乎知乎此者天地之道不外是矣明仲雋敏有才非徒遊萟而玩物歸休乎是居整襟而晏坐試以是觀之山意亭記東平辛侯守蘭溪即其居之東築亭焉名之曰山意州固多山獨城之南與山接桃花塢者實金華之支傅溪而止髙而環窈而容勢涵蓄而紆徐舊以植桃故名今其下多喬松豫章清池古石幽邃斗絶不異穹石砧岩侯之來也顧樂居之亭制踰丈因崇為基覆以茅椽以竹板以代甓示儉也壁其背而扉其前旁兩窗因方相時而實以山可見也休暇時或斂衣晏坐凝眺徙倚拱翠浮嵐近在目睫為之欣然忘食侯政尚清簡恬于世好所至杜門不通請謁微其薄彼而此厚焉何于山獨惓惓也然愚觀侯仁名而夀字其名是亭也復有合非徒適遊觀表髙勝若夫拄頰之玩朝􅐩採菊之見夕佳以逍遙于塵外而已聖人以樂山喻仁靜言體夀言用也侯為人重厚安裕天資為近之樂是也固宜理之在天地間無處不有在人者不異于物而在物者亦以示人也仁之根心與生俱來山之接于目無一日而不見也善體仁者得之于目而喻之于心凡天下之山無小無大而陳于前者皆吾為仁之助也奚特此哉體之而得焉則有吾胸中之山目雖無山可也古人所謂得意而忘言者其此類歟然則侯之意為可識也已因書其槩俾登斯亭者省焉詠沂亭記仙居在天台為下邑學宫視列邑特最由大門歷殿堂耽耽數十楹其後餘址猶稱是繚以周垣坎以方池杉檜腋分蒲藻鱗湊有亭曰詠沂當池中兩旁梁修石以度幽翳清深遊息是宜嵗乙巳大水亭仆又明年縣尹邊君世安將有作適家君主職教乃出廪施俸相厥事既成視舊有加士民以起廢賀嗟乎吾道之廢興奚以一亭為哉凡人之情習于事物之交則泰山前陳而弗顧作于視聼之頃則植數丈之木而為之動容故妙天下者機而觸天下之機者新之也浴沂詠歸之書童而誦之老而不知者幾何人哉斯亭之未作也清池涼風散棄于榛莽之間過而不問者幾何人矣一旦榱桷翼然冠佩于然臨池御風仰而瞻俯而思曰昔也點也嘗從事于斯矣其言謂何哉其志謂何哉豈無喟然而嘆躍然而悟者乎邊君可謂知為教之機矣昔二三子言志莫不志于得國夫子獨與點而哂由豈鄙略夫事功哉亦曰為國以禮而已果能是道則去點無幾爾邊君既以禮為國吾黨又因其作新之機以求點之志交相贊者也是則亭之廢興所繫豈不重乎止齋記友人某學道隱居有日矣以止名齋識所存也嘗為文示豫且以求益因為之言曰天髙地下萬物散殊莫不有所止也凡吾几席之內六合之外倫紀之著食息之微錯布橫陳互發而交至者粲然之中有渾然之極焉雜然之中有截然之則焉無方無形主制萬有而天下之棼者息騖者盡潰者塞賢者不能過愚者不敢不及聖人不得而名之而強曰至善不得而形之而借喻于止以為學者之的也然理一而已一本萬殊其分在物其本在心至善為事物之止而人心又為至善之止羣動紛綸靜為之君變化千億唯貞夫一往來憧憧不如守中易之艮其背吾夫子之操則存豈非衆理之郛而萬化之根與今吾子求止之道必有考于此矣愚聞之學有要知也行也行不先于知知不易于行冥目而趨不見鵲而張其弓可乎哉必也致格以精之問辨以明之瞭然無疑于天下之故于是居子之齋斂子之形儼乎其若思嗒乎其若忘湛乎若不波之水溫乎若休物之陽鬼神不能窺其際風雨雷電並至不能喪其守擴然而迎犁然而當于物動亦止靜亦止而吾之止者不與之俱亡若是其庶幾于道乎果育齋記松江孫元實以醫學教授金華余辱與之遊間語余曰吾嘗取易象之蒙以果育名齋子其有以申之余謝弗獲既而為之説曰艮上坎下曰蒙曰山下出泉天下之水皆山出也江河滔滔不知其幾千里矣其他或近焉或逺焉皆不能不行而不終于山也孰知其涓然而流泓然而停則一勺而已此水之初也故觀水于海之大未若觀水于山之初人之初也蒙而不終于蒙蒙必通蒙非患也而通之患也作聖之功不于其通于其蒙聖人觀蒙繫辭吾體焉真純湛然靡定所適吾決其從如矢斯激包涵渾融中有靈根吾滋其萌輝光日新蓋果也絶方動之岐而育也全未發之天收二者之功則蒙斯祛通斯正聖賢之歸猶沿流而至于海也然動止相資寂感相因而育又果之本也天下之道此其最初乎元實從事于此其必有以知之矣夫蒙之發也以剛明故蒙以九二當之剛發于果而明根于育明所以用夫剛者也以卦言則坎以內為明艮以止而明是明也其定而光暗然而日章者乎聖人之剛唯恐其不明聖人之明唯恐其不蒙若是而蒙則異矣元實天資剛明才氣議論燁然方進而用于世寄途于醫非其志也余于是而信其有志于道故因疏其所見以為復而願相與學焉金華縣慈濟寺修造捨田記浮屠氏之教今為盛塔廟在名山川通都大邑者閎傑瑰麗不可殫紀下而一邱之勝十室之聚莫不錯據聨峙爭務為完好日有加無已天下之田一入於僧業遂固不移充衍增大故田益以多其徒亦往往優為之宜也金華縣慈濟寺者距城西二十五里載郡志然不著所從始相傳以為旻公焉前望南山背負林麓當白沙溪之間亦勝處也搆故宋乾道中且二百年風摧雨墮敝傾腐撓中殿特甚餘亦皆殆不支衆諉産薄惟石潭者慨以為已責誓悉其資無靳又輔以化誘得所施豫起至大元年冬撤殿更新之門堂兩廡鐘樓藏室以次葺凡數年竣事潭有已田餘五十畝至是以歸于寺將使嵗入益裕而賴以久焉亦材且勤矣余聞宫室田里者先王所以使民養生喪死而無憾也民生當時咸知自食其力而通其事以相成無敢傲焉以遊其食而奉之非有功於人則職於上者耳今世稱浮圖氏能為國家祈福永命則其功豈不甚大斯民所以竭資力而事之咸謂當然其徒固可以拱手蒙成安焉肆焉而用天下之物不必其已之勞也今潭也汲汲乎搖其體膚筋力以修壞起廢而寧其居又以其積纍之業遺後之人一無異于齊民寧非此善于彼者乎吁此誠善于彼耶抑可以重有感也夫金華北山遊記出金華城西門遙望峭鋭孤起蒼翠秀麗者號芙蓉峯北山之支也十五里始至其下為智者寺梁靈璨師澡瓶在今實名剎西偏遊覽最勝處亭榭錯峙有曰上方境界者豫所甚愛也蓋自山趾蹬道緣澗上至此曠然平夷有大池可數十畝最後秀巘髙出屏抱如畫遊時且迫暮暝色四合空濛濃翠欲滴坐亭上背出木杪風水聲在下人語宛轉蒙密間少焉煙斂月出池光淪漣上下相映發當晝無此景也客髙談朗吟響答林谷逮夜半乃已翌日由智者右行取道遊三洞陟降岡麓久乃出兩山間循水行山漸狹水石清峭十數里不絶野人方開徑嶺下便樵採怪藤古木巉崖沖湍皆故道無有比向所見益竒又數里逹金華觀觀前流水橫披圓青石彌布若鵠卯大者若斗罍甕磊磊纍負離離錯立楓柟青櫟蔥蘢幽翳蓋去洞甚近也三洞者上朝真中氷壺下雙龍中下二洞皆在觀左下洞岩穴突出可覆數百人小竇容舟遊者仰卧以入燭之穹然髙敞飛崖流乳列石怪狀為華蓋垂衣湧濤積雪為龍為龜為狻猊象町者為田方者為床為鐘鼓可考擊為硯一眼受滴水以手承之則否他詭異不可悉名次中洞穴仰天墜石鍵崖罅欲壓幽險深入如墮壺中飛泉出岩半數十丈散垂為簾下注無底怒聲奔雷使人膽掉髮竪出宿觀中山雨夜作水聲雜然如呼如啼如嘯歌悲吟為不寐逹旦雨稍止行數里趨朝真重岡復嶺所歷益髙狹徑俯壑萬仭蘿弱苔滑聞前向塗稍絶乃還遊鹿田東西二寺鹿田者相傳仙人宋玉女驅鹿以耕山有玉女墓墓上樹不知名甚竒西寺第一軒前立石森然穿穴玲瓏類靈壁太湖間以巨竹泉流交其間昔默成潘公所憩遣刻多存者宋寺雨留三宿山髙驟寒雲霧噴薄門外迷不見行路室中沈沈咫尺不分人壁題近時吳琳詩有雲暗雨來疑是晚山深寒在不知春句似為此日發相與附火劇談燒笋引飲而已既晴風日清美野卉發香山紅澗碧春物爛然林薄鳴聲嚶嚶摘茶者道相屬由鹿田抵山橋石山插澗立樹出石上蒼然同色飛梁絶峽口回顧攢峰縣崖瀑流曲折隱見真絶景也久之亦去十里至赤松長松落落彌山率數百嵗物度鍊丹山訪二皇君祠問石羊遺迹僅有存者入小桃源兩崖夾澗竒石刻露緣涘多栟花亭宇相望有流觴曲水處碧甃底環青莎側披落紅出波上點綴映媚方列坐小憩數道士攜酒至取觴以浮談辨喧笑悉沾醉去止寶積觀宿松聲澗響凄然相和如琴笙不絶蓋晝夜皆然山中所厭聞也明日寒食有懷松楸遂由東關入城以歸金華為天下名山環亘數百里岩洞泉石之勝顓在山北距余家不再舍而生未之識友人張君子長約遊屢不果嘗以為恨至治二年三月子長復遣人邀豫欣然從之起壬申迄戊寅凡七日以雨道險故不至朝真他如安期生石室劉孝標讀書岩暨僧寺可遊者以十數皆不克往然幽絶竒麗之觀所得亦多矣先是約所至賦詩宿金華觀僅一分韻止即歸將追賦焉而汨沒多故情事復墮渺茫明年余之官髙郵秋中行境內潦災水宿者三月重湖巨陂荒溝斷港瀰漫洸漾求北山卷石塊土不可得而所值士皆鄙陋無一可與語者况望如子長輩乎坐念昔遊倣佛可記者筆於篇時一誦之使精神飛越如晤對山水間亦足慰也書其一以貽子長云嵗癸亥十一月十日識蘭溪州新學記蘭溪升縣為州餘三十年任守牧者幾人能有興作神祠之侈梵宇之崇官舍亭傳之新咸出意相勝獨學宫在城東因舊制卑陋日就圯不支朝廷右文闢科風厲鼓舞是宜在所急曾無一人顧省者豈所謂知本哉至治元年知州夾谷侯某鋭意改作閔學帑不足又慮煩役民俾士之録籍者以力自占自夏徂秋中外告功殿庭門堂齋廬視舊咸闢周垣夾廡官署庖庾實昉于今嚴嚴翼翼翔湧神捷衆肅其觀又先作塑繪像造祭器行釋奠禮未幾去官事遂格繼者中怠弗理今知州崔侯某慨然念不可廢前功於是葺其緒補其闕飾其所未及而州判王君某復贊助而督之既考成底績職教事者朱某來請文且謂夾谷侯能新之於數月之間而六年之後得崔侯乃完始之者未必難終之者為不易二侯之功其可以巨細論哉是皆宜書也愚既直紀其事而復為之説曰因廟為學近制也吾夫子功等天地被萬世非壯麗尊嚴罔克稱王居若吾徒之廬因而大焉非幸歟昔之學誠陋矣嘗登先賢之祠考進士之碑碩儒名公彬彬可稱果係其居哉天下之事後出者必有加於前而俗之趨下者嘗莫挽而歸於古安宅廣居人孰無之博厚髙明可以自致如使宏其宫而人之眇新其室而習之汚則賢州侯之意荒矣故愚願以諗於衆庶其遊居周旋仰瞻俯察警悚振飭思所以稱是而度越於前人哉明善書院記帝王羣聖人之道至夫子而明羣聖賢之言至朱子而明朱子之功異世之夫子也厥今尊右表章聲教四逹荒陬遐徼猶知誦其書思其人嚴事惟恐後矧過化之地祠祝之舊者哉處州松陽縣舊市者古治所也唐葉法善宅焉距今縣一舍許宋時里孰甚盛朱子提舉浙東常平按行至則為諸生講説有葉宸者能述論語孟子大義朱子異之俾主孰焉咸淳季年葉再過者請建書院曰明善入國朝名存實廢前太學生里蕭君子登慨然志興復因他宇奉祠事在法善故墟之陽時至元二十一年也事方萌芽聚田以致學徒後四年子登白其事行省即命為山長又六年麗水王君淮來代斥其地首建禮殿及大門延祐五年山長汪希旦搆兩廡而朱子祠宇猶闕論堂陋制未改泰定元年蕭君復攝教事請於部使者即下府縣而主簿常君禮董建焉明年山長鄭繼來嗣而完之起甲申迄今餘四十年蕭君實始終是其力為多而先立其大者俾易為繼則王君之烈至是而交愜其志也王君時佐吾州語豫以起廢之不易且致蕭君請願有紀豫惟道在天地間秉彛好德在人心靡一日泯滅固無用贊為竊於是有感焉法善以幻貴於唐顯於鄉志怪者孰不歆艷一旦化為爼豆絃誦之區淑其人而致力者往往出於遺裔獨何歟宋偽學禁興倡其説者郡人也當時朱子幾不能免詎知易世後車轍馬迹之所經咸慕其執鞭不可得彼詆誣掊擊者至今羞稱之是孰使然哉善不可以終窮晦于一時者必著白於萬世諸君子扶植之功豈非有得於明善之旨歟繄士之居遊者不怠其承闢異端距邪説惟聖謨是祇俾夫天命人心之本昭晰而無迷然後踐之於躬以底於誠以返於初是為元貞興復之意則所立將與天壤俱敝尚何廢墜之憂哉巢雪樓記劉君剛善將從廣西憲幕辟自金陵來宣城告所嘗往來者别余適遇焉一再見相與道古今較文萟恨見之晚而别之遽也因為余言家本蜀眉州實峨眉之陽先人始徙金陵聞峨眉巔極倚天岡谷綿邃雪經嵗不消望之皓如積玉今居面鍾山結小樓名之巢雪以寄故鄉之思子為紀之何如余聞有生者皆本於土血氣之屬無不知土風思依首丘過故墟而啁噍物猶然而况於人乎聖如仲尼而思魯雄如髙帝而思沛南音越吟是孰使然鄉土之思不忘本也不忘者仁也峩眉之距鍾山遼哉邈矣思峨眉而不可見見鍾山如見峨眉焉追本之心油然而生可不謂仁乎惟君之心抑可尚已又聞長老言宋之南嘗駐金陵諸橋名坊巷大抵皆東京舊季年蜀士僑東南僧廬亦寓蜀扁山川隔絶悠悠我思徒遺恨於無窮今也宇宙混同四海一家桂林為秦漢百越之地去中國萬里君今往即往異時峨眉朝發而夕至可也然則幸生太平之世而快其夙昔之願可不知所自邢念先世之勤勞致當今之報效惟剛善勉焉德懷堂記吳以國氏國由太伯始故子孫在吳越為盛番君著功漢初居畨者宗之今教授君存仲退甫能譜所自出宋以下皆歷歷可考且以德讓名其堂取至德之旨也嗚呼泰伯以天下讓聖人稱之其後季子慕義而興復以國讓讓遂為勾吳家法彼季子猶可及若太伯之為則自有宇宙以來一人而已民德下衰釁起父子兄弟間簞食豆羮忍以相奪相殘自非甚頑無知聞斯人之風未嘗不釋然意消遙遙二千年系之以姓者孰非神明之遺乃與俗俱化曾不復聞有髙節茂行倣佛先烈之萬一者此子於君之名堂不能不慨然也推問番人言君早孤逮長愛三弟田廬服器自取寡約餘悉弗有人皆以為難撫教諸子循循雅飭闔門內外肅雍無間言凡其鄉人與四方之學者咸尊事之蓋其天性純篤而真踐不渝故自身而行於家自家而孚於人者如此其視讓國天下雖有大小之殊而同於為讓可以無愧斯堂之作孰不謂之宜哉藐余忝宗姓衰落不逮適俱仕宣城辱不鄙夷而命之記豫固慕為讓者未知視君何如因是而砥礪激昂以自附於盛德之末異時斯堂不為専美是則區區之志也君毋謂余不讓山泉記王君某名其居山泉君北士而寓宛陵非鄉也其居在闤闠中前直官寺左右雜民伍間山與泉無有也抑山泉者荒遐寂寞之觀幽人隱士之所樂而君方將應公府辟佐部使者奉條察亷服簿書贊畫之勞雖有山泉亦不能從容盤桓也然則何取乎爾也人謂君襟韻髙勝雖嬰以世故而蕭然自適不異林壑間是亦美矣而未也在易有之山下出泉蒙君子以果行育德艮上坎下蒙為山泉不待夫嵬然而髙泓然而深固無往而不在也致吾果育之功使行完而德充不在夫隱而為髙仕而為通將無適而不宜也君之取義其必出於此也其必求無愧於是名也江行磯石志泝大江上行彭澤湖口縣境中濵多石山舟人呼磯頭在彭澤下者曰馬當曰峯骨曰彭浪曰小姑在上者曰繫表曰團石曰中子山勢皆自東來乍起乍伏稍近江忽若奔赴欲度界而旋却盤鬱怒突騫舉驤奮形體大略相似繫表尤宏豁峭立余時夜半抵壁下與漁舟聚宿月出其背光射山上樹如細草芒久乃照舟中也小姑者峙江中與彭浪對若關門舟行出其中峻急甚孤圓髙聳南一面岐首樹木扶踈蔥蘢漸逺望見亭亭煙雨中青鬟翠袖姿麗􅞅絶俗呼小姑亦善狀也上下鐘山者夾湖口縣左右俗謂上為張公磯下為柘磯皆壁立千仭獨下鐘中一道斷缺附土有竹木稍異時久乾水落岸痕可三丈許以故盡見根底竒怪或森列如立笋或下垂如滴乳蟠繞散布者如樹根四出層突而下削者如河岸殘氷孔穴玲瓏水所注射而不見其出也有就岩穴置大士像宛若天成山勢盡處潰為亂石髙者十餘丈大者如屋其次如數石甕盎方床斜几磊磊撑柱間為修莖擢立上攲平可坐側視山兩旁至絶頂皆巉巉彌望類人所壘疊靈壁太湖者蓋其石扣之有聲故山得鐘名大蘇公嘗不以為然恨余不及如公中夜獨往一聞噌吰鏜之音以證所言爾由湖口道彭蠡三十里中流為大姑山片石方而長又呼鞋山世以並小姑而竒峭為不及矣未至南康二十里蟆頭磯羣石如蟆抵星子灣視落星卷石又出大姑下而磯石之觀止焉仰見匡廬方巍然髙大如王公巨人儼容莊坐自馬當已見是山至此幾三百里蓋無山不在壓跨中亦偉哉余評瀕江諸磯上下鐘勝江中諸石小姑勝而於匡廬則無能名焉姑志之俟質諸善遊者定性齋記聖人罕言性難之也六經無言定者僅一見於大學程張子始為定性之目亦異矣夫性統於心心定而性存今曰定性未能不動是以心言又豈非異乎人之有心本以應物膠轕紛綸千名萬狀日至於吾前持吾方寸之虛明而與之酬酢於無窮雜然之際卒然之頃髙下弛張疾徐疏數無不欲其投機赴節合軌度而中肯綮是必有道焉逐物者汨沒而忘返惡物者有意於絶之忘返者衆人之患而絶之者異端之失也大公而順應其君子之心乎內外兩忘動靜俱定其定性之能事乎昔嘗誦程子之書歎其精奧宏深與易論孟表裏其語天地聖人之常以為亦不外是蓋持養純而自然之為非學者驟可至返而遡其端則有知止之功在竊謂從事於此然後徂而求定則庶幾可也宣城胡君子仁以定性名齋而質其説於豫豫觀子仁之為人明敏有才逹於世故不激不阿自其居鄉周旋親故間纎悉曲當出而為部使者所賔禮歷交諸公與其佐屬人各不同而處之一無失言違色非善於應物者歟顧方窮經講學劘日夜以求聖賢之止者是能因其資以致其工即其事以驗所得其於定性之名豈徒取其異而玩之哉故愚敢誦所聞而願相與勉焉復始齋記宣城魏氏故宋參政敏肅公諱良臣之後也由紹興至今二百年子孫猶衍裕不替然而知學者鮮名蔑字彥明者實八世孫勤苦好修培業積文尤邃於春秋貫串諸家講肄不輟凡其鄉之學是經者咸推之嘗葺所居齋名以復始蓋取左氏畢萬筮仕之辭將以追先猷紹前烈而還其光顯盛大之舊其志可謂壯哉按魏以國氏由萬始賞斯為諸侯而辛廖之言驗後之顯者相在漢徵在唐皆位宰輔而敏肅亦登政府數千百年焜煌簡册前後相望而畢公髙之澤逺矣天壤間得姓系氏孰非聖賢勳德之胄彼其不克於承而寖微寖滅者政復何限有能奮然欲振而興之其人為何如參政公之世猶近也彥明固宜慕之不忘遡其所由推而上之姬周之先獨不有可念者乎論者謂左氏好誇所載此類非一殆若淫巫瞽史之為夫氣化之循環人事之先兆固有若此者是未足訾也天下之物莫不有始亦莫貴於始公侯之姓誰實為之復公侯者當思復其所以為公侯者耳吾聞君子有反性之説明善之教非所謂復始歟公侯之復天也性善之復已也已修而天應之理也修於此而彼之應不應有所不計焉亦理也左氏必諸天吾必諸已而已彥明之考於傳説也審矣抑其以是名齋固有志於學者其不以豫言為不切也夫寧國路修學救荒記江東憲府蒞寧國政化之及寧國蓋先焉矧其素號名郡而屬邑宣城尤衆繁務劇按臨者深所致意憲使密蘭公總裁之日今御史梁公克中實為經歷使佐相得憲綱具張斥貪擊強察姦明誣威布澤流一道清謐而寧國之士與民則曰二公之於吾郡若修學救荒事其績之尤著者也初學徙東郊與廟並列地比水環堤為固久寖蕩隳大成殿改建皇慶中腐撓已間見不知始何時穿右支徑趨學門故道榛蕪弗怪也梁公以白於使既按視命易殿楹二梁一前築方臺倣今成均制塑像羣弟子漢以來諸儒補其未備舊堤周百大憲副李公嘗修其半至是完之增其廣髙别為新堤二十丈逹於衢甃以甓翼以欄易民田之間垣捷徑之沖搆石梁跨水上至者始復由正道入顧瞻林塘掩映宫墻絢麗一旦景象異而心目變也先是學逋租隱於豪民私於𨽻胥積嵗益多又贏錢藏府中者中統鈔一千六百定或倡言貸取息贍用即爭假借去展轉竄易久將不可知乃屬有司括隱欺復斂所散既給嘗費則以佐興修而一諉之教授方君晉焉經始至順元年夏涉秋竣事時旁郡皆以歉故輟廪膳而兹獨不廢又以官餘錢增與貧病士前所未有也巳巳旱飢宣城特甚録其數至三十三萬餘口使惻然弗寧夜起倣徨與梁公議所以救之策首督郡募民粟幾至萬石食之已乃使詣江浙省言狀通豫米四萬碩施者八千餘平價而糶而宣城得四之三焉念民無以糴則遂散之而以旁邑所勸鈔代輸凡一萬六千七百定輸者七千四十定而其餘猶不足以繼也於是聞於臺請所沒入贓合一道之存者為七百三十六定遣僚屬分勸徽饒信三郡得鈔三萬七千七百八十定有竒且慮衆為欺而惠未浹則選吏四出核實而廩其遺然後更遣吏悉散所有凡歷時自十二月止四月受米人二斗幼半之鈔則如米之直施合前後凡三焉當其赴訴之分拏給散之纎悉豪姦之舞智並緣所以撫摩禁防者無不曲盡疾疫不興寇攘衰息雖古之稱善救荒者不是過也民嘗請圖像立祠咸遜謝弗許繼而梁公有南臺之命學之士將伐石頌績修學在所紀救荒其可泯乎哉夫興學教也救荒政也知教斯知政而信食重輕養教先後固孔孟大旨二公之設施措置未有不本於此然則并書而並傳之其亦可也愚於荒政嘗預使令而修理之役則又承命而董其成故詳為之書李公名嗣宗尤垂意是學築堤實啓其端嘗議改論堂齋廬市材需時將繼今有作分部賑寧國縣飢六萬七千七百餘口勸民米一萬三千六百十七石鈔一萬一千九百定而官豫米一萬石均散代輸如宣城其在廣德建平二縣飢尤倍功亦不細事𨽻他郡當自别有紀云蘭溪州新修門樓記蘭溪州治即門為樓猶故宋為縣時所建規制宏壯相傳且二百年矣今置漏刻樓鼓角其上比嵗為政者更造大廳及左右吏舍獨斯樓無改焉嵗久屢修敝亦隨之視瞻弗聳民以為病至順元年丹陽羅公某來守是邦顧而嘆曰失今不圖壞必重費民力且豫治未信而勞之不可會長官北庭貫公某繼至協𠂻成化佐屬率從明年冬乃議修理既捐俸倡先惟是一二富家之役於官者橫費既息歡趨以聼攄材庀工如作私室官不與之於是棟楹榱桷之朽敗者易之板闌瓦甓之缺敗者補之丹碧粉堊之漫漶者新之不數月而訖工輝煌絢麗騫飛竦踊前後映帶不復見新故之異而挈壺有職更卒有次侯伯之居為之巋然增重焉嗟夫今州縣之作難矣公家之財自毫分以上不能擅有發無已則仰於民彼侈然好大剝竭而不恤者固非已而務崇其私者必苟於官又孰肯起而應之哉竊嘉夫二公之有以致此矧其勢足以改作而止于修敝補廢存前美而弗泯塞後費之無經退然不務於襲能以出竒矜已以求勝其慈愛忠厚之意蓋非他人所能及者是不可以無紀也故因吏民之請而著其槩使來者得有考焉北山後遊記至治壬戌之嵗豫與張君子長遊北山其後無因至焉年運而往與世益乖山水之耆益深今年二月六日獨至靈源草堂訪琳師已出徘徊故處觀公一公止豫留明日同往法清寺觀乳泉又過慈源寺憩水石篁竹間會雨信宿而歸既而子長以書抵豫曰黃君晉卿旦夕來來則約偕至山中豫喜甚日佇訊至四月丙子會於草堂琳師出所藏書畫有張公詡清溪圖及宋人墨迹甚多觀已出坐大池上亭景清曠即上方境界也丁丑道前岡之鹿田林徑翳深松石間植有髙數尺者西寺第一軒已燬於火惟岩壁故在登其半以立仰見有字隱隱曰潘紫微字即默成公别一行曰喻子才云云東寺門徑更新餘締搆有加暮所宿房即向時􅣕坐雲霧中者也戊寅早經宋仙女墓前一徑可趨朝真洞豫以昔所未窺奮欲往黃君極言其險絶乃止歷氷壺洞次雙龍洞命未至者入遊憩岩下閲所立碑有云元祐中郡守張公製三洞名按郡志其人名夀是也旁多鐫名惟清獻趙公最古扣金華觀出循故道還鹿田前趨山橋道旁藥草羅生衆木異狀多不知名非特仙墓上然也近橋岩弔王端明野書堂故基仰穹崖俯奔澗穿行老樹怪石間幽絶特甚有小徑云由此登岩巔可極目數百里云金華綿亘雖逺絶頂有湖曰徐公湖處正當鹿田之背者為三洞南為橋岩連數十里間雄峭竒麗之觀萃此矣既絶山橋緣澗左行勢漸趨下度五盤嶺稍平夷前出孤鋭者芙蓉峯也下為法喜院舊名潛嶽潛嶽者芙蓉别名默成公嘗隨僧飯於寺今髹鉢藏焉直寺門數十步為公墓則榛蕪矣主僧延酌池上夜宿堂宇整潔甚安己卯登芙蓉峯嶺未半入寶峯寺竹深澗鳴古屋閴寥登芙蓉閣殊壯偉玉潤師若珍所建者師盡山水甚簡畫必題詩悉有思致既踰嶺下險徑返草堂休焉山行凡四日一公周旋弗置侍而從者黃劉二生也明日庚辰雨遂歸因念至大中與晉卿約遊弗果僅與子長來今二十餘年而復踐宿約豈非幸歟第恨其别之遽歷覽之未周而後會之未期也嗚呼天下之至樂山水朋友而已使吾二三人於此營一壑之栖相與窮年茹山飲泉誦歌謡吟以樂其樂亦無不可者而近於世故不得以遂雖然今日之樂詎可忘耶故序記之以附前志之後使覽者亦有以知吾徒之志云爾至順四年五月日志七進圖記七進圖者畫金華潘氏父子也竹隱老人名祖仁字亨父子奕女玫子京方竒亮育七人首畫一竹床老人衣冠卧文簟上右手支頥左手撫膝熏爐麈尾置旁革履陳下六子一女環侍次畫奕奉觴進一𨽻袒裼右提酒壺左持具格次畫二女御踵行次人背面捧槃中芍藥前人以右手扶盤花隱其手女玫在後自持花一枝重臺特起異於盤中者次畫京拱而行從𨽻以竹枝貫雙魚於盤置刀一帶葉橙一醯器一捧以獻次畫茶具陳列供事者數人一童跪地垂手持碾困睡或撚紙觸其鼻微醒欲嚏方坐瓦具上以甌授附於爐者將瀹茶也次畫亮捧五木以趨次畫竹間一室簾牖明整几格積羣書育迎立以請竹風蕭然老人舉兩手整巾帶而行六子暨童子奴八人導從前後蓋竹隱自為文云晝卧於家愴恨欎悒兒曹思有以娛之推次序列各持一物屬辭以進自酒而下至於博老人皆却之最後幼子請至竹間室觀所儲書於是釋然起而病良已其文規模放叔而藻麗出新意書以漢𨽻亦工每段次畫於文用李伯時白描法精絶似之然未有考也按竹隱後贈中奉大夫奕後名良佐字致君贈通奉大夫疇德鄜其子也京後名良貴字義榮一字子賤由舍法中政和五年進士第二人官至左朝奉大夫徽猷閣待制中書舍人兼侍講自號默成居士方後名良瑗字仲嚴終太學生竒後名良翰字叔倚紹興十五年進士官至太府寺丞倅平江府亮後名良知字叔愚早卒育後名良能字季成登紹興五年第歷官祕書省正字江州倅默成嘗自稱兄弟六人又云吾母生子十有二人長女適錢經國稱之為姊即玫是也紹興己卯默成自左史除西掖竹隱年已九十次年卒計其生當慶歷中及見纍朝文治之盛濡染既深言語自妙而超然清素之風行於家庭者如此昔時朱子極稱默成節行而以夫子所謂剛而無欲者當之詎知其精神心術之肖固有所自也哉竹隱之文他無見於世圖亦餘二百年物異時轉徙泯沒不可知其傳未必廣也豫既從潘氏借觀録其文因略記畫之次第併附六人者之官位名氏而竊論默成公之淵源焉使世之未見是圖者於是而有考焉尊賢尚德之心將竦然而生顧不美歟婺源州靈順廟新建昭敬樓記婺源五顯之神聞於天下尚矣蓋其上當天星之精據山川之雄儲英發靈烜赫震疊自唐至於近代迹具紀載國朝加廟號崇封爵香幡金幣之賜遣使時至每嵗夏初四方之人以祈福會集祠下者上窮荆越下極揚吳銜舟塞川重霧翳陌百賈列區珍貨填積賦羡於官施溢於廟浹旬日乃止尤為一邦之盛故廟之穹堂華殿飛樓復閣宏侈巨麗所以致崇極於神者靡遺餘力焉至大四年俄毁於火繼而土木薦興二十年間所營建者十已八九獨大門昭敬樓猶闕且為最先之地而反後焉一簣之功若有待然者元統元年今達嚕噶齊伊克蘇公實總廟事首議及之庀工於夏搆架於冬為屋三重楹亦三之其費皆出於廟之田租與其施財後既非常懼弗克給明年知州于公文傳至乃相與謀稽其出內括其隱欺沛然有餘功以不輟秋七月落成舊觀復還髙廣有加金碧煌煌榱棟峩峩如浮宫嶢闕出雲氣而臨風雨騰龍翔鳯奮頭角而鼓羽翼也視瞻丕聳肅敬自生神居尊嚴名號斯稱凡材與工之費中統鈔以貫數之四萬五千五百有竒先是夏初之會于公實督其稅入革復重之害而薄其征來者益倍歡頌四出時有金芝産於殿之右梁竒芬瑞采數月不變今猶矗其上亦異哉二公之雋功盛美吏民咸願勒石會某適過是邦俾執筆以序徴諸見聞可信不誣竊聞聖賢之語政治民事神而已然必曰先成民而後致力於神何哉使其職業之不修怨嗟之不恤而徒媚神以徼一日之祐彼聰明正直者豈肯顧而歆之今二公叶志和𠂻帥正自躬政肅令清化以大行年穀比登疵癘不作耋稚歌舞涵煦惠澤明靈寵加彰示貺賜其於神人之間可謂無愧者矣是誠宜書凡州之僚屬贊是役者同知某州判某吏目某也婺源州重修捕盜司記州以判官兼捕盜而公署自有所以専其事也然判官二人迭處遞更若専而實公又日嘗坐大廳罕至其署因仍苟且則於其堂宇漫不加省亦勢然也婺源由元貞乙未以縣升州即尉治為捕盜司在州門之右蓋故宋時所營今又四十年敝壞可知矣泰定二年州判錢伯圭塔紀嘗一修之後八嵗廣平韓君昌涖是職顧瞻咨嗟計其壞又甚於前念不可不圖也於是捐俸倡先出意經畫役不及民而事隨以集易撓以堅更腐以良門堂列廡焕焉如新又為之築垣以周外甃甓以底平凡弓矢裝服械器悉整而完之藏之庫以俟用考前官之氏名紀刻以示久皆前所未舉者君之用志亦勤矣哉夫官以捕盜名非徒語捕盜之能實貴於無盜而已婺源居萬山中壤地阻僻民知務學而畏法然寇攘姦宄之禁不敢一日廢善其道者存乎人耳君來是邦因其俗之易治而叶贊良守長之為以相安於清靜之化故四境晏然囷窖之積於野者不移商旅之出於塗者無警桴鼓不鳴桁楊永卧可謂美矣且又不以傳舍視其居出其餘力以興敝補廢豈非本末具舉者哉故承命而為之書書壘記書者文籍之總名所以載道者也自書契既形聖神迭興測天之靈彰示大訓為萬世建人極蔑以加矣道裂而分諸子競起百家爭鳴其羽翼夫道者固不可廢而偏詖傾邪淫誣荒幻之説亦且托於其間是果足以為道乎哉七略四庫之目館閣崇文之傳鄴侯邯鄲之儲非不美且富也彼固有精約者存在夫人慎取之而已故愚嘗妄為之説曰由千萬編而約之於六由六者而會之於四又自其四者而貫之於一逮其人與書忘心與道俱而後為至耳河內九臯公平生薄嗜好好讀書所蓄凡萬卷僑居豫章闢樓鶴軒之左悉置於其上而以書壘名之且特取先朝所賜大學衍義尊閣之以為壘之鎮既自為記以述其由又作歌以道其樂由是書壘之名聞於時豫觀公在延祐初以文翰簡睿知踐歷華要後屢典大邦皆有風績惠愛既以其所得書者而見諸行事之間歸視其樓足以無愧於是載道者矣抑吾聞軍壁為壘而狀物之大者曰魁壘焉古之善治兵者以吾之不可勝待敵之可勝節制既明形勢既強守則有餘至於談笑折衝摧陷披靡雖百萬之衆可坐而挫之矣吾儒有云能勝物之謂剛剛則嘗伸於萬物之上殆亦若此然則公之所謂壘者可知其魁然而大又豈可量也哉客有進者曰公之壘嘗試而效矣究公所施舉斯世將無不被其澤而白頭斗壘於公何如公夷然笑曰吾知吾書而已遑恤其他公名薛超吾御史大夫覃國清獻公之子今為三衢守云東陽縣修學記有地百里視古諸侯生齒數萬服屬徵會雖時異勢殊古治寥邈然有能垂意詩書爼豆間則其賢於世之吏亦逺矣蓋知學道則愛人而能勸學敦儒則必知慕夫道事必有本而政與教非二致也不然則有倡興作以厲民飾觀美以要譽者又不若不為之愈人之誠偽賢否何如哉東陽縣教諭求君惟學以書來道其邑尹許侯思忠修學之美曰學創自前代更歷有年外雖宏壯而中實敝壞許侯始至即慨然有志顧改作則重煩而並修亦未易乃以至順壬申新從祀兩廡餘將以次及元統乙亥春且滿未代益大展力由大門殿堂齋廬前後書閣朽蠧者易之傾陀者正之闕敗者補之黯昧漫漶者鮮明之又改作櫺星門及便門寺仞墻崇嚴像飾顯顯赫赫費皆出於士之樂從者而官不與知焉落成之日士皆易冠服肅視聼以趨而嘆前此之未見也蓋侯之治邑也明敏而有惠愛故久而益孚他政績彰偹皆可紀而此尤係於教請書以示方來豫察其言許侯之篤於政教而非厲民要譽者之比是誠宜書惟吾郡多名文人何取拙鄙者敢辭而求君復再書謂侯嘗通守蘭溪子實受㕓之氓而君亦援先世契好請益堅乃直敘其梗槩而復為之言曰東陽為婺大邑昔之賢令長如唐戴叔倫有去思之頌宋慶歷中鮑令安上建夫子廟有惠於民至今人目其所憩岩為鮑令岩民俗固厚矣自馮宿拱之兄弟以文顯而近世尤多宰輔至連四五人咸以文學科第進儒風抑盛矣山川如昨聲氣猶存吏豈遽不古若而學士大夫豈盡出前人下哉今許侯之美諸君既頌之毋忘固當因其作興之機而勵其景行之實化魯侯明德之風而表周士維楨之效至是而交無愧焉爾求君協承侯之志克相是役教事迄今乃成豈不與其有榮乎張縣尹政績記蘭溪縣初內附時民范宇者以邀奪退卒金驟致富至元二十三年盜劫其家縣已捕得盜者范擅恣戕殺人又虛張其失亡數令囚妄引某受寄某受分誣以知情賂結上下皆聼其所為縣令東平張孝安始至奮然直民寃格其事時民亦爭訴於提刑按察分司判官瑪桑阿桑阿主尹尹遂詰范姦狀繫之獄范急厚賂守者一夕逃去會監察御史中巴爾斯布哈王宏行部督治益嚴范匿旁近數月人莫敢言縣丞簿隂為耳目摘令去之杭因造寺某奉御至京師倚權臣僧格為奏言范所失皆貨中官財宜罪有司不理者得旨遣尚書歡賽音至婺與宣慰使巴特瑪新按問徴償於是兩御史瑪察判及尹皆坐罷威焰震一時追逮赴訴者非法慘虐盡死里中大家富人及夙昔纎微怨與嘗詣察司舉尹政績者皆被禍破産并命相屬數年徵猶未已范之資遂纍千萬初經授五品秩行泉府司少卿改兩浙轉運使司副使升同知乃死尹儒家流為人慈和言語願欵至遇事激烈蹈水火不顧有古強吏風既去蘭溪復尹衢龍遊又以忤宣慰使某罷時年且七十子喪惟一孫在貧無以歸與豫家祖父雅相好大德癸卯來留止數日師道時從容侍聼談金季年諸老遺事及進士詩賦手授善醫方屬以濟人既去貽書先人極相賞愛至今不能忘也比嵗有自北方來從白雲許先生遊名眉夀者公之曾孫也一日過豫為道前事眉夀亦早失父略聞家人言不能悉也俾豫筆之豫固樂道人之善况於張公且吾州舊為縣時尹止六人其賢未有如公者距今五十年人能道之雖其摧擊姦強志不克終使果如其志則吾里數百家善良之禍免矣可勝惜哉范勢既消歇子孫日就破蕩數年前有生殺人死獄中者正向時囚繫寃濫處跬步不差聞者快之今眉夀從師學道不逺千里志操卓然將為時偉器天之於善惡報施果不誣也故為書其槩非徒表斯人之善俾世之稔於為惡者亦有所鑒焉婺源州蒙古字學記國家混同天下之文肇建字書以逹言順事卓為一代之制不襲於古爰命州郡建學立師置弟子員優其入仕之途所以尊右奬寵之甚至然歷數十年逺外之邦學猶有未盡立者兹非守吏之過歟婺源知州于侯文傳為政之明年百度具修靡廢弗舉凡先聖賢之祠庠序書院之所咸焕然一新是學之役且以次及會江左分部僉憲多爾濟巴勒公至諉以其事州之名族汪氏泰初者服侯之化歡趨請命捐其地之右州治大門東南者願自任經營不煩公家闢址掄材蚤夜展力中為帝師之殿門堂齋廡列左右而峙後先庖庾之細亦罔不具至元元年二月庀工八月告成顯敞深宏既足以昭尊事之嚴而師生之衆亦不患於無所容矣侯又念宫室之完而廪稍未充乃核在官之田豪民所占射者二百有十二畝有竒取以畀學計其嵗入亦不患於不給矣於是僚佐吏民咸謂州之有學學之有田悉自今始以永於無窮于侯之功其可泯哉伐石來請文以紀之是固宜紀也抑豫聞字書之學設教之一事耳周官保氏教六書漢尉律試八體諷籀九千字以上前代固以是為重也且聲出而字生聲又字之先聲音之學則秦漢之前未之有也夫其紐攝杳冥盤旋之寥廓感通之用神矣雖皇極之元會運世要不出此昔人極論華梵音字謂其或密於字而疏於音或精於音而略於字字有限而音無窮則無窮者其至乎愚固昧昧於此恭惟國書之行創自神智源流甚逺蓋兼音字之統學者所宜知也婺源多才俊于侯既作興之將有穎悟而傑出者異時非直潤色鴻猷彰明治具而天地運化之微古今不傳之祕亦且於此乎得之侯之功又豈不大乎婺源州學記闕郡于侯文傳守婺源首惟學校是究是圖曰嘻婺源徽國文公之鄉也吾受夫子罔極之恩微公之教不及此今吾幸以科第至是官幾於古二千石刺史而又適臨是邦則學之修否教之隆替非吾之責而誰哉於是即文公故居為祠復新安晦庵書院且并及於學焉婺源宋為縣時屢徙今在州西隅者最後也延祐甲寅中燬訖丁巳以次而復工務速成材弗堅緻僅二十年已不勝其敝矣時諸生方幸復除欣然承侯指願相與出力改建門堂先其大者則又自節量廪粟之餘禮殿經閣因舊而修拓地兩廡增闢齋廬揭以新號曰博學審問慎思明辨篤行格物致知誠意正心修身皆侯所命也始至元元年六月次年七月竣事髙明靚深宏麗輝焕既逺過於前時而遊居易心瞻視改觀其為作民振俗之助亦豈小哉學正吕君合相役視成與其耆艾之士貽書師道曰願以有紀師道惟昔之記是學者孫龍圖莘老洪內翰景盧而我文公藏書之閣周程之祠則亦為是學作也師道何人而敢踵其後則力辭之既而呂君不逺五百里走池建德邑謂師道頃至是邦嘗與釋奠于侯指語以當興之所今其言悉酬必有述毋讓師道又辭不獲則念侯之興學蓋將深有望於州之士欲略陳其愚則諸老先生之論固已具矣若孫公推原三代養士賔興之法孔氏成德逹材之教悼後世之不古若洪公嘆古人臨事變而不亂雖天資不可及亦學問以輔誘之功士不素養不可望其必然二公固知教之重矣我文公則謂君子之所以學知有所至而力行以終之窮理以勝其私而復焉其切於學者皆聖賢不易之法而侯之名齋適契斯義其可舍是而他求乎婺源山水清峭生其間者多健而材少長即羣遊校庠角萟較能往往蔚茂馳聘而以夙望自居者著述如林動欲名家漸磨濡染抑盛矣尚其反躬就實明誠兩進無忘先文公之訓以昭答賢州興起之意哉敢終薦其區區之愚諸公以為然則請鑱諸麗牲之石以為之記其必有發也夫禮部集卷十二
