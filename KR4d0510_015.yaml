body:
  text: 禮部集卷十五元吳師道撰序敬鄉前録序師道曩侍先大父傍及見故時遺老談鄉里前軰事頗竊聽一二遺文殘藁借玩傳抄每樂而不厭然亦恨其時尚少弗能問而識其詳也比年諸父淪䘮衣冠道消出里門無言與儒者時時繙閲故蔵則因近里中火後散軼已多俛仰四十年欲質其事而無從或子孫僅存者率遷業變習問之茫然反笑恠其不切嘗發䇿校庠舉數人為問亦無有能言之者可勝嘆哉因念蘭溪縣漢𨽻㑹稽後為三河戍唐咸淳始置縣迄宋季上下千數百年山川如昨清英秀美之氣實鍾於人其間豈無名世者而郡志所載僅六人且仙佛之徒半之則記載缺畧可知已南渡都杭近在畿甸文學之風何啻什百於前碩儒才士名卿賢相相望軰出不可謂不盛矣易世来未有紀者若其人名位論著顯然固不可泯不幸而不為人所稱今遂浸微更數十年豈復有知之者哉因比次得若干人畧識本末間采詩文附焉無則缺之非徒尚詞藻也因其言論風㫖而其學問志莭與夫當時風俗人物亦可槩見而祠廟碑志則又是邦故實之所存如東峯亭記進士鄉飲題名之屬亦當在所考并置於前名之曰敬鄉録焉嗚呼維桑與梓必恭敬止桑梓猶恭且敬之况賢者乎某生也後弗獲執御於諸老先生然仰高山而挹遺風未嘗不振飭興起可不知所自耶君子之學上希聖人生乎吾前者吾之所以階而至於聖也善無徃而弗存歸求其餘行逺自邇况朱呂之傳有在是者乎彼其濶視六合而狭小一鄉凌厲千古而厭薄近代則與重鄉土尊前軰之意不類非某所敢知也敬鄉後録序宋紹興二十四年婺通守洪遵修東陽志其紀當代人物僅僅數人盖斷自渡江以前理則宜然而其所紀有下及紹興者又不盡用此例則所遺固多仙釋之徒與賢士大夫孰愈若滕章敏宗忠簡軰又皆出於其前而不見列何也最後事類一巻凡稗官小說恠誣猥䙝之事渉於婺者悉不棄博則博矣無乃詳於所不必録而畧於所當録者乎按吾婺昔𨽻㑹稽後為東陽郡以至於今千幾百年矣晋魏以前如江治中王徵士非劉孝標之文則莫得而知郡志亦失考而頼是以傳然猶不得其名信乎紀載之不可闕也况自宋中葉以来賢材繼出其顯於靖康炎紹之際者皆生於嘉祐以後涵濡之深風氣之開豈苟然哉忠義功名宗公當為第一下逮乾道淳熈吕太史道徳文章鄒魯一方師表百代視前世又逺過焉於是名卿賢相牧伯大魁碩儒名人偉士肩摩踵接盖不可勝數而其季年北山何公魯齋王公則又紹紫陽之的傳至今私淑者猶不失其正亦盛矣哉王何名爵在史編論著在天下章章傳頌之决不遂冺沒無俟纂集可也特沉微不著者遺文逸事稱道殆絶或地望舛錯乆亦失真逝者有知豈無憾於其後耶愚不自量既集録蘭溪諸賢因及一郡兹事體重而聞見單寡不能盡知故所録僅止此方且與同志博考而並載之非敢有所舍取也然初意主於表微而并及顯者其或人文俱顯録所弗及者亦不無微意焉吁士之傳世視其所立而已是編不因予録而傳者固多因予録而傳者間一二然亦非區區之愚所能使傳也夫何病於僣哉送張州判序凡貢士之見㧞於有司者有座主門生之分盖自唐已然儒林之盛事也然今昔道殊者已取才望以為公故薦士出於已今也糊名以防私雖謂之非知已可也况乎羣十數人坐一堂之上甲是乙否聚訟紛紜衡鍳之不精去取之失當使僥倖者得出乎其間而且號於人曰吾主司焉異時恥累及之盖有不免而尚得為榮也哉三衢張仲亨至順壬申中江浙選予實與聞焉眀年遂登上第官州佐以歸一再過予敦修事分氣意勤懇不類一時同升者愚不知其何以得此也雅聞仲亨素以學行推於鄉其人恂恂謙讓見之而信吾於仲亨益深有望矣夫士由一命以上即足以濟物今之司民社任長佐者雖牽制撓沮不得以盡如其志然隨吾力之及亦無不足焉特平生所守為不可變則其大者爾彼其負所學者世方指以詬病吾與仲亨深恥之顧嘗以為言而竊嘆也因其之官黄岩序以贈之送陶教授序科舉學校之制相為表裏者也今科舉方興而學校日就衰落是豈無其故哉敎官之選不精亦其一事也近議者欲以進士任敎官餘取之鄉選之中者盖有意於革雜進之弊矣而有司未之改也予竊觀延祐以前士舍學校無所於仕當時負才望而畏名義者徃徃居多且自卑而逓升遲以嵗月或白首僅沾一命其選若是之難也比年變化狡獪栖疾俄出而擁臯比不再轉而倚席太府揚揚然誇於人曽不少愧其人如是尚何責以敎養之事哉陶君士元世衣纓家當科目未興時以才受知憲府薦為邑敎為郡正山長而今調教授漢陽於是距始仕時幾三十年矣後来者或反出其上是於士元不足較吾獨嘉其雍容恬静稱敎官之名是行也必將無負厥職矣士元尤喜為詩漢陽古鄖國正周南漢廣之地也夫其秉操而循禮列於正風至今想西周之盛則其俗用美矣當文眀之時咏歌太平而推廣夫敦厚温柔士元之所優為也鄉先正鞏仲至亦嘗為是官鞏公深於詩而逹於教見稱於昔之君子遺風餘韻想猶有人談之使異時談士元者與鞏公同稱其美而羨吾邦之有人顧不美歟送汪山長序元統乙亥春予道過三衢將徃謁清獻公故居一償宿昔之願繼而識山長汪君處謙其人循循雅飭甚温而文與言若有契者予既數日留處謙日周旋不置遂相與出西郭門抵孝弟里遥望甍棟翹起田野中容已肅既至拜遺像於堂清風生氣凛然襲人按行徘徊問池臺故基漫不可考四周廹民畆竹樹無隙可容侵攘殆已乆獨庭下二豫章當時所手植者夭矯盤拏大數十圍其一且半枯撫之慨然太息時工人方治碑讀之知前此摧壊尤甚監郡薛侯為興脩汪君寔宣其勞恒産素微君請於矦畀田廪供租給則又君之能有為而前長席者之不逮也嗚呼太末之區歴千百年而有一清獻公聞其風者頑夫㢘懦夫立誠百世之師也凡居其鄉者固當有所興起為長吏者固當知所旌勸奉祠掌教者固當知其風㫖治其田土室居以無負其職不然是皆公之罪人也予竊觀薛侯之為重為衢人喜幸矣今君之滿歸也士侈為詩謌以華其行而屬予友人不逺二百里貽書俾予序之予既識汪君揆之人情不得辭第不知諸君詩謂何言而必及於清獻也苟知清獻為不可忘則將有奮然而興以大振夫卑陋偷薄之習是豈不足為汪君榮而君去此亦宜無忘其景行之思以交相賛也顧不美歟於是直書其說因以示之庶其有激已夫送徐學正序古之士者世為士未嘗輕徙其業流風渾厚固難以之望後世矣世道日微詩書仁義之教祖不能以淑其孫父不能以訓其子雖有司設利禄之途猶不能化之使從也獨且奈何哉新城徐君子聲素儒家流老成篤實士也来為吾州教官於是又識其二子及孫皆被服儒者訢訢然一家三世自為師友心竊異之時予方歸休里中杜門日無所為研弄丹鉛挟册謡吟自以為適而君家父子不憚徃来經義微辭辨析考求異書名篇手不停抄其嗜之甚若飢渇於飲食得之而喜雖眀璫拱璧不是過非習氣深至者不若是三年間頼以滋益不然以予之迂踈狷狭孰肯過而問耶子聲在吾鄉有一事尤可喜為仁山金先生立祠是也尊賢尚徳能為人所不為吾嘗閲吾州教官稱儒之名若君者不一二而一門嗜學世之愧者且多矧吾鄉也哉予家父祖儒傳序至予忝竊末第自度無補於時惟退讀故書訓飭二子使粗知向方謹身寡過以不貽先人羞亦不啻足區區有慕於子聲非苟然者子聲滿去當得初品官子孫旦夕與賔興積學之餘責効課功青紫可坐拾矣雖然位高金多志得意滿者吾豈彼羨哉使有子有孫詩書之傳無窮清素之風不墜天下之至榮大願詎有過之者吾將與君共保此道婺猶相去三百里間聲問可及幸時時警發無忘雲仍之好自今以始送胡生序胡章煥文自樂平不逺數百里来介其宗人仲退文書持所業詩文一編納拜欵謁行古師弟子之禮貌甚恭辭甚卑異哉生之為也自予来此邑亦欲以古道矯民嘗興學宫程講説間自為之開示大方意美材良質何地而無必有自拔於習俗之陋者夫何作之而不應勵之而愈惰二三嵗間未見有一人如生之為空谷足音其為喜何如哉夫學問之道從師取友多見洽聞固貴於㳺然予觀孟子論友一鄉之士為未足而友一國之士又以為未足而友天下之士又進而尚友古之人其徒有及門受業者則又不欲其留而勉之以歸求有餘師夫尚友古人豈不在方冊乎歸求有師豈不在身心乎聖賢又惡夫人舍近趨逺貴耳賤目者豈無意耶生之逰也請贈言於仲退丈而出首道番陽見博士祝君蕃逺二君皆予所敬者今自番而来見予顧予學殖荒落有愧二君其何以給生之求而滿生之望哉生復將之宛陵之建業而逰四方焉其所遇者必廣矣嗟夫科目廢四十年逮延祐初而興又二十年當至元之初而罷甲子凡一周矣前乎延祐諸老尚存典則未冺學者雖寡少類皆無所為而為則誠豪傑之士而文詞亦往往精詣不羣近年士習既殊髙者務求異於前哲卑者不過争為揣摩籠絡之説文氣卑下骫骳日甚識者已逆知有中更之事閭巷小夫投棄編冊彼固不足與議忽游目乎八荒問為諸老之所涵養扶植者淪謝相繼落落無㡬得不重為黯然哉所深喜者仲退丈以八十之年强力未衰進徳彌篤相望隣壤數嘗以文義濯磨使予頗自慰今復有招予之約旦夕解去當操几杖而從之惜生不能偕此㑹爾雖然亦審其所適哉若夫求道而非名為已而非人則祝君之告生者已悉兹不復云贈姚學正序科舉學校相表裏者也内儒而仕者不為進士則為教官科舉廢而學校存柄國者豈不以學校為至重哉科行二十年所得者可數其英雋眀達為時儒器者不少不幸而有濫厠其間往往速戾敗官議者遂相詬病以一概百直决絶之而後已可勝嘆哉學制既専宜其選必精夫何雜出冒居猥謬充斥絃誦聲消㢘恥道䘮萃小夫庸䜿日夜相與較升合錙銖苟欺竊訟争學校不廢猶廢也新安姚叔器之為池學正也脩教法招生徒治宫室覈田土眀㑹計斥蠧冗奮然為人所不肯為於是忌怒朋興沮撓百出叔器出江寧楊君志行莆田陳君衆仲贈言且并求益又知叔器少受學於楊君其為錢塘教諭也公謂以斯行騐其初比三年有成陳君謂江浙教官毋慮數百求如叔器者鮮楊君之期之者既騐矣今池學之績逺過錢塘使陳君聞之又將深嘉而樂道愚何足以賛一辭哉愚竊末科忝下吏雖無救廢罷戰兢惕勵得不以罪去幸矣而見叔器挺然自㧞為今教官刷恥増吾道之重故樂為之言以勵同志使皆若叔器豈小補哉愚觀叔器之為人温雅慎宻而其中屹然不可奪宜於用豈惟教官他日有𢡟風績於大藩而揚聲華於天路者必斯人也必斯人也王推官母夫人夀詩序池陽推官王君景福之母張夫人今年八十有五矣推官世居有莘舊成均髙第仕州縣所厯齊魯河濟之郊未嘗不奉母以從則地猶近也池陽在大江之南水陸數千里風土異方安輿之来雍容和愉其甘㫖問起居身率婦子惟謹嵗時奉觴夀拜舞笑嬉所居臨髙城風日佳時俛仰溪山按行花竹公府早休娛侍終日户庭無他聲諸孫誦書琅然人生之至樂天下之慶事庸有過此者乎雖然斯誠雅致也而愚於君顧又有深羨者焉自其為刑官也清心以御物每屬邑吏至則戒以毋妄生事事之至者察讞詳眀而裁决平恕故人知畏慎不犯斷獄稀少留而不敢専者僅累嵗之内耳昔雋不疑有所平反則母為之喜吾知推官君之有以白其母矣古人所為養志者非此之類歟然則夫人之夀祉益未艾也某既竊嘆嘉而又獲觀士大夫善頌禱之辭輙識其言以序於端秋浦類集序天厯己巳予以公事過池陽望九華登齊山嘗一賦詩後還里於北山草堂見張公詡青溪圗及元豐以来諸賢題詠遂和杜牧之弄水亭詩不數年忝授建尹趨謁大府溪山依依復在目中似有夙縁於是詢杜亭之故基訪張國之遺刻皆無有記憶之者秋浦志亦不能詳為之太息梅公聖俞以景祐間為建徳令後人闢堂祠之又徙而為亭皆蕪廢予既復亭之舊欲記其事求梅公為令嵗月志亦不書如朝峯亭等作則皆得之宛陵集中又既新邑學崇化堂嘗傳桞君道傳為作記俾求柴公中行舊記并刻之竟無蓄摹本者因嘆其文獻之不足徵往往見他郡乗著詩文者則為慮也周而其法亦不可廢也比来城中獲觀青陽楊君秋浦類集自唐宋至近時凡為池而作與夫語渉於池者靡不登載蒐獵纂輯詳富麗美諷玩累日既有以滿其前日之所恨因㕘以見聞補其遺軼并所欲商畧者間蒙見采一二復以書来求為之序惟是編有益於兹郡不患不傳愚言何足輕重哉獨念池陽山川之勝千百年間宦游寓公率多顯人而生其間者顧未有磊落竒偉與其山川稱豈風氣猶待而發耶抑有人而未之聞耶况宋季壤接淮右戎壘相望殆若窮邉絶徼然民不事文久獨青陽號多儒雅楊君好古博聞喜與名士大夫游恨予未識也何當弭節九華之下相視莫逆縱談兹事視杜荀鶴冠卿軰當邈在下風是亦一快惜不得往姑書此以寄意云讀四書叢説序讀四書叢説者金華白雲先生許君益之為其徒講説而其徒記之之編也君師仁山金先生履祥仁山師魯齋王先生栢從登北山何先生基之門北山則學於勉齋黄公而得朱子之傳者也四書自二程子表章肇眀其㫖至朱子章句集註之出折𠂻羣言集厥大成説者固蔑以加矣門人髙第不為不多然一再傳之後不冺沒而就微則畔渙而離真其能的然乆而不失傳授之正則未有如於吾鄉諸先生也盖自北山取語録精義以為發揮與章句集註相發魯齋為標註㸃抹提挈開示仁山於大學有䟽義指論盖有考証中庸有標抹又推所得於何王者與其己意并載之君上承淵源之學雖見仁山甚晚而契詣最深天資純眀而又加以堅苦篤實之功妙理融於言表成説具於胸中問難開陳無少凝滯抑揚反覆使人竦聴深思隨其淺深而有得焉故自逺方来從學者至數百人遂為一時之盛今觀叢説之編其於章句集註也奥者白之約者暢之要者提之異者通之畫圖以形其妙析段以顯其義至於訓詁名物之缺考証補而未偹者又詳著焉其或異義微牾則曰自我言之則為忠臣自他人言之則為讒賊金先生有是言也此可以見其志之所存矣嗚呼欲通四書之㫖者必讀朱子之書欲讀朱子之書者必由許君之説兹非適道之津梁示學之標的歟先是君未殁時西州人有得其書而欲刋之者君聞亟使人止之且恐記録之差也則自取以視因得遂為善本諸生謂予嘗辱君之知俾序其所以然竊獨惟念昔聞北山首見勉齋臨川將别授以但熟讀四書之訓晚年悉屏諸家所録直以本書深玩盖不忘付囑之意自是以来諸先生守為家法其推眀演繹者將以反朱子之約而已故能傳緒不差閎大光眀式克至於今日也又念某識君之初嘗以持敬致知之説質於君君是之復舉朱子見延平時其言好同惡異喜大恥小延平語以吾儒之學理不患其不一所難者分殊耳朱子感其言精察妙契著書數十萬言莫不由此學於朱子之書當句誦字求必若朱子之用功而後足以得其心此君之拳拳為人言者也然則得君之叢説而讀之者其於君教人讀書之法尤不可以不知也故因并著君名謙其世系履行與經綸著作詳具友人張樞子長所為行述兹不復序云詩集傳名物鈔序白雲先生許君益之讀四書叢説某既為之序矣其徒復有請曰先生所論著獨詩傳名物鈔為成書向聞屢以示子而一二説亦厠子名於其間子盍有以播其説念昔蒙君不鄙夷相與反覆論辨頗聞纂輯之意而是經之體段予因得畧窺焉夫詩之興尚矣當周盛時在下則有二南之風在上則有雅頌之作周公取以列於經幽厲之後風雅俱變夫子於諸國之風則刪其滛邪於公卿大夫之作則取其可為訓戒者東遷之後王國並列於國風而於商周之初考其遺失又得商頌之類至魯頌則因其所用之樂歌以著其實以是合於周公之所取而為三百篇若自衞反魯樂正雅頌各得其所則指周公之經殘闕失次者爾是則詩之為經始定於周公再定於夫子遂為不刋之典不幸厄於秦火中可疑者多而諸儒不察由漢以来毛鄭之學専行歴唐至宋一二大儒始畧出己意然程淳公吕成公猶主序説子朱子灼見其謬汛掃廓清本義顯白每篇則定其人之作每章則約以賦比興之分叶音韻以復古吟哦上下不加一字之法畧釋而使人自悟破拘攣發蒙蔀復還温柔敦厚平易老成之舊自謂無復遺恨嗚呼詩一正於夫子而制定再正於朱子而義眀朱子之功萬世永頼此名物鈔之所為作也自北山何先生基得勉齋黄公淵源之傳而魯齋王先生栢仁山金先生履祥授受相承逮君四傳有衍無間益大以尊君念朱傳猶有未偹者旁搜博采而多引王金氏附以己見要皆精義微㫖前所未發又以小序及鄭氏歐陽氏譜世次多舛一從朱子補定正音釋考名物度數粲然畢具其有功前儒嘉惠後學羽翼朱傳於無窮豈小補而已哉然有一事關於詩尤重者不可黙而弗言魯齋嘗謂今日三百篇非盡夫子之舊秦火詩書同禍書亡缺如此何獨詩無一篇之失如素絢唐棣貍首轡柔先正等篇何以皆不與而已放之鄭聲何為尚存而不削劉歆言詩始出時一人不能獨盡其經或為雅或為頌相合而成盖聞夫子三百篇之教而不全則以世俗之流傳管絃之濫存者足之而不辨其非朱子固嘗疑桑中溱洧諸篇用之祀何鬼神享何賔客何詞之諷何禮義之正不得已則取曽氏所以論國䇿者謂存之而使後世知其非知所以放之之意仁山屢載於論語考証謂諸儒皆然之某嘗舉以告君君方遵用全經宜不得而不取也今鈔中二南相配圖魯齋所定者盖合各十有一篇退何彼穠矣甘棠於王風而削去野有死麕則君固有取於斯矣以君之謹重慮啓夫末流破壊之弊然卓然有見寤疑辨惑如魯齋之言使淫邪三百餘篇悉從屏黜之例豈非千古一大快朱子復生必以為然也惜斯論未䆒君不可作矣姑識於序篇之末以俟後之君子攷焉送琳上人序金陵古帝王都間數百年王氣肇興龍翔當天於是崇建巨刹甲於海内開山訢公居焉尊貴隆重當世之極選東陽煇公寔同師門前自江西百丈入覲召對被㫖與公同修禅林舊規垂式諸方以二師之聰眀辨博上簡睿知信能𢎞大其教稱其為師表者也琳上人者煇公之弟嘗將命共事獲聞纂次之意左右周旋亦一時之盛哉今煇公主吳興道場上人不勝鴒原之思治裝徃省遂將之金陵拜訢公席下不憚千里扁舟東下水雲之鄉泝𣺌漫以望亭塔之參差廻溪深谷嘉樹茂林既挹夫清邃幽麗之状飄然復西臨大江瞰中原山川之蟠踞殿閣之翔湧又得夫瑰偉宏傑之觀所以動盪其心目無不可喜者而二刹名區又皆方外人物之淵薮泛愛而精擇必得其秀敏者而與之游乃若篤友于之情厲切偲之義怡然而不違浩然而有得超乎若真陪鹿苑之游充乎若搴珠林閲寳山捆載而歸是行良不虚矣予寡交鮮諧每嗜游北山盤桓泉石間上人昆弟特相欵宻煇公既有四方之役上人留草堂見輙益親時論文藝慰其寂寞未嘗間數月不相聞也獨恨煇公别乆又未能一識訢公然讀其文章而想其傑然也旬月前鄉僧自金陵来謂公嘗語及予時又得煇公書而上人適有是行徵言於予予烏能亡言耶嗚呼道之異不得而强同也情之同不得而苟異也兹予既道其區區以貽上人而又歴致其敬慕於二師者是豈非人之情也哉送趙用章今嵗夏四月予訪桞君道傳於浦陽相與至月泉上君識趙用章過其居高門古垣庭宇翛翛君語予曰此吾邑故家之不廢者也及秋予有北上之役用章托載同行舟中追躡數千里不置因得欵語平生知其喜詩而好逰每親戚故舊從官四方未嘗不往焉故東陟天台西登廬阜徃来江湖間又嘗一至京師今其再也夫山水之樂搜竒抉勝固昔人之高致若京師聲利之區自非有求者不至用章之志未可知也一日来告予曰吾之是行非有他也縱觀巨麗展覿懿親而已向嘗葺佚老之廬桞君嘗以梅石名其齋今集賢諸公畀我以處士之命用是以為號遂受而不辭持此以歸徜徉梅石齋間不啻足矣予聞其言然後嘆用章之賢於人也夫奮起褐夫自南而北者揚袂抵掌莫不有芥拾青紫之心奔走造進日夜不少休以僥倖於一得而不得者亦多矣乖義而違命貽羞而取譏往往皆是也若用章者豈不誠賢乎哉用章徵言為别將請於名士大夫賦梅石之章必有能發眀之者雖然吾言過矣歸以示桞君幸為予刪送崔生序古之人懐道自足則行於朝歸則以教於鄉進退浩然無往而不自得然淑人覺後尤所願欲而樂之者以道之所傳者衆而澤之所及者廣也郎中吕公仲實自中書解印歸冀寕開門授徒來者四集幾無以容諸生争出錢買材以斥大其居一時興起甚盛聲流聞京師崔生者其鄉人也公為少司成時嘗留受業聞之欣然命車戒途若恐弗及夫以公之文學議論挺挺諸公間而至剛之氣不撓之節四方士莫不延頸願見况於親炙之者乎其在江東時公被擢自海上還一見受知今備貟學舘有愧於前人因生之行慨然興懐安得走唐晋之故墟揖河汾之遺風縱觀冠佩之盛琴瑟書冊爼豆揖讓之容求所謂英材者而識之異時光於邦家無愧乎其師之所立者不在此歟符離陳克敬亟談生之美為之徵言因道其所欣慕於吕公者而并以為生勉焉張文忠公雲莊家集序人聲之發為言言之精者為文而皆出於氣也昔人謂文不可以學而能氣可以養而致是氣也孟子所謂浩然至大至剛以直養而無害者歟夫其養充而氣完然後理暢而辭逹孟子之言非為作文設而作文之法孰有過此竊嘗以是騐之世之人即其文之高下而其氣之大小能養與否與夫養而未至者并可以得之也故濵國文忠張公名養浩字希孟庶幾學孟子者公早負文名由至大初仕顯於朝逮延祐中天子方好文一時侍從言語之臣號稱最盛而公頡頏其間及至治時所上時政書萬言力詆權姦更變法度非便幾蹈禍不測諫鐙山䟽謂閭閻細民戯玩非人主所宜作犯顔嬰鱗衆咸為之恐而卒以直見賞其剛大之發沛然而莫之禦者豈一日之致哉既解參議中書歸卧華不注鵲山之陽殆將十年屡召不起翛然雲莊之居悠然山泉禽魚之樂沉潜乎經史百氏益肆於詞和平冲澹之中錯以竒崛藻麗要皆依據義理而切於日用之實流布自然而無綴緝辛苦之態所養益可知已竊聞公最後起為西臺中丞以救荒憂勞致疾而殆忽聞鼔樓梁木自壊其夕有光荐星隕於濟南則其平生之氣感動至於如此豈獨見於文也哉往年某至京師公已還第時公父濟南郡侯年夀八十嘗賦詩頌美以致慕之意今公之子秘書郎引出家集示予重惜公之不可見也公雲莊集四十卷已刋於龍興學宫臨川危素復掇其關於治教大體者為此編秘書屬予以序顧以朝多名公辭謝不敢則委其集數月而請不置因為推公之所得者如此若其世系官位之詳則有太史之傳墓道之碑兹得畧也遊西山詩序三月十七日金華吳師道正傳晋寧張翥仲舉襄城趙璉伯器臨川吳當伯尚河東王雍元肅同游西山玉泉䕶聖寺遂至香山既歸各賦詩以紀實先是䕶聖主僧月潭師欵客甚勤留之不果則約以再游又約以詩為寄未及寄則又屢督趣之於是裒寫為卷納之山中四人者推某為最長故其詩居首而又復叙其畧焉吁吾曹東南西北之人幸而㑹於京師佳時勝集徜徉名山水間既愜於心師超然方外而獨惓惓焉其高致尤可愛而仰也秋風揚鈴客興未巳又將往踐前約然下三宿之戀或法所不可師其有以語我来送王生歸省序民生於三曰父君師入而事親出而事君而從師者又所以學夫事親事君者也師之責亦重矣夫一鄉一國之間苟有道徳行藝出乎衆人則將囊衣裹粮不逺千百里而從之今也天子之成均朝廷之慎選十餘人羣居而列教豈不以厭諸生之心有以精其能而成其業其相與也豈乍離乍合若市之人哉然陽城之為司業諸生有乆不歸省其親者遣之曰學者將以學夫忠與孝也偉哉斯言夫歸求有餘師亦不過孝弟而已兹固聖賢之意而陽子得之者學而出於誠則何往而非進徳之地哉廬陵王先生光輔居太學三年今以覲省歸生乃吾同年吾素合君之從子故喜親予其天資謹厚尤勤於學顧予偹員倚席何足厭其心而諸先生之有造於生者固不薄也茲既有以慰其親之思而又毋忘諸先生之教則於道兩盡遲生之来也有日矣送舒生序番陽舒生元以國子伴讀授宗仁衛教授需次京師將暫還其鄉過予請一言以别予聞國初時監舉伴讀之選甚嚴而精如耶律公有尚髙公凝姚公燧皆此焉出今之在朝廷號名公卿者猶可歴數也近嵗法弛而弊興其進也不以材其試也不以程矯辭而謁告曠職而家居循日計月候期至得仕如探囊取物議者咸以為言而未有能奮然起而更之者盖積習既深而覬幸者之所不樂故爾雖然法之行於昔也得人固多法之斁於今也又豈無一二才且良者居其間可以執一論乎生由泰定初補四門生至順間為伴讀而至今幾二十年尚及接前人之休風其進選也公其傳習也勤受命而職教以其淑諸人者逺以淑後之人吾知其必能也然其在學舘與予不相及其貢而上於詮曹予適至而與聞其同貢凡八人獨生時至崇術之堂不忘師友之誼其七人者予未嘗見其顔面古之為舉主者果若是乎此愚於生之請特嘉而勉之又以知法之敝而不可不更者如此上之人尚有圖之哉宋侍御妻張夫人挽詩序婦徳弗外聞餽食酒漿平居無事稱述惟不幸而殁則托於能言者而有銘謡之作又有哀歌以相蒿里之挽於是隠者宣微者著而人得共聞之古之賢婦淑女得以不冺於世者職此之故也侍御史宋公夀卿之配張夫人既卒歸𦵏滑州公既請於大梁吳待制彦輝為之銘彦輝方以文章重一時士大夫咸為詩以繼其後惟恐夫人之盛美弗得揚而無以慰侍御公悼亡之悲也吁以公之聲望羽儀臺府秩貴二品夫人昨封京兆光顯盛大是豈不足以傳然歴考諸公銘若詩之所稱則知夫人固自有以傳而不係其夫者豈非兩賢也哉樞宻都事楊善卿持所裒詩示予俾序其端予雖不及識公而聞其人乃今又獲覩夫人之懿既為之嘉嘆遂受命而不辭馮景仲存拙藁序士以科第進遂奔走禄仕委棄舊學至絶口不言文吾往往見之未嘗不為之太息也君子之於學猶日用飲食也豈有飲食而可以一日舍哉斯人也即其後而騐其前則所學盖可知矣醴陵馮君景仲延祐五年進士也天歴中予至江西君為省屬一時洪府上下多名士大夫君有文聲出其間固已心識之今兹幸為成均同僚得睹所謂存拙藁者其詩斷自泰定丙寅文則間存少作盖去擢第時十年矣夫以君之學既足以成名而又遲以十年之乆始出所著自見方一再州縣倥偬簿書牒訴中汲汲不少休日進月増弗懈而及於古豈不卓然異於流俗也哉盖君之學根据經傳出入百氏以取材羅絡甚廣間嘗與之商較作者榘度髙下可否不差毫釐其為人樂易清夷羣居陳説古今辨詰紛拏而獨恂恂似不能言者以故知與不知皆愛之盖其所得者深故其發之也慎所蓄者善故其守之若虚此尤人所難也顧不以愚之不才朝夕周旋若以為可與語者故愚輙以所知為之説如此若夫名位聲望重於時則圭齋學士寔君之鄉人而知己之尤厚者得其一言足以自壯而愚非其比也送尉彦誠序東平尉彦誠别三十餘年矣一日相見京師鬚鬢蒼然坐乆乃始能識問所從来則以舂陵幕滿官也問所歴則由浙而江東而湖湘也由憲察掾而師閫史邑簿以至於今也於是憶彦誠昔在金華與許君益之㳺君所厚者張子長暨予予因以友彦誠也是時趙公予英持使者節来浙東以古道風勵學者後進晚生不倦奬誘之於許君深所敬禮延教其孫璉字伯器者而吾數人以游從之雅獲登公門相與歆動鼓舞以思自㧞於流俗亦可謂一時之盛哉既而彦誠用薦者沿牒去後數年科目始興許君終不應子長嘗應而止予遂忝末第與伯器為同年彦誠則乆不相聞矣趙公殁今幾二十年許君亦前五年卒存亡離合恍惚隔世不自意至學館及與伯器為僚而今忽又與彦誠遇也彦誠數来取許君舊詩泣下不自禁义道子長嘗走雨中訪之百里外感激太息吁士君子行已之致交友之誼始終如一則死者復生生者不愧使行違其言後戾其前則寧不靦於面目孰若相視浩然而無愧者哉彦誠復調掌昭武幕旦夕且行持一卷授予謂有諸公詩而子序之竊謂其才業見於已試今也坐幕府治文書佐上官以恵澤一郡則不待賛因特叙其所感者焉伯器方在刑曹并以示之亦相勵之一端也雖然予又有禱焉昭武在閩中壤與武夷接武夷有隠君子杜伯原父與吾許張所敬者彦誠未之識也往子長欲約予徃候之窮山水之幽深從觀所藏之書及其著撰之富而未遂也萬一過之為致予言老病且衰憂患乗之不樂乆此留引領南還庶幾滿其来償之願并可復見彦誠矣尚謹識之送曽子白下第南歸序至元元年科舉制復行眀年士偕集於春官自科廢且六年人謂未易卒復而眀良相逢復之不旋踵某幸竊禄京師命下之日與士大夫舉手相慶又獲觀英俊之来風動雲合誠平生一快也臨川曽子白夙有文聲尤喜其在數中夫子都之姣惟無目者不知吾固以吾之目而信人之目矣既而羣進有司則子白不與焉予駭且疑謂其學之不逮耶則並之者鮮矣謂予之謬於料事耶則同予者衆矣思之而不得其理向嘗泛觀唐宋小説記科舉事謂有鬼神司之故有當中而黜當黜而中者每笑其恠誕自今觀之亦豈不然凡有司之不知與吾徒之竊料其如鬼神何哉予將有以觧子白子白方處之怡然未嘗見幾微不滿色則其器量尤非人所能測也予聞子之族祖南豐先生嘗試而不中獨歐陽公嘆其魁壘㧞出而恠有司不能變所操之尺度南豐郵其文數十萬言示公公讀之以為有司可弔而已可賀也其後公知貢舉南豐卒以進士成名一時之不遇誠不足為輕重哉子白不鄙予數録其文相示予無歐公之聲望莫能張而大之也然朝之知子白之文而悼其屈者有之矣是豈非今之歐公哉安知異時之不出於其門也子白勉之南豐之業吾於子乎望董氏傳家録序國朝奮興朔方一時中州豪傑之士佐命歸誠宣智効力卒成萬世之業重臣大家封爵胙土爰及子孫距今且百年傳者或絶或微可歴指而數其蕃𦙍顯仕號稱獨盛者藁城董氏而已盖其始由太傅趙國忠烈公俊而興一傳太尉忠獻公文炳少保忠穆公文用太師正獻公文忠而遂大再傳而右丞忠愍公士元平章忠宣公士選太傅清獻公士珍旁及其餘伯仲之裔益逺益分迨今七世且二百餘人内而居政府臺閣外而在藩閫風紀州縣者不可勝紀真可謂盛矣愚嘗讀漢功臣表見其後多以罪廢者甚一再世而國即除竊又有感於今之故其於董氏不能不為深嘆也且董氏何以得此哉自其祖考以忠誠結主知毫髮機詐不入於其心當草昧驅馳之時緫干戈定城邑體好生之仁而不嗜殺至於嚴家法重禮教推賢薦士如恐不及兹固足以為垂後之基而為之後者又皆莫不承訓祗徳飭已好修尚文而敬學凡聲色裘馬驕侈華靡之習所樂不存故居官守職多剛毅㢘讓能以政業自表見是則天下稱董氏而他族莫與抗豈不宜哉今正獻公之曽孫監修國史府長史鑰著董氏傳家録謂諸公為董氏紀載者有世系有家傳固可即是而攷其本末矣然二書之所不及者亦不能無也乃以譜系列於前而復以墓道之碑贈諡之制與夫行述諡議遺愛逸事之文纂輯比次凡傳譜之未偹者於此有攷焉予得而讀之因為之言曰董氏勲勞在國史彼家傳世譜所以著其詳而今録又加詳焉夫史臣之體程其巨細兼包互舉義存筆削其立法也嚴若夫孝子慈孫所以振揚其先將無所不用其極雖一言一行之渉於見聞者皆當並存而無遺所以隆孝愛之至情偹一家之私記則雖詳且多不厭矣長史之為其有合於此義也夫使凡董氏之族覧之而朝夕惕厲以無忘先人之豐功盛烈繼繼承承與國無窮是編所載當不止董氏之發其可量哉長史屬愚為序辭謝不獲故述其槩附於末而虚其右以俟朝之顯而有文辭者焉送蕭君祐奏差序宣城予舊游去之十餘年矣父老故人猶念之不忘貽書千里外訊其安否或遇之他邦則亟見道往時難事太息無方及人之徳也而何以得此堂堂臬司清流所居持風裁以主善類故區區者得少展其志夫豈無所自哉數年前尹池之建徳行部使者至予以抗直觸暴怒不測時蕭君君祐寔從與屈掾伯昻力言其無他乃解彼怒者固不吾知而二君之知我亦得之於宣城一時之免於禍非偶然也繼嘗擬作詩以謝二君而無因見焉君祐燕人也予来京師與之欵語而益信其賢方以外艱服除奉中臺之命復之江東予心不能無動焉吁今之為州縣者益難矣其人難矣顧其中豈無介然自守者第其所為素與俗忤而又不能容悦以事人故其得禍最速非遇風紀之賢眀者維持保䕶之其不殆鮮矣君祐推其心以往遇賢使者固有合不然亦有以佐其採察之所不及而捄其舉錯之不當愚方為一道喜幸而豈真以其私而已耶告行有期振䇿南邁敬亭宛溪悠悠我思父老故人有見問者為我多謝送浦江邑長官詩序予讀漢循吏傳文翁至召信臣不過數人指其事而稱之者興學務農増户口修水利弭盜賊又一事或兼一事不言其事者則曰奉公㢘平治行第一或言其民歌舞祠祀之盖舉其大則細可畧著其賢則實自見民之乆而不忘則當時親戴愛慕從可知己若河南吳公治為稱首僅附見序端何其簡而有法也後世頌遺愛紀政績者自農桑學校以至筐筥細碎無不具四善二十七最之目靡有遺動累千數百言而不已何哉浦陽趙君敬叔致其父老之詞曰邑長官世庸公慎宻而寡欲者也為邑三年民樂而安之其滿而去也争為之詠歌願得序其所已然者嗚呼州縣不易為矣其不能為者固繆而好為者復失之赫赫之功難繼之事利興而害生愛之而反病焉者多矣去太甚罷不急禁擾煩相安於清静是亦足矣豈必他為哉善乎父老之稱其長官也慎則畏法宻則盡心而又以寡欲為之本言甚約而美實章雖循吏所列而何以加諸愚既因是而得長官之賢又嘉其父老之質而不夸有古之遺意焉耳故書之以為序陳監丞安雅堂集序至正二年七月闕日國子監丞陳君旅衆仲卒於京師中書左丞許公親率省部以下弔且賻司業王君諗於衆曰前是監官不幸者有之矣顧賻有厚薄陳君貧加厚可也於是輟餐二日諸生復相率出錢凡得五十緡合其家所得賻倍而贏若干以其贏給喪費謀歸𦵏莆中則道險逺君嘗愛錢塘山水將老焉囑曰𦵏錢塘可適參政馮公赴官浙省司業君以告公忻然許為卜地西湖上乃以其錢四之一俾其家蹴車船其三則委之馮公𦵏畢而歸餘貲焉後月馮公書来報悉如約嗚呼是舉也何其多義也湖廣行省參政蘇公時亦戒行囑某曰陳君所以致令名者文也文之傳則朋友之力也異時吾能使之傳子盍裒集之嗚呼蘇公之舉亦義也予即訪於其家則其子多以借人留者必欲傳録而後出出之始自南寄来大抵非完藁矣因而為之序次詩文等緫若干篇釐為十卷君以布衣起遐陬徒歩入京師首為平章趙公所知㳺中丞馬公學士虞公間而於虞公尤宻其所稱道見於文字者他人不可得也諸公相繼淪散士大夫之望隐然屬之君不料其止此也予在南方時嘗讀君之文而愛之来京師君始相識幸為僚成均得朝夕接知君之於文用心甚苦功甚深藻繢組織不極其工不止而予不能也嘗見予所作曰吾觀子之為人孤峭廹急謂文亦當然而紆徐委折含蓄思致何其與吾意合也於是遂索觀所有予性恥表暴察君之誠不敢隠也君之學得於外舅趙大蓬名必曄者為多必曄庸齋汝騰之孫有學行君早經指授故前軰淵源尤所習聞且言從事於文奪其志自今願以大者逺者共講焉予謝不敢當而二人之莫逆深矣官舍相近歸即相過或踏月就談盡二鼓乃去自始病至甚􅉵未嘗間數日不見見輙談文義之外不及他也君之於予豈若衆人哉纂次遺文固其責也况重以蘇公之命乎因念諸公尚義之舉不可以無述并以予之與君相得者録其梗槩以識予悲若乃評其格製表其精華序而發揚之使章章不冺非蘇公而誰敬虚其右端以俟君之世系官位墓未有石諸公又豈能忘情乎敢并以請君嘗名堂安雅令予記之不果作今題曰安雅堂集庶幾其志云年月友生東陽吳某序送杜宗元察掾序詩不云乎既見君子云胡不喜甚矣哉君子之難見也古之人有恃風裁而高聲名者一時之士執其御登其門以為至榮大幸是則詩人喜見君子之義聲應氣求物之從者固以其類哉風紀之司君子之所張也其抑揚進退足以輕重榮辱天下之士亦君子之所頼也為之掾史與有斯責豈徒治文書佐唯諾而已哉其有出名家尚儒雅被服冲澹孜孜焉恂恂焉日夜以稽經術較文藝為務所至必求賢士大夫與之㳺將以深培其本而大肆於用所志可謂卓爾不羣者矣寥寥此道間何濶焉而今於杜君宗元之来見之宗元之来浙東也所臨之邦實惟金華疇昔文獻之盛雖不可復見而遺休餘澤沾被深長後来相望猶未冺絶是以聞君之風莫不投袂思奮延頸願交者無他焉亦欲自附於君子之列耳此之好善也優則彼之修己也勵豈不交相遇而相成哉某在江東時識君於行部今相距不再舍而兩年間僅一見屬有幽憂之疾弗獲日陪冠佩之末趨挹簡冊之緒論而君復時時深念拊循而慰藉之自惟僻陋褊廹方為流俗所甚憎若之何而不見棄於君子也君方升陟御史府辟命之下咸以為慶而亦不能不惜賢者之去焉雖然吾黨之相與切摩者亦曰古道耳器識不高則所就不能以喻今人問學不充則所立不足以追古人而與之並宗元志於古道矣去是而羽儀臺序流聲實於天朝方將為天下善類喜而奚私别之戚戚也哉送吳學録序教官選壊乆矣未若𨽻各道者之尤甚也自屠沽負販以至賤𨽻雜色無不得是假是名者可為吾道長太息盖數年前以司廪計者升邑諭郡録或議其非而罷之當矣今之為是者問其名則曰徳行文學也晦迹邱園也吁徳行不可詰也已遺逸之科朝廷所以待特起之士安用此蒐𤨏軰累百百哉偽委風靡㢘恥道喪必有任其咎者而莫之敢言也里人吳履徳基由天台直學為衢學録徳基世儒家自少至長不廢挾冊若人而職教孰不謂宜雖然以徳基而異於非儒者未足多也要當異於俗儒而後可非惟異於俗儒也雖古之號為儒而實則戾儒者吾與之異而後為至爾徳基質甚良行甚謹居北山之下先正遺文古書多見之某於鄉先生之學雖蚤服膺而累於薄宦嘗有不獲卒業之嘆比年歸閑稍知紬繹𦕈微窺闖深宻回視平昔淺陋鹵莽為之内熱流汗欲强進自力則老病及之矣徳墓年富不離庠序今又無出内㑹計之煩而有優㳺暇豫之樂柯峯幽絶之墟攜束書而往讀焉以求聖賢之心洗俗學之陋將見充然而不窮浩然而有得涵養器業自致逺大何施而不可奚有於是區區者哉送程知事序三衢程國表調佐池陽幕過予而言曰子嘗仕池習於池之故矣具有以語我来予告之曰行臺統蒞東南而江東視行臺為最近憲府之在宣城又不過咫尺間臺府之言朝發而夕逹於下也江東數郡之政夕行而朝聞於上也是以百司竦然惡者懼以戢善者勵而修公論之激揚視諸道尤速而先下曹末屬稍有以自見者其待之必有異也又况以儒而進者乎某才不能以喻人政不能以異人而趨走承順之節又萬不若人惟以拙誠代巧詐而已至於奸豪之謗誣權貴之觸忤謂必蹈禍乃有眀争而顯釋之者嗟乎其何以得此哉池當要冲軺節之所往来聲實尤易著聞今之仕者以邇臬司臨孔道為憂内慊故爾若吾徒則何往而不宜哉國表聞之喜庶幾有合者然於其行也予又有公私之請焉池學饒土田陂湖奪於强有力者十之六七往予承鄉史命按覈半月間追復七百餘畆豪黨忿疾幾見中傷㑹以滿去則著於櫝勒於碑俾不沒君起家諸生能無念及此乎此予為吾道請也予在建徳時植縣門建學崇化堂復官舍侵地作梅公亭清白泉亭沿山手植花木頗為登臨勝處今去之七年興廢不可知君出行邑試往訪焉發揮溪山之精英一吐秀句鑱諸千仞之崖異時寄予以為光寵尤幸之幸者此予之私禱也尚識之毋忘禮部集卷十五
