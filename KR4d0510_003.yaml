body:
  text: 禮部集卷三元吳師道撰古詩追和杜牧之弄水亭詩韻題清溪圖池陽瀕大江羣山勢騫舞髙甍出麗譙萬屋駢民伍泱漭清溪流光照城南户飛梁壓水天荒亭仆風雨載酒客誰來弄水人已去蒼煙帯林薄緑野分畦圃賈檣攢比櫛魚舍低殘堵秋色㶑生漪夕雲閑映渚蕭蕭蒲柳脫槭槭葭蘆語遊鱗數鯈尾沉影窺鴈羽征毛寒未減珠光時自吐隨流長堤盡當道奔石怒十里清瑶堆谽谺爭刻露僧居草棘翳仙洞霞飛貯却還望翠微絶憐浸秋浦太白與樊川千載不可遇摇筆想吟詩攜壺記遊處何當占民籍便欲棲村塢磯釣具竿綸畝耕供臼杵暫遊竟返棹微官謾紆組中情託謡詠萬象恣嘲侮九華興未已淛水期空負忽見張公圖如得千金賂沉微正爭席榮誇無負弩悠悠山水思冉冉年歲暮展卷倘頻來猶堪浣塵土天厯己巳予過池陽與友人自清溪遊齊山賦詩紀其事而溪上之勝未之及今觀靈源草堂所藏張公詡清溪圖及諸巨公名章妙翰為之憮然自失因和杜紫薇詩韻一首追述所懐非敢僣附昔人第以晚末獲見是圖用志喜幸云爾遊東峯分得松字層顚陟岧嶤前轉憇東峯周遊撫荒址分坐䕃茂松天際遠瀨白煙中寒樹重遐瞻目已極幽情興未傭詠歸樂童冠願言躡遺蹤陳生山水圖白雲從何來縈紆截青嶂落落倚岩松沄沄赴溪浪平林出茅屋修梁亦相向如何寂無人此境付空曠憶我秋雨餘江南入遥望德興開化道中三首春晨氣澄穆雜卉香滿路百舌鳴髙林墟煙淡如霧農夫啓門出在野各有務行人獨何為憧憧自來去又宿雲逗疎雨睒睒吐晨旭晴光動千花霞雪眩川谷白鷴戯深叢黄鳥鳴灌木俛仰竟忘疲歴此溪百曲又兩崖蒼石間湍水激清瀉山桃爛紅芳光影連上下春風忽怒起意乃媚行者飛花撲人来攬之欲盈把過常山趙忠簡公墓客行常山道溪駛波沄沄泝流睇崇岡問是丞相墳舍舟歩榛翳隧道不復分石麟已零落宰樹何披紛其傍曽𤣥居混迹隨耕耘亦有顯仕者逺去忘榆枌長吏類俗流但識期㑹勤葺治禁樵採此事今無聞堂堂中興烈忠正而徳文禍胎偃月奸寃魄炎海氛凄凉槥車還倉卒書疏焚誰知尉職卑乃能杜使君蒼天佑賢俊㣲爾幾空羣興懐慨前事空山黯愁雲咸陽骨安在唾罵奚足云騎箕儼天上千載彌清芬信饒道中雪五載樂閒曠閉關毎安眠祖行復言邁廹此將殘年江湖多北風臨流竟囬船連旬蹋凍雪驅馬不得前錦溪何淪漪芝山亦清妍豈乏故人居欲徃無由縁漫漫四野白青是誰家煙僕夫慰饑面呼酒還欣然我獨不解飲自苦誰汝憐前途幸云邇努力勤揮鞭職思在憂民才薄志自堅只應髙人笑胡不甘田園入建德界纔登東陽橋復渉蘭溪渡千里名地同依依鄉井故六合豈不寛遐瞻恣馳騖嗟此窮山中寧知擬予歩三生有夙習兹遊亦竒遇獨憐迂狷姿諧俗匪心素靦顔民社寄抑志簿書務煩爾父老迎亭車勞前路巖巖齋詩為蕭從周經歴賦泰山峙東方特起無附托瞻彼巖巖姿作鎮長四岳紛紛培塿卑𤨏𤨏丘垤薄巨靈鍾竒秀后土標磊落古來鄒孟氏氣像儼相若尊王辨何雄闢異道斯廓剛大塞兩間作配真不怍去之二千載士氣日以弱陵夷破崖岸漫漶滅垠堮自非拔俗彦所立焉能卓西江名世家清望在臺閣當服獬廌冠且贊芙蓉幙正色肅羣邪忠言挺一諤巍然衆倚重行䆒經濟畧矯世起卑汙名齋豈徒作屹流須砥柱伐病宜峻藥平治舍我誰勿謂髙難學二月下旬寒食在郊書事言懐二十韻生非適時才向用更從宦所至歉輒饑命薄自招患去年行視旱四境幾及半逆知憂未歇奔走今敢憚既廪無餘糧私室乏朽貫民窮固堪憐俗戾那可勸餓者擁我前對之謾興歎蕭條空山裏荏苒芳序晏寺幽宿稍便嶺峻歩宜慢看花妨病眼揮策憐弱腕止飲已兩年啖蘗日無算獨飽豈所安輟飱空據案松楸入我夢忍淚憶灑飯子規非惡聲夜半勤相喚是時乆不雨望望復憂旱風雷忽震蕩簷溜鳴逹旦起看麥青青翛然一疎散天心自仁愛忍使民命斷書生誓及物此志誠汗漫投救方自兹偪仄嗟誰伴和臨川危太樸見寄美人江之西道路阻且長欲徃從之遊未遇孤鳯翔娟姢隔秋水蘭佩芙蓉裳瓊桂手自折贈客來池陽寄言亦念我熣燦金玉章書生拙為吏窮山抱荒凉徒勞復貧病不去策非良秋風起予思木落百草黄目疾謝柳道傳張子長惠藥處世五十年寡嗜仍少病天與兩目光炯炯素清淨前年翳生左赤脉歘交横審因察其源五色非所競學書信夙習耽讀亦本性雖于二事切未必致兹證從來不解飲杯勺强酧應積毒根胃腸標表發昏瞢鍼刺爭雜施流血和淚迸丹砂與空青數市窘貲罄梔蘗動盈筐日啖不論命重氛幸全掃餘眚時一盛荏苒三載間視眺猶未瑩偏盲亦何害忌者遂相慶維兹二三友為我憂怲怲許君屢貽書力勸宜習靜損讀復省思黙坐但微瞑心腎上下居火實以水勝炎炎降不怒行之乆自定殷勤柳與張有便嘗致詗為言醫法難俗師慎毋聼一朝得竒藥千里轉持贈緘封謹視䕶述語頗詳竟開罌異香發著筯金膏凝試之累旬日竒效他莫並感之欲刺骨報爾無照乗我生未見道絶塵怳猶瞠眊焉慙訓言亦豈中未正扶持謝諸公磨刮完兩鏡漸驚容衰老謬忝小邑令鄉山杳在望歸船行可榜把卷欣復適看雲遠相映揮絃送孤鴻飄然動髙興從今没暮齒不復憂倀倀永懐何能忘臨風寄孤咏贈鐫者劉生作邑荒山中文陋嗟俗敝黌序燬蕩餘大半莽榛翳官居有曠圃豪奪恣氓𨽻清白泉乆堙梅公亭已廢永懐前賢迹敢忘崇化意亭池復舊觀講肄闢新位故人思我文題篆仍表識碑榜擷清芬發揮藉精藝之子畨國來竒遇良有契通悟捷天機委折知筆勢我無及人德誰堕峴山淚庶幾譔刻工尚可傳好事歸歟無長物摹搨遂盈笥塵土厭徒勞山林深夙嗜舊編未卒業良友纔一二幽棲金華北謡誦以卒歲削磨千仭崖遲子當一至九日約遊齊山不果晚登尊經閣嘗愛杜牧之齊山作重九插菊滿頭歸清詩播人口我来慨風流已落千載後深秋偶留滯佳節不可負詰朝共攜壺夙戒二三友俄聞車馬集賔從分左右紅袖拂煙靡翠幄張林藪欲徃那敢前踟蹰謾搔首晚風送凄雨坐想驚散走參前儼髙閣直上敞虚牖㝠迷瞰城郭披靡見蒲栁清溪来足下翠㣲真培塿古今杳同夢何物能獨久斯人雖跌蕩而亦世希有飛蚊一晌聚瑣瑣諒非偶真樂名教存聖謨掲星斗卓哉尊聞意夫豈為杯酒登髙兹誠最吾賦當不朽四月癸卯原父杜徵君自武夷山道蘭江道傳子長来㑹明日徃拜許君益之墓道傳有詩因次其韻五年絶朋儔索居大江潯来歸頓聞同掃迹方投簮何言得良會星聚臨蘭隂太常儼耆德隠君澹沖衿追琢金玉章諷和鸞鳯吟柴門閉溽雨竹樹幽深深笑言勞契濶喜我病不斟張子飛車來頓忘山水滛欣然鍾期遇寳匣開瑶琴獨嗟白雲老不見傷我心束芻拜墓下衿佩來森森斯文黯銷落白日氛翳侵經德固不囘豈弟神所歆峩峩武夷峯鬰鬰金華岑前修未云邈千載嗣遺音靜樂齋詩為貫子素提舉賦天機與嗜欲深淺互相勝山夫躁擾胷戚戚恒若病卓哉賢哲人與物澹無競愧怍俯仰忘廣胖心體應融融始内充顒顒形外盛坐見萬物春本自中扄瑩淵乎陋巷居㸃也風雩詠千載真踐難誰與踵希聖君侯勲武裔文采世聨映氷玉自孤標金珠非夙性姱修厲素節俯與寒士並至樂靜乃存無欲斯能靜迄収至靜功知止貴先定掲名示毋忘朝夕寧弗敬過髙郵訪毋公叟提舉邵文卿檢校昔我來髙沙初踐入仕途回頭謝書冊便受朱墨拘河堤事方急卷埽驅千夫呼聲相舉力赤目黔肌膚是秋復滛潦四境無遺租按行負病出蕩兀扁舟孤朝餐逐鴈鶩暮宿翳菰蒲嚴冬寒到骨氷雪膠重湖歲窮甫歸休酷罰不少須獨哭返殊方抱恨絶復蘓爾來二十年徇禄仍區區焉知復此來乗傳上京都雖辭下曹苦詎稱諸生模入城人不識歴歴記市衢故人喜我至倒屣迎門趨坐定察顔面憐我老更臞升沉各一咲存沒付長吁邀我且小留相與為歡娱同行不可緩亦復稍踟蹰聨鑣踏斜日持觴送城隅後期約南還願言縶其駒我無甘棠愛負丞愧吾徒感此良自慰意氣激懦愚烱炯千里心持炤甓社珠送徐檢校之浙省并簡前政王止善皇朝樹藩垣江淛天下最豈惟財賦强政體亦宏大羣僚極髙選吉士多藹藹贊參每從容勾檢尤倚賴徐卿世名家踐歴振風裁運籌佐漕輓遺聲滿吳會今兹綴班行深意良有在更張化絃新洗目盛除拜眷懐東南區眀見萬里外元宰廻北轅貪墨亦狼狽然終公論白少覺衆心快誰當進良謨清靜撫彫瘵諸公正虗左願言亟行邁王公山隂裔前政民所愛一時欣接武二妙實同載我生一何幸識君向燕代與王邇鄉井而不共傾葢相知十五年未面已如對因之道懐思望望乆相待後日都城南春朝及王㑹賦苕溪漁歌送殷尉之烏程苕溪多漁村渺渺連震澤歸舟聞扣舷清唱煙水隔聲隨晚風響長入秋山碧官曹間無事聽之聊自適翛然滄浪思恨不同泛宅如逢𤣥真子應問金華客題靜虚齋靈扃本純一衆物交其中物去一自存靜虚乃闇通風収水上翳塵掃鑑影空兹境未易窺朂爾聖學功多言徒紛紛請質無極翁贈淵黙子聖人與天徒淵黙以為宗龍化見矯矯雷聲聞隆隆恵莊玩一世獨贊柱下翁之人慕嘉名自視將無同誰云比德難企可齊華嵩太音本希聲多言貴守中徃祇爾師訓勿憚立下風蕭存道元帥去冬行後題昔在天厯初狂寇俄震驚將軍疾驅馬肅肅出神京銜命既撫綏仗鉞亦專征一巡晉冀靜再顧關洛清歸來不言功髙卧堯都城載懐戰鬭苦况乃饑饉并流離泣道路白骨何縱横慷慨發長謡緘題遺公卿至今讀其辭惻惻傷其情風塵隨汎掃寰海仍升平宻勿藉廟謨但願休甲兵常德𤣥妙觀陳道士落成三清昊天殿迢迢武陵源仙蹤隔回舟風吹洞中花時逐江水流祠宫闢靈場棟宇齊雲浮髙居曠遐曯垂光下瓊樓九歌發遺音夜半鏘鳴璆降康屢豐年延祚祈千秋於穆一氣元寂寞與誰儔宰攝十有造功化𢎞以周赫赫旦明間及爾王與遊齋居謹對越信矣非形求留昌平四詩居庸關神京望西北連山鬱崔嵬百里逹關下兩崖忽中開林霏遞掩映磴道隨縈迴豈知古燕塞祇以越與台夙聞彈琴峽澗響逾清哀行行未及遠秋風漲黄埃翠華屇榆林丞相前驅來疾還憚廹險顧瞻復徘徊惟天設限蔽萬古何雄哉撫迹思徃代鍵鑰毎自摧皇衢坦蕩蕩來徃無驚猜氊車正聨絡怒轍奔春雷前趨見行殿遥峙積雪堆騰凌萬馬騎暮繞龍虎臺愚生一何幸獲忝儒臣陪憑髙未成賦瑣瑣嗟微才虎峪淙淙泉居庸古塞口諸峯並嵯峨左轉萬栗林黄葉堕殘柯路出草棘間石溝泫微波黄塵歘騰起知有飲馬駝前趨俯絶壑素礫没坡陀窮秋水没竭泓渟不盈科無復聲淙淙虚名誤來過下馬小徘徊土屋依巖阿野老向我言深入水木多前年邑中人來此避干戈委蛇數十里隘險無誰何桃源志樂土商山有遺歌誰知戰爭場咫尺隔網羅欲遊苦匆匆斜陽下前坡劉諫議祠李唐祚中微刑臣執其柄賢良褎然來一策駭羣聼事機戒不宻昌言毋乃病吾職非近臣陳義固當正為時吐忠憤誓不顧軀命同遊雖厚顔得失非所競滔滔徇曲學胡不愧元聖巋然闢祠宇名教係邦政居庸峭摩天過者竦深敬朱懐珪碑昌平官道傍卧碑何壯偉有唐營府督懐珪姓朱氏盧龍昔强藩巨孽所根柢爾𦙍泚與滔逆氣粤有始眈眈元相國肆筆方述紀寧知兩月後口衊不貸爾千載託斯人遺臭同一軌荒墳莽蕪迹石獸相撑倚雙螭已插地文字未殘毁徒令行路者唶唶嗟僣侈聖賢樹功德金石無溢美末世乃濟奸事定有公是奈何極穹崇來者紛未已留此懲不忠并以愧諂子題趙子昻為吳德良所作蘭竹圖幽蘭何猗猗疎篁亦蕭蕭石間澹相倚㑹合不待招吾宗昔妙年依光近乗軺清芬散春直風氣凌煙霄美人松雪居逸思共飄飄忻然染毫素寫之配髙標寳藏三十載不啻英瓊瑶相攜湖海上未覺山林遥朂哉君子心自保同不凋清明山房詩中扄抱靈景湛湛一物無云何衆形役坐受昏垢汙君子中夜存平旦氣則殊神光燭無垠還我摩尼珠標山亭詩為張惟遠秘書作齊東有佳山嶄然植雙標下窺城中人孰敢當其招濵公擅竒賞領客窮岧嶤慿髙吐浩氣逈與長風飄至今履屐蹟仰之在層霄公子亦翩翩築構規山椒刈茅覆白雪鑿石堆青瑶樹以檜栢株坐待隂蕭蕭睠言繼先志於焉逺塵囂鵲峯華不注夙昔山泉饒云何兹地勝談者猶寂寥圖經自兹補藉爾梓與喬我亦岩棲人平生志耕樵忻然慕髙躅東望浮雲遥揮弦送飛鴻因之發長謡關中張氏義行詩我昔仕州縣天厯遭歲荒勸分走郊野日夜憂彷徨豪民方樂禍射利閉囷倉非無補官令誰發升斗藏稍稍繩以法羣怒幾中傷有客為我言好義關中張素非髙訾家肯施貧人糧隂德被鄉閭斯士宜表章因之感前事使我增慨慷送曹道士溪光爛雲錦宫居晃瓊瑶中有學仙子風度何飄飄松床卧散髮光洞行吹簫春序倐已闌憶此山中招送錢師復下第歸杭分得屈字錢子南州彦入貢隨方物振羽臨春風翻然出羅罻朝臣漫知己良友惟稱屈清才豈終滯篇制宜黼黻京都覧壯麗客思忘堙鬰衣上有緇塵歸向西湖祓送王正善提舉廣東舶司炎州際滄溟萬舶集竒貨有司慎委寄資用邦國佐王君開敏姿踐歴聲華播漕輕有贏糧鹽莢無乏課曾陪青瑣遊合向烏府坐經年都城客車馬日相過無人為吹嘘去看飛鳶堕珠犀侈錯落囊楮甘㸃汚願言挹清風庶以肅頑懦廷中新命下海上羣商賀千載酌泉詩遲君一来和分韻賦石鼔送逹兼善出守紹興石刻三代遺獨數岐陽蒐剥落卧榛菅竒寳誰見収金源亦好事駞載來薊丘豈知橋門鎮天為興邦留我老幸摩挲攷古思西周使君精篆法聲華振皇州足追史籀製惜值車攻休騑騑五馬來東向㑹稽遊㑹稽豈無碑頌述徒誇浮願言宣仁化嗣續垂千秋正旦卧病寫懐老懶厭囂雜忍復逢元正髙卧豈不佳抱病難為情沉思徃昔夢歴歴還自驚兒嬉不知愁燒竹到天明援筆寫兆符意氣何縱横中年世故廹黽勉事將迎斂板趨大府慣踏曉鼓聲山縣稍雍容簮花映寒晴晚陪大明班蹈舞隨公卿韻音聆法曲仙仗穿霓旌恍惚天上遊特用誇平生覆手得憔悴憂患何交并逢時感易集閲世念轉經六十行已衰百計茫無成雖卑向平娶慚無鄭子耕春陽被羣動我體當和平窺園怳葱蒨曳履聽嚶鳴竹素有深縁所競非浮榮寡過希前修飲水復奚營寄題上清薛𤣥卿瓊林臺上清羅宫居金碧耀日開天道西顛勝屹然自成臺空霏四山合湛碧兩溪廻琅玕雜玗瑱一一古仙栽微彼人如玉何能儼相陪夙昔賦遠遊並海觀蓬萊徑辭竹宫侍空谷自徘徊朝登雲霞發夜坐星月來髙躅凌秋旻逸氣横九垓渺焉不可攀延佇起予懐伏生授經圖老生抱百篇藏壁避暴秦漢興流亡定取視半不存二十有八篇當時號今文苟非著簡册文字何由分無端安國宏倡説異前聞並言本經失口授熟以馴承風競接響誰復究其原宏也尤厚誣因圖畧開陳生老不能行故遣錯至門云何易其語謂不能正言諸生近齊魯傳言豈無人奈何使女子此事决非真錯來止授册豈復書所云藉令書所云審視生必親唐儒更妄謬謂目亦眊昏痛哉百嵗老幽壤抱寃沉昔初二子意祇務孔壁尊以彼口傳訛非與吾書倫焉知反自累異説滋其根詆誹忍廢古悍戾恣紛紜此輩不自量按據為竒新但知快攻撃何曽精討論試看錯脱簡今古文所均口熟豈應爾完具未必焚此理最易察玩習嘗因循考古貴求是執要元不煩請誦馬班書毋為浪啾喧禮部集卷三
