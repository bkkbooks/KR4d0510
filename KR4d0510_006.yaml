body:
  text: 禮部集卷六元吳師道撰律詩五言送友人秋風吹古道木葉墮征衣明月今宵缺孤雲何處飛關山行路惡文字賞音稀莫待相思劇天寒早賦歸和陳端叔二首髙吟伴細斟清思淨塵襟丹火栖金井花香拂玉琴滄洲風月滿紫閣霧煙深鴻鵠墮平地誰知萬里心又白雲燕薊北悵望兩分襟夏枕塵生扇南音思滿琴青天孤鳥沒落日大江深聞欲飛車去髙歌激壯心和李坦之丹房天柱隂客棹越江深鶴怨山中出龍聽石上吟天光澄碧眼秋思冷瑶琴一曲歸來調風飛七澤音送孫稅官台山宦遊客長嘯水雲遙百賈日中市千航海上潮民淳輸課集仙近賦詩招後夜歸舟路西湖何處橋陳處士挽詞二首端叔乃父臺榭西湖上貂璫北寺中安知處士服竟老洞陽宫燕薊風霜迫金張露電空骨歸魂漠漠故國野花紅又風雨前朝夢關河百里身白衣終晚歲丹鼎樂餘春令子天涯客長懷闕下人存亡兩愁絶回首一傷神和友人二首吳越俄蕭索何鄉可定居乾坤有凶嵗州里負寃書赤子魂如寄將軍腹未虛有才時不展感慨欲何如又俗徒不可語之子况離居江上又芳草山中無素書鳥鳴春樹靜花發酒尊虛相見應相問心情百不如哀陳端叔跌宕三千首淋漓一百杯公侯驚滿座賔客慕疏財書帖蒼鵝換燒丹白鶴來斯人不復見揮涕惜多才次韻林初心先輩二首太史滯周南醇儒去廣川功名欺白髮風雨送流年故國悲歌裏滄洲醉夢邉平生心似鐵相對肯凄然又倦客無人問逢人祗自嗟孤舟在江漢老夢繞京華聽雨間扉掩看雲短幘斜固窮吾已定莫向五侯家春日雜咏四首二月忽將半一春能幾時寒隨鴻雁别雨赴杏花期江水碧於酒山雲白似炊登樓思無限孤客在天涯又雷雨連三日溪山擁萬花晴呼禽磔磔風舞燕斜斜默坐知春意幽栖感嵗華緼袍猶可貰護落任生涯又怒電時聞落驚雷夜轉多摧花亦太甚裂樹欲如何幸不關調燮猶應廢嘯歌明朝好風日一舸弄春波又間士偏憐日貧身不受春柴門花片落藤架鳥聲新寂寞清千慮妍華等一塵未嫌還往少應是不羣人和元生惠韻二首秀色浮芝宇清才映謝廷會須乘駟馬莫羡拜雙星對竹人俱瘦看山眼獨清漫郎最堪憶煙雨渺寒燈又春遊有夙約何處愜幽悰落葉江邉寺飛泉石上松飄蕭憐野鶴哽咽笑秋蟲且共談文樂塵埃隔幾重春日二首雪盡清如洗江晴碧色搖春聲喧候鳥野色亂風條初日暉暉淨逰絲去去遙意行仍得反佳興滿今朝又凍谷馮誰暖蒼規笑我方閉門春寂寂覽鏡嵗堂堂芳草仍無主歸鴻只戀鄉東風不世俗頻到讀書牀六月二日市西避水三首白浪風前濶青畦眼底無騎危爭上屋取快欲乘桴六月衣猶夾千山氣不蘇安流終有日鼓舞任天吳又久雨知天漏溪狂學海流驚呼聞壞屋捷足見操舟坎井誰為快乾坤等是浮獨憐如寄客漂泊幾時休又二十年前夢寧知復此來漲痕猶斷壁飲地已荒苔患憂今逾劇風流逝不回江聲中夜急浩蕩有餘哀宿龍華寺河口龍華寺秋風駐野航雁聲庭左右燈影水中央田里仍艱歲公私困築防無心共僧語憂惻漫倣徨二月十七日寒食同胡子仁出城至廣教寺登懷李闕寒食逢休沐幽尋喜不違山中懷李去陌上踏花歸淡況隨流水餘情付落暉他年記良會回首重依依送張教諭之分水騎馬青山縣彈冠緑髮年小淹文學掾却上孝亷船淑士須經術汙人是廪錢相期振逺業宛水故多賢送人北歸被褐南州客依光北府居起辭從事辟歸讀古人書莫雨江雲濕春風汴柳疏他年有來雁毋惜問何如送王仲言升察院吏書聖皇新下詔風紀肅羣綱江右循公選臺中得望郎功名三尺法意氣九秋霜冠豸多知己能無重激昻又佐憲遊名郡摧姦奉漌條真才堅百練正色靜羣驕臺府聞新辟參軍愧下僚深知公論在相望未應遙出蕪湖江口七月二十四日江風淡秋曉絺綌頓無顔黃葉下髙樹白波吹亂山清遊仍覽勝久役暫知間回首宛陵道依依更欲還寒食寒食偏逢雨貧家不識春桐華閉深屋書册擁間身忽忽韶華老茫茫世事新平生祇自苦不與杯酒親和孔用道御史留題韻二首旌旗趨嶺海斧鉞下天關甘雨洗四野清風生萬山花飛公館靜草長縣庭間墨妙留題處光華復此還又衣繡層雲上乘軺萬里餘詩清寫江竹食淡擷山蔬白筆峩冠薦青燈蠧簡魚不才為令拙幸獲望前驅又和前韻二首宦情元自薄民事政相關日晏策羸馬春深思故山衆人皆欲醉百計不如間邈矣鍾期子瑶琴獨抱還碌碌諸公後悠悠半世餘未辭陶令米敢厭庾郎蔬北野非無馬南溟亦有魚永慙嘉遁客肯受俗塵驅題官舍壁三首拙令不諧俗頗希清靜風焚香小閣上隱几亂書中暫喜過客少更聞甘雨通莫嫌官俸薄補報正無功又岸幘小池上翛然亭午涼雨蒸藕花氣風揚棗葉光俯窺紫鱗泳仰見黃鳥翔所喜淡無事與之情兩忘又官舍千峯裡迎秋氣已清池煙明鶴影林雨斷蟬聲紅惜芙蓉落青憐荔薜生今朝少公事吟嘯且怡情送嚴生教諭樂清萬古斯文在浮雲世故新冷官寧下選傑士肯凡民書史三年績絃歌一縣春妙齡勤自奮得祿慰雙親又雁蕩東南勝兹逰孰與同襟靈開磊落文氣發竒雄莫憶家居樂無憂廪稍空遲歸行有日重咏舞雩風中秋泊淮安望張仲舉助教不至中秋淮浦夜誰共好懷開看月坐復坐可人來不來獨謡慙短思多病負深杯想見蕪城路吹簫擁醉回崔鎮宿遷舟中柳隂望不極兩岸草蟲鳴積水經秋減清風終日生開篷看細字停棹問荒城知是邳州近青山數點明咏櫓剡木誰為汝船旁兩翊斜畫波成乀出語轉咿啞動勢雖因手圓機為有牙莫嫌終夜聒相送到天涯重過彭城重遊彭祖國更上項王臺山接徐邳去河兼汴泗來鬬爭雄百戰吟賦萃多才人物今安在城笳莫正哀徐生省親歸髙郵昔贊髙沙邑重來二十年曾無嘉樹植猶有故人憐教胄逢才俊思親輟誦絃願言敦實踐節孝是家傳吳秀才挽詩彥輝子州來曽哭子豈謂復聞今甚切吾宗恨何堪乃父心青蘭霜日慘白璧夜泉深賴有文章伯揚芳慰苦吟贈苗伴讀試中觀歸省用世春秋學成名弟子員少遲登仕版具慶及親年塵匣新收硯氷河不膠船到家多暇日慎勿棄遺編送魏主簿未識衡漳邑先聞簿佐賢氣應超矮屋聲已軋鳴絃春雨花環郭秋雲稼滿田軺車有使者來應採風篇送盧道士歸天台誰謂神仙逺風聲在世間蘇耽歸飬母賀老早還山之子忽云邁斯人應可攀天台春已莫花落水潺潺象山圖突兀山如象東南縹渺間先生説經罷仙伯御風還瑶草晚溪碧桃花春洞間神京看圖畫塵土愧人顔送郝州判之餘姚東越之官地依依舊所經乘潮下别浦佩印到公廷秧雨春波白鹽煙海氣清有人傳美政應足慰豫聼玉泉山圖何許泉如玉元因有玉人山暉神發夜木秀澤含春此日還看畫無緣可卜鄰寄聲嘉遁者莫汚世間塵送胡生之遼陽教官夫子乘桴意終然墮渺茫千年逢聖代六籍到遐荒馬隊褒衣講雞林織錦裝還歸過吾里細與説遼陽送邢晉卿御史言事去國白簡當廷日青山入夢年身輕寧去國力在竟回天峻節臺綱重清風奏稿傳聖朝旌直士未許竟飄然題瀏陽李氏遺經閣歐陽學士外家瀏陽有高閣何似漢東居復見歐陽子來翻李氏書籯金誰羡汝宅相足華豫湘産多香草殷勤辟蠧魚賦舒彥昭淡齋方寸有天君休令渾世氛寒空清映月秋水覩涵雲郎署雖升寵齋居獨逺羣應知舊遊者此意與平分江山秋色圖江南何處景一幅淡含暉草木半黃落樓臺深翠微橋連秋水渡船與莫雲歸我亦漁樵客悵然思拂衣送李巡簡聞在鼇溪上詵詵士子歸忽更新武辨寧志舊儒衣野草侵階長山雲繞寨飛淡然塵事少與物自忘機送尹縣丞之金溪丞佐官非下斯民委寄深豈甘箝署紙祗喜贊鳴琴山好猶瞻象溪清莫産金前人有遺美即此是官針謝堯章松巢詩人清似鶴雅意在巢松風過條枝定雲來户牖封輕身遊太古留爪記竒蹤笑問騎鯨客何如五老峯題謝堯章君琬兄弟詩卷謝氏家聲舊今猶好弟兄依依對牀語惻惻在原情露蕚花雖減春池草自生殷勤同姓老望爾早來京題天台戴氏詩後戴希尹者為軍器大監內附後或薦之不起有子為教官與從子同徵亦辭從子仕至集賢閣學士闕闕榆林馹夕佳軒客行關塞北萬嶺復千崖過雨夕陽好開軒山氣佳偶然成勝事為爾發清懷千古囦明意悠悠未易諧送甘生南歸去去從師樂無心志帝京河風送帆影墻日憶書聲萬里須重到三年待有成獨憐倦遊客白首不勝情為葉敬甫賦母線石密密線縫裳依依石在匡石如心不轉線與恨俱長尚想精神聚寧容髮體傷殷勤珍襲意爾後永毋忘送周剛東之大平縣幕黃山當縣庭三十六峯青公事隨時了吟聲許更聽府曹懷舊雨使部仰華星亦有經行夢追飛過敬亭五言長章壽張希孟參議父濟南郡侯聖主龍飛日髙人鶴髮年耆英關景運風槩仰遺賢名冠濟南士書藏圯上篇家庭台輔出茅土國封延髙唱追商皓間情寄渭川雍容鼎養樂蕭散地行仙緩景陽春駐榮光賜節全式聞神降嶽還有使傳宣稱壽歸馳馹承歡快擊鮮極南星似李林下酒如泉碧藕香清露蒼松鬱紫煙明生昨夜月涼入下秋天勝集駢車蓋華音被管絃紵衣輝玉杖綵服映貂蟬願借丹青筆摹將四海傳和黃晉卿北山紀遊韻三洞金華北蒼蒼夾徑松瀉空噴百澗拔地立千峯林石欹還整岩梯絶復通向田瑶草碧隱樹晚花紅嵌竇推丹入椒庭載酒從洗觥忙羽士捧硯喜山童陟嶺驚逾峻沿流竟莫窮千年杳仙鹿兩寺互僧鍾擘裂森開峽傳聞舊化龍轉霆奔雪浪禜旱却玲瓏水際朱藤蔭岩阿青桂叢亭荒餘磊磊舊有磊磊亭今字鐫石雲出正濛濛蘭若知何許芙蓉復在東五磐隨屈曲一路聽琤琮山斷俄為野湍平不見空暮房深榻靜朝磬小樓重傳玩遺髹鉢興嗟對殯宮拂衣登嶺去穿棘少人逢飛殿仍遙峙重關故不封歸尋草堂卷坐戀木軒風兩紀三人合相看一笑中孤蹤欣影逐薄技愧才雄别袂分殘雨衡門翳野蓬後遊寧未卜思劇漫憧憧次韻王繼學參政胡古魚編修剪燈詩剡渚推冰紙并州剪水刀輕明新雅製麗巧極纎毫不讓琉璃貴渾疑錦繡韜皺紋縈細縠疊縷引長繅花草形相錯鵷鸞勢欲翺騰光宜秉炬透色賤塗膏愛著詩聨綴嫌逢騎驛騷香風翻寶帶華月湧雲濤良夕娛佳賞元臣念小勞都人應共樂歌舞送春醪又晏賞誇燈夕熒煌映斗魁新工出刀剪妙製壓樓臺寶月團團現春雲細細裁千絲齊拂綴一篆百盤回華蓋空中覆霓裳海上來驚揚白雪曲照徹紫霞杯洛紙應添價韓檠遂積埃光華傾輦轂吟賦動公台暗室毫釐燭丹心户牖開省躬方自感寧復詫詩才送袁奉御降香入閩尋母使節光華逺親闈夢寐形秋雲孤影白春草寸心青純孝通天意深恩出帝廷香從九霄下路向七閩經馳馹程寧緩占烏訊有靈定應歌泄泄端自感冥冥聚散天倫重悲欣雨涕零綵衣回萬里華髮共千齡寵錫翔鸞誥歡迎擁繡丹青傳盛事垂世永晶熒觀南陽髙武宣王誥詞其子渾璞治書徴賦歷數歸真主英雄起壯年挺身辭汝蔡仗劍走幽燕武略紛誰敵神鋒奮獨先攻城蒙矢石拓地攬山川淮甸威如掃蠻方命已縣長驅越東角直搗海南邊名冠三軍帥功開半壁天至仁惟不殺偉績更無前鐵馬戈鋋息貂蟬佩服鮮曹公創尚在鄂國志逾堅星隕悲蒼漢山崇想故阡分祠遍南紀遺像􅌂凌煙疏傅曽開國承家復象賢繡衣躬入奏丹陛詔仍宣聖代昭恩數王封衍土田風雲攄壯氣日月漏重泉制闢奚斯廟光增太史編哀榮十載少忠孝一家全奕奕丹青繪綿綿帶礪傳桐鄉修秩祀願薦侑神篇即事上聖方虛已元台屢集凶雷霆轟震怒日月出冥蒙一掃苛秦法重恢大漢風孔堂全簡在郿塢積金空覆轍垂明鑒更弦起雋功戚休開一相黜陟正羣工急務除民蠧先宜擇憲聰小臣圖報切無路獻愚忠分題賦雞舌香送蘇伯修御史之西臺彼美南州産芳辛性不移品登炎帝録名著漢官儀含液深滋舌揚芬蔚吐辭從官陪論列微物得追隨忽跨青驄馬將違白玉墀眷懷敷奏切西上且遲遲送納文粲江浙省都事分省東南重都曹左右并聳聞除目下欣值化絃更淮甸新功業慈恩舊姓名揚鑣趨巨鎮振玉出神京臺閣人爭送湖山氣已清進籌禆上宰提筆念蒼生春詔宣寬大秋幃拔俊英兹行端不負持報漢公卿和蘇公伯修曲阜新廟落成聖皇尊御極闕里重興文宮寢新儀盛牲醪特祭殷祝辭宣上意銘石逮臣勳壇杏深凝露林楷密蔭墳鐘金聲北奏衣布體三熏執法親遺裔言詩夙異聞遣祠承寵渥序晏洽恩勤已定封公爵仍增守廟貟山川方焜耀天地正氤氲豈比東都碣僅傳韓府君分題賦鶴川送蕭存道元帥之雲南屬鶴慶路山水幽雅多僧剎鶴野遼東胄西南向鶴川山連已蜀外江接夜郎邉箐竹應穿密繩橋想度懸忽逢岩石勝豈憶地維偏佛剎多金像夷居擁翠氈吏逢開府日人記督兵年警檄停飛羽行營息控弦蠻方寧復過祖烈幸重宣奉聖歌新樂觀風續舊編翩翩此時興何必羡芝田分題蕃宣樓送山僉憲之閩大府開閩土危樓鎮海涯飛雲浮畫棟麗日照髙牙昔駐蕃侯馬今迎使者車三山歸指顧萬井仰光華縹眇臨城處逍遙散吏衙榕隂千樹翠荔子半空霞嶺嶠俱清謐賔僚亦靜嘉宣風問民俗作屏扞皇家去去青冥樾依依紫禁花登髙應有賦留待碧忩紗次韻許可用參政從幸承天護聖寺是日升左丞西北羣山逈盤盤護帝鄉玉泉流海潤金剎倚雲翔四月龍舟邁千官馬首驤落花縈劍佩高栁拂帆檣采女遙分隊材官迸綴行和聲宣鼓籥珍獻集梯航天雨清初霽湖波靜不揚瓦光浮璀璀鈴語振鏘鏘梵唄雷音偈醍醐雪色漿玉牀敷御座翠殿散天香內晏筵初秩仙韶樂更張騶虞遊近野黃鵠下回塘馳道風隨輦行宮月轉廂應同遊上苑何似幸雲陽心共斯民樂謨咨上相良傳宣升列輔稽首答休光勳業期千載精神萃一堂序調堯歷象澤浹舜要荒盛事傳新句迂儒之寸長願將歸美意弦誦播修廊送趙生時立漫倚成均席居然乏友朋獨憐故人子相伴夜窗燈學自言詩悟才須辨秀升重圍頻逺訊長路忽先登建業千峯霧漳河十月氷青春期正逺白首仕無能我亦思兒輩因行恨不勝分題賦白簡送李惟中治書之西臺執憲崇臺府修容象物宜挺然元不撓皎若自無緇玉雪齊心映風霜入手隨立當文石陛攜趂紫囊絲簮筆應同色持書允有儀奉條嚴糾慝對命謹書思西陜分治日中朝注倚時修名青史册素志白圭詩正直神斯聽清明世所知當年魏公笏此事即吾師分題賦漢陽樹送蘇伯修參政之湖廣省江漢交流處川原樹杳茫晴光朝歷歷暝色莫蒼蒼陌上平如薺煙中密布行蔽虧城隱見掩映屋低昻秋引登臨興春生戰鬬場鳥聲樂林莽牧地富耕桑政府迎參預儒紳動寵光功懷神禹柏茇咏召公棠大别欣移棹南樓想據牀殷勤與封植清蔭被炎荒禮部集卷六
