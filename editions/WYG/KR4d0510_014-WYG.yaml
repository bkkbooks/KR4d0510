body:
  text: 禮部集卷十四元吳師道撰序忠義録序嗚呼天下之生久矣亂亡之國代有而忠義之士靡國無之盖天地降𠂻君臣大分亘萬世而不冺者也故開國之君其待亡國之臣抗命仇已者雖殺之而未嘗不嘉其節賣降輸國者雖賞之而未嘗不愧其行所以旌義勸忠懲委質而懐二心立垂世之大法也往者宋厯告終我朝神武方興兵威所加望風稽首然一時仗節死義以為其主者往往而有之後秉史筆者固不得廢時平事息三紀于兹㣲者將弗遂湮滅乎吾友張子良慷慨好義者也于是博采旁搜傳信覈真凡得死節之士八十有七人女子四人焉所録雖前朝之臣而著民彛輔世教固亦聖代之樂聞也予嘗論宋三百年傳世十六惟道君荒淫餘無甚失徳其守國以仁其用人以儒其待民近厚當其末年賈似道専柄誤國進用者皆依阿患失之徒風俗委靡熟爛勢必及亡而我朝乗其敝是以興師致討惟切責首釁數其失信背盟之罪而已天時人事可見也世之議宋者曰崇文太甚抑武太過兵勢衰弱以予觀之特委巷之末談耳今所録如文如二李陸謝軰盖宋之真儒也其武臣握强兵膺重寄者遂爾降叛而偏禆小校卑臣散𨽻死者不可勝數彼又何以得此於若人哉於戲忠義之效觀于存者而知其亡徳澤之報觀于賤者而知其國覽是録者或因予言而有攷云送方夀父之道州序士生志四方盖游宦所必至古之人皆行之獨悲夫今之不幸也科目未興而無以為官從師道息好士禮廢而無所于游當今南北曠蕩之時而老於茅茨林穴之下者豈無贏粮之資哉勢有所不能也曩予聞浦陽方君存雅名及見其詩文慕交之朋從間徃徃為予言其人雖老得予將益愧焉不若是而止也送趙伯器序甚哉為學之難也資至焉師非其人未至也師得焉父兄不以道未得也天予之以其資而人繼之不以善豈皆果於自棄哉固有父師之間不能交遇而相成爾有玉於此工人彫琢之幸得善工主人信其技付之以所甚愛聴其自為而無敢撓敗然後器成用適而稱天下之良玉焉吁成人之材而欲交盡其善若是者亦希矣故程大中知周子之賢而遂興河南之道吕正獻伸焦君之教而卒成滎陽之名孰謂千載之下無人哉趙生伯器生有道者家清淳沉厚夙有異質從游来南得師之良寔惟許君討論指授夜以繼日凡羣經六藝之㫖亦充乎其有聞矣余觀其從師而進於學琅乎若宫鳴而商應也涣乎若日出而氷消也勃乎若時雨既至草木振起而莫之禦也崇業茂美往與齒俱得師如是知其不能舍而去也今將有行則如之何而流風醖藉樂道人善嘗挟其二季游江湖賢士夫間而恨未之識也今幸秋識夀父於客舍一見語未卒掉鞅去髙姿勝韻烱烱心目間旬月未已既而夀父復来過門言別曰里故人之官舂陵邀我俱往雅聞南方風物山水之勝將覽以自廣胸中之竒也余聞其言為之蹙蹙然汗浃不自禁平生少年時意氣激昂萬里咫尺謂司馬子長特易易安知局束困頓至此哉今君汎然而遊無假於仕獨遇好士者之求馳騖東西靡不如志安得企而隨之乎矧今所游尤余所動心者道蒼梧瀟湘之墟望九疑之聨綿舜峯之蒼莽重華二妃之遺跡尚有可見者乎歌七泉之詞弔侏儒之民元次山陽亢宗之文章行事尚有可考者乎雖然子誠有志於學也其為我出城西度營川訪濂溪瞻丘園之尚存問子孫于異代歸而誦其遺書潜思無極太極之妙想像光霽洒落之襟以一洗萬古之塵陋顧不偉歟他日遲君之歸當累日劇談告予以所見雖然學主于正而已道于正者必至焉許君之學上宗紫陽今之求聖人道未有舍紫陽而徑者也自今其尊前聞緝舊功求紫陽之徒而從之焉是亦許君也韓子不云乎江河而下苟不止雖有進疾必至于海學者必慎其所道子之所道正矣既善其始而據其源矣循而不止有不至海者哉勉臻厥成以揚父師文人善教之美吾於爾乎望趙子敬復墓後序自聖人之道不行而異端恣横浮屠氏尤甚非特遭時然也其徒率多强力忍難并志齊一衣冠之士有不逮焉故塔廟被八區而吾有鞠蔬之宫財施傾萬家而吾憂不足之飯取輕見譏疾視披猖或與之抗而不勝則益以為笑吁異端之不勝久矣特患夫為之者氣餒而才慊爾事有出于綱常之所不容神人之所共疾聲其罪而擊之才足以集事氣足以配義然而不勝者未之有也持吾必勝之具雖千萬人往况一夫之敵哉趙君子敬先世居蘭臯其墳墓在郭東與今集賢公實同自出他子孫散處呉越間祠田墓亭守者不支并于豪僧君聞之走數百里以質於有司兩年于外啗誘撓怵者百計弗屈卒逢賢眀遂底于直愚聞浮屠氏以禍福語愳世而奪攘舞奸殊不自懼何也盖其為教也棄倫滅親絶葬廢祀于他人尚奚恤哉矧狃于無所忌而施之吾儒微趙君得不被無人之譏乎君既訖事告歸祇謁𤣥堂脩治缺夷松楸鬱然祠像如故睇瞻徬徨以喜以悲予因君亦重有感也五陵之愁雲北邙之悲風金盌珠襦不知流落何許而君家一抔土獨存于衆壤之餘復還于既失之後孝子慈孫之功有誠不可冺已况乎抑異端崇世教一舉而二善獲耶予既喜其事因序而貽之俾示其後之人而且以厲吾黨之士送元生序公卿大夫之子異於庶民者非為其仕之異為也謂其才之易成也昆岡無凡珉鄧林無散木其所據者固異焉典樂之官既逺世之欲得仕者且無用學焉膏粱綺紈移其體博奕貨色奪其志異時積驕踵愚墮先敗官者十而八九彼孰無才也哉直自棄耳薊丘元生侯伯之家眀雋好脩氣和而行謙屬文為詩尤工書畫人皆賢之愚謂以子之為賢於世固萬萬責以君子之備則尤有所當勉者子之學外也非内也華也非實也盍亦求之為經乎聖人之經子非不習也習之於心身則吾所謂内而實者也夫如是則有大過人者矣子之来獨深慕交予方將切磨相從以久而復不可留故其意彌切而尤知其言之直也今之法世宦者必通於一經雖㣲予言子亦將有黽勉程督而不容自已者焉然或疑予言之過則將曰子責我以學則子庶㡬學於此矣是何迂踈困頓世之不取子也嗚呼子非予比也予固庶民也送王文學序文學卑官也今之衣冠而儒者舍是而無以為仕而或者重不滿焉謂其以雜混正少妨老也夫其貴老成而賤新進者豈不以持守縱肆之異歟至其隠利欲而謬名義則以縱為能守為拘矣是故君子之論無彼此先後一以賢否為斷耳王君仁境以文名四十年而来教吾州其老成有守者歟君年倍予而辱視以友相與道古今較文藝如源泉之不窮如良賈之善鑒如宿將之將兵深溝峻陴應敵整暇然予之所敬不恃此耳抑其操若有合焉曩余負果鋭意輕天下事謂人生取快意而已奚必規規然自束縛哉及究觀聖人之書乃知天下之事無不至于理而止安焉而聖執焉而賢悖焉而衆人夫吾之學固將去衆人而希聖也守其庶乎以是戰兢自持弗敢一引首揺足以出於理之外而指目之者莫不以為拘也今觀王君之為簡重而少與沉潜而寡耀進不希合于公卿退不責恨于諸生其所守何如哉今夫世之機詐誕慢便姢捷給號為䟽通者方探取富貴以驕其妻妾耀其鄉黨閭里而吾徒乃相從于寂寞之道果能有遇否乎雖然君仕者也去此殆未可量若余之莫宜方歸休城南卜居於清流脩竹間又將動揺其體膚筋力以奉教老人杜門飲水之餘誦歌謡吟先生之道以自適其適而君將歸仙都弗能相留以居相從而逰也因感而為之書送石抹州判序儒之絀于世甚矣平居而羣被服談説据古道則交手揶揄之動有所營則几席之下不能跬歩或矯衆直遂則咎責捷至况以之趨仕應時而概欲匿其志難矣哉真堅者不折真潔者不汚真懦者無敵人特未識真爾蘭溪為州来宦者㡬何人而以儒名者自今州判石抺公始方其至也人已聞其聲而知非時俗之儒矣顧以卑而承尊以獨而捍衆小人狃其習舞其詐以窺吾之淺深也惟公言足以排羣議文足以駭俗吏髙下弛張動中樞㑹至于是非曲直之大奮然抗積重之威犯不測之怒而必争衆皆危之而公以有成彼窺伺挟持者卒亦無得也愚嘗痛儒之受誣而恨真者之未遇乃今而神王氣張非幸其私也七聖賢之脉凛凛復生功烈亦不細矣聞特以為贊而公憮然曰子徒知夫成之之易而未究夫為之之難也仁之勝不仁固也膠於迹而不知變則摧格撓敗者亦豈少哉然後知學之未至于公者不足以知之矣公之居是邦與愚道若以為有契者至是且别則謂之曰予何樂于仕合于同塵上下詭隨今詎止是耶且至于道彌篤耳使别去十數年南北方里外子試以問諸人其必不變矣夫以區區之信公豈俟他日哉出者難工處者易為愚生無適時用矣惟治躬過固窮守義自度可以㡬及他時亦有以復于公焉既書以識别又當以是日夜服膺而無㤀送北野蕭侯序國朝以武定天下垂五十年民不識兵老臣宿將傳子若孫變習而徙志或挟冊吟誦操數寸管以與數行墨者競于是時方右文矣愚聞文武一致也古之人入則訏謨廟堂之上出則折衝萬里之外而為之民者力于農業于學有急則擐甲胄而為兵其道之出于一上下同之莫或異焉夫尊君忠上之方應事制變之宜所謂文者夫豈曲學末藝然哉北野蕭侯世勲庸家早從碩師游天分素髙而又學以充之其包涵渾䧺若湖海渺漫不見垠㟁也開霽明逹如晴月麗空物無遺炤也操要機宰羣動若隂陽闔闢晦明倐忽而元氣自若也故其累鎮巨藩􆂸爾不羣去年江西洞寇竊發師環境不進侯乗傳馳赴召諸將切責膝行受指不數日縛至戲下人莫不多其功自侯視之其所試者毫末耳嗚呼世非無竒才也或棄而不用或用而不竟或限之而不能以他及若是侯者其可謂竟于用而無所限否乎夫文武之事與時弛張豫而思患武之所以必飾也陋而思振文之所以不墜也非有道者不能兼盡于此侯固優為之然愚觀於侯之為往往待下不代愚知晦眀以善其用尤人所難能也今方由金華易鎮括蒼山水郡也地僻而俗閑戎政之暇優游髙居玩心神明氣老識融委順俟天侯之志其得矣是行也喜而為之辭送王教授之南康序士生抱軼羣之才㧞俗之韻宦游四方往往得山水勝處亦至樂也江以西匡廬最大林谷泉石之觀絶天下王君傳明教授南康行且有日君故相家文雅濟美為時羽儀前官桂林窮荒探幽厯覽萬里今復得是山以游抑何幸歟夫愚之樂稱匡廬者以其古多髙人名士之所息遺跡具在焉耳山川清英之氣日夜不乏絶今無其人第聞虚荒誕妄之徒張侈異教髙宫瑰宇瀰漫綿絡奔走攝誘者肩摩袂屬而已抑深蔵髙蹈者不求人知人固不得而知之邪又惟昔之守是邦者前則濂溪後則紫陽道徳仁義之風入人也深固當久而不忘科目方興尊右正學蠻陬夷徼猶知挟其書以吟誦生乎是邦者當何如其興起耶因君之行其有以知之矣若未焉則夫表賢以章化作人以淑類者君之職也愚生好游羈于憂患弗獲相與哦雲松嗽飛瀑放歌長謡往来澗谷中以滿其願然企君之教有成齊芳昔人垂榮是山則其區區慕羨于君者不既深矣乎送葉審言巡簡序國家未設科舉士舍學校無所于仕故嘗多而壅十年来舊制既復士出且有途而其壅益倍何耶或謂貢士數狭不足容或謂由下升髙者業必有成嘗試萬一者不可必未能以此而易彼斯言信矣而未深燭夫弊端也盖向者學校之制専故有司之察選也加詳而嚴前軰在列猶有典刑清議未冺猶有畏忌雜出而躐進者間見於其間而未若今之甚也夫其弊成於外而吏部受之而始議澄汰抑難矣近議者建白俾或别授警曹友人葉君審言與焉余觀君迴翔黌序間且三十年而至于是使循常調以出一命之獲必尚淹數年老且及之矣彼其一旦凌越為等夷者嵗月未艾暇豫以待之為計不已得乎以君之才得職教一郡匪徒償其平生之勞其于宣昭文化作新多士亦素所蓄積也顧使之儗歩他岐溷之下吏投簡編而督兵戰輟揖遜而司警邏舍所宜有者不可得彼萬不逮君者投可乗之機輙僥倖而得之此余之所為深憾而竊嘆者也雖然文武一道也君樂易而䟽通非守章句而不知變者往就是職吾知其稱已抑是選例授闗海嶺嶠絶逺處而君所占乃括蒼縉雲之境便養而邇家無道里之艱君尤自以為幸夷然無不平之色詎知愚之介介於懐者獨不能已乎嗚呼世之易處而倒置者又奚止此哉余何迂之甚也送劉教授序天下之官卑而實貴者無如學官其名則師其職則教雖風紀之尊與為禮他有司固弗責以跪拜之節羣居則坐者尚右説經則聽者在下官箴之所貸吏責之所不加雍容委蛇亦何樂如之彼任州縣者則有奔走俯仰之勞文法期㑹之責固皆分之所當為而不敢鄙厭然視此則有間矣往年予嘗慕為學官而不可得後忝與計偕末第奉常受一命為丞而見為學官者被優異若此未嘗不内愧也抑聞由學官而改調者例得簿曹則其身之所處前後頓異計其遇事激發未必不悔為之而有羨于昔也余来髙郵識教授劉大賔其人莊重温讓信能稱其職之貴者時方以秩滿去過余言别將告之曰余欲子之官不可得矣今子將舍子之貴而效我之所為雖然得無悔乎或者語予曰大賔典教是邦一新學宫功最巨當役廢並興介然無所汚去之日財粟猶羨溢以遺後之人方受知羣公用薦者去為㢘掾為省郎不復俛首州縣間矣夫騏驥驊騮一日千里者决不在凡馬之列然則愚之昧于料事而所以知大賔者不其淺耶戰國䇿校經序先秦之書惟戰國䇿最古文最沉博自劉向校定已病之南豐曽鞏再校亦疑其不可考者後漢髙誘為注宋尚書郎括蒼鮑彪詆其踈畧謬妄乃序次章條補正脱誤時出已見論説其用意甚勤愚嘗並取而讀之髙氏之踈畧信矣若謬妄則鮑氏自謂也東莱吕子大事記間取鮑説而序次之世亦或從之若其謬誤雖未嘗顯列而用此考彼居然自見遂益得其詳焉盖鮑専以史記為據馬遷之作固采之是書不同者當互相正史安得全是哉事莫大於存古學莫善於闕疑夫子作春秋仍夏五殘文漢儒校經嘗去本字但云某當作某某讀如某示謹重也古書字多假借音亦相通鮑直去本文徑加改字豈傳疑存舊之意哉比事次時當有眀徵其不可定知者闕焉可也豈必强為傅㑹乎又其所引書止於淮南子後漢志説文集韻等多摭彼書之見文不問本事之當否史註自裴氏外索隠正義皆不之見而通鑑諸書亦莫考淺陋如是其致誤固宜顧乃極詆髙氏以陳賈為孟子書所稱以伐燕為齊宣用是發憤更注不思宣王伐燕乃孟子眀文宣閔之年通鑑謂史失其次也鮑以赧王為西周君而指為正統此開卷大誤不知河南為西周洛陽為東周韓非子説秦王以為何人魏惠王盟臼里以為他事以魯仲連約矢之書為後人所補以魏㡬鄢陵為人名以公子牟非魏牟以中山司馬期為楚昭王卿此類甚多尚安得詆髙氏哉其論説自謂翼宣教化則尤有可議者謂張儀之誑齊梁為將死之言善周人詐以免難為君子所恕張登狡獪非君子所排蘇代之辭為不可廢陳軫為絶類離羣蔡澤為明哲保身聶政為孝樂羊為隠忍君王后為賢智婦人韓㡬瑟為義嗣衛嗣君為賢君皆悖義害正之甚者其視名物人地之差失又不足論也鮑之成書當紹興丁夘同時剡川姚宏亦註是書云得㑹稽孫朴所校以閣本標出錢藻劉敞校字又及見晉孔衍春秋後語參校補註是正存疑具有典則大事記頗引之而世罕誦傳知有鮑氏而已近時浚儀王應麟嘗斥鮑失數端而廬陵劉辰翁盛有所稱許以王之博洽知其未暇悉數而劉特愛其文采其他固弗之察也予既悉睹其失豈容不正乎吕子有云觀戰國之事取其大㫖不必字字為據盖以游士増飾之詞多矧重以訛舛乎輙因鮑註証以姚本參之諸書而質之大事記存其是而正其非庶㡬眀事跡之實求義理之當焉或曰戰國䇿者六經之棄也子深辨而詳究之何其戾鮑之區區又不足攻也夫人患理之不眀耳知至而識融則異端雜説皆吾進徳之助而不足以為病也曽氏之論是書曰君子之禁邪説其將眀其説於天下使皆知其不可為然後以禁則齊以戒則眀愚有取焉耳是非之在人心天下之公也是雖芻蕘不遺非謂大儒必斥愚何擇於鮑氏哉將寡學謏聞謬誤復恐類之世之君子有正焉固所願也又國䇿之書自劉向第録逮南豐曽氏皆有序論以著其大㫖向謂戰國謀士度時君所能行不得不然曽氏譏之以為惑流俗而不篤於自信故因之推言先王之道聖賢之法而終謂禁邪者固將眀其説於天下其論正矣而鮑彪以為是將求其故而為之説者非其本㫖䇿乃史家者流善惡兼書初無决擇其善者孔孟之所不能違若之何置之鮑氏之言殆後出者求備耶夫天下之道王伯二端而已伯者猶知假義以為名㐲正以為功戰國名義蕩然攻鬭并吞相詐相傾機變之謀惟恐其不深捭闔之辭惟恐其不工風聲氣習舉一世而皆然間有持論立言不戾乎正殆千百之一二爾若魯仲連盖絶世者然其排難解紛慷慨激烈每因事而發而亦未聞其反正眀本超乎事變之外也况其下者乎當是之時本仁祖義稱述唐虞三代居然不為世俗之説者孟軻氏一人而凡求之是書無有也荀卿亦宗王者今惟載其絶春申之書而不及其他田子方接聞孔氏之徒其存者僅僅一書又何畧於此而詳於彼耶史莫大於春秋春秋善惡兼書而聖人之心則欲寓褒貶以示大訓是書善惡蕪録無所是非而作者又時出所見不但記載之為談季子之金多位髙則沾沾動色語安陵嬖人之固寵則以江乙為善謀此其最陋者奮從親之利以為秦兵不出函谷十五年諸侯二十九年不相攻雖甚失實而不顧也厠雅於鄭則其音不純置薰於蕕則其氣必奪善言之少不足以勝不善言之多君子之所以舉而謂之邪説者盖通論當時習俗之弊以其重而名之也且其所列固有忠臣義士之行不繫於言者而其繼春秋抵秦漢載其行事不得而廢曽氏固已言之是豈不知其為史也哉竊嘗謂天下之説有正有邪其正焉者主於一而其非正者君子小人各有得焉君子之於是書也考事變究情偽則守益以堅知益以眀小人之於是書也見其始利而終害小得而大䘮則悔悟懲創之心生世之小人多矣固有未嘗知是書而其心術行事無不合者使其得是書而究之則有不然者矣然則所謂眀其説於天下為弛絶之善者詎可訾乎送包山孫山長序今州縣學復有書院往往處山林間幽深曠逈長吏過客之所不至校官廪俸自給日與諸生咏歌誦經其中暇則升髙望逺仰林俯壑坐磐石而濯清泉亦足以散塵慮盖境静則志専志専則業精士之嗜學者未有不樂此也躁競者不然占通都劇郡金粟衍裕處出内㑹計詣有司無虚日造請公卿揚袂矜衒朋從酒食游戲徵逐於講習何有又有利僻逺自逸僅一至輙去曠主席而家食僥倖終滿則取牒資仕進若是者其賢不肖如何哉衢包山書院𨽻開化開化山邑包山之勝可知宣城孫某任山長將往徵言為别予與之交雖淺而知其曽大父處士敬甫從朱子游某實世其學大能挹雲谷武夷之風是行也將充然有得其為此而不為彼也决矣因書以為贈送芈希曽之江西序士之負清才而行直道者使之處風紀之司遂其髙志而有以自見宜也然寡恃少諧不能與機捷者競進則邅廻欝抑齟齬拂戾勢有所必至處之者宜何如哉東平芈君希曽早游真揚間從學名師工書善古篆質直耿介士也往嵗受知江東僉按篤刺公辟從事幕下既而調江西不遇推挽者復以牒而東今嵗凡再至宣城顧以例不可則復之西焉去家數年往返㡬千里羇旅之蕭條江濤之險艱風雪之荒寒人不能堪君方諷吟攷古汲汲不少休察其心夷然而自得視其氣浩然而不衰抑賢已雖然吾徒之所賢詎知非世俗所謂迂逺而濶於事情者顧君之自處已定而愚亦以信已者信人焉耳今江西一道賢使林立豈無復有知君如按篤刺公者君寜乆淹哉送吳子彦縣尹之辰溪序仕以行道古人皆然才足以自見志足以直遂信已而不拘乎人而又廪禄充厚足以養其父母妻子供輿馬道里費故得安意守職而無私憂嗟乎奚為今之不然也大者不能伸其道而禄又弗給夫何樂於仕哉士生斯世雖才有髙下平居讀書史考古人成跡開口論天下事幸遭明時可以自致其身自一命以上苟存心及物必能有濟豈甘槁項黄馘遂與草木俱腐所以若區區之愚過不自量亦進而與時流偕焉迨其焦勞州縣間屈心摧剛靦顔蒙詬前虺後蜴抗獨以捍衆十歩九穽擇地而避害耗資於無益挈家以自困未嘗不幡然悔赧然愧飄然欲去之也比来宣城識同姓子彦君盖宋故相許公履齊曽孫忠清相傳克濟其美歴仕筦庫丞佐今授辰溪尹以君家世之盛文雅政譽之懿固非予所敢望而平夷冲澹心事畧同故相得為最深每言當今仕宦獨吾徒為難盖欲已未能無以釋髙蹈者之譏然羣囂雜處中山林之氣清苦之習無往不在未易與俗人言也予聞其言心竊悦之為之相視一笑君方徃治辰溪辰溪雖簡逺聞其俗質而事簡斯民得賢尹實將被其賜今無庸賛姑識其耿耿者為别以見予之深契于子彦者子彦一觀之其念予否乎送吳教授歸番陽序余来宣城得同姓三人僚則徳良友則子彦而教授仲退君則丈人行也今年春子彦出宰辰溪未旬日仲退以告老歸番陽二君者與余以文交遊莫逆相繼別去何能無介介於懐子彦行既序以道之於君欲無言得乎余觀世之為教官者往往以廪帑之富為善地夫其厚于此則薄于彼志之所存可知宣學最江東積餘饒至貸予人溢于無所用君漠若弗聞出内之署嘗懼已凂嗚呼若君者可謂絶無而僅有矣去年君預以老請憲使成公勉留之今監公暨羣屬官以下咸謂師表宜齒宿矧君清强未衰不當以例去而君堅不可大書致仕其門具舟亟行恐弗及其言曰余幼學于父師垂老弗離書冊間幸復際賔興名薦書被一命不負厥職足矣年及而弗去人謂斯何嗚呼若君者可謂無愧於進退之際矣余聞君子愛人以徳故於君之去未嘗不嘉其志而健其决然惜君之僅有而重夫離别之戚者又豈為直區區一已之私也哉君之學行嘗見於予所為徳讓堂記并是而觀之足以得其人焉贈黄伯庸序至大中黄公可玉在杭時友人寄余詩一卷中有公名字恨未及識嘗賦以道意後益見其詩文開已即世意尤恨今年還豫章將遊匡廬抵南康風雨横作艤舟上觀瀾閣識伯庸於學宫知為可玉子也學祠九賢其一名灝字商伯者考亭門人曽大父也可玉之父子麟字麒卿不為郡守草行表不食學廪粟以狷介稱文亦精覈今賢祠記托名他人寔其筆也於是又知其家世之詳而伯庸一見如平生歡聞余嗜山㳺忻然從眀日由五老峯下拜白鹿洞祠出坐枕流亭勘書臺徘徊風泉雲壑間復尋源至風雩潄石覧崖上鐫字慨然想道徳之遺烈去過白鶴觀弔坡老遺跡前趨栖賢院臨玉淵上憇三峡橋下瞰深險觀湍石奔怒竒壮震蕩心目即陸羽祠酌泉而返又眀日訪開先寺屢渉溪抵橋徑行閲恠松數里入門左雙劍峯插天歴萬竹亭登潄玉亭踏澗立石上仰青壁萬仞兩飛流自絶頂下合注澄潭中復散分去日暮凄風幽谷若聞龍吟乆之乃去乗月夜返星子灣舟中當其尋幽抉勝君輙攝衣披榛前導遇栖遯名蹟或殘碑舊題則指以相告徐行偕坐則縱談詩文樂而忘疲恨不旬月贏粮盡山南北之勝以永兹樂也既作詩記㳺贈伯庸而伯庸復出可玉文及所自為詩謂余盍評之余謂先隐君學有淵源又質諸聞人碩師文已名世伯庸妙悟卓識規摹家法出語趣過人不待愚言贊矣獨自念今兹之来所游處者孰非文學之選竟兩月連席未嘗有如伯庸相視莫逆得一吐所懐者矧伯庸賔興上有司竒寳横棄頋不以見尤而乃周旋弗置是何愛之深待之厚嗜好之獨異耶愚既獲從匡廬游又竊窺賢父子製作之盛是行所得在此而不在彼矣輙序其事以識余之遇焉伯庸謹毋示他人一為匡廬誦之送黄仲仁歸嚴陵序嚴陵蘭溪壤相接黄君仲仁猶鄉人也其為宣城郡學録始辱與㳺及三載告余以别其言曰宣城之敎官前此幾何人矣或不安於職或不待終更今幸依大府之光被諸公之知徜徉其間至是秩且滿滿宜去奚必俟代哉愚方羈縶下曹踰滿望代代者未見雖欲效仲仁之去不可得聞其言殆若處樊籠而羨飛翮者矣當春和時舟行泝桐江上宛轉兩峡間連峰摩天江水清徹紛紅眩緑卉木葱舊子規號鳴響應巖谷余嘗歴遊處也神馳魂飛愴恨何極雖然萬一有憐余者俾長林麋鹿得遂野性及時拏輕舟載斗酒與之追逐豈不快哉夫鄉物之思離别之感人情之所不能禁者故余因而極道所懐若夫仲仁之才美與其展力是學而可稱頌者則有諸君子之詩在送梁仲庸御史序至順元年六月甲辰江東憲使宻蘭公副使李公暨經歴梁公以祝釐朝出民之老者焚香夾道羅拜曰我曹頃遭飢凶數十萬口而公寔生之父母妻子不謂復見今日公恩徳盛大不知所以報惟使公壽考福禄保我民既退議相與圖像而祠祝焉不數日梁公擢南臺監察御史報至民又喜甚予惟江東捄荒之切雖使與副圖於其上而梁參賛居多誠不可冺也先是公始至有所按治掾曹或隂左右之既露懼不自安乃連黨與詭謀飛語相搆扇以撓憲綱公持之堅貞憸邪自屈臺府清眀褒斥之公卒當物議而厭人心南臺所𨽻十道江東最簡事而公適當其擾幸今使之来相安清静而天灾非常又有以濟其艱難焦勞弗寕而才績因以著宜其顯被是擢也公早踐華要方盛年司朝廷耳目之寄清風惠澤所被益廣豈惟江東而已然江東之民懐思於公若此瞻甘棠之遺䕃念桐鄉之故壤亦豈㤀之驅軺車持使節異時重來而父老尚有存者庶及見之豈非盛哉贈申彦直序士平居尚志孰不曰患不吾用用必濟物一旦得職則汨沒利欲而不酬其言者多矣然用有小大故所及有廣狭而又有不能如其志者焉若夫職小而施廣志遂而事成者不亦難乎始余至寕國申掾彦直遷自番陽來與之語而異之後見其府中所立無不卓然可稱嵗己巳宣城旱飢甚彦直受命司憲以拯捄為己責方秋時城中米絶細民無所得糴皇皇且旦夕殆則首督富者糶為之節量規畫以安之已而流亾四出勢益廹念官庾發必俟命將後弗及盍先議勸分適予自江右還申攝邑而相謀於是民之訴不能自食者餘五十萬口老弱纍纍日數千百擁府縣門不去豪民大家方懼已削顯抗隂沮怨怒謗讟羣起而吾二人日夜坐縣中疲精竭力為所欲為者一夕甚寒予以􅉵歸休及門而彦直至語余以事之難仰屋太息繼而痛哭余語之曰利於人而害其躬者天必不爾第安之是時亦姑相寛譬而事之濟否未可知也頼部使者清眀見任不疑事卒以集亦云幸矣其後發廪散財分任以出彦直勞益多議者嘉其為且名薦書進之清途是固激勸之公余聞有所為而為善者不誠因上之人以成功而掠以歸已者悖彦直豈有是哉所深喜者為人之所難盡力於已知而得以遂其濟物之志焉耳彼乗時以利其私扼餓莩之吭而奪之餐者方鷔然自以為得而媢疾有技違之俾不通者亦何足與議哉屬余將歸追念前事猶痛定思痛因并書所欲言者以為彦直告彦直堅於為善而於世之毁譽乖合皆不必計是亦區區之志也送李慶昌憲副序士由一命而上即可以攄志利物况乎乗騘戴豸駕軺秉節處清肅之司者哉然風力堅强者或鷙而少惠庶務眀察者或廹而鮮𢎞全是道者盖難其人乃今於江東憲副李公見之公御物甚嚴疾惡不少貸莊毅之容望之凛然而遇循良㢘潔吏有禮崇奬扶植惟恐或傷之詢訪周詳綜理精覈若不能毫髮遺而粹夷之徳冲雅之量恢乎其有容焉盖其踐歴三臺為材御史聲望之著非一朝而逹於風憲之體亦其積習然也兩年分部徧竟内宣化振俗鉏弊滌寃清風所激庻彚昭蘇遭嵗荐飢宣歙間流民千餘人自署部屬横擾且不測公痛懲之離其黨發粟勸分賑救寧國廣徳建平諸縣所全活者數十萬口惠澤尤博以大及物之志亦足以無愧矣驅馳焦勞至於嬰疾謁告謝事飄然北歸度去之心固非薄淮陽然去是且羽儀天朝澄清諸道特六郡數十縣之民遽失所依而下官末屬囿於安全之内而藉以自立若區區之愚者不少豈能無悒然也哉某嘗學為文辭自公之偉績頗欲見之頌述而公實傳静軒閻先生之業若李漢之於韓公者故不敢以蕪陋進屬將有行而某亦且去官聞宣之人士復為詩歌謡吟輙不能自巳序其梗槩以伺觀者擇焉張屏岩文集序士傳世不專以言而言固徳之符也夫子曰有徳者必有言夫徳修於身不見於言有之矣其見於言則亦皆心術行事之所寄如景之出於形耳不然聖人豈為是確然深信之論哉若吾東陽屏岩先生之為人純眀而粹美夷坦而淵深孝愛友讓敦義篤行自其鄉之人及吾黨之士識與不識皆稱其為君子長者也當宋季年以詩義第浙士第一入太學纔二十有六載英華之氣發於文辭同時軰流固望而敬之矣未幾國亡隨其君北遷道途之凄凉羇旅之鬰悒閔時悼已悲歌長吟又有不能自已者焉方中朝例授諸生官獨以親老丐歸遂得婺學教授改調時年甫强仕即陳情辭禄以遂志養杜門深居沉潜經籍縷析羣言益造精微不為苟作盖其自少至老雖所遭不同而履度若一故所著述皆本性情義理舂容和平粹然一出於正較其生平所為殆無一毫不合者所謂有徳之言豈不信哉公既殁其子樞裒遺藁屬愚為序雅聞公晚年屏棄筆硯以汨性害道區區以言語求公特其淺者也况子長超卓之才閎肆之學方大振於文異時并其前人而尊顯之宜也於愚何取焉獨念初與子長定交逮今且三十年聞公嘗囑以吳某無他来必許其周旋見則自延之荘坐竟日談學館舊遊及留燕時事嘗出數編相示毎讀一篇已析言其所作之故盖公平居人未嘗見其面也藐焉不才負公期待衣冠道盡風流日微故書以致其拳拳之思有不知其僣矣公名觀光字直夫屏岩其號里系事行詳見子長所自志兹不著特别取其出處之槩有係於文者云春秋胡傳附辨雜說序讀春秋者必自三傳始甚矣三傳之不可盡信也公穀傳義不傳事是以詳於經而義未必盡左氏傳事不傳義是以詳於史而事未必實說者謂三子皆口傳受之學者乃著竹帛而題之以其師之目本皆不謬而濫說徃徃附益其中其信然歟前儒固守其說啖趙氏以来始有所去取折𠂻至宋而二孫二劉蘇許呂氏各稱名家槩不能無異於三傳至河南程夫子敎人讀是書以傳為案經為斷推眀聖人經世之法而於大義嘗發其端中更王氏以私意廢格咸所憤嘆胡文定公當紹興中專進讀是經大綱本孟子微辭祖程氏根據正矣自謂事按左氏義取公穀之精傳有乖謬則棄而信經又謂左氏博通諸史叙事使人見本末傳説既乆浸失本真要在詳攷而精擇之可謂通而不固者也然闕故其為言哉初而闕不足以示勸戒者闕亂賊闢邪説正人心用夏變夷為主則不可訾也故子朱子之論謂其以義理穿鑿夫曰穿鑿則不可謂之義理盖義理正而事情未必然故曰以義理穿鑿爾且朱子攷訂諸經畧偹獨春秋一字弗之及嘗恨不見國史終莫知聖人筆削之意又曰已與聖人神交心契然後可斷其書吁國史豈復可見聖人如天天豈易知盖有測焉而偶合者矣朱子雖不滿於胡氏而終許其大義之正則談春秋而宗胡氏未有不先焉者也方今設科表章與三傳並學者宗之宜矣而議者猶或病之間嘗誦咏反覆輙以所未安者䟽而辨之其或事義足相發眀者附以見焉雖冒昧不諱而庻幾察於胡之大意因以識陋存疑將質之當世通經之士騐諸他日進學之工願為是書忠臣而異於讒賊者是則區區之志也香溪先生文集後序子朱子集註孟子全載范浚心箴由是天下莫不聞其名且與天壤俱敝也浚字茂眀婺之蘭溪人因其里居稱香溪先生祠於學宮舊矣某㓜即訪其文集不可得嘗讀黙成潘公與范賢良書而知其交讀徐忠莊公徵言傳而知其所取又得前軰誦傳姑蘇臺賦雜興諸詩滋欲見其餘而仁山金氏四書考證謂范集近亡以金之洽聞而云然殆無有矣居其鄉思其人而不得誦其詩而讀其書不能不致予恨焉至順辛未始得先生文七卷於親友應氏盖其首編也陳公岩有序稱從子端臣右史所纂凡二十一卷則逸者尚多一日先生族孫来言家藏缺自一至五卷惜其無從補也於是忻然畀之足以成編嗚呼百年之閟一朝而顯兩家之藏不期而合抑亦有數存其間耶先生當紹興中舉賢良方正以秦檜當國不起本節偉矣其學多本於經貫穿精覈諸文皆嶄絶矯健鑿鑿眀整卓然名家鄉先正有集盖自先生始也古之賢者嘗患無子孫之傳而有子孫者每患其不知學近時范氏之族豈乏富貴者恨其不能專為先生置祠奉常至於斯集之傳又不過當時一餉費爾浮榮悖貨倐焉澌盡而不忘者固自若亦足以有儆矣今右史裔孫璹念殘闕之復完恐冺沒之荐至首刋數卷將卒其族人之力而終之不私其美又以右史䝉齋集未及刋則以其與香溪唱酬諸詩先附見焉俾予序其事予於是編固願有述又嘉璹之能光昭其先庶賢子孫已凡與於此者豈不與有榮乎送徐生序學未有不原於知者也理散乎萬微而心殃乎毫忽非有以極其精則粗畧膚淺之習勝沉潛切實之功少昧迷其真而何以措諸事為哉此古今學者之首務而甚難者也愚少也非不學騁乎末流既而反求諸經粗知渉獵慨然念鄉之前修皆已淪謝而無存矣幸而遺規緒論未盡泯滅毎嘆其窮深析微精研妙契句求字察其用心若深文之吏然非過為煩宻也以為不如是則不足以得天下之理也理不患其不一所難者分殊耳因是而悟先儒之言確乎不我欺也然又必持義踐蹈交相發而後為至焉竊嘗志於此矣間者忝末科綴微官出入世故退而思其所為可愧可悔者何限政坐未能精知耳近嵗歸休屏處復且安心方策日求其所未至孑焉寡儔無與切磨者亦非盡善之道也三衢徐生来吾州亟見而益親其天資眀鋭而纂言考義甚富且歴訪予以前修及一二畏友必欲聞其梗槩汲汲孜孜將窮日夜而追之其用志可謂勤矣於是且歸復治其故業予方資朋友之助而生不可留又恨未能盡其所欲言者而辱徵言於予遂以平日向學而嘗歴者告之非以已律人也顧已之道乃先儒之道而不悖於聖賢者也生於予言果能不疑否也三衢多君子生歸而與之㳺居必非若窮鄉寡陋之所得者有得焉幸以告我若其决科成名以取顯耀直易事耳姑少須之送浦江邑長元凱公序科舉之選所以望天下之士者重矣由科目而仕者要必以有異乎人然異乎人者豈有他故哉正身眀敎守職奉法一循聖人之道而不戾眀天子之意則所謂異者又不過即其常而已彼其矜智能侈事功思踰其分於赫赫之譽者君子顧弗取焉愚識斯説乆其嘗為吏則未能自信否也浦陽與吾里壤接頃見前太常博士桞先生談其長官元凱公之賢知其一出是道也盖浦陽山邑號少事易治公既臨之以不煩蕭然堅清之操薰然慈良之風恒乆不渝而租賦簿書之餘惟興講學藝是務故不令而民自化子㳺不云乎學道則愛人仲弓亦曰居敬而行簡斯人也非有得於是與未之多見也今其滿去邑人士争為頌歌而逺以屬予序之誠嘉夫公之政有以契予心其所立真足以増科目之重勵吾黨又信桞先生之不誣不敢以未識辭為其無合耶則當所擯斥而何乃至是非相為黨也非有為而然也吾聞君子之善善雖小弗遺亟稱而樂道有以激而進之彼將益勉其不足於已為盛徳於人為令名古之道也書曰人之有技若已有之人之彦聖其心好之不啻若自其口出秦穆之言夫子齒之帝王之列而大學之論平天下亦引以終聖賢之歸重於好善者如此充君之心異時居糾察之官必能扶持善類處文衡之任必能奨㧞後進為輔相大臣必能使賢人端士咸得其職保子孫黎民而利國家其效大矣豈直愚慶幸其私而已哉雖然朋友之交則有規切之義焉非聖賢孰能盡善此愚不肖所凛凛也君其規我眀以告我毋徒譽我為也聞將解官西還書以識别且因末簡而請焉嗚呼敢不敬蚤夜以毋㤀君知禮部集巻十四
