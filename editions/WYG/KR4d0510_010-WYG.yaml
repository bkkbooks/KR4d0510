body:
  text: 禮部集卷十元吳師道撰雜著三國志雜論荀彧操欲取徐州還乃定布彧曰昔髙祖保闗中光武據河内云云攻之不㧞畧之無獲不出十日云云此是學李左車説陳餘語前討徐州威罰實行其子弟念父兄之恥必人自為守無降心此是規摹韓信秦父兄怨之痛入骨髓語議遷都許彧以為云云彧勸操曰昔髙祖代為義帝縞素而天下歸心云云操以詔書示彧云云彧曰劉項之存亡足以觀矣今與公争天下者惟袁紹耳云云此段規摹韓信請言項王為人語操與紹連戰議欲還許彧曰今軍食雖少未若楚漢在滎陽成臯間也是時劉項莫肯于先退云云或説操宜復古置九州彧言曰云云此是比張良諫立六國後事杜牧云彧之勸操取兖州則比之髙光諫不令還許則比之楚漢及事就功畢乃欲邀名漢代譬之教盜穴墻發匱而不與同挈雖所以論彧者未盡亦足以誅姦鄙之心矣司馬光乃謂凡為史者記人之言必有以文之比操于髙光楚漢者史氏之文愚按彧引髙帝不但取兖還許二事或言山東未平彧則以髙帝為義帝縞素勸其挾天子以令天下操患力不敵紹彧則論劉項之存亡以釋其疑操以彧為子房而彧動引髙帝宜矣史氏紀載大抵因其言而文之未有全出已語况彧之言不一豈得皆為史氏之文飾乎馬公曲為彧諱其論未當若乃陳夀規摹漢史沾沾自喜真以髙帝視操則有之矣夫儗人必于其倫夀之無識奚責哉郭嘉魏書曰備來奔以為豫州牧或謂操圖之嘉曰備有英雄名以窮歸已而害之是以害賢為名云云傳于備來奔云云嘉曰備有雄才而甚得衆心終不為人下宜早為之所㑹操使備擊袁術嘉與程昱俱諫時備已去操恨不用嘉言曹操不殺昭烈此自英雄之度嘉昱筭畧之士恨圖之不早耳昱傳載與嘉並諫遣昭烈謂前日不圖備昱等誠不及則二人皆嘗言之矣按董昭亦勸操止備三人者其智畧同而操之所深信也三人皆言之而操不聽豈非偉度乎綱目據魏書使嘉掠美而操沒善豈其實哉田疇田疇感伯安之遇痛公孫之暴厲志矢言義存報主可謂壯矣苟量力不敵銜憤莫遂獨徃終身固無尤焉既能合衆致强謂宜伺時乗隙得正而輔孰能禦之幸而獲逞不擇所從事成脱屣以明素志可也當鮮于輔連烏桓之衆袁紹督易京之師輔乃故吏疇嘗與之比肩紹有徴命亦可因以殄賊于此之時靡聞感奮何乃操使臨門聞命恐懼輸智猾賊用為啓導飾言鄉部之忿以掩非義之從是致蹋頓隕命熈尚授首不念公孫之殄滅實由假手于二族為讐人報能無愧乎頋乃哭尚以徼義辭爵以為髙可謂輕重乖宜去就無當者矣赤壁之戰赤壁之役奸賊褫魄迹其輕敵淺謀無以自掩操貽孫權書云值有疾病孤燒船自退横使周瑜虚獲此名評者謂操欲間瑜故為是言果誰欺乎考之史瑜勸權戰也謂操衆不習水土必生疾病且然之辭也魏志則曰戰不利于是大疫則疫在戰後矣于瑜傳乃云時有疾疫此不足信也黄盖獻謀因風縱火瑜傳所載著甚于吳志乃云操燒其餘船引退夫燒盡北船延及岸上營落豈復有餘自燒其餘豈人情也原夀之意祇欲附合操書掩飾敗衂之醜故為異同以亂其實不知明者觀之豈能眩哉曹植操之諸子彰最為鷙暴璽授之問誠有異心倉舒早慧而譎年稍延殆未可量植文藝而已加以任性不飾素志無他非丕所忌也當儀廙見誅灌均希㫖而禍不烈者良以此歟逮叡之世上疏求自試求存問親戚夫以植之才固宜見用曹氏大計固宜厚親戚然當時疎逺猜忌之弊已成言之者適所以為迂于事而昧于智也植乎吾知免矣司馬懿司馬懿請與武侯戰曹叡使辛毗監其軍以制之請戰者外示武而監其軍者知其不敵而飾其事也將在軍君命有所不受苟能制吾豈千里而請戰耶武侯料之明矣史又謂先是懿數請與亮戰按建興六年春出祁山冬圍陳倉魏皆遣曹真來拒八年真請由斜谷入叡遣懿泝漢水由西域與真㑹漢中以大雨道絶而還九年出祁山叡始遣懿來拒遇于上邽斂兵不交至鹵城登山掘營不肯戰賈詡魏平有畏蜀如虎之譏不得已而戰遂大敗由是論之懿始終不敢戰戰則敗耳史氏之言抑何誣哉虚夸其勇實露其怯所謂欲盖而章者歟華歆邴原管寧華歆邴原史稱三人相與為友徃徃並以名徳之士尊之愚嘗評漢魏之際清風全節髙蹈不汚惟幼安一人從惡滅義無若歆而原亦簒賊之臣豈二子者矯飾于初年而狼籍于晚暮耶與寧並列豈直麟鳯之于猰犬哉裴氏著龍頭腹尾之評亦止為不當以先後論而不斥其非倫何也考之世説載揮鉏擲金及分坐割席二事又魏略稱寧嘗笑邴華有仕宦意則知當時已辨其賢否裴氏所宜著録而反不之及盖亦有同乎世識崇飾其賢掩匿其惡而孰知惡之終不可以掩也譙周譙周陳夀皆巴郡人也夀于杜瓊傳載周問當塗髙之義明魏之當興推備禪之名知蜀之必亡與周傳勸禪降魏之言相表裏大槩謂天命在魏又以尊司馬氏之繼綂爾周言于禪曰若降魏魏不裂土以封請以古義争之此誠大謬無識之語而夀謂衆人無以易之理又云劉氏無虞一邦蒙頼皆周之謀吁賣降覆國俯首事仇曾是不以為非而反以是為善乎又載其與周别周語予曰孔子七十二劉向揚雄七十一今吾年近七十庶慕孔子遺風可與揚劉同軌雖因年嵗比方實則顯自附儗雄之失節周尤有甚更生忠誠周自視何如而况敢上議聖人乎周不可勝誅矣夀之著此若以矜其平素親遇之榮其他褒賛如所謂後進通儒所謂行止有取子孫亦忠篤質素又引董子比之所以尊揚周者不一而足徇私黨惡一至于此其罪當與周同科矣郤正郤正身草降箋臣事讐賊故其論姜維也不斥其不孝不忠之大罪而舉其小善以為稱降叛之相為黨也陳夀取而著之篇其自為論也亦止責其黷戰屢擾而已君臣之義置而不論可乎孟宗事親孝故忠可移于君古之人不得已則寧輟忠而全孝傳曰君子不奪人之親亦不可奪親也金革之事無辟孔子以為有為為之盖臨事而制是豈可以為常也哉孫氏之制奔喪者死傷化悖典甚矣有人心者肯捐其親而委質乎當時顧悌喪父權强令釋服悌畵壁作棺柩象對之哭泣服未闋而卒奪情滅孝誰之罪歟孟宗喪母奔赴自拘聼刑陸遜為之請減一等其秉志純篤不為淫刑所撓可謂絶無而僅有者矣朱子嘗謂此事闗係甚大按吳志司空孟仁卒注引吳録及楚國先賢傳所載寄鮓生筍等事當并書之宗事他見亦多如孫琳廢亮而為之告廟仕虐酷之朝無所匡救而不能止此是其失不可以此而廢彼也甘皇后昭烈祖雄父𢎞名字僅見至于母嫡室皆不知誰氏元年既立宗廟祫祭髙皇帝即不必更建親廟並有諡號嫡室追崇禮亦宜之豈有此之未及而下議皇后之諡乎孔明舉事必不其然此皆記載缺畧之罪按志建安元年吕布襲下邳虜昭烈妻子求和得還三年布遣髙順攻之復虜妻子曹操禽布昭烈得妻子五年操擊昭烈虜妻子據此則昭烈妻凡三見虜也甘后傳云昭烈住小沛時納為妾昭烈數喪嫡室攝内事随至荆州産後主昭烈以建安六年至荆州十二年後主生十三年操追及于當陽長坂趙雲抱子禪保䕶甘夫人得免又劉封傳云昭烈至荆州未有繼嗣養為子則未至荆州以前未有子史之所言自相戾也漢魏正朔魏明帝景初元年有司奏以為魏得地綂宜以建丑之月為正三月定厯改年為孟夏四月其春夏秋冬孟仲季月雖與正嵗不同至于郊祀迎氣祀祠烝嘗廵狩蒐田分至啓閉頒宣時令中氣早晚敬授民事皆以正月斗建為􅔦數之序齊王芳正始元年春正月始改從舊景初元年四月至正始元年正月即漢建興十五年三月至延熈二年十二月也魏志所書例差一月今綱目所書上著漢年而下從魏正如延熈元年正月立皇后張氏今書二月冬十一月蔣琬出屯漢中今書十二月二年二月蔣琬為大司馬今書夏其餘皆當正自昔言漢初及秦元年冬十月皆謂不改月獨顔師古謂此皆太初正厯以後追書吕子大事記是闕顧注史最精必有所據且賈山言有云願以夏嵗二月使當時不改月何以有是言魏明之制固為不典其改月不改時亦因可以推見前代之必然也綱目改定文建興十五年春正月魏黄龍見以三月為夏四月夏五月魏地震魏以陳矯為司徒魏制三祖為不毁之廟六月魏擊遼東不利公孫淵自稱燕王皇后張氏崩八月魏大水魏主殺其后毛氏九月魏營圓方丘南北郊冬十月吳以諸葛恪為威北將軍十二月魏遣太尉司馬懿擊遼東魏鑄銅人起土山于芳林園魏光禄勲髙堂隆卒魏作考課法不果行延熈元年春正月魏以韓暨為司徒立皇后張氏立子璿為皇太子吳鑄當千大錢秋七月魏司馬懿克遼東斬公孫淵八月吳中書郎吕乙伏誅冬十一月蔣琬出屯漢中魏主叡有疾立郭夫人為后召司馬懿入朝以曹􅐩為大將軍十二月魏司馬懿至洛陽與爽受遺詔輔政魏主叡卒太子芳立二年正月魏以司馬懿為太傅何晏為尚書三月以蔣琬為大司馬秋九月吳遣將軍吕岱屯武昌冬十一月魏復以建寅之月為正吳將周𦙍有罪廢徙廬陵附録綱目延熈八年冬十一月大司馬蔣琬卒十二月尚書令董允卒以宦者黄皓為中常侍按漢志九年十一月琬卒董允傳九年卒此皆仍通鑑誤目録九年琬卒不誤又考允傳陳祇代允為侍中與黄皓互相表裏始預政事祇死後皓以黄門令為中常侍奉車都尉操弄威柄終至覆國陳祇景耀元年卒據此文則皓此年未為中常侍也然専政則自允卒後始九年以姜維為衛將軍與費禕共録尚書事按維傳在十年亦仍通鑑誤景耀二年秋八月陳祇卒以董厥為尚書令諸葛瞻為僕射按祗卒在元年亦仍通鑑誤讀左傳并註數事左氏所引夫子曰云云多非是張子長辨之因録其遣宣傳二年孔子曰董狐古之良史也云云書法不隱一語當是夫子之言其下二語後人依託文飾之辭末語尤謬九年遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎洩冶諫死無可非議説者以書名無褒詞强生異説引詩云云使誠夫子之言是以忠為諱也其不然决矣昭傳十四年仲尼曰叔向古之遺直云云殺親益榮平丘之㑹止猶義也夫當是傳者申言之殺親益榮必非夫子語以子産古之遺愛語例之恐止一句為是二十年齊侯田于沛招虞人以弓云云仲尼曰守道不如守官官不外道豈有舍道而能守官耶孟子所引無之决非夫子語也杜注君招當徃道之常也非物不進官之制也其説似美而非君招當徃豈非制非物不徃豈非道乎子産卒仲尼曰古之遺愛也注子産見愛有古之遺風見愛注非愛者惠愛之愛即所謂惠人也猶言叔向古之遺直也前註叔向之直有古人之遺風此註亦當從之二十八年仲尼聞魏子之舉也以為義云云其長有後于晉國乎末句必後人附㑹之言與畢萬之後必大語類僖十五年秦伯伐晉卜徒父筮之吉渉河侯車敗註秦伯之軍渉河則晉侯車敗也此秦伯車敗也盖筮既吉而今車敗懼不祥故詰之徒父復告之云云按文勢渉河侯車敗三敗必獲晉君三敗及韓下即接晉侯云云非指晉侯車敗明矣杜盖因侯字即指為晉侯誤獲其雄狐夫狐蠱即其君也註以狐蠱為君其義欲以喻晉惠公其象未聞晉惠公烝于賈君故喻之如此詩刺齊襄亦云雄狐晉戎馬還濘而止註還便旋也小駟不調故堕泥中按註以還字句愚恐作一句讀言還轉于濘而止也以還為旋改字而義又過曲儀禮堕祭説士虞禮尸取奠左執之取菹擩于醢祭于豆間祝命佐食墮祭註下祭曰堕堕之猶言堕下也周禮曰既祭則藏其堕謂此也今文堕為綏特牲少牢或為羞失古正矣釋文堕許恚相恚二反猶隳許規反今按猶隳即是指猶言隳下之文然字不同釋作音亦異特牲饋食禮祝命挼祭尸左執觶右取菹㨎于醢祭于豆間註命詔尸也挼祭祭神食也士虞禮古文曰祝命佐食堕祭周禮曰既祭則藏其堕堕與接讀同今文改挼皆為綏古文皆為挼祭也㨎醢者染于醢釋文依註音堕許恚相恚二反後堕祭挼祭皆倣此㨎如悦而𤣥而誰三反佐食取黍稷肺祭授尸尸祭之主人拜受角尸拜送主人退佐食授挼祭註退者進受爵反位妥亦當為挼尸將嘏主人佐食授之挼祭者亦使祭尸食也其授食亦取黍稷肺祭今文或皆改妥作挼矣主婦適房南面佐食挼祭主婦左執爵右撫祭註撫祭示親祭佐食不授而祭于地亦儀簡也云云少牢饋食禮祝反南面註堕祭爾敦釋文堕許規如規二反下同尸取韭菹辨㨎于三豆祭于豆間上佐食取黍稷于四敦下佐食取牢一切肺于爼以授上佐食兼以黍而授尸尸受同祭于豆祭註牢羊豕也同合也合祭于爼豆之祭也黍稷之祭為堕祭將食神餘尊之而祭之上佐食取四敦黍稷下佐食取牢一切肺以授上佐食上佐食以綏祭註綏或作挼挼讀為墮將受嘏亦尊尸餘而祭之古文堕為肵音折釋文綏許規相規二反并註挼及堕亦放此下同主人左執爵右受佐食坐祭之註右受佐食右手受堕于佐食也至此言坐祭之者明尸與主人為禮堕祭所以祭鬼神之物猶生者之飲必祭也其禮則尸與主人主婦皆有之祝出迎尸尸入即席坐既舉奠祝命尸尸取菹㨎于醢祭于豆間及祭黍稷肺等是謂尸堕祭祭神食也尸酢主人主人拜受爵上佐食取黍稷肺授主人主人受佐食坐祭之所謂主人堕祭祭尸食也主婦亦然儀畧爾士虞禮所載及特牲祝命挼祭云云少牢尸取韭菹條尸堕祭也特牲主人拜受角條少牢上佐食取四敦黍稷以下主人堕祭也特牲主婦適房條主婦堕祭也按疏云三處經中堕皆不同此五字或為堕或為挼為羞為綏為㨎鄭以羞綏挼三者已从堕復云古文作㨎以特牲及此士虞皆有㨎祭故亦兼㨎解今考鄭註作挼不作㨎竊恐㨎字似綏而義同又有而誰音亦與綏堕易混䟽或據别本爾但士虞特牲俱有㨎醢祭豆文鄭雖兼解而於皆為挼祭也下始云㨎醢者染于醢則自有先後初非混言之其釋挼則主于堕與三者不異疏似不察也又按此字凡八又有隋妥肵疏不出皆字訛音轉所致釋文既依註音堕而士虞特牲從去聲少牢從平聲亦失于考定從一也禮記曾子問綏平聲周禮守祧大祝隋或去聲或通用二音亦皆類此然其義則同也社主説周禮大司徒設其社稷之壝而樹之田主各以野之所宜木遂以名其社與其野謂若松栢栗者小宗伯若大師則帥有司而立軍社奉主車注主曰軍社盖用石為之此各一説也後之言樹者白虎通云用樹尊而識之使民望見敬之又所以表功尚書無逸篇云太社惟松東社惟柏南社惟梓北社惟槐莊子齊櫟社漢史豐枌榆之類言石者孔頴達引許慎云今山陽俗祠有石主石是土類崔靈恩云社主用石以地産最實吕氏春秋云殷人社用石後魏天平中遷太社主石之類按宋史張齊賢傳問周家田主所宜木今社主石奈何齊賢等對周之田主用所宜木其民間之社非太社也陳祥道禮書曰諸侯立社皆樹為之主以象其神大夫以下但各以地之所宜木以二説考之則用各有當矣春秋傳陳侯擁社見鄭子展陳祥道云果長五尺不可得而擁盖周制尺有六寸後世定為五尺陳失考也但其制半埋地中必舊已然果埋而又取以載恐不可爾朱子謂古人多用主命如出行大事則以幣帛就廟社請神以徃然不可考按禮記君行載遷廟主無遷主則以主命盖廟無虚主則社亦不當虚主矣仁山金先生嘗引朱子説恐當以此為是論語問社章孔氏用大司徒文及注又釋朱子因之竊謂三代之社雖有遷改其所置之處即其境内之土何宜松宜柏之不同耶又夏土何以獨宜松殷土何以獨宜柏耶意此三木乃天下常植之物無土不宜樹之不同以示改制如子丑寅之建黑白赤之尚爾楊復儀禮通解續具載陳氏説引唐儒議石尺寸不同當考唐書舊主長尺有六寸方尺七寸今宜長五尺方二尺通解舊主長二尺五寸方一尺七寸今宜長五尺方二尺又唐儒云社稷主用石按稷舊制無主朱子社壇議云讀太𤣥經聖人之作易也果有心乎哉法象著形龍馬獻圖假手于羲皇一而二二而四四而八又三重而六十四猶木之有榦榦之有枝秩然而成整然而序縱横上下錯綜參伍無徃弗合殆若極天下之至巧者而史遷謂伏羲至淳厚畫八卦盖自然而然巧者固無庸其間雖以文王周公孔子為之爻象彖繫不過因理以明數即卦而示道而其為道也變動屢遷不為典要三百八十四爻不三百八十四用而止故天地鬼神之秘萬事萬物之理􅊶攝而無外貫通而無遺觸之而值象之而合筮之而靈天下之人神之而莫知其故信夫天之為之而非聖人心思智慮之所為也千載而下豈有加哉揚雄作太𤣥以一生三三生九極于八十一其䇿揲以三虚三用三十三此其法大與易異者也易有彖𤣥有首易有爻𤣥有賛易有象𤣥有測易有文𤣥有𤣥易有繫辭𤣥有攡瑩掜圖告易有説卦序卦雜卦𤣥有數有衝有錯此又同其義例而異名者也且𤣥以凖易實將模放擬議自比於聖人漢儒以譏其非聖人而作經後之為之辭者曰𤣥所以賛易其大異于易者如是不識何以為賛也盖雄深沉好思嘗覃思渾天三摹而四分之本有見于厯爾因厯作𤣥而巧求其合其思幽苦故其詞艱深易以天𤣥以人易以無心𤣥以有心孰謂𤣥足凖易哉故其紀日不及月無弦望晦朔以冬至為天元三月地元七月人元而夏至反在地元之中隂陽之為氣也二嵗之為物也方以三數乗之則皆不可得四分而加一率四嵗而加一日則千載之後大冬為大夏旦筮用三經夕筮用三緯日中夜中用二經一緯吉㓙不在其逢而在其時日中夜中夕筮無大休咎而旦筮者不大休則大咎數者昔人嘗論之是皆不得乎自然而强出于心思智慮之為毋怪乎支離舛謬之至此也或曰折篿毁瓦可知吉㓙易道無徃弗存况𤣥十餘萬言髙者出蒼天深者入黄泉其言奥頤悉寓至理詎無謂耶曰折篿毁瓦將以求卦也卦者無心之具故假之無心之物求之而後吉㓙之理得今𤣥也出于有心之為殆猶設不平之權衡而稱物之輕重烏可信已昔者雄自謂後世復有揚子雲則知好𤣥君子立法為其當為而已𤣥之書今猶昧昧也吾誠惜其人而非天將自附于易而逾遠卒勞而無所用之後之才智出雄下而好為穿鑿附㑹以求易者可不戒哉秦隋論三代而後混一天下者凢六姓秦漢晉隋唐宋享國長久稱漢唐晉未久而分裂宋稍久而播遷秦隋最先亡夫合天下而為一强盛之勢秦隋唐一也而僨身喪邦或若是亟者何哉昔人以忠厚者延長暴虐者不永固不易之論愚嘗因而求之剏始之君艱難經營角智力而得之非若三代之積徳累仁者獨漢為近正其餘已不能然况秦隋乎以仁得之以仁守之不可尚已以不仁得之以仁守之獨不愈于不仁乎當其取之之際威武之時多惠澤之日少無以大相過必其子孫有賢聖者出于一再傳之後有以結天下而固人心然後植長久之計文帝之于漢太宗之于唐是已彼秦隋一傳而又得暴虐之主無怪也晉武之興繼以惠帝特以昏庸召禍已不可救其實非若二世隋煬之惡也民猶哀之而戴其後宋興數世守文當靖康間享國已㡬二百年故亡而猶存而混一之盛終不可以復得彼論徒知忠厚者足以延長而不知忠厚之澤當上承開國之初而為之斯時也治亂脩短之决也武帝窮兵縱欲虚耗海内向使繼髙帝之後髙宗中宗孱庸不君向使居太宗之先漢唐之祚不保其徃而扶蘓不廢楊廣不立秦隋之為秦隋亦未可知也是故善觀人者不于其先不于其後惟于其一再傳之君之賢否而知之千金之家有子不肖蕩其貨財而曰其孫猶賢也不知孫雖賢而其富已不得而有矣吾觀子嬰慨然誅趙髙似果而材隋之末世亦仁柔無罪天下大勢已去其何救于亡嗚呼以是觀之則知前説之益可信矣異端説自佛老禍中國垂二千載莫盛于今日昔者其徒屬于有司而未嘗自為官府别為異教而未嘗假以名位棄家舍身也無妻妾子女之畜惡衣菲食也無財貨車服之養當度者給牒于朝未有捐數十緡于主者而即去民籍也金紫銀青開府之號間見前代特記其異未有設大宦儗政府在外者與州縣並也主其教者尊禮若神王公在其下宫居玉食服御擬萬乗天下塔廟一郡動千百區其後率占民籍十三貲産半有司之賦商賈室家無異衆庶是以惰游者入焉無賴者入焉退官豪民見懲于有司者入焉假借以肆貪邪而言之者以為諱治之者不得逞甚盛之勢曠古未有也余聞二氏之教以清静寂滅離世棄俗為務凡紛華盛麗皆彼所禁而不得為者今一切反是則其教固不行矣二氏之立言髙者直指性命為宏濶勝大之説聰明者惑焉卑者談禍福縁業輔以禳禱禁呪愚昧者信焉今之目之者曰是能祈天永命也是能救災致福也如是而已不知其誕也是尊信其粗而未始及其精也夫其能自立者在禁欲忍難而其溺人心則性命之説為尤甚今也為其徒而不知其道尊其教而不及其精徒曰佛老之盛盖眩于耳目之外而不察其實固未嘗盛也是猶横潦之無根羸人之盛氣豈足恃也哉昔者進取詞章之學方行于世遂以為儒道之盛已而大弊議者猶未悟今之大經大法綱常之教禮樂刑政之具脩明于上海内乂安兵寢刑措此儒之效也向使佛老之實用則且大亂烏睹今日之治哉進取詞章之不用而儒道之實用于隱然之中所謂盛者不在兹乎彼之盛者實則衰而吾之衰者實則盛本則立矣持之以久勝之以漸異端之害有不息者乎原士士之名何始乎生人之初㝠愚􅃖􅃖有聰明才智者出為之君始求其才智者自輔而為之公卿大夫于是舉賢于愚㧞秀于庸而士之名立焉其後制度益脩選舉益精納言試功察徳考萟自家而舉于鄉自鄉而升于國都王朝上之取者無異途下之進者無他道學焉而後仕耳當是之時四民並稱次則農工商惟士得仕焉夫農竭其力者也其人椎鈍而賤陋工治其技者也其人泥小道而弗周操鄙事而弗慚商通貨財者也其人貪冒以嗜利狡詐以厲民故不可以仕外是則處官府職簿書有吏焉下是而任奔走服役有胥徒焉皆治于人而不可以治人者也傳曰辨上下定民志使士農工商交致其能吏胥各守其分上下有章貴賤有則禮樂刑政有所措善治天下者不出此道而已後世不然士焉失其所以為士農工商吏胥失其所以為農工商吏胥侵紊汨亂凌越倒置蕩無經常民志之不定上下不止其所若是而求治猶適粤而北轅也盖數者之中必有一重焉重焉者士而已治國平天下之道必出于士而爵禄名位皆士所宜有今也士不専有而彼得以有焉安得不雜然而興悍然而争而騖其嗜欲無涯之心哉故士者衆民之綱綱先壊而餘随之必也變今之道反古之制使士有常用用有常尊而賢者出焉為之範防裁制則一正而民定何亂之足云嗚呼天之生斯人也畀之所以生之道必使知是道者司其生焉彼農工商之徒守一能匪不足知道焉鮮耳士雖不能皆知道學焉者衆耳人而不學不足以為人猶衿裾而禽獸舉而加諸人之上而令其治人也可乎哉夫欲治天下者必定天下之民而定民者必先定天下之士愚故作原士任人有國者必有法任法者必任人二者治道之大端也法有常制雖甚庸之國不能皆非人無常情雖至治之朝不能皆善世之所尚論治體者遂以為人之難任法之易守也始有任法不任人之説其言曰成周盛時周召毛原更迭執政極治者數百年晚節禍敗迄不可救此任人之弊也後世一定于法雖庸君中才相與坐而守之可以無事此任法之効也是不然周召之徒能用周之法所以盛其衰則反是任人非要乎秦人蔑棄賢智純任法律迨其亡也未嘗改一刑而摇一禁任法可恃乎法者具也人者所以操是具也操得其人則完而不廢法之用有窮而人之用無窮吁後世之法非古矣若其大者則固百世相因而無改今之有司負今之法爾夫上而公卿大臣下而方伯連帥不得持生殺之柄而擅利社稷之事下而為州縣之屬者皆得與守令之政吏具成案牽引比附拱手聼命一笞弗得増損其權輕其勢卑是雖有大奸慝亦無所懲而上之人亦將曰彼不能出意以有為則所辦于吾法而自足不知任之既輕彼亦應我以輕苟簡其職鹵莽其政一有不惠則扞格而為害國有大禁則消沮而為容啓民玩愒而示天下以不信積習陵夷益病吾法法之不行自上壊之盍亦反本矣將欲任法必先任人安能逆料人之難繼哉然則所謂任人者必如何而後可曰所謂任者非必予之以太甚之權也専之以責其功尊之以勵其節予奪操縱使得稍盡其才而㣲文細責不得以激撓之亦可矣吁今之任人者固所未論也今之取人則愚竊惑焉儒焉而不盡出于儒吏焉而不盡出于吏旁進雜出不試而用者居多今將得人以任法其勢不得不擇人而授任古選舉之道衆矣豈無適其中而宜于今者乎必使進取一新有以振厲天下之才然後徐議其責任之道亦適乎其可也劉梓汝材名字記木之類非一而經獨稱梓材言木工以梓人非以其良故耶愚嘗讀詩定之方中而求梓之為物遍考傳註諸説或云椅梓即楸云梓似楸云楸之疏理白色而生子者是楸與梓相亂未易明因記家語謂北山有梓實而俯楸屬多喬聳但當以俯而實者求梓自謂此説或得之夫以梓為材之良其名顯著又如是而數千百年言其種類形狀尚不能定則世之用梓者未必得其真真者或混而莫之辨也惜哉木有梓未嘗即人人即而用之故有干雲蔽日瑰巨傑異之姿徃徃立枯山阿湮腐澗壑彼固安之而世之小有才者惟恐不見知惟恨不見用賈炫焉鳴號焉其自處反不若無知者亦可愧矣故愚因論梓而竊有感焉識之而未有所發大梁段吉父偕其友劉生見予問之則梓其名汝材其字且求予為之説因其適有合也舉以告之生質美而敏從學來南樂交賢士大夫以蓄徳進業他日庶㡬有成者充于身惟患其不能大其用毋苟于自售聖賢之道不出乎此生誠有志焉其必因予言而知自勵也禮部集卷十
