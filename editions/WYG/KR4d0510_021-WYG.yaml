body:
  text: 附録元故禮部郎中吳君墓表元有文學政事之士曰禮部郎中吳君諱師道字正傳受性剛方蹈道貞固以仁為經以義為用以規為瑱以禮為輿學則探其奥㫖見聖賢之心行則踐其嘉言合君子之度非大公至正不接于心術非忠篤豈弟不見于猷為所謂時之龜龍邦之利器士之標凖民之懿則不疚不跲初中終皆可舉也君婺州蘭溪人吳太伯之後也而㓕于越子孫以國為氏播植華裔代有名德若河南守之治行大司馬之功閲廣州牧之亷清左庻子之文學皆載在方冊裕于後昆君承是覆露蔚有矩儀四世祖杞自信安來徙曾祖輝配陳氏祖儒宗宋國子監進士配湯氏張氏進士君生四子長子辛贈應奉翰林文學從仕郎配龔氏贈宜人季子㮚配柴氏君寔季之子父在以大父命為伯父後㓜而頴悟長而不羣問學疾力瞻視審定大父尤所鍾愛期于有成年十九觀西山真先生讀書記慨然嘆曰義理之學聖賢之道豈不在于此乎吾前日之自以為適者今則深可悔爾至大初聞白雲許先生謙從仁山金先生履祥得何王二公之文學而上泝朱子之傳乃述所得于已者以持敬致知之說質之先生先生味繹其言深加敬嘆以延平李先生所以告朱子理一分殊之言為復遂定交焉心志益廣名譽日聞至治元年辛酉嵗登進士第解巾褐為高郵縣丞階將仕郎至官之日䟽剔壅滯咸有條理明達文法吏不能欺漕渠决壤水泄入湖平地泛濫而運道不通君躬董其役築大堤以捍漕渠規偃瀦以藩湖水既成徃來頌之三年秋水大淹民以菑告君行水所至悉得其寔未幾丁外艱服除改寧國録事以覃恩陟從仕郎宣城自昔為雄富之邦在今為兼事所涖地大民豪政充事繁君載覧氓俗周爰令圖絶其尤違布其條教當師旅之興丁飢饉之嵗事為之制官修其方吏士豫附夫家寛息始而人以為煩久之民安其政天歴元年戊辰嵗徵兵江淮以遏賊師掌兵者統馭無狀軍士肆為攘奪舞刀出戰羣行入市脅市人取財物人憾或不與則縱火殺傷人城人震慄府縣吏皆閉門自守無敢誰何君嘆曰食人之食者憂人之憂倘人人辟匿為自完計如一城生衆何乃單騎按行捕殺傷人縱火者搒掠市門外衆兵譟呼揚言吾屬等死耳録事待我急我必殺録事君聞之使號于衆曰録事在此敢害録事者前衆不敢動會諸路兵涉道為暴君晝則綜理官事夜則廵視營落兵衆讋服城人以寧二年而已嵗大旱黎民阻飢宣城一縣仰食于官者三十三萬口亷訪使者議賑民以君攝縣事措置荒政先是城人缺食君禮勸大姓得粟三百餘石平估而糶者一萬餘石四墉之内無飢人至是悉召縣民禮勸如初衆皆聽命籍其户為九等得粟三萬七千六百石以均賑飢人明年春二麥猶在田君白亷訪使者轉以聞中書御史得官粟四萬石贓罰錢七百三十定亷訪使者掾出勸分旁郡得鈔三萬七千七百定選郡府公能使以等第分與民君獨任其三之二與飢民為約束號令嚴整番更而受分者日數千百人無敢譁者有偽易服來受分居衆中指其人顧吏曰取彼吏擒之覈問得其情衆大驚以為神明所以賑其民無不盡其理三十餘萬人皆頼以不困亷訪使者列其治行薦于朝至順元年庚午嵗以疾予告明年遂歸在官幾五載去之日自始至今宣城之民誦樂而歌思之元統元年乙亥嵗遷池州建德縣尹階文林郎建德依山以為縣君能因其俗以清省得其民明年旱其備禦之法如宣城時事學宫庳陋君始至撤而新之以勸衆士郡學有田七百畆為豪右所侵久之不能治郡學以言郡郡下其事建德俾君䆒治之君按其圖籍悉以歸郡縣學後有泉曰清白宋縣令梅聖俞作亭其上嵗久堙廢君修而復以厲僚列盗起漳州朝廷出侍衞軍討之次于建德君拊慰得宜民不知軍在其境建德素少茶而榷稅尤重邑人苦之乃移文所司極言其敝榷稅為減民以少蘇三年之間桴鼓不鳴細民得職供賦稅給公上而已至元末朝廷更化妙東名儒以教國子令中書右丞吕公思誠侍御史孔公思立雅知君時皆在中書提衡稱薦遂自常選中擢國子助教階承務郎明年春升博士換儒林郎六館諸生無不敬懌人自以為得師君在京師未嘗事造請惟晨夕坐館中課諸生講明經義表章正學惟恐不及或以為太嚴者君聞之曰為人師而可以寛自處乎吾盡吾職而已遑及其他嘗語諸生曰聖人之道至朱子而大明朱子之學至許文正公而後定向非許公見之之確守之之固其不為異論所遷者幾希故在館三年一遵朱子之訓而守許公之法未嘗以私意臆說參錯其間有持異論而來者君辭而闢之曾不少假諸公言于朝請以劉文靖公因從祀孔子廟廷事下國子監君以為劉公以葢世之才而為朱子之學其學術之正固無愧于從祀然事大體重非學官所專决必廷中集議而後可施行始疑其持兩端不肯即下議未幾咸以為是翰林學士承㫖庫庫公翰林學士多爾濟巴勒公薦君堪任翰林國史以為道德性命之明達禮樂刑政之該通操行清白而不愧于古人志節剛方而不狥于流俗未報而君以生母之憂南還矣時至正三年癸未嵗春三月也君素强無疾是年冬忽患痞猶端坐終日講學不輟嘗校文江西甄别有序亷訪使者耿公渙深相器遇舉以為儒學提舉官事上不報後校文江浙士尤服其精允四年甲申嵗江浙行中書大比取士夏五月遣幣聘致君議欲以主文君以疾辭使者以丞相意堅遂委幣而去秋八月疾有加乃反幣且上休致之請逺近聞之莫不失望十七日癸酉遂以疾卒内外易之際精爽不亂君生于至元二十年癸未嵗二月七日壬辰夀六十有二娶徐氏封宜人子男二人長深先三年卒次沉女一人適同郡趙虎臣孫男一人池女二人以至正五年乙酉嵗九月十有七日丁酉葬于銅山鄉中徐之原初休請既上朝論惜其去久之乃得請以奉議大夫禮部郎中致仕命下而君之卒已久矣所著書蘭陰山房類藁二十卷易雜說二卷書雜說六卷詩雜說二卷春秋胡氏傳附正十二卷戰國策校註十卷綘守居園池記校註一卷敬鄉録二十三卷君于書無不觀亦無所不通為文章清勁善持論晚益踔絶有史漢風經說明辨剴繹補其所未備啟其所未喻非苟為同異事攷守而已戰國策一匡高鮑之譌而長短之說遂為成書園池記暇豫所屬亦足以正名物事淹該敬鄉録質而不俚詳而不穢去先賢耆舊傳逺甚君之䘮始訃予奔哭之慟將即窀窆門人徐元以狀來請以揭其墓烏乎予尚忍言予友耶昔三代之時道術既一風俗既同士生其間學藝修明而德行純備其出而見于世皆可以為大夫士君公上頼其成而下被其澤歴世浸久而風聲不冺者由習之于豫而用之得宜故也後世論人之方不能如古而士以未成之才輕試于用往往習之非豫而用之不得其宜是以政不堅凝而民受其敗君方泥蟠里閭己負衆多之望一旦起自諸生而受民之寄人皆以為習之于豫而用之為得其宜矣其出而從政也布政厚下為世吏師其教于國子也均已成人為時明法朝士拭目大僚引重使得寵永年充逺量束帶立朝何適不可昔賈誼董仲舒有王佐之才值好文之主而廻翔下國中道而没有志之士于今為慨君以董賈之資而處休明之世抱已成之才而操可用之勢齒位未極怛化俄及可勝痛哉烏乎人誰不死而不忘者存君行修于身澤施于人而言著于後他日祠于瞽宗立于學宫俾逖聽遐觀而後來者勸亦可以不朽矣予投分于君三十有五年班才不渝而始終如一其知之也深則序之也備愛之也道則言之也公雖死者復生而生者不愧吁嗟乎吳君去白日之昭昭襲厚夜之㝠㝠邈儀刑兮既逺尚有考于斯文吁嗟乎吳友人東陽張樞文京山杜本書河南陳思謙篆額墓志銘浙之東州有數君子為海内所師表葢自朱子之學一再傳而何王金許寔能自外利榮蹈履純固反身克己體騐精切故其育德成仁顯有端緒若白雲許先生烏蜀柳先生皆已後先亡没獨正傳吳君則同郡而合志以正誼明道扶樹世教而已任者也朝廷方用之成均庻其興起正學以作新斯人而今又亡矣缺兹謝病空山臥念斯文契好涕泗時零而君之子沉乃千里致辭請書長史張君之文表掲墓上又以門人徐元所述事狀欲與銘其𤣥室且謂罄海内之交相知尤深而敢以淺陋辭乎故緝次而序之曰君諱師道字正傳姓吳氏太伯之裔也高祖諱杞自三衢徙蘭溪曾祖諱輝配陳氏祖諱儒宗故宋國子監進士配湯氏張氏生四子長諱辛贈應奉翰林文學從仕郎配龔氏贈宜人季諱㮚配柴氏君乃季之子應奉公無子以大父命君為後大父愛其頴異欲以續冢嗣大父臥起飲食與俱期以有成稍長課之詩賦經義即詞明理順年始十九觀真西山先生讀書記慨然嘆曰聖賢之道豈不在此乎前日自以為適者深可悔爾至大初聞白雲許先生謙從仁山金先生履祥得文定何公文憲王公之學上泝朱子之傳乃述已所得持敬致知之說撰書質于許公深加敬嘆即以延平李先生所以告朱子理一分殊之言為復自是凡一辭之未瑩一義之未安輙徃復詰問訂定方已于是造詣日深譽望日隆至治元年辛酉登進士第授將仕郎高郵府高郵縣丞至官之日條理紀綱若素履其事者至于畜泄渠漕拯救民傷民蒙惠利未幾丁外艱服除改寧國録事升從仕郎寧國為江左大郡而憲府臨之君不亟不徐剸繁禦暴賑荒聽獄一以忠信行之凡屬境寃滯憲府委之處决咸稱平凡居官五載以疾予告而歸民歌訟追思久而不忘亷訪使者具其治行列薦于朝至元元年乙亥遷池州路建德縣尹官文林郎與民約以清心省事新其學宫專意于教養凡有堙廢考圖按志悉復其舊宋梅聖俞嘗宰斯邑有泉號清白重建亭其上以激勵僚屬地産茶少而征課重則力言于所司以減免之時值漳寇兵興朝廷遣侍衛親軍討之屯次境内者兩月君撫慰得冝民頼以安三年之間田里清謐二稅之外無餘事矣朝廷更化之初選用名儒今中書左丞吕公思誠侍御史孔公思立知君學行時在中書薦擢君為國子助教階承務郎明年升博士階儒林郎六館諸生素聞君名無不悅服在京不事請謁晨夕坐館中講明經義表章正學且請立何文定公書院嘗謂諸生曰聖人之道至朱子而大明朱子之學至我朝許文正公而論定向非許公見之之明而守之之固未必不為異論所惑矣誠宜一遵朱子之訓許公之法私意臆說無庸參錯其間摛文之士有持異論者辭而闢之或請以劉文靖因從祀孔子廟廷事下國子監君以為必廷中集議乃可施行始疑其持兩端不即下議既而是之翰林學士承㫖庫庫公翰林學士多爾濟巴勒公尤重儒雅薦君明于道德性命通于禮樂政刑操行清白志節剛方可任翰林國史未報而君以生母之憂南還遂移疾上休致之請朝廷授君奉議大夫禮部郎中命下而君已卒矣先是嘗校文江西甄别有序又校文江浙士服精允至正四年浙省以幣聘君主文君弗及徃士論尤痛惜之君生于至元二十年癸未二月七日壬辰享年六十有二娶徐氏封宜人子男二人長深先三年卒次沉承其家學女一人適同郡趙虎臣孫男一人孫女二人以至正五年乙酉嵗九月十有七日丁酉葬于銅山鄉中徐之原以深祔焉烏乎君之學行傳之門人弟子信于朝廷功有所立德有所成著書續文各若干卷長史張君既論述而表顯于墓矣乃本其師友端緒而為之銘曰聖賢之道具是成式世迷其宗乃鮮知德買櫝還珠蔓延荆塞愿恭色莊誇危欺黙不有先知孰袪尤忒偉矣吳君剛明易直探端泝源正其學植理一分殊擴充意極高仰堅鑚淵窺海測日省時維躬行心得敷教成均寔宣乃職克振綱紀凡為規則胡不百年康民華國幹摧儒林罔不傷䀌金華峩峩泉源湜湜來溉來瞻攷斯貞勒京兆杜本撰并書篆吳先生碑元國之博士吳先生既卒三十有七年其子今翰林待制沉告于太史宋濓曰先君學行海内靡不聞然知而尤詳者莫如鄉人鄉人知者衆矣好道而諒直者宜莫如子圖其傳俾久弗忘非子之屬而誰與濓于先生固弟子行幸執筆從士列咸餘教所暨且與沉友雖老矣寧敢卒辭先生吳氏諱師道字正傳婺之蘭溪人少勇于學不督而勤始為文辭輙驚駭長老未冠讀真文忠公書大悔初所為非是即以聖賢自師時許文懿公以朱子之學淑學者先生持所悟識造門質難許公甚敬禮之授以所受心領意繹日開嵗化斂戢充横克削就規矩􅂱然有聞于時至治元年舉進士登科授高郵縣丞階將仕郎漕渠决泛原陸漕不通先生集工隄之三年以外艱歸服除改寧國録事轉從仕郎天歴元年徵江淮兵過郡將弗簡下兵白晝拂刀㦸走怖市人取資貨不與輙縱火焚廬舎横甚自郡守以下皆畏噤不敢治視民慼若不知先生曰兵無狀賊天子民不治且不可制遂從數卒行市捕得縛市門搒掠示衆衆譁噪大呼曰何録事乃敢爾吾曹死耳不忍為人辱必殺録事先生聞之獨出謂其衆曰録事儒者易殺敢殺者來録事不汝禦也衆􅌓眙不敢有言退相戒曰他人易凌慎勿犯吳録事明年飢先生平價勸分得粟萬餘石食城中民既而宣城民仰縣官食者三十三萬口亷訪使者以先生能吏檄攝縣賑飢悉召大姓第其家為九等出粟有差得三萬七千六百石飢者以不殣死又明年春未麥先生白亷訪使請諸朝發官廪十萬計使者亦遣掾使出貸旁郡復獲鈔數萬定選亷察吏賑民先生任三之二籍民為曹伍以次呼名受錢粟襁負充庭中若無一人然既有受而易服重至者先生目吏取其人于衆中詰之具伏左右相顧疑為神明居五載條教修完事治奸息亷訪使者薦于朝以疾引歸重紀至元之初遷文林郎池州建德縣尹新孔子廟堂廣學舎豪氓侵郡學田七百畆郡下先生問狀按圖䋲豪氓歸諸學建德非茶區民苦茶稅先生言不便報減稅民頼之中書右丞吕公思誠侍御史孔公思立薦先生經明行高宜為人師召為國子助教階承務郎踰年升愽士進儒林郎先生聲著中朝者久士子聞先生至喜曰是婺吳先生耶相率持所疑指問開以機鑰皆嘆服去先生因所聞陳說誨誘端簡嚴肅經義一本朱子排斥異端有詆朱子者惡絶弗與言初許文正公衡在成均時宗朱子以為教其法具在先生守不變學者信向如文正時禁林近臣復薦先生才任修史未報至正三年先生以内艱歸明年江浙行中書省當大比聘先生取士疾作不能行上書請致其仕八月十七日卒于家夀六十二既卒命書下以奉議大夫禮部郎中致仕五年九月十七日葬銅山鄉中徐之原先生之先居信安四世祖杞徙蘭溪曾祖輝祖儒宗宋國子進士考㮚世父辛無子以考命後之辛贈應奉翰林文學從仕郎妣龔氏贈宜人先生娶徐氏封如龔氏二男子長深先卒次沉也一女適趙虎臣孫男若干人先生于書無所不觀故無所不熟涵蓄淵䆳不可涯涘為文務自理出暢而不繁崇而不矯有蘭隂山房類藁二十卷易書詩春秋皆有雜說通十卷戰國策校註十卷絳守居園池記校註一卷敬鄉録二十三卷自聖賢之學不傳篤信者失之拘而不適于用喜功者失之詭而不合乎義二千年間非無豪傑之士而功烈不少見于世者不以斯耶宋之君子後先繼出推明闡抉疏闢扶樹理無不章事無不備雖聖賢復生為後世計無以加矣然卒未有由其說而大有為于天下者豈非有志者鮮矣先生早有所聞尊而行之守道而不遺乎事致用而必本于道施其緒餘于郡邑已足以震耀當世使假之以高位而獲大行被其潤澤者夫豈細哉卒止于斯謂之天也非耶雖然觀其所自立不既偉矣夫銘曰聖學之傳猶日麗天光華赫如炤被彼埏有足者行有目者覩致力成功咸以日故使日自明明不照物雖曰行天何取于日其或善燭而不能遐如膏與薪厥功幾何道積于躬用見乎世微之一毫大之無外在聖有作佐適造周天包地含岳立川流區區霸功寔悖于道卑曲偏歧膏薪之耀歴世二千濓洛擴之有支而南考亭拓之夷其榛荒亦有車馬有駕而行可盡天下彼昏不由狹徑是趨殫其智能陷于泥塗惟婺有傳考亭之適先生是承孔武且力涵而俾深植而俾成濯其光晶有􅂱其明始奮而仕不辭下位道無觕精崇庳一致䋲豪鋤强煦其弱羸父嚴母慈亦作之師廷臣咸言其道可斆帝曰女來掌我邦教有肅威儀有秩詩書大帶𤣥端開陳聖謨使陟而升可釋四海世方仰之曷為不待不顯者身道則不亡遺書滿家百世彌章世觀其書將考于為勿謂易知斯道在斯禮部集附録
