body:
  text: 禮部集卷八元呉師道撰律詩七言奉安仁山金先生神主二首我里堂堂有碩師窮經白首竟誰知諸君宣化文明運百世風流道德祠鄉曲論公身殁後衣冠色動禮成時服膺私淑遺編在豈乏方來秀傑姿又仁山山下故書藏上泝真傳自紫陽䇿秘當時桑海變道行異世日星光先生永配千年社學子濃熏一瓣香端藉廣文崇教寺相看不恨髩毛蒼和鮮于伯機舊題柯山韻樹古崖深晝景㝠仙橋有路上神京洞門呀月青霞出鯨背撑空白浪平須信地靈鍾異質誰令樵客擅脩名千年太極無窮意騰說紛紜笑老生于壽道興崇徽國文公祠宇之盛闕里名存第宅非斯文天為啓良機禮崇盛德千年祀功比侵田一日歸故井土消泉激激甞闕齋所銘井南街春動柳依依溪山光景元非昨想見神遊憶佩韋萬里清風堂宴集呈壽道知州孟威郡帥二月髙堂酒滿杯梅花雪落杏花開文章太守羣僚集弓劍元戎小隊來四座清風談未了萬山斜日首重回客游謬忝嘉賔碩愧乏鄒枚賦咏才衢州超化寺前朝老屋半傾欹尚想諸賢㑹集時閣外雲山天歴歴城頭風雨草離離渡江疋馬空成夢印雪孤鴻自足悲頼是同行非俗子僧寮借紙録殘碑大宋南渡後朱希真汪玉山范元長甞寓于有雲山閣張巨山作記今摧敗不可登臨矣寄題永康上安寺三峯閣峰名淦竹石柱後塢永康縣名花溪道家浪說蓬瀛山何如此地三峯環竹岩石柱秋落落花溪雲塢春潺潺旁通異景人莫測中有髙閣僧獨閒我居不逺二百里今當一往窮登攀謝宜春易芳猷帥閫見寄詩同上燕臺記昔年重遊兩髩各蒼然升騰大府方飛剡拓落微官漫草𤣥驛有使攜雲樹句門無人候雪溪船浮生聚散何須論仰止芳名宇内傳送人之宣城并寄諸故舊我離宣城已五年送子行邁心茫然塩車驥耳空自笑雪泥鴻爪誰知憐溪山到處足清絶冠佩祇今多俊賢游從定應得真樂莫惜頻寄新吟篇正月五日大雪連日寒凍不出殘冬兩度聴驚雷新歲隂寒雪作堆病客老容仍頓至荒山春色幾曽來氷虀滿貯加飡飯松火頻添細撥灰最憶二兒同咲語五更孤枕夢初回送人歸婺源勇隨束帛出山來仍逐雙鳬並路回廢院俄驚鎻秋葉荒田應夢長春苔稻梁屑屑非髙志榱桷森森搃異材吾道未窮先哲在紫陽千仞鬱崔嵬重過齊山清溪翠微曾與客同遊陟險搜竒興未休八載重來驚老大十年髙咏想風流雲迷複嶺深藏洞水落寒江逺見洲安得符離張太守畵圖再與寫清愁山行即事穿雲渡水百盤廻身在青紅綿繡堆野老怪人衝雨過牧兒疑我看花來山林自是平生志州縣元非健吏才但得翳桑無餓者不妨歸卧守蒿萊寄題留山道舘幾處燒丹詫葛翁留山今復見新宫神仙自愛無人識樓館誰令有路通碧水帶花來洞口玉笙隨鶴度雲中更尋履石依稀迹轉覺幽深興未窮葛公坑山水幽䆳有石上履迹送陶生之江西二首大江西上好青山曽記輕舟一往還翠袂小姑煙雨裡白頭五老霧雲問子遊仍及春風早我夢寜如昔日閒應過柴桑懐爾祖千年髙節杳難攀又憶昔洪都與勝遊桂花荘上共鳴騶鎻深廢院書聲斷劍化空函寳氣收往事十年春夢變斯文千古大江流西山晴翠東湖月應有幽人遲子留送師剛中萬户二首閩南小寇敢披猖藩府新開選帥良中道已聞蠻黨静回車復見羽書忙縂戎嚴令風霜肅報國丹心日月光此事正堪談笑了春和歸誦采薇章又秋浦飛鳬倦欲囘忽聞萬騎自南來愚民驚向荒山走拙令喜逢青眼開禮樂詩書曽璧水功名圗畵合雲臺早聞吉語東風裡戱彩庭前奉壽杯寄交代辛仲剛一泓清白鏡重開更築新亭記老梅千載前賢想遺烈三年舊令愧非才應須花木春添種莫遣牛羊夕下來深䕶扃閑驅俗子登臨元不為銜杯和友人惠韻交情落落曙星稀心事悠悠倦鳥飛佳友每欣連榻話俗兒偏笑載書歸淮山江水風吹夢寒食清明雨濕衣白髮相看一樽酒不妨秉燭對餘暉題吳教授重陽詩遺墨就用其韻秋風老菊尚餘香誰信吟詩近夕陽營冢子収遺藁墨傳經人覔賜衣黄州來南裔雲仍冷香水東流日夜長淚落緘題孤宿約去年空過鄭公鄉佳山水亭百年老屋半蒼苔一日佳哉舊觀囘浮世何曽改山水髙懐聊復寄亭臺夜深漁艇簷頭宿日落僧窓竹裡開此去京華踏塵土時時還有夢飛來送人之開化縣幕我亦曽為縣邑官賔僚毎歎合并難幕中婉畫能交賛堂上清琴坐可彈露窖雲屯黄䆉稏杉幢秋擁碧㠝岏送行還憶經過地珍重諸公各勸飡春陪李惟中司業同年赴京至彭城而别使華移炤辟雍流末席何期忝見收二十年前依虎榜幾千里外逐仙舟黄樓同上還分手紫陌重迎尚及秋又報奉常新命下早脩儀注賛皇猷九月初旬臨清下陵州舟中誰云北土異南方九日晴暄未隕霜河水渾黄千里疾柳隂濃緑兩堤長豐年有象占農畆佳氣非煙望帝鄉驛酒一升猶可飲祇愁無客共重陽静復堂震雷初動復為元能見天心本静存夜氣清明守靈府春陽消息認孤根披圖細玩先天奥問道深懐立雪門莫以佳名事觀美化機妙處不容言碧筠軒次韻賸栽脩竹拂春雲為愛堅貞節獨尊食肉可能醫俗士垂綏莫共乞天孫清風繞屋笙琴響翠霧侵人几席昏想像兹軒元未識題詩先到楚山根寄題紀信廟貌齊隆準伏危機辦為君王解急圍楚炬無情燎黄屋晉城有土瘞遺衣功名不與山河誓義烈終同日月輝新廟落成牲醴盛千年魂魄想依依送俞廵簡之邵武朱口坐厭寒氊作廣文忽騎快馬號将軍民安樂土元無警士有通才故不群折柳都門三月雨看花山寨萬重雲武夷溪曲應相近為我馳書問隠君送徐縣丞之夏縣馬公鄉裏去鳴琴送别因風感慨深此日大夫花滿縣當時丞相布為衾朝廷毎尚亷平政父母誰無愷悌心愧我不才曽作邑相逢祇誦古人箴送鄭知事之杭州寒食匆匆不少留故人相送出皇州喜聞南國蓮依幕乍識西湖柳映樓知已定逢臺閣彦清才寜混簿書流是邦凋瘵今非昔好與黄堂賛運籌送張縣尹之孝感縣十年前燕杏園東此日重來踏軟紅得意方為萬家宰題詩仍醉百花風慈恩姓字氛埃表雲夢衿期浩蕩中媿我不才曽學製欲談舊事惜匆匆蕭存道元帥平雲南頌後題長槍大劍壓毛錐却虜人言底用詩誰似頌聲騰北闕更兼威畧震南夷十年尚記先朝事萬里重迎大將旗今日綏懐銷戰伐莫嫌無路獻雄詞送劉伯温之江浙省郎中江浙連閩屹巨藩年來民力見凋殘帝憐下土驅豺虎人賀南州集鳯鸞槐影晝籠青𤨏闥湖光晴炤畵闌干清風迅掃諸曹務應共賔僚一笑歡送陳道士歸龍虎山誰云學道出人間親在髙堂髩髮斑萊子寧忘身戱彩張矦應夢手持環神仙天上辭珍舘煙雨江南望故山獨羨相知老宗伯連章珠玉賁林關端午今年重午住京華一寸心情萬里家楚些祇添當日恨戎葵不似故園花案頭新墨題紈扇墻外髙門響鈿車朋侣蕭疎歡事少誰令衰髩受風沙送曾貫還江西應試桂花荘上昔年遊送子曾偕計吏投望氣此邦終得劍濟河今度決焚舟興文已信關天運積學深期為道謀京邑相逢乍分手春風遲宴曲江頭送髙知事之道州元子輕徭減稅租陽公遺惠及侏儒頻年未息山夷警今日誰分刺史符溪上訪賢談太極雲間懐古叫蒼梧佐僚喜得詩書彦從此疲民盍少蘓送顧縣尹之安豐致意舒穆嚕書庵鼓篋曽陪胄子遊青衫初著盛鳴騶桁楊卧雨公庭曉秔稻連雲田舍秋今曰淮鄉真樂土古來仙吏屬清流詩書萬卷庵中老問道應知不逺求次韻張仲舉助教上京即事六首海波填碧湧金鰲當日經營得俊髦周鼎卜年開帝業漢都作鎮奠神臯宫中雙鳯朝扶輦帳下千牛夜捉刀萬國㑹同時肆覲衆星遥拱北辰髙又大駕時廵鎮北庭皇風萬里暢威靈有年太史仍書雨卜日祠官已祭星白草黄雲秋漫漫朱樓翠樹晚􅁳冥南歸却作灤陽夢應是平生舊所經又翼翼行都歲幸臨名王諸部集如林氊車滿載彤庭帛寳馬髙䭾内府金暮散歌呼灤水上夜騰光氣黒山隂世皇謨畧真宏逺共感湛恩到骨深又虎賁猛士羽林兵繚繞宫垣帯雉城土冷水泉長凍沍天低星斗倍光精穹廬歐脫雲彌野馬湩醍醐雪倒觵巷北巷南歌吹襍祇應儒舘自書聲又聖主恭勤服澣衣頻年羽獵罷連圍金華勸講延髦士紫殿親祠却宓妃調鼎有功神化宻扣門無事諫書稀髙秋八月時廵畢還與都人候六飛又孔鸞斂翅乆盤廻延閣穹崇際復開四海宣文千載仰兩生接武一時來紬書共啓緘金匱持筆行登視草堂努力深期報知已明時肯負出羣才聞危太樸王叔善除宣文閣檢討四首隂山分胍自崑崙朔漠緜延逈北門遥見馬駝知牧地時逢水草似漁村穹廬勅勒秋風曲青塚婵姢夜月魂今日八荒同一宇向來邉檄不須論又兩都賦意入經營今日竒逢有此行弟子絃歌臨璧水諸公篇翰出承明眼中髙闕祥雲色夢裡空齋舊雨聲千里相望勞問訊追扳無路若為情又亭障連山入杳茫氊車如雪漫沙場雕盤天際秋雲白雁去關南木葉黄獨客應憐冠戴楚閒愁無奈管吹羌歸來若度桑乾水莫忘并州是故鄉又藻水縈逥草滿川皇都佳氣鬱浮天端門髙映雙龍闕馳道中容萬馬韀群后承恩歌湛露從臣待詔賦甘泉更聞所過蠲租稅田野清平樂晏眠寄題趙仲明霞坡亭雲石曾營霅水傍霞坡更出弁山陽東風桃李紅成陣晚照桑榆緑作行落筆時時争吐燄浴丹夜夜共浮光書來特詫新亭好飛佩何當與頡頏送傅士開搃管之饒州留衛行都已奏勲又驅五馬向江雲傅岩人合登台輔番國民方仰使君入篚南金無乏貢奠居陽鳥不驚群向來曽是咨詢地治績應須早上聞送孔用道都事之山東憲副聖師宫宇魯東方出使聞孫逺有光臺上霜華随馬白庭前檜色照人蒼惠文未必妨吾道衣繡從來羡故鄉獨恨此時知已别素心千里重相忘至大庚戌黄君晉卿客杭與鄧善之翰林黄松瀑尊師儒魯山上人㑹集賦詩今至正辛已晉卿提舉儒學與張伯雨尊師髙麗式上人㑹再和前詩上人至京以卷相示因寫往年所和重賦一章後先人物一時雄心迹寜須較異同來此清談散花雨依然舊夢聽松風畫圖長共湖山在劫火頻驚殿閣空萬里忽逢東海客前詩重寫思何窮十二月廿四日至廿八日崇文閣下試諸生和仲舉韻黄昏庭樹亂烏號門外紛紛散白袍巻地風來華燭滅半空月上井欄髙氷花著硯凝寒玉茶乳翻瓶響夜濤衰老強陪豪俊列不堪鄉思正如毛楊氏水北山房楊君水北山房住想見蕭然逺世紛茅屋秋風隕黄葉燕泥春雨涴𤣥文争傳圖畫京師看未羨聲名幕府聞我欲相從好兄弟釣槎吟石肯平分先天觀誰開岩障作仙家龍虎宫前路不賖珠現寳光懸黍米鼎分真火養丹砂玉笙夜度雲間鶴碧水春流洞口花欲問先天易中事希夷何處卧煙霞餘干張氏讓堂同居九世古稱義六世讓財今更敦終身不失一段地此族尤宜雙表門里中時有鳯凰集堂下春來花樹蕃所忻異時激頽俗我亦泰伯州來孫題曹士𢎞文後前蘭溪廵檢起家刀筆儒為吏隨世功名武換文爾輩安知良太史吾鄉猶説故将軍百年諸老零秋葉四尺孤坟黯暮雲頼有賢郎能競爽䞉将遺藁播清芬送雅勒呼正卿福建鹽運司同知奎閣清光趂翠華玉墀微歩響衝牙却逰萬里梅花雪又看三枝荔子霞國計從來資海鹵皇恩難得到天涯使君篇什多風雅先與疲民洗嘆嗟送毛道士歸先天觀身共閒雲暫出山就攜詩卷借人看不隨方士留燕土還與仙翁守漢壇花落鶯啼春日暮天空鶴去曙星寒瑶宫縹緲無由列别後從誰説弄丸城外見杏花曲江二十年前㑹囬首芳菲似夢中老去京華度寒食閒來野水看東風樹頭絳雪飛還白花外青天映更紅聞説琳宫更佳絶明朝攜酒訪城東王仁甫左丞宜閑閣試向宜閑亭上坐静觀物理笑勞勞風生秋樹停紈扇雨足春畦罷桔橰碧水自隨鷗泛逺白雲偏共鶴飛髙向來軒冕紛華夢此日全輕似羽毛題盧溝雨别圖送張道士盧溝橋邉栁色齊盧溝河畔草萋萋東風故吹靈雨送北闕為有天香攜飲闌水榭見花落路入煙村聞馬嘶後月歸來重經過五雲却望鳯城西南臺趙子威照磨母氏眉壽堂髙堂此日拜龎眉家慶相傳事更竒戯彩佳兒來栢府獻桃阿母下瑶池雲煙色動金花誥雨露香生玉樹枝儘釀中山千斛酒仙逰遐景正無期次韻柳侍制直院晚歸二首庭松吐燄引凌霄露井銀床凍不消雲霧窓深隔風日鳯凰聲集和簫韶書成給札分曹寫直罷攜香滿袖飄自昔詞臣宜白髮禮賢珍重此時招又卑飛無力到煙霄憂患侵凌壮氣消得食侏儒偏笑朔獻嘲弟子豈知韶天憐病月今年減雨送凉風昨夜飄無補明時合歸去山中休待故人招送孫生歸豐城十載成均尚褐衣論詩豈是賞音稀群英雜遝歌清廟獨客飄颻賦式微劍氣秋城遥入望書燈夜屋耿留輝白頭倚廣成何事囘首南雲亦合歸送掲生浩侍父南歸白首詞臣出帝畿翩翩之子一時歸夜光匣裡雙神劍春水船頭五彩衣胄學新功存簡册人生至樂在庭闈誰知惜别情偏切目斷江雲日暮飛元夕感懐天街叠鼓閙香車官舍荒園宿暝鴉不飲閑關宜謝客無眠對月轉思家三年元夕留京國六十衰翁感髩華江上春風後期在爛燒銀燭對梅花清明清明頻歲客天涯歸愛江南好物華煙煖人家插楊桞雨晴門巷掃桐花誰憐卧病春将過強起哦詩日又斜杏酪不須持餉我自燒新火試新茶五言絶句客有談獻玉絶絃事因賦二首荆璞寧非遇卞和猶識真識真不自保翻恨世無人又識趣全琴在賞音千載期朱絃何用絶自貴不求知贈王月屋相師三首威儀諒有則彩色寧非天開口問窮通紛紛事可憐又我貌不足數我心當烱然請君視此屋晴月光無邉又圭蓽四十年忽有萬里行㑹看憶君言一咲春風生謝氏友山圖二首逶迤漫相逐偃蹇自難親之子與為友此山能擇人又幼輿山岩姿安石丘壑情復見佳子弟使人増眼明嘉定黄氏瑞竹二首練川誇瑞竹黄氏見髙門富麗應如此時來豈有根又曽聞寇公竹插地竟成林勿謂彼非瑞清風猶至今雨竹圖千年舜妃淚一幅湘川雨掩卷不忍題余心正懐古畵兎孕靈廣寒府承寵中書署誰令秋水邉弄月凄風露贈内静子止水還能照死灰寜復然寄言内静者求静莫令偏促織圖監州貫子素徵賦華屋歌鍾夜何從識草蟲惟應苦吟者相對共秋風東津暮泊二首人家煙霧裡燈影樹林間撑空青突兀知是烏龍山又四山斂暝色百蟲沸哀聲夜乆月未出川光虚自明錢舜舉畵卷二首紅白芙蓉黄葵不向東風開酣霜拒秋冷紅白為誰妍自照滄浪影又秋露滴金杯秋風吹道衣陽光澹欲出相向獨依依讀左傳偶成勝母不可入栢人寜肯留胡為如死鳥更有在乾侯山川圖白雲映髙樹上有青青山不見幽人居應在空濛間淵明像靖節有髙趣沉冥非酒徒畵師寜識此偶出亦攜壺竹圖透石迸新芽清泉映涓翠姿妍競陽春朂哉歳寒意環翠亭萬山欝環合髙亭一振衣拂衣下山去帯将空翠歸鷺振振風生柳沾沾雪㸃磯白攅秋水立青映暮天飛蓮藕花葉圖玉雪竅玲瓏紛披緑映紅生生無限意只在苦心中溪山雪霽圖橋凍驅驢滑灘澌理棹難何如閉門者不識風雪寒正月六日離建德道中雜咏三首前年踏雪來今歲踏雪囘天知我􅇸空從以萬銀堆又深村出簫鼓草市亦燈火元夕約到家人人應候我又荒山與峻嶺千轉復萬盤巍然金華出使我心平寛畵松風霜不改色水石淡為隣祇合空山老豈知人世春題李盤泉卷山中百歲老曽見辟雍流懶説前朝事清泉照白頭小竹石圖千畆䕃渭川萬仞峩華嵩兩竿卷石間蕭蕭亦清風六言絶句水西道中鳴鳩林外葉宻眠犢沙頭草添春水石橋紅杏夕陽茅屋青帘仙居圖雲氣參差青嶂樹林飄緲飛樓誰識仙家歸路桃花流水漁舟江湖八境圖洞庭君山隠隠暮碧洞庭𣺌𣺌秋波羇客白頭懐古湘靈莫奏雲和武昌草生自識春洲月滿誰登夜樓寂寞漢人文賦蕭條進士風流廬山香爐峰看飛練棲賢峽聴奔雷三叠谷簾未識至今却悔歸來海門多景樓前狠石浮玉山下中泠長江天險安在北固煙光自青太湖雲樹煙波浩𣺌漁村橘里縈環想見三髙不死超然來往其間浙江兩山噴雪眩轉三道奔濤淼漫白塔故宫髙殿行人來倚闌干靈隠寺平地琮堆翠涌何人鬼刻神㑹有風雲震蕩再還前日飛岩西湖花柳空濛春霧蒲荷淡蕩秋暉水光山色長好舞榭歌臺易非題水竹小景二絶鐡樹霜藤崖壁藕花蒲葉汀洲更著蕭蕭水竹有人傲兀扁舟又脩篁煙景濃淡逺樹人家有無此日亂山深處喚回迷夢江湖題髙彦敬越山圖三首漁浦渡頭煙淡錢塘江上潮平呉越興亡何在青山長對人横又潮平風定日落雲白山青雨乾憶得晚秋天氣浙江亭上凭闌又西域有兹竒士東州無限佳山一幅西興漁浦風流千載人間山水小幅蒼嶂秋雲更白青林霜葉偏紅江南八月九月人在詩中畵中即事殘書長日茶思髙屋清風誦聲青荇池邊飲馬緑槐隂裡聴鶯禮部集卷八
