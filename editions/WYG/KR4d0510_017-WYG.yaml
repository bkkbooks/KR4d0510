body:
  text: 禮部集巻十七元吳師道撰題䟦羅隠甲乙集讒書後題右羅隠昭諫甲乙集上中下三卷讒書五巻淳熈中知新城縣楊思濟所刋者予嘗覧唐摭言載隠開平中累徴夕郎不起羅衮倅姚公使兩浙贈以詩有向夕便思青𤨏拜邁年尋伴赤松遊隠荅云云今集中無之按陳氏書録稱甲乙集十卷與此不同疑此非詳本又有集五卷湘南集三卷及淮海寓言今皆未見無所考也虚谷方公引方輿勝覧取杭州圖志謂隠光啓間為錢塘令辟掌書記為給事中遷發運使皆錢氏除擢而歐陽公吳越世家乃稱為鏐賔客以為疑愚考晁子正云隠舉進士不第從事諸鎮皆無合而歸錢鏐辟掌書記歴節度判官副使奏授司勲郎中梁祖以諌議大夫召不行魏愽羅紹威推為叔父表薦給事中卒㨿此則表薦為給事中乃紹威非鏐也而隠說鏐舉兵討梁正為鎮節度使判官時事方公皆不之考吳世家書隠為鏐賔客乃鏐未為節度使景福二年以前其辟掌書記必在後他志所傳豈足㨿以為信耶吁世之稱隠者類以為詩人見其所著亦不過以為不遇而憤世者耳而孰知其義不臣賊之意凛焉古烈士之風偉矣哉自羅𢎞信厚事全忠紹威既臣屬之全忠至以女妻其子紹威卒於開平四年給事中亦梁命也與諌議大夫之名何異而謂隠從之乎摭言所謂不起者得其實考其年嵗亦合可徴無疑愚故偹書二詩以附今甲乙集之後而著其説如此庶幾隠之志益以眀而世俗傳聞之謬識者必有所折𠂻矣東峯亭記後題馮宿拱之東陽人在唐有顯名韓公嘗與之論文則其文亦槩可知所作蘭溪縣靈隠寺東峯新亭記修辭清麗叙述有法釋乾覺亦住靈隠今為聖夀寺亭在其東偏舊置碑學宫背刻嘉定中朱吕二先生祠記盖亭廢乆矣石斷為二相傳趙氏子自負愽聞或以問之不能對怒撞之中殘缺凡五字今文粹本多異而義舛叅校以補其四他悉從碑定録焉獨邑宰洪君名士適當碑首行最下處字㓕非斷裂致然紹興時洪遵修東陽志已云無所考矣按蘭溪自唐咸亨置縣歴五季而宋凡數百年其間豈無賢令若拱之之稱洪君在當時為曹成王臯盧羣所知則其才其政信有過人者又託顯人之文以傳而竟無傳惜哉然洪君之名雖亡而實不冺則因馮文而著猶不亡也吾邦祀徳頌政之碑非無大書深刻顯列姓名者而顧無一人道之則其􅄑而存曾不若不􅄑而亡者之為美世之是非未嘗不公也而又豈繫其文哉使凡為吏者修其實而不務乎其名則碑之有無皆在所不論奈何具為之者之不已也吁盍亦因是而知所儆乎予又嘗攷郡志令洪君以下有張綢周顯徳中有陸光餘皆無紀近世壁記未亡時聞長老談其著者逺則舒邦弼汪文衡近則孫度高參不過數人是數百年間所稱道者僅止此可勝嘆哉因并記之以示来者趙彦衛補定安公紀後題江隂趙彦衛作西漢定安公紀補首書元年四年書䇿命孺子為定安公五年至十八年每嵗首書公在定安其說以為孺子雖㓜實係大統公在乾侯聖經可法意亦美矣愚按通鑑綱目於莽簒之年注新莽始建國元年盖從簒賊於統正統已絶之例意以孺子未立而廢不得以係統也按孺子嬰宣帝𤣥孫楚孝王孫廣戚侯顯子同漢之近親非若吕后取他姓子比矣太后臨朝稱制莽居攝踐阼改元居攝又改初始則孺子雖未正帝位固已為天下之君矣莽廢之而猶存莽㓕而復為漢若之何絶之哉又考序例云正統雖絶而故君尚存則追係正統之年而注其下唐武氏例是趙氏補紀殆類此但其書法則有可議者不稱居攝初始直云元年三年則失其實矣莽以平原安徳漯隂鬲元丘凡萬户為定安國而以大鴻臚府為公第居之則書公在定安亦為失實矣定安公乃莽所加號今既正莽之非豈得仍其號乎竊因而思以為綱目所書宜自初始二年下注新莽始建國元年初始三年以後下注莽年如前逓數而書孺子在京師仍其故稱恐庶幾得之或謂孺子初立時二嵗至莽㓕前一年已二十嵗尚得稱孺子乎且更始既立當仍係孺子之年乎抑㨿更始之年而注孺子之所在乎其後方望立嬰為帝而𤣥㓕之則書此又當若何曰孺子者㓜稚之通稱周成王一十三嵗嗣位二十而周公還政猶稱孺子王於此不足病也孺子係統盖欲正新莽簒竊之偽眀劉氏之未嘗絶耳諸將共立𤣥而𤣥遣兵誅莽其事自當係𤣥綱目以𤣥不成君注漢帝𤣥更始元年處之當矣方望事在光武建元元年其書今當云方望以前孺子嬰稱帝於臨涇𤣥遣兵擊斬望嬰并遇害云姚氏校注戰國䇿後題頃嵗予辨正鮑彪戰國䇿注讀吕子大事記引剡州姚宏知其非亦注是書攷近時諸家書録皆不載則世罕有蓄者近得於一舊士人家卷末載季文叔王覺孫朴劉敞語其自序云嘗得本於孫朴之子慤元祐初在館中取南豐曽鞏本叅以蘇頌錢藻劉敞所傳集賢院新本上標劉校字而姚又㑹粹諸本定之每篇有異及他書可正者悉注於下因高誘注間有増續簡質謹重深得古人論撰之意大與鮑氏率意竄改者不同又云訪得春秋後語不為無補盖晋孔衍所著者今尤不可得尚賴此而見其一二詎可廢耶考其書成於紹興丙寅而鮑注出丁邜實同時鮑能分次章條詳還注說讀者眩於浮文往往喜稱道之而姚氏殆絶無足恠也宏字令聲今題伯聲甫待制舜眀廷輝之子為刪定官忤秦檜死大理獄弟令威令憲則皆顯於時其人尤當傳也余所得本背紙有寳慶字已百年餘物時有碎爛處既㨿以校鮑誤因序其說於此異時當廣傳冩使學者猶及見前軰典則可仰可慕云宋高宗書東坡遊徑山詩濯字韵宋崇寕宣和時蘇學有禁今徳夀皇帝乃取其詩親書之一時好惡如此而廢興大故尤有足慨者矣山谷老人帖山谷老人贈筆工嚴永帖盖在戎州時公嘗手書煎茶賦云試嚴永筆即其人也此紙乃摹本後有杜氏綰印章綰字季陽仕至知英州其祖父與正獻公為兄弟綰好法書名畫見王洋字渤所為墓誌此其所摹者也黄公好書故筆工姓名往往見詩帖如允道寧吳希炤林為之張通軰可攷也夫善書之得佳筆猶良工之用利器應心順手是亦一快彼謂不擇筆而妍徤者豈通論哉他如蔡忠恵之紀諸葛漸蘇大忠之取吳政父子朱文公之稱蔡藻三公皆深於書故爾吁一技之精猶獲附賢者以不朽况其大者乎楊補之畵梅後有一紙書東坡詞贈彭筠青老清夷長者于書字學歐陽率更如睡壁軒記之類尚可見此大幅字氣韵淳古而蕭散兼之殆欲突過唐人以上尤可貴也彭青老亦安成名士與王盧溪民瞻軰遊寫梅書詞非一時盖後人所聮合梅之妙不待賛矣潜虚舊本後題某少好占筮等書嘗購得司馬公潜虚附以張敦實發微諸論者不知何人所刻其書完具無缺意為善本也又得里中孫氏冩本盖提刑公憲文故物紙背有梁充家為福建安撫使韓彦直知泉州時手書名當時往来書札也於是百五六十年矣特愛之甚見其文闕因以前本令學子補書之後數年讀朱子䟦張氏潜虚圖記所得范炳文别本首末乃知完本為贋書赧然流汗愧前日之輕率而増加猥雜不可削除以為大恨因與許君益之言之君遂出蔵本亦闕文者歸以叅校用朱子法非其舊者悉以朱圈别之仍前録䟦語於卷後以識愚之愧恨又以示兒軰俾之廣見聞慎取予而毋蹈予之失也按朱子所記行變觧之數此夲亦不合未有所考特命圖之後䟦語之前一條凡例二十六字注六字所謂命圖之關紐占法之變者此獨有之而許君本亦闕則此本豈范公所傳之舊歟因抄其二條以示許君而并記其說於此云云張敦實徽婺源人其鄉有刋本完書又聞昭武有艮齋謝氏所注釋未見家則堂詩巻後題士大夫當廢興存亡之際而能秉節守義歸㓗其身為清議所予其言論風㫖之存者人固望而寳之在宋之季則文天祥謝枋得之詩章與家公之春秋義説是也屏岩張先生在宋師時得公所冩贈書若干篇蔵家其子樞裒以為卷且推眀古昔行人之義以賛我朝待公之有禮而成其志是皆民彛世教之所關者予觀家公故宋大臣遭履艱險而制行卓然固不可及及張先生以太學諸生從主北遷例得拜官或因以致通顯先生顧以母老受鄉郡教授歸年四十既辭禄謝事從容去就亦無愧焉君子之所予以其類則家公之惓惓於先生也宜哉讀其詩想其時風覊雨紲飲泣相顧麥秀之歌其聲凄然使人悲而不禁也鍾儀之操越石之吟其志皎然使人悚而起立也吁其可以有所感也夫鮮于伯幾書贈弟桂手帖中原大儒遺山先生嘗云有神降一士人家降筆書云欲求聪眀先須積學欲求子孫先須積孝桂積孝矣學未致力也兄樞書欲求聪眀先須積學斯言是矣欲求子孫先須積孝是有為而為神言吾不取也夫知學者必知孝知孝而不知學先儒所謂無以考聖賢之成法識事理之當然而所行或出於私意政慮是爾鮮于公勉其弟以學學其可少哉馬氏家譜後䟦汴宋自建炎渡江中原士大夫多從而南今世易運殊且二百年子孫有存而能追記其先世者幾何人哉徽婺源有馬氏權氏掌氏魚氏之族或存或微馬氏有名臨翁者見予出其譜知為吏部員外郎直龍圖閣遵之裔遵子咸咸子修己修己子偲皆名臣至偲始南徙者也偲而下六世至臨翁皆於醫稱於鄉臨翁與予言能歴歴道其所治療及故家遺俗事使人慨然太息人之稱世家以宦以學以藝爾三者之中世學者最鮮世宦者或一再傳藝者再三傳則人以為難而馬氏之傳且八世矣禮不云乎醫不三世不服其藥况於八世者乎非其隂徳之積厚不至是也由臨翁而益培之繼者又未艾鮮于伯機自書樂府遺墨鮮于伯機父遺墨世方貴重此卷雖不着題識望而知其為真也樂府詞亦其所自作前二首道退居之趣恬淡閒雅有稼軒遺山風後無題一首規模香奩花間艶麗而媟非莊士所欲聞然古今詞人極意以為工者往往若是豈惟伯機父哉䟦輞川圖臨本後王右丞維輞川圖既屬之李趙公後傳南唐建業文房宣和譜已不復有世所見者往往臨本也今觀領軍趙侯孟威所蔵亦甚精絶可玩彼真蹟當何如耶予嘗論維文詞清雅風度高勝超然山水間疑非世之人矣而居位顯榮汗賊不能死適累是圖惜哉昔劉燾無言嘗以麗紙冩維詩并裴廸所賦謂裴在唐無聞而詩與維抗衡其人亦可以想見予謂廸之不嬰世故髙蹈自全賢於維矣因覧是圖竊倣劉意冩附其後而評之如此若其筆扎之拙陋固不逮則非計也定武蘭亭䟦友人示余禊帖云得之天台故家紙墨甚古末多宋賢題識鍳者謂定武本無疑予嘗記昔人言定武本所始或以為宋景文得諸伶人孟水清或以為韓忠獻求於李學䆒李别刻本獻後宋公始購得之其說不同而咸謂出慶厯以来今此巻題天聖丙寅重装則尤出其前以為留民間時所傳則湍右字雖糢糊而帯流天字殘缺乃薛紹彭所鑱者不應在前也觀范文正公題云才翁東齋圖書嘗盡覧焉才翁當是蘓舜年不眀指禊帖後諸公皆然竊意此必他有所指而洪公景盧䟦語乃眀為是帖發耳嵗乆散逸竄錯不可稽恐覧者或因是致疑於善本故表而著之王魯齋先生父仙都公澣所書碩畫後題古人之用天下其考視成敗得失毫髪不差而圖畫之方設施之序未嘗不豫定於胷中不然則不能以有成矣魯齋先生之父仙都公嘗手書武侯見先主下至冦莱公出師澶淵八九條名之曰碩畫皆南北分隔之時攻取制勝之䇿公自有所見非後學所能識也嘗聞魯齋早慕武侯熟窺天下之勢議因蜀取秦以俯拾中原今此畫首武侯是亦家庭講聞之一騐惜乎其俱不得試也所謂攷觀而定素者徒見於此而已楊雄諫止單於朝書有石畫字鄧展云石大也則與碩通公當是取此仙都公所與子書時魯齋方七嵗魯齋先生之學世有自来矣先生大父崇政講書直煥章閣致仕諱師愈師事龜山楊公後又從朱張吕三公遊朱子誌墓稱其有本有文者也父朝奉郎主管仙都觀諱澣執經朱吕之門克世其學此其所與子書莫非小學書少儀外傅之㫖也先生生慶元丁巳嘉定辛未甫及大學之年而仙都公卒所謂未及聞詩禮之訓者指此也先生負才偉少即欲以天下用其身年逾三十始知家學授受之原一日讀論語居處恭執事敬而有警歴扣考亭門第卒得北山為之師焉夫其養蒙於􅆂濡之素而就正於一變之餘則賢父兄嚴師友之功豈可少哉輙因是帖妄論先生徳業之所以成庶幾學者知所慕效云爾潘黙成醒醉帖黙成先生乞酒真蹟戒酒文墨本葉君審言合為一卷題之醒醉帖予讀之其乞酒也以杜門養痾他無所需惟醉鄉之為快其戒酒也以病渇由酒故悟千金方之言暫止千日夫酒能蠲痾亦能致疾先生之或飲或止皆以病故盖攝生之宜也若其懼定力之不固而矢詞於聞思大士則異乎吾儒者爾黄太史作發願文痛戒酒肉後復食飲如故二公此事正同夫制欲而不累乎物雖佛學無不與吾同彼其心所無住而弊至於自恣吾之心有所主而動必適宜宜飲而知節二公之不滯於一固儒者之常也吾觀子朱子之於黄公亟稱其孝友之美而於公則以剛而慾者當之二公之師表百世者在此而不在彼也鄭北山墓誌銘䟦何耕道夫撰北山何基篆葉閶天啓書甲戌乙亥間某杜門深居日無所為則取家所蔵鄉先生遺文逸事裒集之名敬鄉録苐聞見單寡未敢旁及間以詢之友朋而許君益之手録北山鄭公行實以来尚恨未見全集及誌銘之屬時葉君審言寓坦溪實公裔孫家詢之得墓銘遺事雪竹賦卷再拜伏讀益知公之詳惟吾邦人物挺出建炎紹興間忠義威畧則宗簡宗公文學氣節則黙成潘公而公扞圉勤勞志在恢復當時並稱宗如老虎之當北鄭如伏熊之臨西公平生與潘雅契立朝不主和議亦合至於卒忤檜相竄斥以死其受禍尤甚若公者參於二公之間不亦偉乎英風遺烈炤映鄉井後生小子仰之猶足以矯然有立也某既取雪竹賦諫和議救胡邦衡二書及他詩文入録中而又反覆此篇於其銘文之感慨題義之竒古楷法之精嚴見諸公之風誼又讀公之子良嗣乞銘之書至情懇切亦交有發焉豈非平生大􅄑哉既以歸之坦溪談闕姑識嵗月於後北山感雪竹賦後題士君子以平生之志發為一時之言而一時之言或為終身之符若北山鄭公所作感雪竹賦也而方其比物發興引以自道異時奮㧞於困厄之餘不屈於摧折之際往往如之夫修身踐言之死弗變固有志者之事而辭氣威儀所以定命者其理亦微矣昔王沂公賦雪梅雪中未問和羮事先向百花頭上開果踐魁台韓魏公賦雪老枝擎重卒荷大任今鄭公雪竹前後輝映三公者皆宋之偉人也吁亦異哉蘓文忠公雜書小冊右蘓文忠公雜書一小冊文定公題識二十八字冊本抄黄石公素書及占相等法題乙夘嵗寳元元年文忠纔二嵗文定始生乙當作己誤也此公早年所嘗繙閲往往因餘紙信手肆筆縱横斜正間見錯出如道徳經文杜韋韓公詩章及雜事古語雖無倫次而皆可諷誦又作人物面目㯶樹水波㳺戯妍巧悉有思致後来書畵之妙已見於此擬對制䇿稿論列時事十數條按公嘉祐六年所對䇿首用此文而下移一叚以為結語中間如勤政御臣制敵用人阜財消變之方皆與此合盖當時天下之事其要有幾惟眀者所見畧同而言必出此有以見公之偉識非區區揣摩套括者比也至若弟懐其兄而書之前凡懐其弟而書其後追計嵗月感嘆離合使人惻怛之心悠然而生豈徒好云乎哉文定公長子湧泉少傅僑居婺其家寳蔵此册裔孫某出以示余三百年物手澤如新風規可仰既欣􅄑寓目因叙梗槩以識而歸之于介翁詩選後題于介翁先生名石因所居鄉自號紫巖徙城中復兩溪之號貌古氣剛喜談諧早慕杜氏五高之為人後師王定庵業詞賦接聞諸老緒論故其學多所通觧自負甚高世變後一意於詩出入諸家豪宕激發氣骨蒼勁望而知其為山林曠士一時吾鄉言詩者皆莫及也愚年十二三時從之遊㑹以故舍去後數嵗見愚所作輙曰是子當不下人向之不能卒業彼此交以為恨而稱道誘掖惓惓不怠猶有古人之風焉未幾死矣平生刋稿七卷其子以板借人為所匿餘篇或購以錢乆將妄為己作薄甚可嘆也予暇日因即其傳本及所藏續抄者選之為三卷雖愧力之未能廣其傳庶幾寫録散布不遂冺沒俾掠美盗名者有所警九原有知亦足慰矣舊見金華山賦及樂府櫽括出師表等作先生自以為得意者今皆無所考姑伺訪求又嘗得仁山金先生所為集序當時不列於編豈所見有不同歟然其歴叙山川人物而歸重期待之意亦不為薄特温雅之評似未切爾并附於後以示覧者云題程敬叔讀書工程後某頃年在宣城見人談四書集註批㸃本亟稱黄勉齋因語之曰此書出吾金華子知之乎其人咈然怒而不復問也盖自東莱吕成公用工諸書㸃正句讀加以標抹後儒因之北山何先生基子恭魯齋王先生栢㑹之俱用其法北山師勉齋魯齋師北山其學則勉齋學也二公所標㸃不止於四書而四書為顯魯齋自早嵗迄晚年又不一令視北山尤詳學者所傳多魯齋本也仁山金履祥吉父並游何王之門導江張䇓逹善則魯齋髙弟其學行於北方故魯齋之名因導江而益著金張亦皆有所㸃書其淵源有自来矣四眀程君敬叔著讀書工程以教學者舉批㸃四書例正魯齋所定引列於編首者而亦誤以為勉齋母乃惑於傳聞而未之察歟竊觀程君叙所見書如何某四發揮發揮不止於四王氏正始音金氏尚書表注四書䟽義考証金止有大學䟽義論孟考証末記魯齋以天台陳茂卿夙興夜寐箴上蔡書堂諸生并其手書則於吾鄉諸公之學尊信深至凡其言論風㫖固所樂聞而惜無以告之者某晚生知慕鄉學痛緒論之浸微惜遺書之多喪比年尋訪考求間獲一二所恨未識程君倘各出所有以相叅訂而求其用於心則往者有知亦忻於異世之有同於我者矣故姑於是編之後以致予意云魯齋亦有類聚朱子讀書法一叚在上蔡院講義中陳氏鳯髓集後題詩集句起近代往往采拾諸家而間一為之未有尋取一家之作而用之全編者也文文山在羈囚中始専集杜陵詩以發己意咸謂創見今觀九華陳氏鳯髓集則知前乎已有此矣夫杜陵之詩浩愽深宏􅆂蓄萬象巨細無不有而於古今之治亂得失人情之舒慘戚忻亦莫不散布畢陳斯人乃能融液貫穿排比聮合大篇短章詞從句順宛然天成積至數百首之多既免夫鴻鵠家雞之嘲而自謂得鳯髓膠絃之妙其用心不既専且勤乎夫良工之機錦經緯錯綜順而成章者固粲然可觀若夫剪綴百衲横斜曲直紋縷相值不差毫分要非極天下之至巧者不能也陳君名巖字民瞻自序在宋淳祐中今且百年而未傳於世景徳上人宗公出以示予俾題其後故為論之如此嗚呼文章在天地間其變無窮不可測知當杜陵有作時豈預為後人設哉由今而後凡前世諸大家皆可倣此而為之推其端原必自陳君君亦足以為不朽矣因閱縉雲馮時行集有䟦楊序之草堂集句知昔人亦有為此者多不傳耳讀易雜記後題學者類喜言易今世尤甚愚不知其何説也自漢魏以来王輔嗣之說单行雖未盡善而數百年實宗之至宋而邵子闡伏羲之秘程子衍周孔之文朱子又發眀易専為卜筮作融㑹義理象數之㫖說者無以復加矣所宜虚心潜玩以求聖賢之心不當横生己意喜新好竒穿鑿破碎務以求多為也其有名為祖程朱而誇多騁愽援引茸襍自相矛盾不之顧又有摭前人之所已言以為已出架屋下之屋不相為嫌若是者盖不勝其紛紛焉果何益於易哉某讀是經有年頗厭衆說乙亥丙子之嵗来池建徳陸走道逺不能多負書獨取古易吕氏音訓程傳仁山金氏標㸃者朱本義北山何氏啓蒙大傳二發揮魯齋王氏諸圖論自隨與兒軰說讀懼汨亂也既而番易新安友人摹記鶴山魏公集義平庵項氏玩辭及近時纂集者數家集義自周程諸門人下及朱吕淵源所自可以叅觀但其取漢上朱氏以偹象數一家未免蕪雜項氏說多精善其餘家類皆擇弗精語弗得以此較彼是非瞭然矣竊不自揆管窺之愚時亦有之因記於篇將就正於有道非敢言易也且俾兒軰知守正途而毋忘鄉老先生之所以導啓我者則其於易學盖庶幾焉朝峯亭詩䟦右朝峯亭詩梅公聖俞為建徳縣令時所作也後三百餘年予来是邦求其故迹則堙沒乆矣問之遺老言亭在山絶頂上前對玉峯故名及考宛陵詩則云亭去公署二十歩較今所指處似逺豈向来公署非止此耶又云四山回抱如朝揖之勢則非因對玉峯而名俚傳何可信也詩言四時景趣形容曲盡周環溪山風物宛然如故獨其地荆棘彌望牛羊交跡林木之盛無有而所謂民訟日稀終嵗探賞今又豈有此樂耶余既營梅公亭而朝峯猶有所未暇以俟後人因嘆是邦文物之陋凡公題咏無有道其片言隻字者乃取中池州之後詩悉書以遺邑人而以是作附刻於亭記之背且命沿山雜植花木幸毋毁傷數十年後盡復舊觀賢大夫退食之餘徜徉曳杖登臨賦咏以追梅公之樂則予雖不及見亦不足恨也梁昭眀太子書隠山寺榜碑䟦建徳縣隠山寺有梁昭眀太子書榜隠山之寺四大字昭眀性愛山水嘗至池往往有遺跡處或亦渉縣境中此書傳是其親作餘八百年而宛然獨存亦異矣宋崇寧褒村有牌墨猶存之語宣和二年尉張畀摹本以刻於郡城西廟中淳熈守袁說友又取真跡龕置神殿側其崇敬如此所傳信不誣矣某丙子秋視旱抵寺訪尋在東廡室隅塵土翳蝕徙以出拂拭諦觀嘆其筆勢雄秀莊重因語僧某曰此何惜一石而不為永乆計耶間稍剥落俾模池廟中石本叅訂刻之庶幾完善眀年春以賑飢復至已買石礱治未幾視則石斷為二不可用矣仍語某毋以是懈當决成之又眀年六月某来告曰前之月寺傍溪水暴溢岸崩出一巨石高七尺許濶幾半碑製具而無文容字位置且有餘殆神眀之靈隂有以相之發端實自公願紀其槩某欣然為書使并刻於下方云是嵗為至元重紀之四年龍集戊寅九月壬戌朔越幾日具官吳某題建徳縣學産碑䟦建徳縣學産碑延祐丙辰教諭程端禮所立也天歴己巳燬於火他無册籍於是人利為欺隠匿竄易之弊起乆將不可勝言矣某来訪求模本閱嵗始得之乃伐石重刋躬自叅校悉如其舊庶幾前人用心之勤不致冺沒繼今有所案㨿稽考而奸欺之徒不得逞志則其於學校亦不為無補焉䟦山谷草書船子和尚漁父詞漁父詞始於𤣥真子青箬緑蓑一首山谷老人櫽括為樂府詞船子和尚夜静水寒之偈亦以樂府歌之盖其所甚愛也此十五首世多未見蕭散閒澹中時寓深意與偈句同一機軸而老人書法竒逸又足以發之盖衿韵既高落筆自勝世之用志於詞翰者覧此可以有省矣䟦葉審言所藏晋唐石刻梅花蘭亭婺倅㕔本石初裂三叚後為五此正五叚石本前軰稱其有定武典刑者也獻之保母帖所謂黄門岡在今㑹稽城外十餘里禹穴天柱之間其文固有望於後人之無傷而曲水小硯并出人間豈字畫實為之累耶虞永興書汝南公主銘當是他帖中剟取者元魯山銘李華作顔公書此乃别幅小字不知何人王懐瓉銘亦不可攷五紙皆精善而其二出吾里梅花石今不復有王刻猶在晋唐風規未逺後生新學其尚知葉君裒萃之意哉䟦宋賢手帖歐公書稱甲科得人不獨朝廷得賢亦使學古者勉勵此真大人君子識治者之言吳傳朋為友營僻闕且憐其乆閑已不能少展力足以見逹官顯人念舊之誼蘓養直從人覔香求白蒲桃本託置金竹簡紙獨卧粗氊雖事渉𤨏細自是詩人隠士一種風致皆可敬可喜而况於翰墨之清麗交映互發乎蕭懿祠堂斷碑䟦蕭懿衍之親兄而心跡不同懿忠而衍簒也事具史傳眀甚而山隂陸游引伯叔文叔同起為比謂大蕭齎恨死不及見梁之興何其誤也吾友張子長為論紏正之使陸氏復生亦當無辭以辨廟碑立於漢中者盖懿以永眀末為梁南秦二州刺史加督魏軍入漢中圍南鄭懿拒擊觧圍遁去又追逐氏師楊元秀取魏六城邉境以寧嘗有功兹地故爾是碑宋乾道中始為趙彦愽所知遂傳於世彦愽字富文為吏精敏有聲其餘力亦及此按碑稱皇太子臣綱奉勑撰下不著書者氏名或在殘缺後叚今彦愽直云簡文書豈别有㨿乎考古實事要不可不謹也第五行海内字下有浩浩二字似亦非原文覧者詳之䟦汪元思固窮集及所録朱吕二先生詩帖大愚吕忠公謫廬陵獨善汪公裂裳褁足送之後徙卒髙安其弟約叟輟試往䕶其喪凡弟遂以義聞士大夫間昔徐晦之不負楊臨賀巢谷之逺從二蘓公黄太史沒宜州有永州唐生者為經紀後事収拾遺文特立獨行之士風聲意氣信不間斷也獨善之孫元思力學忍貧自為貧約十條指心以誓其友胡潜類聚聖賢處貧言行為固窮集貽之元思以貧約附焉質於北山何先生愈勵其操卒死於窮嗚呼好義者民之天而固窮者士之節夫能忼慨赴人急難不為威武勢熖屈者始有以固其窮而委靡恇怯苟慕富貴者必不能見義以勇為固窮之善殆有得於獨善之窮汪氏兄弟祖孫是或一道也葉君審言家蔵元思固窮集因録朱吕所與獨善詩帖約叟髙安行程厯中哭大愚詩并何王諸公稱賛之語萃為一帙某既竊嘆復推說以附於諸老之後云獨善名大度字時法約叟名大章元思名開之題家藏淵眀集後予家淵眀集十卷第三卷首有題云淵眀晋所作者皆題年號入宋所作但題甲乙而已意者恥事二姓故以異之思悅攷淵眀之詩有題甲子者始庚子距丙辰凡十七年間只九首耳皆晋安帝時所作也中有乙巳嵗三月為建威叅軍使都經錢溪作此年秋乃為彭澤令在官八十餘日即觧印綬賦歸去来􅀆後一十六年庚申晋禅宋恭帝元熈二年也蕭得施作傳曰自宋高祖王業漸隆不復肯仕於淵眀之出處得其實矣寧容晋未禅宋前二十載輙恥事二姓所作詩但題以甲子而自取異哉矧詩中有無標晋年號者其所記甲子盖偶記一時之事耳後人類而次之亦非淵眀意也世之好事者多尚舊說今因詳校故書第三卷首以眀五臣之失且袪来者之惑焉愚按陳振孫伯玉亦云有治平三年思悅題思悅者不知何人今未有考但其所論甚當而有未盡考宋書南史皆云自宋高祖王業漸隆不復肯仕所著文章皆題其年月義熈以前眀書晋氏年號自永初以来唯云甲子而已李善著文選淵眀始作鎮軍叅軍經曲阿下題引宋書云云盖自沈約李延夀皆然李善亦引之不獨五臣誤也今考淵眀文惟祭程氏妹文書義熈三年祭從弟敬逺文則云嵗在辛亥節惟仲秋自祭文則曰嵗惟丁邜律中無射惟丁邜在宋元嘉四年辛亥亦在安帝時則所謂一時偶記者信乎得之矣本傳江州刺史王宏欲識之不能致潜游廬山宏令其故人龎通之買酒具半道栗里邀之集中荅龎叅軍四言五言各一首皆叙隣曲契好眀是此人又有怨詩示龎主簿者即叅軍耶半道栗里亦可証移家之事陳氏書録稱吳仁傑斗南有年譜張縯季長有辨証俟見而并考之耳湯伯紀注陶淵眀述酒詩定為庾辭隠語盖恭帝哀詩發千古之未發諸公皆韙之其中難觧亦不敢决得存疑之意愚嘗有一二管見補之重離照南陸鳴鳥聲相聞秋草雖未黄融風乆已分素礫晶脩渚南岳無餘雲湯注司馬氏出重黎之後此言晋室南渡國雖未亡而勢之分崩乆矣至於今則典午之氣數遂盡也素礫未詳修渚疑指江陵愚謂以離為黎則是陶公故託其字以相亂離南也午也重離典午再造也止作晋南渡說自通書我則鳴鳥不聞陶正用此鳥指鳯凰此謂南渡之初一時諸侯猶盛也礫小石其樂夫天也吾於陶公亦云湯公因釋述酒詩遂及諸篇直以暴其心曲故不汎論甚簡而精愚讀之偶有所見附著於後云贈長沙公族祖云同源分流人異世殊慨然寤嘆念兹厥初孔服遂攸嵗月眇徂感彼行路眷然躊躇云云蘇眀允族譜引一篇之意不出此數語命子詩末句亦已焉哉鄭康成誡子書末曰若忽忘不識亦已焉哉公正用此意陸放翁筆記云爾歸鳥四章一章和風二章接清句下三章日夕氣清四章寒條具四時意歸田園居第一首狗吠深巷中鷄鳴桑樹顛古鷄鳴行鷄鳴高樹顛狗吠深巷中陶公全用其語第三篇種豆南山下草盛豆苖稀本楊惲書意五桞先生傳短褐穿結簞瓢屢空始作鎮軍叅軍經曲阿被褐欣自得屢空嘗宴如自何晏注論語以空為虚無意本莊子前儒多從之朱子以回賜屢空貨殖對言故以空匱釋之今此多被褐對屢空又飲酒第十二首顔生稱為仁榮公言有道屢空不獲年長飢至於老以屢空對長飢朱子之意正與之合還舊居詩疇昔家上京按上京在今南康郡城外十里栗里原去郡一舍則公嘗徙於此前有移家詩居不一處也擬古第二首聞有田子泰節義為士雄田疇字子泰北平無終人又按疇始從劉虞虞為公孫瓉所害誓言報仇卒不能踐而從曹操討烏丸節義亦不足稱陶公亦是習聞世俗所尊慕爾第三首仲春遘時雨始雷發東隅衆蟄各潜駭草木縱横舒翩翩新来燕雙雙入我廬先巢故尚在相將還舊居自從分别来門庭日荒蕪我心固匪石君情定何如託言有不肯背棄之義雜詩第二首日月擲人去有志不獲騁陶公之志非他忠憤而已念此懐悲棲終曉不能静此與述酒篇流泪抱中嘆傾耳聼司晨之意同也讀山海經第一首遶屋樹扶蘓湯注扶踈本太𤣥愚按燕剌王傳劉向封事皆有此語在揚雄前第十首刑天舞干戚他本誤作形夭無千嵗曽紘伯容為辨正之桃花源記并詩洪景盧云後人因陶公記詩不過稱賛仙家之樂唯韓公有渺茫寧知偽與真云云不及所以作記之意竊意桃源之事以避秦為言至云無論魏晋乃寓意劉裕托之於秦爾胡仁仲詩云靖節先生絶世人奈何記偽不考真先生高歩窘末代雅志不肯為秦民故作斯文寫出意要似寰海離風塵斯說得之愚早嵗有題桃源圖云云頗與此意相發故録以俟徐文清公手書襍稿後題右故宋侍讀文清公毅齋先生徐公手書襍稿一册起乙酉止壬辰之所著也公起家諸生踐歴中外以亮直敢言著聲嘉定中提舉江東常平茶鹽上書忤時相劾罷歸乙酉當理宗即位寳慶之初鄉人葛樞宻容父喬侍郎夀朋代為請祠紹定戊子力乞休致又眀年庚寅命下端平被召晋擢中秘奉常手䟽數千言極陳時弊侍讀經帷開陳友愛之道用是復濟邸主爵請廢王安石從祀祀周程張朱請以趙忠定侑食茂陵北使至無國書請館之於外如晉叔向辭鄭故事又忤時相皆關係之大者一時儔俊傅景初楊敬仲柴與之趙昌父劉平國陳師復共薦慎景元魏華甫袁廣微同列今猶誇詡誦傳也盖自公之居閑十五六年此册所載始終八年優游休退自警者凛凛甚嚴而於親友之慶弔問祭燕集往来悃欵真誠風流篤厚至於暄凉晴雨之候卉木禽獸之情狀宻察深省託興寓懐而無一言一事之不出於正盖其學問侍養不怠於閑暇之時故風節議論彌篤於晚暮之後於此可攷矣公早受業鄉先生大冶主簿葉君子應後乃從朱子游簿君實東萊門人前修既逺緒論寖微晚學之所深恨間嘗扣之簿君曽孫審言得公雜説一卷手帖一通今復見此肅乎挹公之清風藹乎接公之仁言起畏起敬懦立鄙消不勝其降嘆也謹書其後而始歸之耳禮部集卷十七
