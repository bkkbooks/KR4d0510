body:
  text: 禮部集卷七元吳師道撰律詩七言八陣圖慘淡風雲舊指麾濤聲洶湧尚含悲握竒智在人誰識長嘯神遊石不移天下竒才司馬嘆江流遺恨杜陵詩當時萬事皆天意三酹英雄誦出師寄友聚散悠悠水上萍相思千里夢魂驚門扄白日閒花落愁入春風芳草生天北雲遥囬雁影江南春盡老鵑聲飄零王粲今何處想見登樓此日情送林初心溪上開樽洗客塵千篇髙咏句清新春風冠盖英雄夢夜雨江湖老大身萬里燕山馳壮氣十年吳國起閒人來時須得文章力去看薇花紫禁春游仙居南峰并序大德十年秋余來仙居聞南峯為登臨佳處而未之識至是偕邑人往焉山去郭數里而近仰見白塔立雲表踏落葉縁嶺上空曠極目無際逹興道寺章安尊者道場近時邑士吳君直軒講授寓焉右偏小軒為臨眺之所羣峰拱環一水囬互寒暉清氣蕩溢心目平沙逺村煙樹魚鳥如墮瀟湘圖畵中視軒扁藍光大字瘦硬可愛梁間題郭三益楊宗山劉明府陳古靈先生詩在旁有近人登髙懐古詞亦悲壮時衆客互觴喧嘩余獨操片紙吮筆視佳者記之癖好類如此客有導余循東廡拂塵壁讀陳仁玉擬騷詞陳風流文翰有名喜觴咏山水間甞視軒前小阜營葬穴今其後業不復葬悉為勢家有客感舊故嘆息不已余亦愴然既而曰人生良會開口一笑不易得今古興廢事奚足介哉于是舉酒相属樂甚顧日欲暮半醉而罷余聞天下竒觀往往因文人勝士題咏發之今南峯溪山甚佳留題甚多古靈不可尚已如郭三益詩亦清麗惜乎傳誦者少而南峯之勝不得附之以題也兹逰不欲作詩客請為倚歌和之非求多之也庶将著其詩而廣傳好事者耳藍光軒外空煙輝鷺鷥石上寒風漪秋髙林薄衆葉脫日暮澗谷孤雲歸山空竹靜僧眠熟舟閑江清人渡稀慿髙把酒𣺌今古浩歌興逐征鴻飛赤壁圖沉沙㦸折怒濤秋殘壘蒼蒼戰鬬休風火千年消伯氣江山一幅掛清愁丈夫不學曹孟德生子當如孫仲謀機㑹難逢形勝在狂歌弔古謾悠悠溪亭夜宿閒亭來伴野雲棲剪剪東風冷客衣孤鶴有聲溪上啄落花無影月中飛愁銷緑髮三春過夢拂青山半夜歸混迹漁樵莫惆悵得時奴𨽻總輕肥和逯彦常留别落日平蕪轉晚暉西風殘葉􅄃秋飛江南煙水孤鴻冷冀北弓刀萬馬肥零落酒徒愁夜夢支離冷骨怯秋衣劇談之子聊相慰莫向青山又賦歸野中暮歸有懐野田蕭瑟草蟲吟墟落人稀慘欲隂白水西風羣碓急青林暮雨一燈深年豐稍變饑人色秋老誰憐倦客心酒禁未開詩侣散菊花時節自登臨送郭推官之吳興水精宫裡宦遊鄉聞道賔僚藹俊良清氣入懐生翰墨仁風到處洗桁楊深春柳色湖亭静落日蘋花客棹香我欲縱遊身未許夢思風物九廽腸水軒碎萍落落㸃清圓山影簷花不碍船荷柄倚闌髙似竹龜兒出浪小于錢敲針作釣凌風立叠石為床聼雨眠塵慮繞纒君自爾林塘何處不翛然寄葉審言并簡晉卿燕塵越水舊衿裾何事今年賦遂初肉食終還虎頭相身謀可復兎園書閉門深巷楊花滿送目停雲暮雨疎不見黄生今數月因君聊與問何如寄張子長落落長遭俗子憎别來懐抱向誰傾有時錯莫呼張丈無力吹嘘薦賈生叱石山中尋藥侣翫雲林下讀書聲知君亦有逍遥興肯與卑棲嘆不平次韻逰山石寺雲鎻幽源䕶隠丘君因逺棹適良遊江潭日炤魚龍野佛殿山空草木秋山竇泉香聊作供題詩僧去獨含愁肯將塵事妨清賞不盡登臨興不休次友人韻二首風埃飄泊望誰收勁氣盤盤狹九州鄭老有才翻得冷沈郎自瘦不縁秋芙蓉白鳥滄洲思蔓草荒庭落日愁客裡得錢那惜醉歸來𤓰芋熟西疇又膏火錐刀祗自焚莫将清氣一時分休文溪上多明月𢎞景山中有白雲詩思凌秋添勝語丹經參夜得竒聞飄颻物外何須恨漢世公卿貴少文送李僉憲行部之越天上神仙氣自清南行萬里識儀刑繡衣使者新持斧國子先生舊執經馬蹋秋原風獵獵雕盤霜浦日㝠㝠縱吟太白詩千首天姥雲門近眼青寄李坦之九𤨏三茅仙聖宫故人招隠幾時同青楓月落重江外翠袖天寒絶谷中文字相知惟我爾精神不隔漫西柬長安冠盖紛如數闕老誰憐賈與終和黄晉卿客杭見寄一從君客江城去詩思凄凉酒盞空天末倚樓孤岫雨春深閉户落花風半生正坐才名悞萬里誰憐意氣同坐憶王孫咏招隠萋萋草色向人濃又書問蕭條已半年知君近買過湖船江花日暮吹紅雪店樹春晴起緑煙客裡光隂遽如許人間岐路正茫然離羣得似游從樂紙貴錢塘日萬篇又翰林學士巴西彦天禄儒臣漢世雄一笑吟邊餘故老並遊方外亦清風呉天有象星應聚冀北成羣眼已空十載神交未相識卧淹幽谷恨羈窮喜雨髙隴深溝有剰泉風雷仍及望霓先凉思到骨甦中夜饑火燒腸洗積年上帝自仁寧為吏書生有喜豈須田東南米價明當賤擬辦狂遊萬里船寄蔣山長吳興博士荆溪上别去無書十載強浮世升沉堪一笑勝懐吟賞未相忘鯨翻寒日江湖白雁叫秋城草木黄猶有舊時詩卷在髙歌聊復慰凄凉贈王生嗜酒王郎復好吟紫髯如鐡氣蕭森歸㠶千里歲年晚破屋一氊風雪深痛飲廣文逢勁敵獨歌郢客見知音五雲東畔三峰路别後相思試一尋次方韶文三首婺女城頭掩半扉沈矦樓上領斜暉聴鴻前度同遊盡化鶴重來萬事非山水娯人真不惡文章驚世故多違何如有酒身長健竟月登臨莫便歸又倚空風穴瞰岩腰天與幽居物色饒玉女靈旂畨晝永石壇仙樹長春條百年遺老風流在千里浮雲夢寐遥我亦平生愛丘壑相從煮石㸑枯樵又昨嵗郎君一再臨坐成乆别思難禁雁囘衡岳夜雲白花落湘潭春水深縱覽山川誰似爾争雄文賦古猶今倚門莫怪歸來晚遊子終懐寸草心柬王仁境有客空齋嘆不歸鄉心二月亂于絲杏花深巷春風夢茅屋荒田夜雨詩天氣未佳宜小住人生行樂竟何時乞君安得千壺酒爛飲狂歌慰别離送許益之赴趙侍御招二首揚㠶千里載書琴此事光華喜見今青眼憐才真有道白雲出岫本無心校書燈火西齋静聴講衣冠北府深歲晚幽期良自保孤根未恨逺穹林又繡府烏臺峻碧霄金陵佳麗未蕭條詩書正氣屯諸彦花月殘歌笑六朝山倚石頭青入畵江吞天際白吹潮勝逰健筆追雄渾為寄林間慰寂寥送人之台州六月征途盍小休振衣遄過海東頭半空霞赤山初曙絶頂夜凉江正秋詞翰清妍應有助簡書容與定無愁升沉一笑幽期逺肯向滄浪寄野鷗送吳閑閑真人還山壽親二首翠㽔芝盖襲靈芬名在鈞天四海聞重見盖公隆漢室由來番國入呉君三秋勝日雙親壽一沼清逰萬里雲肯詫光榮動閭井祇將忠孝荅殷勤又天恩親許拜慈顔飛鳯銜書逐珮環江上白雲秋近舎人間紫氣曉浮關木公金母齊髙筭芝草琅玕滿故山千載楚萊芳躅在羽衣交映彩衣斑答蔣春卿見寄韻雲錦衣裳侈貝璣娟娟秋水隔相思書來南國魚千里愁入西風柳萬絲乆别忽驚詩句好重親未覺髩毛衰多君世外殷勤意古道寧論俗子疑客杭九日别柳道傳黄晉卿出飲江頭陳氏樓客雜甚二首薄隂江日淡暉暉殘葉隨風上下飛陌上呉兒應競賞天涯陶令正思歸秋花廢苑連金刹晚樹平湖出翠微千古興亡竟何極不須登覽重沾衣又黄菊開時酒價亷晚聲沙市簇青帘不堪衣袂猶為客偶上樓頭試捲簾良友相逢還易别老兵對飲且無嫌西風放棹龍山去何必疎狂脱帽簷送孫伯芳致意姚子敬下帷閉閣想無羣落落經時一過君俚耳誰能知白雪閒身那得似浮雲憂來意緒迷詹尹别去緘題憶右軍歸見西州里名士為言吾甚敬斯文讀唐末史事黄屋漂摇劍㦸圍草荒城闕淚沾衣空吟陌上行人去誰救山頭凍雀飛計失廷臣無逺略途窮天歩縂危機晉陽一旅開洪業落落關河滿夕暉送友人之關西相逢未乆復相違疋馬西行壮氣馳弧矢四方男子志煙花三月故人思秦山渭水金城國漢闕唐陵野草碑萬里兹逰何可絶閉門笑我白生髭京城寒食雨中呈桞道傳呉立夫春深不見試輕衫風土殊鄉客未諳蠟燭青煙出天上杏花疎雨似江南松楸昨夜頻來夢樽爼何人可與談閉户不知佳節過清泥滿道没征驂三月二日麗正門書事萬騎遥聞發上林内前車馬去駸駸風囘輦路香煙合雨映龍樓柳色深淮卒屢呼驚過客伶官凝望促華音修門此日逢佳令咫尺清光倘炤臨恩榮宴聖主龍飛第一春造廷多士際昌辰墨痕金榜雲煙濕花艶瓊林雨露新千載文明開至治九天恩重愧微身輕肥不逐時人夢誓守平生一念真送劉縣丞之官寳應人言淮俗稍真淳君去扁舟早問津鐘鼓京城五更夢劉居鍾鼓樓前弦歌沙市萬家春名城尚記唐年古作吏當如漢世循同是青衫更鄰壤後來還許望音塵送陳鍊師歸越楓葉橋邊一振衣瓊臺璇舘動光輝浮雲散盡青山在華表依然白鶴歸方外祇今猶有事人間何處可㤀機慶湖禹穴經過地且莫停舟訪落暉慶湖千秋觀禹穴告成觀今皆為寺送潘生歸天台二首昔遊曾擬上天關風雨窮秋路阻艱俗駕竟囬蒼嶺下夢魂長遶赤城間黄精仙樹年年長幽澗寒雲日日閒之子明朝却歸去愁今浩蕩杳難攀又陋巷蕭然可設羅比鄰祇怪數經過秋風海國芹初熟今雨柴門草更多心醉豈嫌無痛飲情親不恨有離歌故人憶我還相問耿耿應知未肯磨送𤓰爾佳知州陋邦寧足駐旌麾不待尋常報政期宫有藻芹歌未已囊無薏苡謗何為纍纍金印青雲在落落丹心白日知得意孱庸非所羨祇留遺愛使人思寄劉士明同知前望譙樓帯古城濯纓河畔水泠泠共分草徑臨門入最喜書聲隔屋聽官路馳驅足塵土人生聚合等雲萍琴清茗冷何時共直待秋風月滿庭校視水災扁舟為榻水為家竟日茫茫不見涯草際溝畦行佶曲風前几席坐敧斜官箴廹我寧無畏世事違人祇自嗟遥憶鄉山好兄弟登髙把酒對黄花題偰氏牡丹圖翠葉扶疎映綵霞天留飛蝶守單葩共驚冬樹移春艶須信人文表物華雒水千年重有譜長安一日更無花至今好事看圖畵誰似髙昌進士家送劉君錫宰興化誦詩三百政云何出應時需績已多要為朝廷陳雅頌先令井邑化弦歌淮鄉歲晏鴻安宅海岸雲横水息波喜報太平寛詔下早宣德澤趂陽和次韻九日卧看衡門落葉飛飽飡茸菊露香微潘郎有句休驚老陶令無錢合賦歸忤俗形容祇白眼娯人山水足清暉約君同上南岡頂長嘯秋風一振衣寄題感應夫人廟王仲逹州判先世王洲洲上舊家鄉貞烈千年儼未亡寧使丈夫專廟食應隨王母共仙粧暮雲冉冉靈旗杳社雨霏霏醴酒香定有天恩侈封秩聞孫朱紫看成行重贈王月屋相師編詩猶記十年間一笑春風萬里還老眼依然天上月青鞋未了浙東山自知生世非竒骨祇喜逢人不厚顔為問何時遂幽隠雲林相伴著柴關和劉謙甫二首時永福寺避暑茗甌詩卷代壺觴借卧僧坊百尺廊林下何人共蕭散世間無處覔清凉水花曉立净池月風磬晚傳幽殿香獨有閔時心未已夢思霖雨起賢良又毒日餘威尚鑠金秋期過半竟駸駸愁聞赤地呼天泣夢憶青燈付雨吟困頓吾生甘俛首紛紜世事只驚心褰衣髙咏紫芝曲何處雲林深復深時五月望後不雨至八月和呉教授韻二首客居未定復窮年人事多違一任天薄宦已貽髙士笑短才敢望達官憐簿書草草寒㕔底風雪蕭蕭瘦馬前自倚此心堪對越不須香火効精䖍又杜門飲水可忘饑半世迂踈已自知栗里園荒愁有夢敬亭山好愧無詩萬問誰肯容寒士五斗猶須向小兒囬首京華舊游處題名虚忝監中碑送陳汝錫録事歸湖南寄意楊梓人張幼擇二同年二首叅軍俛首困奔趨豪氣如君世所無餘子下風樓百尺嘉賔勝日酒千壺敬亭遊騎留題句湘水歸㠶入畵圖臺省翺翔真易事人生誰似彩衣娯又姓字慈恩忝後塵一官繼武復宣城仰驚健翮青霄去却笑疲駑峻坂行舉世安知吾道重與君相印此心清湘中舊友煩多謝春雁囬時始寄聲和芊希曽憲史韻二首髙歩青霄計未差征途祗暫走塵沙煙波江上吟芳草風雨城東看落花􅄃轡欲追千載士扣門肯向五侯家遥知齋閣清無事滿案殘書整復斜又平生忤俗苦無朋心事蕭然有髮僧作吏祇師三尺法讀書肯負十年燈空持璞玉嗟誰賞誤落樊籠去未能夢憶金華三月暮踏雲穿雨上崚層夏日田家和胡子仁韻小溪百曲帯山長五月田間始插秧桑燭風懸堕平地麥蛾雨化出空場村煙翳翳雞犬近茅屋蕭蕭竹樹凉疲馬奔忙祇自笑遥聞何處煑茶香和韓廷玉韻脩門咫尺足揚眉縱覽山川自好竒春水北溟鵾化早秋風南國雁來遲上林鉅鹿能㤀賦叠嶂蒼寒正入詩頼有同時賢掾史相知不負此心期送馬元博升察院書吏科目聯翩好弟兄十年早已到公卿飛烏又報臺端集神駿偏依冀北生江水帶城佳麗地春風著柳别離情升沉咫尺仙凡隔相念能無一寄聲和吳存吾題金華山鹿田寺金華峰頂前朝寺曽拂題詩古壁塵岩洞清逰如昨日雨雲寒夢共深春他人豈比余同姓異縣寧知此卜隣多謝聞孫意傾倒借書開鎻不嫌頻秋日登景德寺小閣開元水閣今何處此日登臨憶杜郎落木髙城秋浩蕩亂山平楚暮蒼茫前朝事往空遺跡倦客愁來只望鄉何似閒僧深閉户蕭蕭寒菊數叢黄游三天洞稽亭山下三天洞憶我金華物色同㧞地飛崖雲洶湧映空嵌穴樹葱蘢不知混沌何年鑿直恐神仙有路通終擬赤松歸隠去清遊還堕夢魂中中秋次同院人韻二首鳴騶雜遝欵庭中宴罷扶攜看醉翁禁鑰鎻深秋院月天香吹濕露華風終宵倚樹憐吳質何處登樓覔庾公挹取清光炤方寸此時分散莫匆匆又江右衣冠代不空况聞熈運日方中詩書有造興周學文賦多才侍漢宫願識龍光天下寳厭聴秋露草問蟲選掄此日陪諸彦淺薄慙無報稱功留李王河驛㑹括蒼友人斷港今猶説李王長江元不管興亡淮山終日空凝碧河柳經秋未隕黄多謝長風留過客相看好友話同鄉行歌拾取磯頭石攜袖歸來比夜光驛在池陽上七十里江邊小石通明可愛送楊志行待制赴北南士今誰列從臣喜聞新命掌絲綸中天日月開昌運當代文章屬偉人蓮炬正紅宫漏夜柳絲初緑御溝春平生經濟匡時畧獻納應須得細陳貢仲章學士挽詩鄧來相繼厭人間公又云亡我涕澘文采頓消南國士儀形空想北門班百年鄉夢應先覺萬里祠官竟不還悵望簫笳動哀曲湖風吹浪雪堆山九日病中東邵章甫令尹方公亮教授卧病深居斷往來鈎簾強看菊花開江山信美非吾土風日雖佳負此杯萬事心違将老矣四年客倦盍歸哉登樓援筆猶能賦眼底誰憐宋玉才謝别趙子威憲掾嵗晏蕭蕭雪擁門軒車肯顧病參軍非關知已無青眼自為懐鄉有白雲風采一時傾北府心期千里重斯文敬亭山好何堪戀獨恨相看却袂分中秋次劉經歴韻雲擁銀盤上海濤風吹金粟散江臯氣屯多士潮增壮塵净孤懐月共髙惜影來思尋夜枕分輝直欲到秋毫崇文堂上官壺酒記取今年與燕毛贈史亷甫棘闈重重深鎻關佳士一笑開心顔共看中秋浙江月却話西蜀峨眉山子抛簿書暫過適我困朱墨方未閑不辭題詩記良㑹他時相值青雲間彭子中從龍麟洲先生校文赴郾城教諭從師有樂世誰知縱覽詞場亦一竒雨閣湖山秋隠隠風簾燈燭夜遲遲升堂惟許彭宣侍薦士應無杜牧遺此去還聞郾城柝回頭須憶笑談時喜白髮劉師魯徵賦紛紛兒女政堪哀只恐流光髩底催百歲總為黔首誤幾人得插素標來敧風紗帽從吹頂簮雪花枝且照杯自許貞心比松栢不隨秋卉共凋摧再和鹿田寺呉存吾詩韻十年不到雲閒寺白石清泉笑俗塵壊壁詩存蒼蘚古空山鹿去野花春舊僧零落多歸塔刼火蕭踈近失隣好事主人能釀酒從今來往不辭頻題黄晉卿應奉上京紀行詩後居庸北上一千里供奉南歸十二詩紀實全依太史法懐親仍寫使臣悲牛羊野濶低風草龍虎臺髙樹羽旗竒絶兹遊陪禁從不才能勿愧棲遲寄貫子素監州二首妙年富貴復何如自愛名家萬卷書南紀尚開闕國東方不戀使君車滄洲野鶴同來往碧落閒雲共卷舒軒冕鼎來非分外素心祗喜未忘初又聞道今年入帝鄉扁舟春水下衡湘鄂公圖像淩煙閣坡老文章白玉堂俛仰應無慙世美經綸盍亦濟時康却思送别西湖雨後㑹重逢話更長送王廵簡丞相傳家笏尚多将軍横槊意如何踏花騕褭村無事送酒玲瓏座有歌白日萊衣動光彩青春槐樹長枝柯雙溪咫尺聆佳語未用離愁賦緑波禮部集卷七
