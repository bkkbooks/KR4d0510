body:
  text: 禮部集卷二十元吳師道撰文移請鄉學祠金仁山先生嘗聞有道德者没則祭于瞽宗今學有先賢之祠古遺意也若乃立德立言可法可師當今之所表章學者之所尊信既有其人未列于祠豈不為鄉邦之深恥學校之缺典乎竊見故仁山金先生諱履祥字吉父世蘭溪人少而好學有經世志凢天文地形禮樂刑法田乗兵謀隂陽律歴靡不博通長師魯齋王文憲公栢從登北山何文定公基之門北山實學于勉齋黄公而得朱子之傳者由是講貫愈精造詣益邃表裏誠篤神氣肅和舉進士一不利棄去以文義游諸公間嘗出竒策匡世為在位者所沮格宋季以廸功郎史館編校召已不及用隱居仁山下著書以淑後進大德中本道帥臣及部使者敦禮延致聽授講學翕然鄉方未幾而卒所著書表註大學章句疏義刋于婺江東憲司又刋疏義于宣學通鑑前編近蒙本道憲司命婺學刋行事聞臺府表上送官又有論孟集註考証傳學者文集藏于家先生道德無忝于前修論著有禆于後世列之祀典義叶古今雖一時之未遑豈公論之終冺况先生後嗣貧屢非欲藉是以庇身而某見義舉揚亦非托之以要譽如蒙轉聞有司祠之學宫非惟允愜多士之望抑亦不負風憲尊賢崇化之心學校幸甚代請立北山書院文欽聞聖朝興崇正學表章先儒盖以學術明則人心正儒道顯則風俗美是以上稽孔孟之傳下主程朱之𣲖設科則用其書秩祀則尊其爵至于門人高弟同源分流或抱道懐德以終身或著書立言而垂世故于學舍之外復有書院之置表厥宅里附之風聲夫惟設教廣而立賢多是以致治隆而興善速此我朝之盛典視前代為逺過也伏見故金華何基字恭生宋淳熈中躬禀異材夙有大志侍父宦游臨川勉齋黄公為令從而受學遂厭科舉之習博極聖賢之書確守師說不為空言玩索沉潛㴠養淳粹藴經綸之宏畧勵亷退之髙節隱居金華之山北學者尊為北山先生婺守趙汝騰延聘不就以名薦聞景定中與建人徐幾俱被擢命授以婺學校教授兼麗澤山長控辭不應咸淳初除史館校勘又除兼崇政殿説書辭之益力特改承務郎主管西岳廟亦不肯受誓老布衣作詩見志既殁錫謚文定平時不輕撰惟研䆒朱子之書四書章句集註悉加㸃抺有大學發揮十四卷中庸發揮八卷大傳發揮二卷啟蒙發揮二卷太極通書西銘發揮三卷行世已久誦習者多近思録發揮十四卷論孟發揮未脱藁文集十卷藏于家採輯精嚴開示明切寔朱學之津梁聖途之標的也同時魯齋王先生栢寔出其門傳之導江張䇓載道北方仁山金履祥校業東州並著範模見推當世淵源所自粹美無疵州里知所尊向後進頼以私淑其賛治善俗之功不為少矣竊惟先生學紹紫陽之傳道著金華之望㓗身叔季有見于幾先闡教文明大行于身後若稽古義宜有專祠今盤溪之上故居宛存過者改容想其風烈或謂昔雙峯饒魯亦勉齋門人前代奉祀有石洞書院何子之學不下饒公北山之名豈愧石洞謂宜即其所居建立書院彰示褒寵以補遺闕竊見近年剏設書院如信之藍山饒之初菴平江之甫里不過文義著作之士因有申明蒙信允較斯人品表異尤宜况其家非殷冨事絶扳援于義非慚有言非忝如蒙轉以上聞俯從所請豈惟慰悅是邦人士之願亦足興起海内學者之心世教所闗誠非小補請傳習許益之先生㸃書公文竊以博士之官掌司書籍講授經㫖是正音訓今之職也當職猥以疎庸具員承乏伏見監學雖有藏書並無㸃定善本諸生傳習師異指殊不無乖舛嘗聞先儒有云昔人鄙章句之學者以其不主于義理爾然章句不明亦所以害義理又云字書音韵是經中淺事先儒得其文者多不留意不知此等處不理會枉費詞說牽補不得其本義亦甚害事也三復斯言誠為至論當職生長金華聞標抺㸃書之法始自東萊吕成公至今故家所藏猶有漢書資治通鑑之類逮宋季年北山何文定公基傳朱子之學于勉齋黄公若魯齋王文憲公栢寔游其門仁山金履祥並學于何王而導江張䇓學于王氏以教于北方何氏所㸃四書今温州有板本王氏所㸃四書及通鑑綱目傳布四方金氏張氏所㸃皆祖述何王近時許謙益之乃金氏高弟重㸃四書章句集註及以廖氏九經校本再加校㸃他如儀禮春秋公穀二傳併註易程氏傳朱氏本義詩朱氏傳書蔡氏傳朱氏家禮皆有㸃本分别句讀訂定字音考正謬訛標釋叚畫辭不費而義明用功積年後出愈精學士大夫咸所推服謙之學行本道屢薦于朝不幸而没其他亦有著述而㸃書特為切要今所傳多出副本而其家藏乃親筆所定可信不差學者得之真適道之指南也如蒙監學特為申明轉聞上司委通經之士親賫善本就其家傳録并廣求吕子及何王金氏之書頒之學宫嘉惠後進寔斯文之大幸代孫幹卿御史請刋近思録發揮等書公文竊謂傳道受業必以正學為宗著書立言貴乎世教有補所宜章顯以示激揚當職往嵗偹員婺州路屬邑獲聞北山何文定公基親學于勉齋黄氏得朱子的傳道德之望為時師表亡宋屢召授以史館校勘崇政殿說書並辭不受所著書有大學中庸易大傳啟蒙通書近思録等發揮並用朱子本㫖不雜他說大學等五發揮刋行已久止有近思録發揮未就内太極圖西銘發揮先刋于紹興其後門人仁山金履祥纂次訂定見有全書盖近思録乃近世一經而發揮之㫖尤為精要非泛泛他書之比金氏之學傳之許謙紹述宗㫖南北從游者甚衆屢蒙臺府及本道列薦未仕而卒謙所著述有讀四書叢說詩集傳名物鈔尤有發明四方傳録多以未見為恨以上近思録發揮讀四書叢說詩集傳名物鈔三書不過數十卷計費不為甚大如蒙就于婺州路儒學錢粮内刋板流布幸惠後學其于教化不為無補祭文祭邵州判縣尹父子文烏乎自吾聞梅境章甫父子之死為之驚呼痛怛累旬月弗寧今忍言之哉惟公父子隣邦之特風聲相聞而初未識邈兹宣城乃並轍跡子忝録曹章甫作邑寔嘗代庖趣迎飛舄遂為交承契分尤密一老昻然年且九十我時進拜誨言􅈤惻謂世險艱羣枉惡直盍與我子交警互掖我佩斯言日省以惕屬嵗荐荒勸分發倉督責峻急赴愬披猖尤頼章甫協贊交相幸而事集謂而稍康胡為繼兹往往劇任精力耗疲更臥而病我時在告枉顧凄凉勸我先歸行亦治裝父貽我詩子餞我觴寒風敬亭凍雪水陽執别愴恨情何可忘烏乎曾謂不半載而相繼以亡耶自予之歸亦䘮季父憂纒病侵矧聞兹訃仰首號天天不可知吉人而㓙善行乃菑彼誣上行私罪纍丘山者方揚揚得志不此悼而反􅅓興言至此如何勿悲旅殯蕭條來還何時不腆雞黍千里以馳洒淚緘辭庶其鑒之烏乎哀哉祭許徵君益之文烏乎紫陽朱子之傳其在吾鄉曰何與王傳之仁山以及于公其道彌光仁山之門公晚始到獨超等夷逺詣深造盖其禀純明誠篤之資厲堅清端介之操退若不勝衣而淵乎其似道經傳之言窮析精微義利之辨昭燭毫釐雅正之文古淡之句纂言著書根極理趣明體適用才堪佐時金華勸講法從論思風紀之職成均之師使得處之無適不宜臬司早辟崇臺列薦禮幣踵門綉衣徃見衆人所羡公視藐焉匪以為高吾病沉綿烏乎天既厄公以貧又纒以病貧非所憂病也寔命杜門不出學徒四來隨其淺深耳受心開方科目之暫興競葩藻與掄魁獨絶口而弗談務善端之深培盖公之學雖不及顯施以為邦家之用而猶巋然繫南北之望足以淑一世之英才小子托文殆三十年指聖途而誘掖極友道以磨鐫骨肉不足以儷其親金石不足以儗其堅比居閒而處獨益共䆒于遺編不鄙予以不肖將叩竭于師傳前嵗之冬逺役江堧幸音書之不絶慰予心之拳拳每言病以增劇亦祗謂之常然叠兩書于一月乃永訣而終天慨愚生之無成昧出處于幾先誓拂袖以來歸永相從以周旋竟一朝而舎我獨後死而誰憐歛不憑棺窆不執引我寔負公夫復奚言惟精神之如生耿耿相炤則無間于九泉緘辭告哀有泪如川監學祭陳衆仲監丞文烏乎天之生材也不數而材之成也不易祭之何摧傷毁折而不使之永長先生産閩文獻之邦淵源外家佩服義方其耳濡目染者莫非有典有則之學而力追古作則又大肆其力于文章徒步而來京師叅諸公以翺翔供奉承明論說虞庠􅂱蜚英而發聞侈黼黻而鋪張凢朝論之所屬吾徒之所望盖將進而長夫白玉之堂夫何竒疾纒綿沉憂耗傷冉冉經年靡藥弗嘗極吾僚友之情而莫之救徒環視以彷徨今其已矣嗟哉彼蒼雖禄夀之弗登而製作流傳碑板炤耀在四方而不冺者可頼此而不亡某等謹率諸生相與治䘮送靈車之南返俾奉命以歸藏庶幾盡斯文之誼慰精爽于㝠茫寄哀一奠有淚浪浪事述節録何王二先生行實寄史局諸公北山先生何基字子恭婺州金華人父伯熭承議郎主管台州崇道觀先生其仲子也早從鄉人國録陳公震習舉業程課若不得已潛心義理陳竒之崇道公為臨川丞時勉齋黄文肅公為宰崇道公見二子而師事焉告以必有真實心地刻苦工夫而後可先生悚惕受命于是隨事誘掖得聞淵源之懿臨别又告以但熟讀四書先生終身不忘此語也㣲辭奥義研精覃思平心易氣以俟其通未嘗叅以已意立異以為高徇人而少變也凡所讀書無不加標㸃義顯意明有不待論說而自見者居盤溪上因朱子門人楊公與立一見推服自此來學者始衆先生嘗謂為學立志貴堅䂓模貴大克踐服行死而後已舉朱子逺游篇曰此其則也于詩則曰讀詩别是一法與他經不同須先掃蕩胷次净盡然後吟哦上下諷詠從容使人感發方為有功謂以洪範叅之大學中庸有不約而符者敬五事則明明德也厚八政則新民也建皇極則止于至善也至于皇極有休徵而無咎徵有仁夀而無鄙夭則中和位育之應皇極之極功也謂讀易者當盡去其膠固支離之見以㓗净其心玩精㣲之理沉潛㴠泳得其根源乃可漸現爻象䆒其義理謂四書當以集註為主而以語録輔翊之語録既出衆手不無失真當以集註之精微折衷語録之踈密以語録之詳明發揮集註之曲折故先生不著述惟精取語録以為發揮僅及四書大傳通書易啟蒙近思録而已晚年則曰集註義理自足若添入諸家語反覺散緩此其精詣造約終不失黄公臨别之訓也王文憲公栢既師事先生先生謙抑不敢以弟子視之王公髙明絶識序正諸經宏論英辨質問難疑或一事至十徃返先生終不愛以待其定嘗曰諸經既經朱子訂定其未暇者皆非甚切且當謹守精玩不必又多起疑論有欲為後學者言謹之又謹可也先生淳固篤實絶類漢儒雖一本朱子然就其言發明則精義新意愈出不窮然皆非自外求也先生集三十卷而與王公問辨者十八卷不因王公之問則先生無一言孰得而窺之哉淳祐中趙公汝騰守婺延聘請講辭不就後首薦于朝又率名從官列薦添倅鄭公士懿守蔡公抗楊公棟相繼延請皆辭景定五年李公鏞為畿漕會有詔舉賢特上先生名遂與建人徐㡬同被命特補廸功郎添差婺州州學教授兼麗澤書院山長力辭未就理宗崩咸淳改元復除史館校勘御筆兼崇政殿說書降詔控辭再三改承務郎主管華州西岳廟終亦不受也盖自嘉定以來黨禁既開諸公以朱子之學顯者不少矣大抵天樂淺而世好深故其所就日下而摽掠見聞以欺世盗名者尤不足數先生介然獨立葢思有以矯之于其同門宿學猶不滿日恨某早衰不能如若人强健編應聘講苐恐無益于人而徒勤于道路爾世當叔季獨抱隱憂尤有難以與人言者然則先生之見逺矣咸淳四年十二月卒年八十有一平生質弱多病以自能保攝至此國子祭酒楊公文仲請于朝謚文定所著大學發揮十四卷中庸發揮八卷大傳發揮二卷易啟蒙發揮二卷通書發揮二卷近思録發揮十四卷論孟發揮未脫藁近思録未校正餘在家刋布已久太極西銘發揮即近思録摘出者文集三十卷藏于家所標㸃諸書近存者皆可傳世垂則也魯齋先生王栢字令之婺州金華人大父崇政殿説書師愈從楊文靖公受易論語既又從朱文公張宣公吕成公游父朝奉郎主管建昌軍仙都觀瀚兄弟皆及諸吕之門朱子銘崇政公墓又有寧庵記瀚請為公墓祠作也先生少慕諸葛亮自號長嘯年踰三十始知竊學之原與其友汪開之同讀四書取論孟集義别以鉛黄朱墨求朱子去取之意以勉齋黄公通釋尚缺荅語約語録精要足之名曰通㫖一日讀居處恭執事敬章惕然曰長嘯非持敬之道亟更以魯歴從朱子門人遊獨楊公與立告以北山何基子恭學于勉齋得朱子傳宜徃從之既見授以立志居敬之㫖為作魯齋箴自是發憤奮厲諸書無不標抹㸃校四書通鑑綱目則尤著者也嘗謂古人左圖右書後世圖學幾絶作研幾七十餘圖敬齋箴凡日用從事夙興見廟治家嚴􅅚閉閣清坐子弟白事非衣冠不見也㓜孤事伯兄甚恭季弟早䘮撫其孤割腴田與之愛從子侃賢與共學並居開元死與歛且葬凢宗族交友恩意周盡四方來學者隨其淺深啟誘之尤以大學為首教蔡公抗楊公棟相繼守婺趙公景偉守台禮為麗澤上蔡兩書院師鄉之耆碩皆執弟子禮理宗崩率諸生製服臨于郡既歸講道于家著撰益精冨作易圖推明河洛先後天之騐自伏羲則河圖推一隂一陽之義畫出竒偶皆因自然之勢而生八卦文王則河圖却因已定之卦推其交合乃求未畫之圖而易位置河圖者先後天之祖宗乎大禹得洛書而别九疇箕子得九疇而傳洪範洛書之數四十有五而洪範六經推其事五十有五與河圖之數不期而暗合箕子之傳又推而倍大衍之數洪範者經傳之祖宗乎又曰洛書之所以則河圖者何也洛書以河圖生成之數並位此其大意也以二四易置于東西以七九易置于西南此其妙機也惟如此而後縱横相對皆十于是陽居正而隂居隅矣後天之所以則河圖者河圖是逐位竒偶互交後天是統體竒偶之交惟四生數不動以四成數而下上之則偶在上而竒在下矣初一曰五行以下六十五字洪範經也五皇極以下六十四字皇極經也此帝王相傳之大訓非箕子之言也洪範五皇極居中一六二七三八四九相並有並義焉一九三七二六四八相對有對義焉箕子所陳事証相感舉一隅也今三從一横取義亦舉一隅也于今詩則謂三百五篇豈盡夫子之舊漢初諸儒各出所記是之夫子所刪容有存于閭巷浮薄之口者乃以二南各十有一篇兩兩相配退何彼穠矣甘棠于王風則削去野有死麕鄭衞淫奔諸篇皆當在所削也于春秋元年春王正月鄭曰杜征南注隱公之元年周王之正月明白有典則矣豈有魯國之史不用周正而用夏正是不奉正朔也聖人義精理明無其位而輙改正朔悖莫甚焉二百四十二年之間四時之序嘗紊聖人欲行夏之時正以此也先儒謂周正非春是矣謂假天時以立義則非也謂以周正紀事無位不敢自專是矣謂以夏時冠月為垂法後世則非也又謂大學致知章未嘗亡還知止章于聽訟之上謂中庸古有二篇誠明可為綱而不可為目于論語則謂聖人言行萬世大經曰語曰子顧不得與帝王之書並理宗時講官徐僑嘗請錫名魯經有詔奉行時議遷之而止于是為魯經章句以大學中庸孟子為之傳其獨見卓識多此類也咸淳十年五月㣲疾手書付其子缺曰吾不逺矣七月某甲子整衣冠端坐而逝年七十有八國子祭酒楊公文仲請于朝贈承事郎賜謚文憲傳其學者仁山金履祥導江張䇓也宋季近臣嘗言其學行于朝下郡録所著書先生不以出有讀易記讀書記讀詩記各十卷讀春秋記八卷論語衍義七卷太極圖衍義一卷伊洛精義一卷研幾圖一卷魯經章句三十卷論語通㫖二十卷孟子通㫖七卷書附傳四十卷左氏正傳十卷續國語四十卷聞學之書四卷文章續古三十卷文章復古七十卷濓洛文疏二百卷儗道志二十卷朱子㫖要十卷詩可言二十卷天文考一卷地理考二卷墨林考十六卷大爾雅五卷六義字原二卷正始之音七卷帝王歴數二卷江左淵源五卷伊洛指南八卷涵古圖書一卷詩辨說二卷書疑九卷涵古易說一卷大象衍義一卷襍志二卷周子二卷發遣三昧指南一卷朝革集十卷紫陽詩類五卷文集七十五卷家乗五十卷又有親校刋刻諸書無不精善比年婺屢燬散落已多存者或秘而不傳然其磊落光明者固已見于世矣吳氏家述吳氏散居江浙間者乃太伯公族之裔也世逺譜亡不可稽考吾家高祖府君諱杞自衢徙來蘭溪娶唐氏是生曾大父諱煇娶陳氏生三子昌暹其季大父也諱儒宗字景舒元配湯氏繼張氏二女孿生四子男皆湯出女適徐缺次早世子男諱缺辛字伯祥今贈應奉翰林文學從仕郎配龔氏贈宜人次諱文字文可娶應氏次諱字立之娶柴氏次㓜繼他姓由高祖府君而上皆潛美不耀曾大父始好儒命二子治生産而專其季于學觀命名意可見大父攻苦自力既精舉子業博通羣籍介壯嵗當端平淳祐時碩儒耆彦接熟見聞文尚理致𢎞厚靖夷貌莊而氣和管數大家經㫖授者多占科選而已輙不利咸淳季年補國子學先考應奉亦與名待補生而時代變矣事既平中猶治儒不廢與一二遺老以綱紀鄉學為務有司就延以職人尊之曰碧溪先生已而以老休于家先考率諸父承意承養嵗時怡愉歡適聰明康强夀九十猶讀細字書飲酒數升不亂臨終正衣冠言笑而逝先考元貞大德間受知諸公以教官選初授金華教諭改仙居所至建官給田有績于學至大初升岱山書院山長以涉海逺不行與仲季同居均財無間言篤愛姻黨好賓客施予不倦里中平忿憾拯急難倚以為重無大小咸得其驩心焉先考無子師道寔季父所生季父性剛直中無留藏好正言責人率少合而其心于慈恕最隆動守禮法􅅚戒子孫惟恐為不善事隱約終身務培植隂德而已至元癸未先大父已七十餘而師道始生鍾愛甚脫襁褓臥起飲食挾與俱能言口授以書喜其可教少長課以詩賦兼講經義嘗言之曰吾束髮即試有司中年後偕爾諸父迄無成非藝不善也今夢寐猶不離場屋間殆習氣歟抑時運承平科且復歟不然謹身􅅚行猶不失為善士爾其毋忘學也又曰吾家世以善聞而清白相承吾性尤寛耐有犯不校一時名成志得頡頏作氣勢者安在而吾幸獨存﨑嶇兵戈盗賊間人無怨仇之者更善遇之及今老夀子孫衆蕃意者天之報施乎欝于予者將發于若等乎命先考以師道後曰他豈無可立者不可使文脉由吾冢嗣而絶躬保護而成立之没然後已不幸吾家繼罹憂患生理遂落挾冊無救飢寒雖諸父不以責師道也每念遺訓為之感涕刻厲歴十四年而科目興又七年忝與末第幸先考季父猶存而悲吾大父之不及見矣時先妣亦已卒數年間先考季父皆及八旬禄養未充而相繼淪䘮烏乎痛哉師道蒙恩官七品僅得追贈考妣自先大父葬銅山鄉中徐之原徙祖妣祔其後先考妣亦葬于旁當時咸無志石名諱嵗月久將冺没不肖孫之罪益重矣葢先大父生嘉定壬申九月十四日没以大德辛丑十一月二十九日葬以甲辰十二月丙午二祖妣生没俱在家逺不能詳先考應奉生以淳祐乙巳九月十八日没以至治癸亥十二月二日葬以泰定乙丑二月丙申先妣宜人生以淳祐癸卯二月三日没以延祐丁巳八月三十三日𦵏以己未十二月庚申季父生以淳祐辛亥十二月一日没以至順辛未五月二十一日未葬詳吾之所自出故弗他及主于追録故諸孫以下不書烏乎冨貴之澤易衰詩書之傳難繼合吾同祖之族與吾為昆弟今存者四人與吾之子為昆弟者九人隨俗變移希不失業勢葢有不得不然者然因是以致顯耀固非冥冥中所樂聞此師道所以䀌然而傷惕然而懼也方藐焉孑立雖仕而微其守官厲已動循家法故日趍于空乏不自振然用是不辱其身以及其先亦足以報矣顧吾祖宗之所以流澤者大而猶虚其應幸而名秩稍進推恩之典得上及而旁推異時表于其阡庻以昭荅萬一是未可必也師道二子㓜就學能以世系為問因詳書示之并以先大父所付屬者具載焉或者善人之後獲徼福于天昌而大之永永勿墜師道之志其有伸乎至順三年嵗次壬申十二月二十有一日嗣孫師道百拜敢謹志諸公題志後右蘭溪吳氏家述延祐七年進士吳師道所自著也歴叙其大父母父母之所以培養深厚與夫為善之道以期其後人之意甚至元統三年暮春本由錢塘移舟瀫水之濱與吳君道舊經日觀所著述尤切切于天理民彛之間而是篇乃所以示其子若孫使知其世之積善成德非偶然者且命本以頴楷書之藏于家乗本少時嘗讀歐陽先生瀧岡阡表未嘗不抆涕謳吟反復感歎葢其言出于至情足以當人之善心吳君雖未能大施其素學而歴官每以清白稱使其逄時得位則其推仁錫類豈不周浹也哉所謂養不必豐而全大節以表瀧岡者其亦有行也歟是嵗仲夏京兆杜本謹書又太史公作三十世家以吳為首自泰伯至夫差可覩已其後以國為氏雖散在四方去之千載人猶知其同出于勾吳世家者以其氏也余忝與金華正傳甫同氏余家德讓堂正傳寔嘗記之今觀正傳所述世德之美家學之盛余亦與有忻慕焉夫策名上第而榮逮其親世未嘗無也余獨愛正傳名益進德益修而聞譽益有光于前人此非衆人之所能及也然余觀正傳之心兢兢自持惟日不足是豈有所為而為之者哉葢其平生之學本以昔賢顯大其先世自期而吾之顯其親者猶未至則如奉拱璧如持􅦼水所以自持其身者不得不厚而所謂修其天爵而人爵從之殆有不期然而然者此孝子仁人之用心也凡正傳所以自述而遺其後人者不過如此若乃謂其不自足于已者將有所取必于天斯亦過矣余懼讀者未之詳也故書之下方番易吳存書又昔李先生潛訓其子以不欺而寧遲于取應後三子相繼第進士其一人名朴者學于程門致位尊顯而先生贈開府儀同三司夫世其德且榮名追崇之子道其庻矣乎然二者得兼固人之所願抑富貴在天世德在我在我者可以勉人則不能必于其天有諸中失于外君子且將曰幸哉有子如此况内外兼之而在外特未大慊于志由是之焉又自有致其光昭之道乎友人吳君師道自其大父暨應奉公善葢于其鄉既賢且文數竒不遇于進士用是遺其子孫君奮儒科為大邑所至有聲亦既錫光幽壤矣均𢎞盛典其有待乎官資之崇歟孔子曰孝者善繼人之志善述人之事太史公曰爾為太史無忘吾所論著余觀此竊有契云東陽許謙謹題又詩曰誕后稷之穡有相之道后稷始為農師而農事之所宜自盡其力者不可以一勣名也要其所成有相之矣詩人推原其本而為之辭故以誕之一言發之誕非大所能盡也吾友吳君正傳用儒殖家閲三世百年而君始以文行奮由科目自致腆仕推恩及其考妣駸駸乎祚𦙍之大而益滋者也君示予以所自為家述載其服襲于家庭之至行與紹聞于祖考之訓言誠切􅈤惻足以興起人性之善而和諸物則之懿然則即詩証之所謂后稷之穡非能自致蕃育如此固有相之以道耳歐陽子曰為善無不報而遲速有時此理之常也兹非㨿乎烏蜀山人柳貫識又吳氏家述者池州建德令吳正傳父之所著也惟吳氏蟬嫣有周有周伯父讓德弗嗣來孫于荒子孫以國命氏爰滋八方逮河南守革秦嬈苛布漢寛大于時治行第一達賢治嘉氏族丕頼大司馬翊漢中興强毅忠盛奕葉䋲䋲靡代不競相我正傳父世植粤部以茂行芳聞揚于大廷日宣三德以夙夜浚明永念祖考載勤載耔毓彼耿光濬源發祥則此其始昌也乃誕播厥辭以無忘振揚在昔承常作詩教德于曾吳陸居晋世頌有文媯昻樹碑先烈是徵理翺尊祖寔録以興至于今日充其斯誼公聽竝觀不􅄽于志詩曰孝子不匱永錫爾類仁人君子之愛其親豈惟有以悅其天抑又有以被乎人葢推已之善以達人之善凡觀感而興起者皆善善而無恨也美哉乎賢君洸洸乎仁風浪浪乎休聲超乎其盛則夐乎其前聞也吳方茂厥勣奮民庸國動進律加復用嘉賁于祖曾慶流絃絃施于後昆畸人寡思不足以觀其碩尚秉筆執簡以序我友之勣云耳東陽張樞辭又素獲從國子博士吳先生遊先生之學𢎞深縝密本末具舉使不至擢科從仕亦足以顯其先世矧叅觀内外奉公守法風節凛然錫類䟽封榮及幽壤猶有待也讀先生紹述其先德并及其所存詳而覆宜可信矣臨川諸生危素題禮部集卷二十
