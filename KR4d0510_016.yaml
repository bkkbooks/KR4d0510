body:
  text: 禮部集卷十六元吳師道撰題䟦陳森詩後題金華陳森茂卿善為詩年三十以死其友黄君晋卿訪遺藁無得追次所聞凡十四首為之序反覆致意且懼弗能使之傳余讀而悲之昔李賀早死李藩求集其詩訪賀親故或恨其負才取而棄之嗟夫有才不幸而又渰沒於俗善人之志終不可以伸已森之詩清峭刻厲聞其人恂恂不出門户甚矣苦心思背世好不幸而止是也彼聞者將深悲慘痛尚肯并棄其詩而其存者抑何艱哉雖然文章之於世軋於彼者此或茁焉固有卓然絶識之士遺之以不朽李賀之詩今之誦之伊誰之力也或又謂詩人多窮才者多夭此又不然賢者貴而仁者夀理之常也而相值實難今夫世之老夀顯榮生無以踰人死無以垂後冺焉草木俱腐者為不少矣以此方彼又何如哉詩以工而傳森詩誠工使得黄君數十輩風聲意氣曠萬里百世而相感奚必借助於顯榮者而後能傳耶君又何懼焉嗚呼斯言過矣聊以申吾黨之志云爾登瀛圖後題文皇延攬英才當其開天䇿府時此十八人已為之用異時房杜為元臣餘皆忠清英亮宏碩藻麗蔚然臺閣宰輔器計其相為討論非但文藝之末而已愚嘗攷之史而竊恠許敬宗者亦在選中敬宗諂事武后附李義府殺長孫無忌褚遂良韓瑗軰名汚天壤間文皇固未料其晚節使此十七人而與之同列豈真鳯麟之於猰犬哉千載而下當有聲其罪而削去之者洪範謝氏衍義後題洪範一書有大禹之言有箕子之言自為經傳其文甚眀而傳注者昧焉孔氏以初一曰五行至威用六極為禹所第叙而不及其餘中又有頗錯間先儒或是正一二而未䆒故讀者不能無疑謝氏章作衍義攷圖數之錯綜而推極其變萃經説之精要而發眀其遺可謂用志於此矣但其開端之説引禹謨九功即為九疇謂範乃箕子所自陳因九功而演者其言曰六府繼以三事五行繼以五事九功繼以戒休董威九疇終以嚮用五福威用六極禹列穀於金木水火土之次箕子則専言五行而以稼穡歸之土之甘三事衍為五事正徳衍為三徳五事八政無非利用厚生之本五紀庶事莫非五行之逆順至其次序或有差互則若易先後天之不同其言灼有眀証若合符契夫以二篇相望於簡冊之間數千百年習而不察謝氏獨能舉以為説亦異矣竊有疑焉神龜負文禹則之而叙以為疇若五行五事盖已次第而定每疇之下又條陳其目若一曰水二曰火之類皆尚本文自水曰潤下而降乃箕子釋經而為傳餘疇皆然惟八政一疇獨缺爾且禹謨曰功洪範曰疇二字未嘗互見謨陳徳政教養之事範著天道人為之藴範之體段固大於謨彼所云功者指其成績而言可言順而不可言逆可言吉而不可言凶若六極者亦可以言功乎戒休董威義主勸督九功之事曰休曰威雖與作福作威者類此特指君之所得為而福極盖有君所不得為而多係於天者矣使謝氏而曰禹因九數故功亦以九名而事亦出於範互相發則可直以為洪範有數無辭大經大法皆出於謨是則不深考禹經箕傳之過也昔南豐曽氏亦嘗謂謨言六府則範六五行六府次以三事則五行次以五事九功言戒休董威則九疇言庶徵福極帝王治天下其道未嘗不同嗚呼為是説者其非謝氏之比矣謝氏其勦以為已説而故異之者歟故凡讀書者必先畫句段正文字辨述作而後義理可尋不然則雖善其説而攷証踈考証踈則乖剌牴牾而不合不合則又何足以為之善耶吾鄉仁山金先生嘗深䆒洪範之説而定著經傳見於書表注今亦頗行於時愚不復述之特辨其大㫖又使後學者知其表注之為有功云題樊紹述絳守居園池記後樊紹述作絳守居園池記文體竒澁讀者不能句前代為注解者數家趙仁舉出近時宜益詳且精余視之尤踈陋因是為正十數條并補其闕遺者著於左方按紹述文甚多鮮有傳是篇獨為好事者蓄示詭異折儇淺以資咲甚矣人情之好竒也當有唐元和長慶間昌黎公以文雄一世從之遊者若李翺之純皇甫湜之健張籍之麗郊島之寒苦巨細無不有而號稱險恠竒澁者詩則盧仝文則紹述惟韓子兼之故月蝕詩效盧銘樊墓用其體若將納其横騖屬其殘斷而矯其甚者夫韓公之竒竒之正者也二子之竒竒之偏者也文章貴不用意溢於正而竒出焉盖非能竒之為竒而不能不竒之為竒也是作也其出於自然耶其有意為之耶識者其知之矣然昌黎盛推紹述謂其詞必已出至不煩䋲削而自合文從字順則其他文殆不盡若此矣或曰予譏時人好竒復從而辨釋之不幾同浴而笑其裸裎乎曰非也周誥殷盤有奥義缺文焉彼誠不可以意通也而此也飾夷以艱襲昭以幽易常以異徐而察之均可見矣彼解者疲情畢力而猶惑焉則樊子豈非過人者哉書韓幹馬圖後眀皇在御日乆宇内承平畜馬蕃息内而帝閑外而諸監記志諷詠可考也故其神駒駿骨往往而有一時曹覇韓幹軰復以善畵馬著稱人物之適相遭非異事與吁開元之盛極矣凡天産而地生者莫不豐衍洋溢况於馬乎馬之盛而竒者出焉理固然也方姚宋柄國羣賢逓升名卿材臣不可勝數波及於一藝者特其餘而亦皆精妙絶倫非後世之所可及也夫人事氣化感應相尋而至治休眀之效君上涵育之澤著騐昭灼盖如此况夫治世之隆鳯儀麟出而比屋可封被堅執鋭左右服御者莫非聖人之徒詎不信歟廣平王氏家藏幹畫流傳甚逺其為真蹟無疑余獨尚論當世之故而重有感也豈徒賞好云乎哉䟦李息齋墨竹文與可蘓子瞻仙去二百年墨竹一派今薊邱李公得之其用意命筆天趣㝠㑹等而置之未易優劣也或謂二公在當時雖貴重而困悴流落亦不少竹詎能救之哉李公今方以此上當天意寵譽赫奕抑榮矣愚謂士之用世以學術政業而藝事乃其餘三君子之道一致也然而遇與不遇有命也此君何與焉因覧此卷并識其語四皓圖後題子房招四皓定太子司馬公疑其黨子拒父於通鑑不書朱子綱目著之而嘉其有合於納約自牖之㫖至其序鴻鵠之歌則以為子房特權其正且重者存之而為是甚不獲已之謀二説交致其意而吕成公謂其有合於首止之義所以論子房者偹矣愚何敢復瀆嘗以四人出處論之嬴秦流毒天下人孰不欲去之桃源之名後来始聞計其投荒遐竄深宻惟恐不與世隔爾商山聫接關洛在近秦楚兵争之塲隠乎則非其地也身之隠矣人宜莫之知而謂帝不可屈致者則在當時魁然之望甚接於人也盖四人者負高世之才當搶攘之秋將以大有為時幾之不當而老之至也世有文王則若伯夷太公起而歸之而又義不辱於慢罵之主一時詞禮勤厚而其事則將以定天下之本亦非區區者是以果於一来事成計定脱屣而去不知其終夫豈尋常之為哉世之賛者雖僅得一二至論其初節則直以為避世深藏之倫殆未知其心也近時保郡劉因名士也其題有云驅馳恨臣老避世豈初心與愚之所言犁然而有合惜不及見其人而與之上下其論也䟦跨驢覔句圖驢以蹇稱乗肥者鄙之特於詩人宜甫旅京華白遊華隂島冲尹節浩然鄭綮傲凡風雪中皆畵圖物色也杜巋然詩祖忠不忘君不可尚已李豪而孟質賈寒而鄭陋不但其詩人亦似之予嘗評其優劣如此第不知此卷所寫何人識者自能辨之徐忠壯公事實後題始余幼時聞里中徐為姓者曰忠壯公徽言之後少長閱宋史見其以建炎間死晋寕之難論者謂其攻禦偹盡力屈不汚與王禀死太原同科又知公生於衢與吾里壤地風氣相接忠勇挺然使談者不敢以脆弱槩亦偉矣欲從其家求觀遺文舊事以䆒其平生則皆無以應者然其他族在西安龍游者猶盛一日其裔孫某攜公事實来告予若銘状傳誄及當時褒䘏之典甚具既讀而知其詳某謂是編曩嘗一再刻今不存將復刋以傳并以郡乗野史凡士大夫所録與夫公之先世一門行業可考者裒為一編又以譜系附焉謂余盍有賛余惟忠臣義士蹈白刃死城郭封疆豈將以垂名計邪就使一時不見記述堙滅無聞其磊落軒天地者固自若矧能言好義之士何世而蔑有邪忠壯公所立如此國史載之天下後世誦之伊誰之力也吾聞孝子慈孫所以論著其先祖者其心無窮子孫記之而後他人誦之宜也他人記之而子孫忽忘焉吾不知其何心也忠壯公之為忠也其子孫能是孝也見其忠與孝而樂為之稱道者秉彛好徳之心也是編之成又豈一家之私榮而已趙氏夀詩䟦人於富貴利逹皆可以力致其不可以力致者有二焉曰夀曰賢子孫是也夀而有賢子孫者鮮相繼而夀又相繼而有賢子孫者尤鮮夫人之生美惡厚薄禀於天惟善可以自致然善而獲報則亦天也兼其美且厚者而食其善之報固造物之所靳哉廣平趙慶甫嘗為運司幕官退而老於高沙之上今年八十高沙之人士相與為歌詩以頌公先是慶甫之尊翁八十時其鄉之貴公名士亦有頌美之作至是而再見真盛事也慶甫之孫仲敬為南臺掾以今所得詩求草廬吳先生叙之繼而作者未已復以命予予知趙氏之再世之夀覧諸公之稱述觀其家之慈孝又知其累世而賢殆所謂禀之厚美而積善之獲報者歟雖然余因是而有私感焉予家先大父夀九十今予之親且八十矣比嘗迎以来而意輙不樂日夜念鄉井故舊竟舍而歸區區微官不能使其親志娛而心安尚何以為子予祖父之夀幸與趙氏同而視仲敬之所以榮其親而耀於時者百不逮一俾叙此卷豈不愧甚矣哉金蘭庭詩後題蘭庭先生金君名似孫字叔肖先世在宋為富家其父之焱字仲華由太學舍選登淳祐七年進士第官至工部架閣嘗攷試吉州文山出其選文山領兵赴杭州過蘭溪以里第故戒軍士無一人敢登岸者其尊嚮可知也君少雋敏强記工舉子文科既廢遂一用於詩清新警㧞有思致善諷切人世改事殊衣冠䘮氣里中暴者挾威恣睢愒君甚君終抗不為屈又傲俗寡交好使酒多與人忤盖所負素高故也既欝不施家事益落感激憤悲益發於賦咏間殁纔五十有一予先祖父自架閣公時繼館其門君實嘗受業縁是後遂為姻家吾祖晚年舍君無與言者不數日必相過過輙命觴笑談酒酣雅歌或散歩郊郭間竟日留連小子未嘗不操几杖從後少長學為文辭每見輙勗之今猶能追憶其言也君殁時子尚幼故書遺藁皆散軼予家所有唱酬者無幾獨知於介翁集為全然依韵盡和非渉自然今選若干首而以他篇附焉嗚呼士之傳世功業文章而已功業固不待文章而傳特窮微在下文章雖善不幸而冺沒者多矣若金君之自負其才不屑干俗殆古之所謂狷士其詩觸事感時豈不足以自附於風人之列而今鄉人道之已少更數十年將并其姓名莫之識豈不甚可惜哉余非能張而大之念累世事分之深其僅存而可傳者不容棄絶於予是亦義之所當為也異時采民風述郡乗尚論吾鄉人物者庶有考於斯焉桃源圖後題昌黎韓公有桃源圖詩則是圖已著於唐其詩首云神仙有無何渺茫桃源之說誠荒唐末復云世俗寧知偽與真盖未以陶翁之言為然且古今所傳避秦者茹芝之老採藥之女入海之童往往不少桃源事未必無特所記漁父迷不復得路者有似於異境幻界神仙家之云此韓公之所以不能無疑爾愚觀陶翁氣韵淳古寤寐羲皇遭罹叔季慨然簒革之際可感者何限異時所賦路若經商山為我少躊躇多謝綺與甪精爽今何如慕且如此計其於桃源固所樂聞願言高舉於此可以知其心而事之有無奚足論哉評是圖者試以愚言求之邵氏今是堂藁䟦吾鄉先軰宋南渡後如邵公囦應公鏞特深䆒經學邵於易禮部應於易書禮皆有論著成書邵即朱子集中所稱長沙博士以張宣公三家禮範及公釋奠儀式刻之學宫者也余嘗見應氏書約義及於衛湜禮記集説間得所引一二他則未之識淺陋自愧二家子孫或謂無傳者意其閟之爾不然豈不甚可惜哉今是堂稿者邵公所著也其曽孫均示予往往賦咏牋記之作該洽贍麗皆可傳誦因葩藻以騐其根柢則公之學之藴亦可得之於此矣又如朱子在湖南嘗薦之有云文學自將誨誘不倦者夫其親遇知己如此尚何恨於仕之不大顯學之不盡用耶邵氏由今是而益盛世殊事改流風就冺是編均所訪求云得之蕘豎之手者方困悴中裒纂世勤懼貽後之弗繼藹然孝子慈孫之心可勵薄俗倘易禮二書存盍并廣其傳今是之不朽本在兹與䟦東萊手書張孟逺序朱子賛吕成公云一身偹四氣之和狀公之徳最盡百世下宛然如親見焉嘗聞公少年頗嚴急因讀論語躬自厚薄責於人章氣質變化徳量寛𢎞其自治勇而所養純可知今觀送張孟逺序盛稱其横厲超軼眀雋閎逹道古今角詞章顧以為弗如而其所以自况甚謙甚約意若不滿於張者豈其恃才負氣而不適於中和挾記誦文詞之習而未能進於道歟得公之言以藥其病其受賜也厚矣夫世之病是者多倘獲觀是篇而受公之賜亦孟逺有以發之并受孟逺之賜也愚忝公里人沐麗澤遺教輙以所見附於後不自知其當否也孟逺名杰衢人張漢伯澄之孫漢從韓世忠討汝為戰死者孟逺師汪玉山嘗見張魏公公竒之復從朱張吕三公遊後上書忤趙雄宰安吉大水蠲民租額守怒上章求避孟逺亦請祠遂不出其人亦可尚也䟦李安忠畵鼠盜果徐崇嗣嘗畵茄鼠圖今李安忠畵鼠啖荔支盖同一機軸世之可畵物甚多而彼乃用意於鼠亦異矣使觀之者變憎為玩豈非筆墨之妙足以移人也哉東坡贈巢谷詩墨蹟春雨如塵暗云云蘇文忠公贈巢谷凡二詩此篇與元脩萊是也皆元豐六年在黄州時作吳興施元之及其子宿吳郡顧景藩同注公詩後出頗精篇中第十六句作寒螿呷此作寒蛩又云今成都府治石刻一瓢字作一尊及元祐間所書者如此則公手書是詩非一豈其不忘相從憂患中故邪覧巻使人想其風槩題謝君植吳立夫詩詞後延祐庚申冬余北上過彭城黄鶴故基俯汴泗交流四望青山逶迤殘冬參差孤城低黯問戯馬臺何處同行吳立夫喜為詩予因相與誦蘇子由黄樓賦文文山彭城行為凄然而罷後三年之淮東泊舟京口遇故人謝君植飲酣同上北固多景樓時雲物冥晦風起浪作江中来去船千百逺若凝立不動者望維揚隠隠凄凉滿目君植善樂府因舉辛稼軒姜白石舊賦一二闋悲壯頓剉使人涕下不自禁倐忽十年思二友未即見一日閱故紙得所寄他詩詞聮綴成卷念昔遊所欲賦援筆記此倘有二友作必能道余所不能言感慨激烈與古人争雄異時庶幾見之劉漫塘語録後題漫塘劉先生徳行文章師表當世小試令長顧時事方異即逺引高蹈其後雖諸老極力招致亦不變其志抑偉矣某来宣城獲觀學宫所刋語録而先生之曽孫善餘亦僑寓是邦出所藏除籍田令直秘閣領祠官特授將作少監諸告身乃袁公甫撰墓銘太常考功諡議讀之凛然起敬獨恨全集未見爾語録者王使君遂得之於先生之子汝進裒集家庭親友所記序稱十一巻今十二卷第三條論作時文云云注已下疑可削字此條詞㫖鄙淺無乃増益者非歟然第四巻二十八條所云亦此類皆當在所去也其論欲學聖賢且學孟子則與先儒孟子才高難學之㫖異而謂程子氣質之性氣對義理字質對性字之性字贅竊謂程子以天地之性與氣質之性對言正大有功於論性者不知何故為此說也生晚無從質正姑識所疑闕十二卷第三條作時文云云如街市旋蒸熱賣闕第四巻二十八條作文字法尾要有新意如作雜班末後令人歡喜古三墳書後題古三墳書一巻宋元豐中毛漸得之唐州北陽民家紹興中沈斐刻於婺學近嵗火板不存予從張子長假其書讀之所謂三墳以山氣形為别以伏羲連山神農歸藏軒轅乾坤易合其目墳各有傳又有姓紀皇䇿政典之篇後序稱天復中青城山裂石中所得不云何人亦可疑矣仁山金先生謂周官外史雖有三皇五帝之書未聞墳典之名倚相所讀或别有異書爾序以堯舜有二典遂引三墳五典配三皇五帝反滋紛紛伏羲之書莫大於卦夫子從而翼之倘炎黄之書存安得而不録後世農家方技及老莊書所載往往傳述失真近時三墳書出張商英家且古易既有六十四卦安得又有三墳龜山嘗辨之此以理而推其偽者也三墳漢藝文志已無傳隋史載劉炫撰書百數巻題曰連山易子長謂此書巻題不同亦非炫所撰者天復乃唐末號去之二千年一旦復出裂石所得尤渉恠誕按晁公武云張商英偽撰盖得其實矣既眀其偽固不足深辨畧舉一二以見撰者之謬大傳曰易有太極是生兩儀兩儀生四象四象生八卦先儒不知先天之義故多誤解今其言曰混沌為太始其數一一為太極天地之父母一極易天高眀而清地博厚而濁謂之太易為天地之變太易之數二二為兩儀隂陽之形謂之太初為天地之交太初之數四四盈易四象變而成萬物謂之太素為三才之始太素之數三三盈易天地孕而生男女謂之三才三才者天地之偹也其言顛倒錯戾漫無紀統而自比於易可乎夏書政典云云先儒皆以為指羲和林氏獨謂上文邦有常刑干先王之誅文意已足此乃戒吏士之辭故金先生表注因之其說正矣豈區區摹擬𫝊㑹者所能知哉且諸儒皆不信其書而毛漸沈斐特信之亦好竒之過爾斐亦衢人字文伯嘗為婺之教官所著春秋比事陳亮序以為湖州人陳振孫謂湖有沈文伯名長卿不名斐今因此書題識知亮誤也因并記之百丈山鍾氏田劵䟦百丈山在洪都為名刹有田若干故鍾傅業也傅起微賤遭時稱雄擁數州地區區土田再世已不能守向使散落民間誰復有道其名氏者乃今得托名山以傳豈非幸耶東陽輝尊師閲視故劵整此而表章之參政耿公文叔序其事甚悉愚嘗一至西江識公其人寛厚長者言尤可徵此軸又遂為山中之寳物之係其所托者如是亦可以有感矣夫歐公書州名急就章䟦漢黄門令史游撰急就章多古語古字顔師古注之朱子嘗校其文而近時王應麟復補顔注甚悉歐公州名急就章一時以文為戲而音韵協比别出新意亦竒作也公嘗修五代史著職方考列州名於上急就之作其肇端於此乎其文雖少而該括甚多使有為之注釋者豈不勝於地域等書顔王軰人今豈無之耶抑有之耶潘觀我所作葉審言字辭䟦審言主簿將之官晋江過余蘭臯持其冠時鄉先生潘公所作字辭見示審言惟不忘家庭之訓與其執友之言樞機之發日慎一日式克至於今兹也矧蒞官臨民規條萬端約而攝之又豈出於謹審之外審言固將益充其持守之功而坐致夫敬信之效矣予家祖又獲交於菊莊先生而審言與予契分彌篤凡其家所藏前軰片言隻字無不得觀而此紙特未之見耳潘公自云辭倣蔡忠惠公今觀其字亦如之攷之嘉祐間蔡公書授子旬正泉州安静堂者晋江𨽻泉城審言往焉以挹其高風祝頌稱願之辭殆有先兆非偶然者因喜而書之以識别云爾趙子昻書東坡詩東坡先生月夜飲酒杏花下詩風致流麗神情洒落子昻每愛書之亦其平生有契焉耳予評趙公之書當如蘇公之詩不知其覧者以為何如鮮于伯機書太白詩大徳丙午某侍先君應奉在仙居邉尹世安出所得詩一軸示予中有此紙愛之因求以歸太白詩不待賛矣伯機所書遒勁竒逸尤其得意者時時把玩諷敬亭山之句知屬宣城而初漫不之省也後二十年當泰定丙寅予為宣録事歴五年而去山有裴公寺梓華神祠盖禱祀所數至因得窮極幽邃道由書堂寺黄蘖泉在高林窮谷間每因送迎輙憇其旁竟日而返居城中出門即與山直朝夕在目中所謂相看不厭者真成先䜟人生行止豈不有定數耶予嘗觀覧圖史知天下名山川處比南北數千里行所歴無幾異時天啓其逢畀我竒觀豈直敬亭而已哉東坡二帖右大蘇公手筆前一帖為陳輔之之書也後一帖慰黄實師是狀也輔之丹陽人每嵗上冢金陵必至蔣山訪楊徳逢所謂湖隂先生者嘗不值題詩於壁云北山松粉未飄花白下風輕麥脚斜身似舊年王謝燕一年一度到君家徳逢稱於荆公公有尋常百姓之戲亦有詩贈輔云南郭先生比鷾鴯年年過我未愆期休論王謝當時事大扺烏衣似舊時正指此也當公用事時閉與不通及退歸復從之遊因坡公稱此益知其為人又坡與之帖云萬里海表不死歸宿田里有不起之憂若得少駐復與故人一笑又出望外此在毗陵屬疾時時輔来訪其於蘇公亦甚惓惓矣師是本末集賢袁公熟聞之奉化黄氏者䟦已悉按師是母章碩人惇其舅也子由官陳州由是師是二女皆為其子婦适遜所娶是也哲宗嘗欲召用林希以是沮之終寳文閣待制知定州而卒輔之雖遊荆公而尤厚於蘇師是雖惇甥而與蘓相結至是斥於其黨二人出處不同而尚徳守義不為勢利回邪變易其賢一而已敬仰髙風因識其後䟦趙子昻帖子昻學士自其尊公去吾里乆既自著其里為吳興矣觀其荅陶士元書既以得叙親情話為慰又以見桖燭鄉物喜不自勝藹然桑梓之情猶足以勵薄俗獨恨某晚生小子不及一識之面耳吳存吾書存吾先生墨蹟予在宣城閱視既多嘗評其秀勁似顔魯公蔡忠恵竒逸似米南宫至其高處時出入章草二王亦近代之絶此幅醉墨恠豪神氣飛動超乎畦徑之外可喜可愕尤與常所見者不同也所書詞乃康伯可雪夜促蘇養直赴溪堂約者一本楊花作梅花月破黄昏作月滿前村説者謂楊栁一物黄昏與夜意重複愚謂前説是矣黄昏字用林和靖詩語意非指夜也改句不逮逺甚又有改江為溪吹下紛紛為飛下同雲皆陋語耳杜端父墨蹟杜公世居吾鄉之紫岩諱汝霖者字仁翁學於安定胡公嘗為李公擇所稱其孫陵有五子旟伯高旃仲高斿叔高旞季高幼高伯高登吕成公門同時陸務觀陳君舉葉正則陳同父咸稱其文淳熈開禧中兩以制科薦有橋齋稿仲高占湖漕舉首吳獵楊長孺與之善著杜詩發微癖齋稿孫得之為序叔高嘗問道朱子與辛幼安諸人遊端平以布衣召入秘閣較讎季幼文皆相上下幼有粹裘集葉正則序人稱金華五高而伯高為最旟子去偽旃子去輕斿子去非子去華亦皆有名守臣趙汝騰嘗薦去偽請官之其子濬之若川治春秋領鄉貢易世後感激自悼矯行晦迹寄食西峰僧寺而終自汝霖至濬之六世仕雖不顯而文采聲華聮襲不墜亦吾鄉罕有也此帖乃去輕手筆盖先大父碧溪翁之友愚幼及見詩帖尚多今存者止此當宋季士競舉子習而杜氏一門子孫咸尚古文章今里中殘碑斷碣可見者悉有家法下至字畫亦異此紙尚深得山谷老人筆意要非不習而能也愚嘗覧朝野雜記杜斿誤為杜福續郡志者又冺其名今遺澤既斬傳裔殆絶矣每惜其片言隻字輙取而録之於此又因詳著其世及所見聞庶来者尚有攷焉厚齋者季鏞伯韶括蒼人僑居金華甲下字缺考其詩當是甲子云題子華子後予幼時見鄉校壁間石刻朱子與杜叔高書稱子華子非常可笑者識之而未見其書後購得而讀之又攷朱子䟽辨其可笑之實竊悼夫為是者之枉錯其心也朱子以書出越中恐王銍姚寛所為晁公武以為元豐後舉子所作盖因其中多字說淺謬也愚謂其偽之顯然易辨者孔子遇程子傾盖見家語子華子説韓昭僖侯見莊子戰國去孔子世逺二人而合為一苟以莊子為寓言則陸徳眀云魏人者必非妄也永嘉葉適最尊信之至恠孔門弟子無記者孟荀漢唐之士皆以為異説望而棄之適於古人可信者往往擿抉譏訶而於所不可信者獨堅亮而深取之不識其何説也二後序一稱㸃希子黙希者唐南岳道士徐靈符號嘗注文子即其端所謂訓解𤣥通經者盖其人以是書至唐始出故依托為之又云讀吕氏春秋見子華子云云今第二章丁氏穿井得一人之説即吕覧所載剽掠可以騐也一稱釣磯叟者辨今書沒昭僖侯一則其意又使人致疑於莊而証其為寓又以實其編離簡斷非全書之語尤為狡獪善眩而孰知夫人之終不可眩哉輙因朱子之言而摭其遺道冲師書山谷煎茶賦癡絶禪師道冲蜀人也書山谷道人煎茶當宋淳祐中傷蜀殘破至於泣下夫其置身方外猶不忘國家之戚非直鄉土之思而已使當時士大夫見之能無感於心乎范元卿書帖此吾鄉范端臣元卿舍人書也元卿問學該洽詞翰竒逸豈惟負才過人盖内而父兄之漸摩出而與紹興乾淳諸賢遊亦一時之盛也和詩稱三一叔者名津字茂通香溪先生浚字茂眀者之從弟而元卿父謂載茂則香溪之兄也詩有蠻雨瘴烟人歸隴北之句盖元卿以乾道庚寅守晋康癸巳出嶺此當在其後也與徳章秘校帖乃里中陳氏元卿屢和其詩以見於蒙齋集中也北山遊巻䟦右北山紀遊詩文一卷金華葉謹翁審言烏傷黄溍晉卿蘭溪吳師道正傳東陽張樞子長釋無一之所作也自至大庚戌距至順癸酉二十有四年間凡屢遊五人者雖不必俱而遊必有作妍唱導前清和繼後或覧勝發竒或因事紀實凡登臨之美朋從之樂懐賢悼古之感所以攄一時之興而不冺於異日者悉於此乎在矣靈源草堂煇師及其弟琳公博雅好文凡吾徒之作前後裒輯無遺者出以示予遂繕寫成卷而復歸之草堂因念始遊時審言年未四十為最長晋卿次之師道與一公未三十子長未二十也今壯者老而少之齒已過於昔之長者矣其間儒墨之異歸出處之殊致佚勞欣戚之不齊可感者何限幸而相視無恙履屐之力尚强夙好不渝泉石之樂如故豈偶然哉更二十餘年不知當復幾遊而所得復幾篇僕尚能屢書不一書而已也題潘黙成贈方仁聲詩後學道悠悠未見功敢言凡質下仙風他年一鉢江湖去先向苕溪訪葛洪黙成潘公送方仁聲詩也前有序云公吾里人客寓吳興神情散朗如晋時間高士晚得官無仕進意築庵西溪名白雲專以衛生養性為事詩文雄深雅健追古作者凡二百餘言稱重甚至真蹟藏栁道傳博士家按方一名勺當政和乙未年已五十是時士之稍以才藝名者有岐路可競進而超然高舉如此豈非賢乎所著泊宅編十巻行世泊宅在烏程相傳張志和浮家浮宅之所因號泊宅翁盖志和亦金華人而寓吳興者二人志操出處畧同真足以相配而無愧顧世罕知之或以為嚴瀬人者未之考也禮部集卷十六
