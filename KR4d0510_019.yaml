body:
  text: 禮部集卷十九元吳師道撰䇿問江西鄉試䇿問一道國家幅員既廣職官亦衆銓衡進敘專以年勞由是選法多壅簡拔未精清濁渾淆賢遇同貫積久成弊有識患之兹欲澄清吏選大明黜陟俾清濁異流賢愚甄别官稱其任人無幸心或行考課之法或用薦辟之令或因而增秩或不次擢才凡兹數者樂聞折衷又南人蓋聞天運之不齊隂陽之或愆旱乾水溢無世無之雖以堯湯之盛而猶不免也春秋水旱不雨必書所以恐天災知戒而思備也故臧孫辰告糴于齊説者以為譏其不知豫偹九年七年之水旱而民無捐瘠漢人美其畜積多而偹先具也國家土宇之廣嵗入之豐而調度實繁郡縣寡儲年或不登則所在告匱茫然不知所措賑救一仰于兼并之家至不愛名器以假之丁未之災亦可監矣比嵗水旱相仍間有樂土民仰懋遷未至大困今夏亢陽徂秋不雨數月江淮南北赤地數千里米價翔貴飢饉之憂兆于此矣朝廷雖設義倉有司漫為文具緩急不可倚也周官荒政十有二可厯舉而講求歟開倉發粟伺得請則常緩不及當早計而先定歟督糴勸分使民重困而無實惠何術而能周防歟儒者之慮嘗失之過今之災未若丁未之甚然有偹無患亦不可以緩也繼今而後義倉之政若何而無弊李悝之平糶耿夀昌之常平亦在所當行歟諸君子以經術時務出為世用其母以過慮為嫌出位為諱悉心以陳將以轉而告之上又擬二道問蓋聞時平則修武以畜威世艱則奮武以戡定間習之有素則臨事足以折衝訓御之有方則倉卒可以無患此經國之逺猷而安人之上務也我朝承平兵久不試邊徼材武所萃偹則嚴矣內郡武臣繼襲者多不更事兵惰律廢殆無所用之去嵗西陲小警江淮遣戍命下或羣起剽劫殺傷城邑震擾野無居人部統者莫之誰何甚則縱之為姦未獲分毫之力而良民先被其害事已不敢痛懲務為姑息此風甚不可長也夫政之不肅禁之不嚴其責固有在而法固可舉也竊以為國家不吝爵秩廪食畜之數十年希一旦之用而乃若此則亦素不知教不明于義之故也古大司馬三時教振旅茇舍治兵因田以及軍事而仲冬大閲以教其全辦鼓鐸鐲鐃車徒旗物之用習坐作進退擊刺之節其法當行歟漢唐舉將帥之科近代習韜略孫吳書陳校技力之制可稍采而用歟夫子曰以不教民戰是謂棄之傳者以教孝弟忠信為先何所寓而施此歟東山采薇出車枤杜之詩藹然忠君親上之誠先國後家之意説者以為序其情而閔其勞悅以使民民忘其死何道而臻此盛歟夫安不忘戰平居間暇正宜豫偹之日文事必有武偹入而訏謨出而敵愾古之人皆是也諸君子講于前代之冝目擊當日之事能不為國家深長慮而有以處之乎悉著于篇母憚出位又問有國家者必稽古以為治為子孫者必視祖以為法是故率祖攸行尹以勉君事不師古説以進戒去古寖逺損益靡常然國家之所宜人情之甚便者不得而改之傳世既久因革不同然良法之已行成規之具在者不得而變也逺稽諸古近法乎祖而治道畢矣洪惟世祖皇帝肇造區夏酌古凖今創業垂統缺而未遑者固有所待傳而可繼者豈無望于後世之人哉有司竊以為當今有宜復古制者四有宜法世祖者二顧其中又有可言者願從君子質之常朝之義所以接君臣辨儀等博咨訪通下情者也今百官入見嵗不過宴賀一二日非大臣近侍鮮得望清光者此古制之當復一也或謂日日行之慮以為煩間日一朝之制可從否乎諌諍之官所以拾遺補闕獻可替否不以無可議而弗設也今臺臣雖有言責靡專匡救之任此古制之當復二也伊欲以諌設官尊與臺官少置其員而專其任可行不歟給事中之官漢以次侍中分左右曹平尚書奏事掌偹顧問唐以𨽻門下專掌封駁命令務使出納惟允今雖偹朝列無所關掌此古制之當復三也夫既有其官則宜思其任抑從漢制為宜歟抑循唐制庶幾納言之遺三省之舊歟錢幣之法所以權衡百貨貿遷有無厯代未有偏廢者國朝始行楮幣一再變法幣益輕而姦益生往者興用錢重輕失中已而廢不用夫制法之不善非用錢之咎也至今議者咸以為惜此古制之當復四也伊欲兼行錢幣大矯往失何術而可歟世祖皇帝混一之初開誠布公攬延俊乂南北參用朝輔彬彬咸效其能用事之臣過為甄别一憲府掾亦屛南士而不用徒乖無方之義而示不廣之量或謂兹乃矯浮薄之弊而為之者今欲法世祖皇帝之參用矯弊之道若何而無戾歟世祖皇帝寤寐求才間遣徴天下道德魁壘之士召見賜問待以不次之擢當時得賢之盛無與為比或謂近年科目既開又有遺逸之舉便宜不復出不知遺逸之令蓋有意于科目之所不及而徒為文具今欲法世祖之徴士科舉之意若何而無悖歟諸君子平居問學有志當世察于古今之宜熟矣凡此厯代之所以不廢祖宗之所以已行有關于時務之要者是用樂聞啓告以禆政化其毋訾我以六事之外他不及而三古之上未之談焉鄉校堂試䇿問詩不云乎高山仰止景行行止不有先覺何所效而成德哉故表賢旌善為政所先而考德問業學者所向况于居其鄉不知其人可乎吾鄉蘭溪實婺之望山川明秀人效竒古昔槩可知矣世逺失傳若唐徐安貞以文顯近代董少舒金景文以孝著郡志可考也當宋之南羣彥輩出范浚心針獨為子朱子所取且有不知從誰學之嘆而楊子立則又親受業于朱子者今惟語略一書僅見于世應鏞卲囦皆邃經學今衛湜集禮記解間見稱引而他書無聞范鍾以髙科為賢相而言論風旨述者蓋鮮其表表者固如是也未易悉數也風流日微名字僅存有問焉莫知所以對豈非可恥之甚者吾黨未必爾也故竊願聞數公道德之梗槩學問之淵源文章著述之遺軼散落者庶幾感慕振勵之餘將有追髙風而嫓之山川如作詩書方興罔俾專美于前繄諸君子是望毋曰是非經史時務之大而何問之迂也國學䇿問四十道問古之帝王資學為先故石渠制決金華勸講崇儒問道有自來矣講讀設官昉于唐世方今建明著為令典積誠啓沃必得其人將在廷儒學之士自充選與抑若河南布衣者亦當進列歟專任兼領孰為當歟員不必偹而唯其人歟又問律之為書定自唐世國家酌今準古據以從事用之最急者也今學廢不講吏或不知將何以議法而制事哉兹欲倣古置律學授徒定程式以試吏可行與否願聞其詳又問江浙鹽法之弊久矣近者貪暴為政壞已至極難槩疏舉姑以今之所急者言之嵗課虧額數十萬何以補之舊引之積而未售者尚多新者將安所售耶抑配則重困民減弛則無以佐國用遣官講畫且為此爾智者處之必有佐時之䇿又問隆古盛時禮節修明貴賤有章衣服不二民志攸定財用阜蕃中世以降澆風日滋敝化奢麗服美于人不為限制推以經久故比者朝廷定輿服之程申刑罰之禁行之且三十年有司稍弛民寖玩愒奢僣益甚今其何施俾之自化請言其本勿隱勿迂又問豳風有云二之日鑿氷沖沖三之日納于凌隂四之日獻羔祭韭蓋藏氷出氷説者以為節陽氣之盛其效至于雷風霜雹調柔不怒民不疾夭或又謂此特聖人輔相燮調之一事不專恃此以為治是則然矣雖非所恃而猶不敢廢何歟豈隂陽之和冥冥中賴其助而人莫之知歟天人相感之際亦學者所當究也彼土牛送寒鑽燧改火之類推此一端足以通之其毋以為不切之問又問至治之世不能無盜唐虞明刑成周詰姦見于命官之典後世從可知矣方今太平無虞而蠻徼蛋丁時時竊發至于興師小者奪攘剽劫道路相望都邑輦轂之下姦人無所畏忌禁非不嚴也而猶若是豈法有所未偹歟抑吏非其人而致然歟夫道失而民散民散而盜滋不求其本而區區鋤治禁防之末或者不可歟然欲求其本則潛消默化必遲以嵗月而目前之害救之殊不可緩其術果安在歟明于當世之務者必有以處此願悉陳之又問經載聖人之道史記厯代之事經史者時務之所從出而經又史之所從出也以道制事則經不可以不明以古準今則史不可以不講舍經史而談當世之務可乎今䇿試之法或止以時務而不及經史不及經史者豈專以時務為急乎抑雖不明言經史而經史自有所不能外歟猶可置也經者道之所存而事之本也其可置歟有司必不以淺待諸生而諸生之所自待者亦必不爾願聞以祛所惑又問先王之世選舉之法書其德行道藝者起于鄉閭容或不公而唐虞以來至于成周數百年間書傳所記選舉有不實之弊逮至後世變而任一切之法若糊名而較其一日之長者亦可謂至公矣而往往得人不能如古豈立法之未至歟抑有司取人之柄者未善歟又問前代任官有辟舉之法資格之外往往得人國朝銓選屬之省部而貴人百司得以薦舉亦良法也近者廢而不行豈惡其干請奔競之私濫冗壅滯之弊而然耶夫舉爾所知豈不愈于不知而用者至于私且弊焉則禁制之未詳爾乃一切罷絶之可乎今欲人無濫舉舉不失人合乎古之意不礙今之法若何而可又問巡尉雖卑官以治盜為職獄事之發端人命之所關非習于法而健于材不足以為也方今蔭入仕者例得為尉當受命為教官者得假巡簡以出夫以不從事之人而治重刑之事未離誦説之書生而當督捕之任毋乃用之失其當歟闕豈以政而學者不論其素習而能官固無所不通歟今天下之務豈不急于治盜矣苟非其人何以責其功委任之道試言其宜又問先王之治崇本抑末惰遊有禁况乎京師者四方之所視效其俗化尤不可以不謹也今都城之民類皆不耕不蠶而衣食者不惟惰遊而已作姦抵禁實多有之而又一切仰縣官轉漕之粟名為平糶實則濟之夫其疲民力冒海險費數斛而致一鐘顧以養此無賴之民甚無謂也驅之而盡歸南畝則勢有不能聽其自食而不為之圖則非所以惠恤困窮之意繄欲化俗自京師始民知務本而國無耗財則將何道而可願相與言之又問古者胄子之教專以公卿大夫士之子設也今國子學弟子員有蒙古色目漢人之别蒙古色目宜在優崇故沿牒而至者不限逺外而蒙古之視色目尤優牒保者不必其子孫弟姪也遂至滋多混淆壅塞其為朝臣者之子弟乃或待次數年而不得進蓋議法之初未料其弊之至此也今欲循教胄之義而適古今之宜使序進者疏通而無弊其何以處之又問京師生齒太衆糴價常貴欲強使之減賤不可得也今嵗南船沓至販區盈溢精鑿之米至與太倉陳積者其價相若前此所未有也頗聞外郡旱歉道多流民賑貸之事行將有不免古之善積者人棄我取賤極而貴物理則然廣儲蓄以豫為之防可也為有司計必出于和糴和糴則重擾煩而米且不至矣然則便利之宜變通之方若何而可又問古者因生以賜姓胙土命之氏姓所以繫統百世氏所以别子孫之所出制昏姻明人倫莫此為重也後世譜系之制不明妄立擅更固已漫不可稽然稱謂紀載猶賴以有别也今之蒙古色目雖族屬有分而姓氏不立並以名行貴賤混淆前後復雜國家未有明制抑以為若此者未足害治歟抑敦尚淳質而不變革與否必有至當之説又問朝廷比者患獄囚之多且淹也每三嵗命五府官分詣諸道決之亦良法也近復尼而不行豈有所未便歟抑以其擾煩而止歟且天下之囚自州縣至于路嵗有風憲之審録成案已具上之省部俟報可論決則付之在外有司足矣不然則遣官之出疏其年而簡其人是亦可也二者之中願聞折衷又問守令之職最為近民休戚所係不可不慎比常申舉人之令嚴失實之罰卒未睹其效比年此制復格而不行豈以為無益而止歟其故何也今郡守多缺縣令多猥冗不稱或未嘗親民而輒為是官尤不可也銓選之法若何而宜薦舉之方若何而可此誠時務之切者試一陳以觀逺識又問郊之祭也聖王之所以敬天而尊祖也有國家者莫先焉方今當太平之期海宇晏清民物阜康肇舉殷禮宜也然是禮之行必將具儀物豐賞賚則財不免于費恩澤覃及則官不免于濫壅寬宥普行則刑不免于縱三者將何以處之不輕于行者豈不以此之故歟其思所宜以佐在廷之議又問古者惟祀兹酒羣飲有禁漢著賜酺之令法意甚美風俗猶近厚也利興于𣙜沽而流于後世雖欲禁民之無飲不可得矣今列肆飲坊十室而九糜穀作醪不知其幾倍于粒食也鬬爭凌犯之訟失業蕩産之民皆由于此而為政者不知為之限禁可乎非惟不之禁顧禮為有樂而飲宜縱之爾古所謂樂民之樂者固如是歟伊欲使民循禮而有節德將而無醉非教化浹洽人人有士君子之行者不能至是則其效又未可以卒致也其將何以圖之又問書曰無曠庶官天工人其代之謂不可闕人廢事也立政有三宅三俊之目則兼已用未用言之俊所以為宅之本也今天下之廣職官之衆取人之路不為狹矣而在廷之官或尚有缺諸道風紀之正使大郡之牧守往往虛焉豈果無其人耶抑艱其選而不輕畀耶夫才不儲則乏不養則衰失之于平時而索之于一旦不可得也國家之于儲養未嘗不加之意且若何而儲若何而養必有其道矣試一言之可矣又問民間役法南北異宜大槩有三曰差役曰雇役曰義役近者廷議江南雇役許民從便固良法也豈北不可行歟抑差役義役或可廢歟抑兼存而並用其于南北何者為便歟試言之可乎又問自周之季禮壞樂崩秦滅其籍禮書猶間存一二至于樂則亡矣僅存樂記而止凡聲容器數皆不可考今郊廟樂器果古之制歟其聲容猶可以倣佛古之遺歟考中聲以定律此最要事也果若何而合于古法歟其考詳以對務為精鑿可行毋徒以樂由心生樂主和之説藉口以蓋其所不知又問近者貢士之外復有遺逸之科蓋深藏山林高蹈丘園者嫌于自進而有司不能盡舉爾然夫子嘗曰舉逸民則古已然歟三代時鄉舉里選之公士之懷德抱藝者未嘗隱而不見然耕莘築巖釣渭之流何以不與于賢能之書乎漢之嚴光唐之陽城溫造不可尚矣其他不免釣采華名捷徑索價之譏則為是舉者亦有得有失歟國朝初年徵用儒雅耆碩魁壘之彥接迹于朝當是時科目未興也設科以來得人可數矣特行負其言者或出其間開别是途或足以矯之歟人心澆訛清議泯泯彼方沮于進士之多艱而幸于舉牒之易得紛然雜起一郡動數十人遺逸必不若是多也本以待特起之才而反資奔競之輩真其人者必恥于同列則遺逸者愈不可得其制法殆有可議者歟諸生其明思以對期于賢之無遺而舉之不濫豈不以為美哉又問帝王之禮至周大備嬴秦滅學經籍散亡漢初遺書稍出博士諸生亦或記之禮古經者今儀禮也記數百篇二戴刪之今禮記小戴書也周官最後出立于學宫所謂三禮是也前代三禮列明經學究科士猶誦習而知其説王安石廢儀禮度數之學遂絶不道談虛文而已夫以三禮論之則周官為綱儀禮乃本經而禮記諸篇則其疏義三者固有本末之相須而不可缺是以子朱子慨然定為儀禮經傳通解集注之書未完者門人又足成之可謂禮書之大全千古之盛典也方今設科僅止禮記儀禮廢久固莫之異若周官者豈以其間有與他書不同而疑之歟抑以用之者徒多事而無益歟以唐太宗之英君信其可行關洛諸儒曾無異論世之詆毁者可盡信歟朱子為正學之宗他經訓議皆所遵用禮書乃其用意者而獨在所不取何歟謂冝表章通解一書與三禮並其精治者優異以待之可也明體適用之學莫大于此而去取之際不能無疑願從諸生質之又問周衰孔子沒七十子之學散異端並起孟子時楊墨盛行前乎夫子固嘗曰攻乎異端矣夫子所指異端者誰歟夫子問禮于老𣆀親與之接楊朱師老子者墨子或以為並孔子時或曰在其後蓋莫能明列子莊子皆傳老子之學者莊子亦與孟子同時然夫子之言一不及老子楊墨孟子之言不及莊子何歟觀于七篇之書管晏之功利儀衍之妾婦陳仲子亡親戚君臣上下許行不知君子野人農末之相資白圭之貊道宋牼之利説固皆在所斥然專以闢楊墨為言意安在歟申韓原于道德之意太史公有此言也彼其慘刻少恩罪浮于諸子當與善戰服上刑者同科孟子獨無一言斥之何歟莊子以儒墨並言無怪也東西都以來儒墨孔老時時發于文士之口韓子推尊孟子功不在禹下而孔墨相為用何以筆之于書歟凡此皆求之而不得其説者若夫後世異端之害又在所未論也二三子究邪説之原明聖賢之意詳陳于篇以觀所學又問三代而上義理素明學者習而知之故其材成德立皆能有益于人之國家而治效之盛非後世可及吾夫子語門弟子未嘗及性而言仁亦無正訓是時猶不待辨而明也孟子時則已不然故舉而號于人曰性善曰仁人心大者如此他槩可知矣孟子沒而道無傳由漢逮唐諸儒之所誦説學者之所討論皆未能灼然有見于道士生其間不過隨世以就功名而所立卒不逮古者職此之由歟近世大儒特起始有以續千載不傳之緒性命道德之旨天人皇王之奧焕然大明家習而人誦三尺童子亦能言之可謂盛矣其學之所成就宜可以為聖為賢出而見于用宜皆可以致斯世斯民于三代之上然校功程能視漢唐得人反或不及其故何哉昔猶可諉曰道之不明今何所諉乎豈義理之學果無益于治歟抑學者未能實知之雖知而未能實踐之歟諸生學于此將出而用之者也幸推言其然毋使以儒詬病者得以藉口又問有虞之時五載一巡狩羣后四朝巡狩一年而畢四朝分方而至協時月正日同律度量衡巡狩之時之事也敷奏以言明試以功車服以庸來朝之時之事也成周則六年五服一朝又六年王乃時巡考制度于四嶽諸矦各朝于方嶽大明黜陟其年數之不同固因時之宜然唐虞時巡但考制度而敷納明試在其來朝周則考制度明黜陟並在巡時而來朝無所事者何歟周禮六服諸矦有一嵗一見者二嵗一見者三嵗一見者大行人之職有春朝秋覲夏宗冬遇之别而又有時會殷同乃周官所不載何歟所謂圖天下之事比邦國之功陳天下之謨協諸侯之慮者又各以時而不相通豈圖事者不必比功陳謨者不必協慮歟考之王制則曰比年一小聘三年一大聘五年一朝亦周事也則又異于尚書周禮所云何一代之制而自相戾也凡此皆明著于經學者之所當講而通之者若乃後世巡狩來朝之事非虞周比者未暇及也俟他日言之又問古之為教詩書禮樂周之樂正所職是已吾夫子雅言亦止于詩書執禮禮獨以執言是其用之切者尤在乎此也若夫易則掌于太卜春秋則藏于國史非施教之具也吾夫子繫易而暢義理之旨修春秋而著褒貶之法後人始並詩書禮樂以為六經而學者肄焉樂經既亡經止五而已夫易兼天人之奧為五經之原是不可不尊而春秋乃聖人之權衡非學者所可驟語故自漢以來列五經之序則首易次書詩禮而終之以春秋其體統次第有確然而不可紊者非以為有優劣也科目之興人治一經者未有不兼通他經而得為學者也今之習易書詩者固不乏禮止小戴記已非其至而習者絶少至于春秋則比比皆是也聖人之所急者置而不講其視以為可後者則靡然而爭先毋乃好尚之偏歟為有司者固當據前人之成法寓造士之微權顧乃弗之察而反有以助之豈論聖人之經者不當若是歟不然則抑揚進退先後多寡之宜必有其道矣諸生平心而思之毋徇所尚以為説若曰是皆有司之過不在我則必有任其責者又問凡學春秋釋奠于先師秋冬亦如之凡始立學者必奠于先聖先師此小戴記之文也古者祀祭享之列不相僭瀆未有不尸不嘏不綏不旅不繹而可以言享也然則釋奠之禮何歟所謂釋者何義歟如記所言止于春秋冬而夏獨闕釋奠則止于先師立學則并有先聖又何歟且其云釋奠者必有合鄭氏謂本國無先聖先師則所釋奠者當與鄰國合考其下有大合樂之文則有合者豈非指合樂言之乎釋菜輕于釋奠故不舞不授器則釋奠有樂矣鄭氏何以為此説古之所謂先聖先師者誰實為之先師猶可云詩書禮樂之官先聖固無其文也自魯哀公立廟于孔子故宅未嘗出闕里也魏晉釋奠于學昉見史册未嘗有原廟也唐武德廟周公孔子于胄監貞觀定孔子為先聖于是牲牢器幣日增月益以至于今可謂極盛矣古惟功臣與享大蒸未聞弟子從祀于師也弟子從祀于師非三王之典明矣抑其可以義起而莫之敢廢歟開元釋奠儀設先聖神位于堂東西向先師位其東北南向不云有像設及從祀諸子今觀當時人文字所記則皆為夫子南向像門人亦像十哲而圖其餘于壁是則開元雖著令而時人莫之從也此何故歟夫塑繪之像一毛髮不似則他人而垂足高坐陳器于地未免匍匐就食之譏先儒嘗以為非而因襲之久亦莫之能更也其他尤有大于此者顧以議禮制度非在下者之事是以不得而悉陳若前數者其興襲之由得失之故亦不可以不講也諸生周旋于堂陛之間執事于籩豆之列亦嘗有念及此者乎其著于篇以觀博碩之學又問三皇之名經始見于周官未嘗稱其人以實之也孔安國序書以伏羲神農黃帝為三皇或謂本易大傳然大傳曰伏羲氏沒神農氏作神農氏沒黃帝堯舜氏作亦無明文也司馬遷史記以軒轅下屬之五帝而小司馬補記則以伏羲女媧神農為三皇又有天皇地皇人皇之號大與此異二説出于讖緯雜記其果可取以為據乎外史掌三皇之書不言三墳也左史倚相能讀三墳不云三皇也孔氏以三墳五典合之三皇五帝可謂有徵矣書序之文先儒頗疑之遂以是為一定不可易之論可乎且三墳言大道夫子豈得去之而斷自唐虞乎世有三墳書出宋元豐中果古書乎伏羲畫卦著于易矣神農黃帝之説雜見于隂陽道家農家方藥諸書其果可盡信乎前代古帝王之祭不獨三皇也祭三皇著令于唐夫其開天建極功被萬世固當在所尊我朝大建宫宇春秋祭祀甚盛典也顧乃屬之醫家者流而限為專門曲藝之祖議禮之意其可得而聞歟繄欲究名號之是非核書文之真偽訂典祀之當否談三皇者不可以不知也其明辨而詳陳之驗所學觀卓識焉又問太上立德其次立言聖賢之于言固有所不得已也道之不明不行而害正之説興不容不為後世慮也故六經之文如日在天諸子從而翊之固已有純駁之不齊矣自漢以來諸儒患人讀者之不能通也而又為傳注焉數千百年賴以不墜近世義理之學復明諸大儒討論折衷可謂偹矣我朝表章宗主其説所以一道德而同風俗也且經之闕訛傳之遺略豈得而無天下之理無窮聖賢未嘗不望於後之人若其本原綱領之正俟百世而不惑者固無庸以異為也昔人有言曰天下不可無此人亦不可以無此書而後足以當君子之論彼其垂世立教于此已足又奚待有所增益哉祗見其不知量耳方今有著書授官之令蓋所以待非常之士意有在也前代著述之善者或給札下求或身後始出未嘗以媒仕進也奈何不知妄作之徒剽竊緒餘掇拾淺陋無關于義理無禆于政教紛紛爭起奔走自售任考核者不過假借以成其干請之私其甚者逞私説肆不根習非聖賢以自詭反前人以為高所謂詖淫邪遁當深拒而痛絶者乃使之刋布學宫以惑後生小子之視聽亦可嘆也然一切絶之則失古人精微之意存之而不為之慮則落當世澆薄之風將從何法而可革此亦學校之所當謀者其無以為迂也又問射之法尚矣唐虞侯以明之夏商無文而制莫偹于周今幸散見于禮書雖不能數其詳試言其一二大射賓射燕射之制何以分天子諸侯大夫士之等何以别皮侯采侯獸侯正鵠之用何以異大射擇士既射于澤又射于宫無乃復歟抑有不同歟鄉射之射貢賢能而詢衆庶也不與于三射然則何所比歟主皮之射即貫革之射尚武力也軍族庶人用之猶可其與夫子射不主皮之説抑何戾歟夫子曰君子無所爭必也射乎揖讓而升下而飲其爭也君子傳者謂射以耦進揖而升堂射畢揖降以俟衆耦皆降勝者乃揖不勝者升取觶立飲也考之禮則醴設于西楹西不勝者亦升既取觶飲而先降爾其與下而飲之文若不相當然故王鄭皆以揖讓而升下為句其義亦不可廢先儒何以不此之從歟雖然是皆名物度數之末耳射者進退周旋中禮內志正外體直然後持弓矢審固而可以言中所以觀德行者在此也夫古人于射固幼而習之無不善者然後之為技不可得而並也后羿逢蒙之流以善射稱君子固不能過使之與射則無不中也聖人亦以德而許之否乎此先儒之所疑後學之所未喻者願相與究之又問古者視朝之儀所以辨君臣之等通上下之情也其制之見于經者惟周而已考之禮外朝朝士掌之內朝司士掌之燕朝太僕掌之鄭司農云王有五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門路門又曰畢門外朝在路門外內朝在路門內鄭康成云庫門在雉門外雉門為中門外朝在庫門之外臯門之內據二鄭之説一則由臯門而雉而庫一則由臯門而庫而雉果孰是歟一則外朝在路門外一則外朝在庫門外何以不同歟又小司冦掌外朝致萬民而詢焉注謂雉門外則此外朝又與前不同康成乃謂天子三朝外朝一內朝二內朝之有二者兼燕朝言之是已外朝有二何止言一歟此不可以不辨也秦漢以來朝儀非古矣然漢之大會殿視周外朝前殿視內朝宣室視燕朝古意猶未逺也至唐則有大朝正衙入閣之名亦沿前代之意然入閣之儀唐中世始行至其晚年以御前殿為入閣近世因之又以入閣為盛禮果可以為盛歟歐陽公之問于劉侍讀蓋有所疑也以公之宏博而猶慎于所不知况學者乎亦不可以不考也洪惟我朝制不相襲惟正旦天夀節御朝受賀常日不復講豈以為煩而止耶抑以為果可廢耶萬一修明舊章則必將有考于此有志當世者甘出叔孫通諸生下乎輒因是以覘博古通今之學者又問古之建社有大社王社侯社大夫以下之社民間之社其名不同而社之有主則一也周禮大司徒設其社稷之壝而樹之田主各以其主之所宜木遂以名其社與其野小宗伯若大師則帥有司而立軍社奉主車注謂社主曰軍社蓋用石為之各一説也三代之松柏栗齊之櫟漢之枌榆此樹木也言石則吕不韋許慎崔靈恩之説而各有據也二者何以不用抑其用之各有當歟且祀社必及稷唐儒云社稷主皆石而先儒之説有社主而不及稷何歟夫石主數尺半埋地中軍行奉主則取所埋以載陳矦擁社見鄭子展則是以石擁皆不通之甚者抑别有制歟至若孔氏釋論語松柏栗亦用大司徒之文先儒從之矣竊謂三代之社雖有遷改其所置之處即其境內之土何冝松宜柏宜栗之不同又夏土何以獨宜松殷周何以獨宜柏栗歟是皆口熟其文而未究其義者稽經而考古亦不可以莫之辨也其為我悉陳之又問六經罹秦暴焚滅之禍獨易以卜筮存漢初藏書稍出詩書禮春秋皆殘缺不完故書有古今之文詩雜淫邪之篇春秋三傳之異説周官不合于他書此其體統之最舛者其他文字之訛錯又在所不論也諸儒專門黨同守陋既不能以相通而增析竄移又悉非舊雖易不免矣唐儒定為正義主一説而屏諸家談者不容復致異宋初一二儒者始以已意論説逮關洛建安諸公大明義理訂定經傳又挈大學論語孟子中庸以為之綱發揮精微可謂質往聖而不悖俟來世而不惑矣是以聖朝建學設科尊崇表章使學者有所據守此先王一道德同風俗之盛典也且論聖人之經于殘缺之餘固未嘗以為全可通而無疑闕其所當闕通其所可通以會聖人之心則求之于此已足矣奈何厭常喜新之徒穿鑿傅會溷亂成説適有以投合好異者之所欲夫非聖之言詖淫邪遁之説古所深拒而痛斥者今反有取焉使後生末學靡然而成風果誰之咎歟兹欲明聖朝同道之意懲陋儒詭經之失亦吾黨之所宜悉心者幸察索言之又問治天下者莫大于禮所以辨上下定民志也冠婚喪祭民用尤切前代皆有成式今冠禮廢久世不復知有成人之義昏禮壞于隨俗喪禮壞于異端龎雜不經甚已近世司馬公書儀朱子家禮號為適古今之冝好禮之家或所遵用然不免于訕笑非出朝廷著令使通習之殆于不可然家禮後出頗采書儀書儀所有或家禮所無又竊聞家禮乃未定之本為人所竊去未及修補今所行者是也然則二書當考而損益之歟或止用其一歟家禮之外尚有可議者歟謂宜定為式程頒之天下使民習于耳目而不異則教化行而風俗美其不在兹歟若夫制禮之本行禮之意則又所未論者俟别言之又問先王之世既逺禮樂之書散亡其存于經者殘闕簡略後儒又以意為之説使行者莫之適從禮之大者莫過于郊而異説尤甚請試言其一二天體惟一而或以為六圜丘南郊或以為一或以為二昊天上帝著矣而復有天皇大帝之稱五行之帝信矣而或出五帝之號或以一嵗而二祭或以一嵗而九或以為日用冬至或以孟春上辛此皆大相舛異者不一之説果有以一之歟至于圜丘方澤天地分祭時日壇壝樂舞器幣亦復不同此禮文之甚明者歷代混而為一恬不為怪宋人集議互相是非蘇氏專引昊天有成命之詩以為合祭之證而不知其誤其雄辨歷詆足以移人而先儒深不然之謂自古未嘗有此瀆亂龎雜之禮然當時分祭僅僅一行明知其繆而後卒不能改先儒之説雖明顧未有按據以從事者其故何哉修明舊章講求盛典一破千古沿襲之陋今其時矣諸生其悉陳之又問江浙財賦之淵經費所仰曰鹽課曰官田曰酒稅其數至不輕也以三者而論鹽課兩浙均之官田浙西為甚稅止于杭州而已近年法弊害滋民力疸耗富庶之壤化為蕭條朝廷軫念生靈一旦奮然減鹽額十萬罷民食與倉運之法東南之民歡欣鼓舞遍滿田野道路深仁厚澤前所未有也官田者蓋仍宋公田之舊輸納之重民所不堪議者非不知其害以為嵗久額定欲減無由言之未必聽也今觀于更張鹽法之事則可以見聖君賢相未嘗憚于輕賦而後于恤民當可言可行之時俾得輕減并去不拔之害亦豈不可歟至于酒稅包辦向焉民樂于從不以為病而今不然其故可知不過官吏虐害之耳若聽民自為而利其利凡防禁之擾煩一切去之其便利可久是豈無術歟今四方之事衆矣輒因仁政之及于江浙者并及二事諸生其亦有聞乎亦嘗講求而思有以處之乎又問鄉飲之禮古之所以尚賢而尊長也其威儀度數之節幸存于故自漢以來下逮唐宋郡國州縣猶有按據以從事者今之賢長吏間亦舉行而非有令著也宜出自朝廷頒示海內使斯民獲見三代揖讓之容以為革心向化之助豈非治世之令典歟竊嘗讀禮考求其故而亦有疑焉先儒謂儀禮為經禮記乃其義疏儀禮有鄉飲酒禮故禮記有鄉飲酒義信也今以二篇考之儀禮則首云主人就先生而謀賓介次乃戒賓記則首云主人拜迎賓而無上事記有三賓六十者坐五十者立侍自六十至九十豆各有數而禮無其文若此者何也孔氏以記義一篇兼有四事一則三年賓賢能二則卿大夫飲國中賢者三則州長習射飲酒四則黨正蠟祭飲酒據此則不專釋儀禮其説何以分歟且鄉射之禮飲而後射其義略同然于主人戒賓而無介至一人舉觶之後獻尊尊酢皆鄉飲所無而鄉飲則略記遵入于其終或以為缺而未偹必參考而後通其説然歟周官黨正國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位即蠟祭之飲也月令孟冬大飲蒸亦即此歟而鄭氏云其禮亡今郡國以鄉飲禮代之則是蠟祭之飲本與鄉飲同此又何歟豳風之詩十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥鄭氏引以釋大飲且鄉飲之牲以狗而此有羔羊抑别有説歟夫為其事者必先明其義講求討論他日舉而措之爾凡是數端其稽之于經而詳究夫先儒之説必有得之以俟有司之采擇又問治天下者不能以無刑墨劓剕宫大辟古之五刑也笞杖徙流死後世之五刑也肉刑難盡復矣比者治盜略倣劓刑有司閣而不用卒于不行豈真不可復歟律之死刑有二今止為一遂以輕而從重徙流之刑悉代以杖乃以重而從輕議者抑未之思歟刑統之書自唐以來隨時修定尤為詳密國家酌古準今亦嘗按據從事謂宜定為程式若昔者明法之科吏而仕者必出于此今之通制或當以刑統附入而使得兼用是亦皆時務之所切也夫治有本末皆不可廢特有輕重之不同耳若泛為大言曰化民以德為國以禮何事于刑則非所以答吾問又問箕尾之墟幽冀之區欎欎蔥蔥屹乎皇都峙以西山居庸繚以涿易潞沽山川相繆古今不殊亦嘗有慨然于此者乎肇自君奭啓土建邦彼其化行于南人猶思之而愛其樹况于貽厥子孫豈無遺風餘烈之可言者乎春秋燕人北燕號為弱小一變而戰國悍然與六雄並何其頓異歟縣金招賢談笑而夷萬乘之國亦足嘉矣結客執仇欲挾匕首以得志又何疏也然慷慨悲歌世猶有存者聖賢之澤反不若是久何歟秦漢之君鋭意神仙談者紛起又不類夫忘生輕死者之為抑樂趨時好而非其本心歟謂其人習戰攻俗尚鷙勇固也然有文武偹足為中興元功者摧鋒越河以忠義自奮豈專以勇乎傳詩與齊魯並稱明書禮與鄭馬並列上五經義垂則後世以春秋對策不下朝董者有之於世亂教衰之時獨崇義方五子皆為名臣豈以戰鬬歟况遼金相繼云數百年名世者亦豈乏人故老之所傳遺牒之所記有可一二歷數者乎方今天會運同治教休明邦畿之近㴠煦仁義道德之中士平居自期戰國以下不足論也然考風俗以驅治希前人以成德兹固學者之事尚悉陳之家孰䇿問二道漢武帝建元五年置五經博士蓋有感于董仲舒之言罷黜百家表章六經此其事也趙岐孟子題辭稱孝文皇帝欲廣遊學之路論語孟子爾雅孝經皆置博士後罷傳記博士獨立五經而已據此則文帝時傳記尚有博士五經豈得無之非始于孝武明矣然五經博士之置文帝時不書而傳記博士之罷不知在何時表章之義武帝專之而文帝不與無乃非其實歟傳記固不可同于經讀經者必通爾雅爾雅屬之傳記可也考經論語皆聖賢切要之言文帝之置博士當矣而武帝不能復然世儒無有議其失者何耶又高帝入關與民約法三章悉除秦苛法所以得民心也其後三章不足以禦姦蕭何捃托秦法作律九章復用秦法矣高后初年始除三族誅而孝文元年又何以書除收孥諸相坐律令乎新垣平謀逆復行三族之誅則前此所謂除者皆非歟愚嘗讀史至此思之而不得其説其何以通之禮部集卷十九
