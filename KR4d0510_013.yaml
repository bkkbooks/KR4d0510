body:
  text: 禮部集卷十三元吳師道撰記忠節祠碑天地有大經亘萬世而不泯者忠義是也夫惟敗亡之國其人乃見而有道之朝務存至公不責其抗而録其節至於倒戈迎降開門納欵者雖賞之爵之而未嘗不疑其心薄其行是以髙祖致丁公之戮文皇章君素之贈皆所以植天衷正民德崇世坊非淺見俗識所能測也宋趙昂發者字漢卿昌州昌元縣人也通守池陽時天兵南下池守臣已遁趙侯攝府事即命為真自知城小兵寡勢必危已貽書其弟誓以死報至元十二年正月城陷侯與其夫人雍氏訣雍氏曰君能忠吾獨不能為忠臣之婦相役地下乎侯喜大書曰國不可背城不可降夫妻俱死節義成雙俱自經於州治之後堂大丞相巴延入見而義之命以禮葬於永明寺之側按侯以科第進前為遂寧潼州幕官知宣城彭澤二縣人稱寬信先生蓋眇然儒者也雖不能決鬬於鋒鏑矢石之場而守死弗去於義為得若雍氏區區一女子非服習素聞又豈能若是哉宋嘗贈忠義侯節義夫人廟號旌忠而事不及行矣逮今六十年邦之父老道之者猶咨嗟太息而未嘗不談丞相之盛德也今復紀至元丙子之嵗府經歷蕭君文孫始至未遑他事慨然念祠之未立乃與景德寺主僧正宗謀闢大門左宇並設二主書故爵諡而扁其額曰忠節之祠既祭妥靈又將經營以奉其久蕭君是舉偉矣哉國家祠忠臣褒節婦具有明詔若趙侯夫婦者誠當一旦而發於蕭君巋然足以增世教之重固聖代之所樂聞者君廬陵名家風裁峻整遇事必逹其志嘗著忠孝二史表近代之人物宜其奮不顧流俗獨汲汲於衆人之所緩者豈苟然哉師道既承斯命以紀其事且為薦享送迎之詞以畀其邦人歌之以行其思焉詞曰大風起兮雲飛江聲振搖兮孤城惴其將危城之危乎侯寧不知死封疆兮吾分之宜嗟婉孌兮閨中姿激義烈兮駢頸同歸玉碎珠隕兮皎不緇奔師賣降兮彼何人斯屈膝頓顙兮兒女嗢咿企雙翔於青雲之上兮奄奄苟活不愧死其奚為齊之山兮秋之浦儼巍峩兮新有宇弭回風兮神來下薦有蘋兮奠有醑邦人欣欣兮願侯母吐惟忠惟貞兮福汝祐汝疇非臣兮誰則無婦庇我民兮永無窮以終古蘭溪官舍壁記至元乙亥之冬豫抵建德官下聞其地亦稱蘭溪曰嘻豫蘭溪人也天復畀豫以蘭溪異哉則考按圖志蓋茹蘭之溪發源于縣東迎春洞之側經縣治西流會堯城溪以入於江者以多蘭名夫蘭以芳香比德君子豫固願為君子者今所至與蘭俱蘭之於豫厚矣苟豫德不類能無愧乎惟古人為吏未嘗廢讀書彼其汲汲焉獄訟簿書之餘不敢舍其力以嬉誠知夫所資者之在乎此也不然則君子之棄而小人之歸矣會豫病目稍平明年始定居官舍後有小閣負山瞰池前挹玉峯頗髙爽取所遺書數十餘種列左右几上橫榻而中處焉時二兒以病留家憐其齒且長而廢學久則命取以來與之自為師友凡退食之暇休沐之日靡頃刻舍是也憑髙而四望則煙雲之吞吐月星之陳布草木之悴榮鳥蟲之喧寂晦明四時之變交於吾前可默而察之也若夫民瘼政疵於此思之將以有行也失言過行於此省之將以有改也煩囂之集於此正襟危坐濯而清之也忤觸之來於此放歌長謡紓而平之也至於六籍之微言百氏之殊義夜思而有得則旦起而筆之竟乃上馬以出歸則不暇解帶徑造而挾册若追所忘參訂考索籖帙縱橫較讐點注丹鉛紛錯或目眩手疲則二兒從旁助豫而彼亦程其誦説獻其課習每為之欣然竟日忘食與寢焉烏乎此傳舍也前乎吾者有若人歟不可考也後乎吾者有若人歟未可知也顧豫之淡泊寂寥誠不滿彼一笑而彼之所樂雖萬倍此吾不與易也至是且兩年吏民始而迂其為中而諒其誠頗相安於清靜至連月無持訟造庭者所治不過租賦送迎之事而豫益得以樂其樂也時方更張庶政督禁嚴密州縣殆不可為懦緩者懼焉欲投劾以去則又法所不可或且羈而罪之因撫卷喟然念早承祖父訓自知刻厲未冠綴文中嵗漸有所論著科舉興偶然得官亦有以自見矣獨恨奔走弗寧又撓於憂患疾病未能卒業家苦無書從人借不可得發憤購求凡數千卷而鄉先正之遺文緒論世所不知者手録盈數篋皆平生所甚珍惜逺莫能悉致嘗恐守者弗謹以為深憂堂堂金華文獻未泯二三故人道德文章皆當世之望愚幸獲遊其間誓將相從以居朝夕承所以教異時有所樹立可藉手見古人亦不啻足矣匡世濟民其責決不在我而科之興廢又豈繫吾之輕重哉二兒聞之喜見顔面其於乃父之志庶幾識之矣因序而揭之壁間以勵豫之毋忘教經堂記古之賢者必貴貴而得祿者必富所謂富貴以道得之者也後世不以其道而得富貴多於是始有眇視軒冕鄙厭金粟以口不言富貴為髙者或以為言則交訾其陋如桓榮陳車馬賜以為稽古力韓公訓子諄諄語卿相光寵咸不免於訾者之議是皆隨聲接口而不深察夫事情者也韋賢玄成相繼為相鄒魯間為之諺曰遺子黃金滿籯不如一經夫以聖經而與黃金並得不類於前所云乎愚嘗按其意則亦有數端蓋籯金易竭經術無窮遺經者安遺金者危初不以利之多寡相較言也學也祿在其中吾徴諸聖人而已利祿豈在所惡哉河東王君元肅與其兄元輔蚤侍父母遊學江南其父有四方之役而其母尤専意於教俾從碩師良士遊業成而聞彰元肅今方以察亷升御史府掾推所得於經者以用於時自念所以至此者皆義方之教之力因以教經名其所居之堂嗚呼父母孰不愛其子教之以聖賢之道其為愛子也至矣子孰不欲報其親以聖賢之道淑其身其為報親也大矣是在父母為賢在子為孝異時居三公位享萬鍾祿亦以道得之而不愧者人將以昔之羡韋氏者而羡之王氏彼不得以専美於前矣然使凡天下之為父母者皆視王氏以為法其有關於世教又豈小哉斯堂之美其可以不著乎故豫得因元肅之命喜而為之書梅公亭記士君子遊宦之邦去之數百年人猶想其風烈而不忘至於崇表而彰顯之是雖好德之心然其所以使人至此而為末俗之勸者豈小補哉池之建德故宋尚書都官員外郎國子監直講梅公聖俞景祐間為知縣事集中詩幾百篇皆在是邑作而當時風物官况之大略可考見也後人嘗即官舍西偏為梅公堂以祠之既廢而今柴夢規重建於縣圃之北世易事更復改縣後之半山亭為梅公亭以識其舊未幾亦化為荒墟師道之來也按行遺趾見大礎在茀草中蕘兒牧豎躑躅其上老木三數株錯立蒼然為之躊躇太息自是營搆之念往來於懷越明年始克就緒為屋三間復扁其號限以周垣鍵以外扄飛簷虛楹髙亢疏明既與邑人慰其景仰之思而溪山室屋環繞映帶又得登臨之美以相樂也當宋之初文體卑陋公倡古淡之作一變其習歐陽子以一世巨人而盛推尊之若已弗及又以仁厚樂易溫恭謹質稱其人同時諸公交口論薦雖仕不大顯而文學行義足以儀當時而表後世建德肇邑自唐令長凡幾何人而公之名獨稱之至今是豈可以勢力致哉使凡吏於此者登公之亭誦公之詩思公之所樹立以自勵則斯邑之民將受其賜於無窮不然是皆公之罪人也師道於公無能為役然不可謂無志於自勵者斯亭之作既自為之經營而衆來致助乃命邑人某董其事不以煩民庶幾可久尚告來者嗣有葺焉其或迂吾之為漫不加省任其圯壞泯滅亦獨何心哉亭成當至元三年丁且之嵗十二月乙亥明年春三月某日記建德縣復地興造記建德池屬縣萬山所盤治所據其會玉峯當前髙大勝特茹蘭之溪過其下合他流以入於江夷然寬平故重門復堂潭潭邃深左右猶有餘地其後悉負山於以占亭榭為宜師道被命來尹考志按圖誦宛陵之詩求前令林俊卿吳淵柴夢規之所建立如朝峯半山之亭梅公之堂皆久無存而近時改作梅公亭者尋亦廢左偏衆樂園四周數十畝民相與侵據堙池以為田塞門以營舍桑麻粟麥之利實蕃而嵗輸纎微以蓋其欺山東趾有泉亢旱不竭號清白泉亦槩為糞壤會有訴其事者詰之則交持偽券紿我且版籍竄易久不可稽摘決參驗姦狀既得乃悉反所侵於是為屋以募居者量其地之入以供官用呼老人指如泉處掘之即瀵涌而出後治甃甓覆屋其上仍作梅公亭於舊址加闢而廣雜植花木為徑通泉上而下屬於署後又念公宇雖粗完而正門特卑陋不中度撤而新之三其中間翼其兩旁稍髙閈閎以稱前後其材與費則捐俸之餘裒助之細諉之邑人計工僦傭如作私室始至元丁丑冬十二月乙亥明年三月丙申竣事自惟治邑無狀兩年於兹力之所及僅若此誠不足以誇示而父老咸謂故地雖歸人習姦欺懼將復有如前之所為者不可使泯沒無紀也請列於石而併節取公牘之語刻其隂兹不得而却也烏乎天下之事有廢有興恆相尋於無窮前人之於兹地可謂勤矣使繼之者常若而人則永存而不廢可也而何俟於更為甘棠之樹勿敢剪伐峴首之碑見者墮泪彼其所恃以為存者蓋有在也而愚方切切然逆料來者之不然惴惴焉惟恐奪者之復至不亦愧乎雖然繼今以往將有大興兹邑之治駿功偉績逺邁於前而深笑豫之陋者其有考於斯言矣池州修學記古者先聖先師之祀必於學法具禮經而其詳不可得而考矣後世廟祀夫子配以髙弟從以諸儒制日益修然廟以崇聖神學以處師生當别而不混嚴而不褻則庶幾爾池陽郡學在城東南隅直九華門清溪之上宋故址也至元三十一年燬於火延祐五年又燬補建僅完規度苟略故未久而多敝且前廟後學蕩無周防往來交迹兩廡皆覆荻代板穿漏傾圯圖繪剝落甚非所以昭尊事而致崇極也至元重紀之四年總管通議公博囉布哈與經歷吳君逺翔以職在主領顧瞻弗寧實圖更張監郡公德哷薩巴夙有興學之志議以克合僚屬交贊先是學前嵗魚池之利或妄援弛禁例罷免學正姚廷用發其姦府嚴督徵得錢為貫一萬七千有竒用以充費於是撤舊而新易脆以堅殘缺復完昧黟更煥由門而殿悉以序及當殿兩旁限以扄鐍啓閉有時肖像從祀一百有五人搏土設色咸精其能徙賢祠之次治土神之棲闢祠祭之室論堂齋廬密比以整最後尊經閣前總管薛超吾所建者特為雄偉復稍加修飾神既妥靈士亦樂居潔淨尊嚴一洗前陋又議以餘資完治祭樂器服悉如其數績亦不細矣惟池學饒陂湖土田嵗積弊滋奪於豪民者已置弗問權勢之所占射掩為己私公家之獲十不一二陵夷朘削不振已甚是以一切承陋踵弊而莫之省吳君方以白之通議公究其事會南臺御史實喇布哈公張公圭行部按臨深以為言承命為謹乃慎選屬吏按核勾檢迄復侵壤尤不易易也竊聞聖賢之道莫急於正人心彼其忍於絶聖人之粢盛扼多士之吭而奪之餐者是誠何心哉眇焉布韋莫敢與抗是猶可坐以懦而無主之罪乃若身為蠧蟊啓姦納侮甘心名教罪人毋怪乎彼之悍然而與之也人心淪陷至此亦可哀已明明憲臣振勵於其上良守賢牧參謀式克承之遂能因時有作夫俾之周旋於宫墻儀象之間有以肅其容正其趨激發其愧悔感悟之端庶幾可與為善而從事於詩書禮樂之教則是邦風俗之一變而美實於此乎肇是役也専諉之姚廷用而學録錢某佐焉奉行而程督之者府吏陳某也學耆艾之士以師道目擊顛末請述以文輒不讓而直書以警夫世之有人心者建德縣迎華館記建德為縣介池饒間瀕江連淮其南道所出則涉重湖以盡嶺海故宣諭詔旨之使乘船馳傳之臣聮絡無虛日官吏迎候郭外率露止道旁或暮不入則寄宿民家迫隘卑汚不幸而雨拜跪沮洳中相顧以為病比嵗師道為尹嘗欲規便宜處營置若亭館者補前政之缺會以復縣署起廢修亭更建大門葺諸敝陋卒卒不暇而去日迫之矣東平辛淑仲剛實來代豫仲剛舊從豫遊者也且别則具告以昔所未及為者數端仲剛欣然蓋有領也豫既歸里中一年仲剛以書來言曰出縣北郭門洗馬橋之東得民李氏地以官地之在內者易之為屋凡十有五間門堂室廡悉以度庖湢廏庫咸具所須宏不過侈華不及奢非徒吾曹之奔走者有所庇依而弭節休轡望而願止者弛然得其安先是慮費之無從僚佐悉輟餐錢以為之先民之役於官者相率致助不足則又勸其餘以贊之始於己卯九月之庚申迄冬而畢雖役非甚巨而材費亦殷然因其所欲而不咈集之以和而不厲庶幾公疇昔之志而樂聞者敢以嵗月之記為請豫既躍如以喜則為名之曰迎華之館且以復於仲剛曰夫亭傳之設非以飾美觀媚往來也知君命之當尊則知使臣之當敬豈細故哉以仲剛之才成此固不難雖然豫竊有感焉師友道廢交承義薄久矣趣之不同背而去之若不相識立異逞私不旋踵變其為而敗其成者則往往皆是也師道政學無以踰人懼得罪於斯邑而仲剛之號於衆則曰吾一循公之為今又唯豫言之信必非苟隨而以為用者矣矧兹興理若社稷廟學之類不一役特以是館創端在所以當紀之因并發所欲言非以為誇且諛也繼今而後以採察咨訪為任者於是遊焉息焉必能稽察參詳公論以得其所為可不懼哉可不勉哉孝感泉記章貢蕭弼漢臣事親至孝從事四方輒迎以俱守祿而貧養志而樂人以為難其在南康府史也父卒不逺千六百里歸葬贛縣金湖之岡為廣帥閫掾也母卒又不逺千八百里歸祔父側負土以墳邇墓為廬動據禮法尤人所難也其營母葬時嚴冬沍寒身先役夫取水數里外一夕去墓二十步後嶺上裂泉流郡人走觀驚異總管遊溪李侯某為書孝感之泉以表之蓋天歷元年也漢臣來婺幕府師道獲聞其事因為之言曰天人感應之機誠而已誠則神神則變化無方况一念之孝出於誠者乎泉者流通之物也吾之精神實與之為流通此理之至微而甚著者彼刺山而飛卓錫而湧匹夫異教専一不二猶得致之况於人子之為其親者乎是故味出如江薑詩之感也寒流於庭宋思禮之禱也乃若安金藏葬親南闕燥地忽溢劉筆老父子營冢大谷山飛流再涌此皆古之純孝事應章灼所謂誠之不可掩者乃今於漢臣見之而與之齊美於百世之上豈不偉哉愚觀今之以孝受旌賞者其稱述必有異漢臣之事異矣使因李侯之舉張而大之可也距今十有三年而甘自湮晦若未嘗有非出於為善之誠而能若是乎故愚竊為之記如此然亦知其事之不終晦也如蘭齋記理之在天下未有不同而人心嘗患於不同者何哉私以間之而已君子之學將以反乎其同也破私而為公并異而為一則凡天下之我同者未始有間也夫言發於心人之相與居必有以見於言也苟出於其同然之真則言之者藹然而可親聼之者油然而有得心融神會而彼此莫之逺又何不同之患哉同心之言其臭如蘭易大傳釋同人九五之辭也謂君子之道出處語默始若不同而其心之同終實無間故其見於言而有味也如此足以觀同人之義矣且聖人喻君子之言而獨取於蘭者蘭芳草也君子實比德焉同人之上卦乾也聖人並言斷金如蘭金之為乾固矣芳馨之氣陽也君子陽類也草之芳者是不一名而蘭為衆芳之宗氣之尤純者也乾純乎陽而無雜此蘭之得附於乾而所以為同者歟其比類亦大矣真定楊君士傑名其友王恆讀書之齋曰如蘭亷使濟南張先生為之篆以寵加之楊君與余在國子同僚以授余曰子盍記之豫以未識辭楊君為言其人好修而文溫靜端厚君子也又聞張先生以風紀臨是邦所賔禮者惟楊君與恆二人嘗造其廬相從於文義之樂他人莫與焉然則是齋之美不為虛矣抑愚竊有感焉愚蘭溪之人也居多蘭之鄉德則愧焉然其心未嘗忘蘭也今雖未獲造如蘭之齋使一造焉其麾而去之耶豫而進之耶不可知也竊髙二三公之誼倘得以文字自見而不為君子所棄是則幸之大者故受命不復辭且薦其説以請敬義齋記國之方興必有非常之人出而佐其開創經營功在社稷澤在生民於是又有賢子孫繼之當承平守文之時以道事君而贊一代之治不其盛哉翰林學士多爾濟巴勒公其先魯國忠宣惠武兩王奮起朔庭首佐皇業錫土祚封傳至公八世矣公生長富貴雍容妙舞而處之泊然篤志學問由是入延閣侍經帷遭逢聖明顯被光寵是雖公之自致而公則惟念吾之所以圖報者亦惟力於學而已是以蚤夜孜孜無敢怠忘歷考聖經求甚切而至要者願得一言為之指歸而服膺踐行之乃取坤六二爻言以敬義名齋顧不棄鄙愚而命之申其説愚何足以知之夫易卦首乾坤而吾夫子皆以學言之於乾則曰學聚問辨進德修業於坤則曰敬以直內義以方外乾奮發而有為坤靜重而有守其德然也亦分也乾君道而坤臣道也以言乎學則皆極其至者也學莫大乎立心而制事直內則有以立心方外則有以制事而天下之能事畢矣是以諸儒又從而演繹之以為是合內外之道也是持守講學不偏廢之功也是敬為義體而義為敬用也是二者夾持直上逹天德也敬義之藴無餘體之而致其力則在夫人耳愚復何説哉竊獨以為君臣相遇自古以為難公之以坤道自居者坤所以承乾也當開承啓沃之任而為緝熙光明之助則大人正己之事其可少哉且爻之辭曰直方大不習無不利也由直方以致大不習而無不利則其見於用也孰禦焉公之為御史也彈劾不避權勢近承命有所案治毅然不阿所謂不疑其所行者於此已見之矣方將大用以光於前人以慰天下士君子之望可不益知自勵乎靜思齋記自建安之學散在四方吾金華何王氏嘗得其傳雖以愚之不才竊私淑而與有聞可謂幸矣朝廷表章道術既出於一學者莫不曰自建安而好異者每恥於自屈陽合而隂違持吾説而行何其契者之少也成均首善天下魏國許文正公之教一以建安為宗夫以公之特起北方地之相絶數千里而先後一揆若合符節尊信嚴事比之神明擴然大公之心其為百世之師也宜哉師道之為博士也與真定楊君士傑為同僚士傑學於其鄉之隱君子安氏諱熙字敬仲安氏之學則祖建安而宗魏國者也士傑篤守師説藹然淳懿慤實之風與豫言而為莫逆也則知其嘗得何王氏之書與其句讀音訓之法又徵豫所挾纂輯誦傳汲汲弗置何其甚異於人而同豫也於是士傑既去為御史猶時時相過談此事一日謂豫曰豫生好靜知靜之可以為學也又知為學之道未有不原於思也故嘗名讀書之齋曰靜思以致吾意子為我申其説豫聞聖賢之學心與理而已理具於心又非相離也靜故心不外馳思故理有所得彼莽然措其心如稿木死灰者非靜也雜然而絲棼茫然如大軍之遊騎者非思也端莊湛一之中自有明睿通微之妙燕間幽獨之頃不忘運量警省之功聖人之所以立極學者之所以作聖不出乎此而已雖然豫又有説焉嘗觀於易之復矣五隂閴寥一陽眇綿聖人繫之辭曰復其見天地之心乎夫以靜為天地之心不可也以動之端為天地之心可也然非靜則何以見天地之心此亦愚疇昔聞諸鄉學者非靜思之要旨歟士傑明於易者也因舉以為告於此有同乎抑有異乎一言以復我庶幾樹發之義焉玉雪坡亭記天地間有至清之氣得之者則為天地之至潔若玉雪是也雪雨於天玉産於地其色同也昔者孟子之論白獨舉白玉白雪之白者蓋以他物莫之與並而吾夫子所謂白乎涅而不緇若玉雪者其可涅而緇之哉植物之中有梅焉其白蓋玉雪之類而芳瑩髙潔傲凌嚴冷尤得氣之清者夫玉之不可以多致而雪之不可以闕説也可以列植而縱觀者其惟梅乎愚嘗識兹説以為世之人有好梅者其必有以知之矣宣文閣授經郎周君伯溫為余言世家彭蠡之東望湖山之旁四山如城雙澗交流當居茅之西有坡焉其先大人植梅百十株嘗自號梅山翁以志其好其尊翁待制暨伯溫母氏封植之勤伯溫嘗閲郡志故宋時守居多梅有亭名玉雪坡者愛之亦作亭坡上揭其名楣間來京師復令善畫者為之圖以求士大夫賦詩屬豫記其事豫觀周氏三世以文儒顯梅山翁錫命詞林而伯溫父子接武於廟亦既登白玉之堂遊羣玉之府矣嵗時扈從出居庸抵灤京雪山水谷昔人所未歷者皆身至其處今也江鄉澤國月香水影幽麗竒絶之觀又將幅巾藜杖逍遙其間以尋退休之樂取數不既多矣乎豫聞君子寓意於物者矣早夜之間疏瀹而照明之使一疵之不存一塵之不汚以保完其精英雖照映天壤流芳無窮可也伯溫之志其出於此歟豈徒玩物適情而已異時志番陽者玉雪之名係之周氏以傳豈不宜哉金溪孝女廟記撫州金溪二孝女者葛氏之女也父祐唐寶歷時官以其地産錫作冶場祐家頗有資迫使涖其事鑿山烹土石無得傾資以充且不足日繫縶榜笞之祐無子二女痛不能救俱自投冶中死監吏黃慷聞于州州刺史奏於朝遂為罷冶鄉人即於通禪寺祠之國朝大德四年縣丞吳瑾始别為廟於石鐘山下延祐五年縣尹李有復新作祠記興於前矣先是至元中府尹張國紀賦銀屬縣總管趙侯友繼之獨引孝女事免金溪且親至其地詢察議者口塞于是縣人始知孝女之為賜而長史之知政者表章之惟恐後也鄉之士危素猶惜其事之未白於世請其友番陽李存記之又求奎章閣學士虞公集贊之名卿顯人又詩歌之由是孝女之名不獨撫之人聞之矣素在京師會縣丞尹大鵬將之官告之故亟至即展敬祠下顧棟宇傾敝弗葺惕然有懷召父老謀之雅州名山劉子芳者願以私財自營不煩而集實至正元年三月也明年丞以書言之素素以告豫謂不可以無識也豫惟先王任土作貢不強所無深溪長谷光怪竊發竒貨橫陳孰得而掩之自夫覬利小人鑿空造禍往往而然金溪之金豈昔有而今無哉意者地之名實纍之爾往至大中鑄錢吾州金華又有鄉名銅山者有司以為言幸而事罷亦此類也孝女之死可哀已或稱投身化銀又謂死後金不復産是皆欲見其異而未究其實者嗚呼死其身以生其親又能逆去數百年之害使世之孝者有所勸而貪利姦欺者有所懲其功大矣丞留意廟事嗣於前人不問可知其賢而危君之攄發幽潛捍衛鄉井是亦仁人君子之用心者得不樂為之稱道哉然典祀既崇封錫未加危君方與朝之顯者遊繼今得之當又有紀矣至正二年十二月日記朱敏平反獄事記天台朱敏明德初為仙居縣吏縣林𢎞道誣兄翁歸與陳甲共殺其父獄已具明德疑而詰之乃𢎞道與兄有隙令陳誣引之而其家利得賄也王乙妻沈以姦謀夫而誣王縱妻明德正其罪并坐受賕者潛卑劫殺僧大亨詞連江乙等四人殺其牛明德疑事旁出窮問乃其仇朱丙自以牛皮付捕者妄云得於乙家於是四人皆得脫次吏瑞安州慶元慈溪縣盜殺海商事久不白分憲疑其寃抑府命州薑判官往勘佐以明德實注意焉初縣共捕方甲等十五人鞠之皆承內王乙獨稱掠得綾紗數段後會赦遂以例得釋明德察其差則方等贓驗皆非而王乃真盜元物三百六十有六其存時十四人者死其一餘十三人悉縱遣升吏溫州樂清縣富人夏民本誣執李甲等二十五人為盜覬獲賞得官明德直其寃遷婺州復辨明造偽鈔囚林乙非同情者前後所全活四十餘人嗚呼獄重事也方今平反失出入具有著令非無勸懲奈何司民命者沈酣利欲良心泯滅盡矣曾何責於小吏乎不謂於明德見之也使四十餘人不遇明德則惟有就死而已推此言之天下之寃胡可勝數幸而有人焉如明德則其效又豈不博哉豫嘗識明德剛徑士也聞其少孤鞠於祖母祖母設誓不食肉四十始昏人強以肉數年後見所為誓詞不食如初其秉志不回如此宜能為人所難也諸公既上其名於薦書矣今得徵休寧幕職循常調爾而旌賞之令未下也故愚為列其事庶幾見者或有省焉浦江張縣尹惠政記漢初曹參相齊用蓋公言清靜而齊治後入相以其所以治齊者治天下百姓歌之歸功老氏確矣豫嘗論當時齊魯諸儒徒為紛紛無以孔門居敬行簡告之者夫簡之一言足以包清靜而敬又本原持養之功老氏而曾及此乎甚矣夸者之不察也浦江父老來言其尹張侯之政曰侯為邑且三年無疾呼遽色簡節而疏目訴訟之至者每開諭使自釋賦役聼其自議而均租稅不待督責而集蓋以亷為本而寬以輔之其心惟恐煩民而民亦更相戒飭惟恐以煩有司是以田里晏然而承事服役者無以行其私也吾等懷德而圖報則願托之貞石焉子其文之又言侯好讀書公退杜門惟執卷危坐烏乎侯其有得於敬簡之旨歟不然何以能若是也哉人知有事之為功而不知無事之為功有事之功小無事之功大侯之所以得民者在此固宜有述哉婺之所轄州一而縣六其談長吏之賢者僅一二人而侯與焉公論甚可畏也鳯皇雍雍衆鳥從之狼方驅羊而盬其髓民之有幸不幸如此詩人樂土之思其能自巳乎此豫之所以重有感也雖然彼其熏純德而沐清風或者愧悔改厲豈惟浦江將他邑實受侯賜侯名悅遂字彥直大同人祖父皆有勞本朝伯父禮嘗平章中書侯以父任纍仕江西州縣而至今職云禮部集卷十三
