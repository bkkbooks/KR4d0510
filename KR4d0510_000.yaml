body:
  text: 禮部集别集類四元提要臣等謹案禮部集二十卷元吳師道撰師道有戰國䇿校注已著録集原名蘭陰山房類稿此本題曰禮部者蓋師道致仕以後授奉議大夫禮部郎中以所進之官名之也考張樞撰師道墓表杜本撰師道墓志皆稱致仕後授琴議大夫禮部郎中而宋濓所作墓碑則稱以禮部郎中致仕元史本傳亦同蓋元史即濓所撰故與碑合然樞與本皆師道舊友不應有誤或濓記録未真也凡詩九卷文十一卷流傳頗鮮此本乃新城王士禎寫自崑山徐秉義家因行于世師道少與許謙同師金履祥所著有易雜説二卷書雜説六卷詩雜説二卷春秋胡氏傳附正十二卷于經術頗深所補正鮑彪戰國䇿注及所撰敬鄊録于史事亦頗有考證又與黃溍栁貫吳萊相與往來倡和故詩文具有法度其文多闡明義理排斥釋老能篤守師傳其詩則風骨遒上意境亦深裒然升作者之堂非復仁山集中格律矣蓋其早年本留心記覽刻意詞章弱冠以後始研究真德秀書故其所作與講學家以餘力及之者迥不同云乾隆四十五年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1317f2de308ea323cda1a71b2025e960d30a6d0597dd55fe9856903e96942103
