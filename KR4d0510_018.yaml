body:
  text: 禮部集卷十八元吳師道撰題跋儀禮經注點校記異後題昔昌黎韓公嘗患儀禮難讀讀之難故讀者少而善本亦少也永嘉張淳忠甫校定又别為一書以識其誤號為精密而朱子猶笑其不能正釋文之謬故其輯經傳集解考正文字詳著條下幸惠後學大矣許君益之點抹是書按據注疏參以朱子所定將使讀者不患其難獨不鄙夷而以下教時時一二小見特效之君或有取焉往復數年必欲毫髮無恨而後已本既定傳藏于家杜君原父令其徒蔣師文傳點君又見東萊吕子點校本且記與令本異者見示蓋吕以成都石經校印本標其異者于上而注中多改塗增字其標者意兩存之而塗改則斷以己意此非吕子不敢也考之吕集附録從子喬年記吕子標抹書首出儀禮豈即此本耶凡吕子所標抹必點句讀吾鄉故家所藏史記資治通鑑之類可證也喬年謂一字一句點畫皆有深意而所得之精多見于此愚因杜君而獲此又豈非幸歟顧未及示許君擕以逺行暨歸則君已殁而不及見矣今所録自喪服後缺其句讀與許君不同者除改字再句勿論凡十有三條欲質而無從固所深恨然十一卷中不同者僅止此條餘無不合益歎君之精詣絶識使及見之當有以自信而世之未知君者于此亦可以見其學矣吕本雖非完尤當寶惜恐其久而放失者也謹著標字于前而並列二家占句之異于後且序其所以然者若夫學者有志于古而求通聖人之制度而又究觀先儒之用心則有全書在焉靈棋經後題靈棋經卜占法也隋經籍志有十二靈棋卜經一卷其法用十二子上中下各四擲而布之視其所得之卦而斷之以其辭除隂漫無象卦凡一百二十有四繇辭古雅似焦贛易林南齊江溢嘗占得金碗玉杯之辭今見初吉卦朝無咎求志賦訊黃石以吉凶兮棋十二而星羅曰繇小而棋大兮何有顛沛今見卷首升騰卦張宣公云其家先魏公所藏其説甚有理以十二子驗隂陽竒耦之數若隂勝陽必不佳在靜江時旱卜云堂上流水堂下行舟已而果雨今見隂掌卦上句作中庭水深文微異按其書有曰一本云云此或别傳也王伯厚紀聞引異苑謂出張文成受法于黃石公行師用兵萬不失一東方朔密以占衆事愚謂此亦後人依託傳會今其書有商山四皓養行道之言文成四皓並時安得有此知不然也宣公目之以有理而發明其説以見其所以靈非苟然者隂陽在天地間不可相無然聖人之于易也嘗崇陽而抑隂進陽而退隂陽勝隂者常吉隂勝陽者常凶莫非自然之理也是法窺見此妙雖微黃石文成亦豈常人也哉豫家先大父畜此書甚敬信之紙背有紹興十一年棋兵官記所占驗事三象內第七卦為人剪去嵗久紙爛祭法以後殘缺俾兒輩重寫因題時所性文鈔後題吾邦素為文物之淵宋乾淳中東萊吕成公倡明正學四方來者至千餘人而莫盛于婺清江時氏名鑄字夀卿者公同年進士與弟鋹長卿率其家羣從子弟十數人悉從公遊又為婺之盛若澐若瀾若涇尤時氏之秀成公輯書説自秦誓泝洛誥未畢而卒瀾以平昔所聞纂成之今所行書傳是也少章字天彛瀾之季子雖不及公門而習聞父兄已熟又天才絶出能推明闡大之著撰為最多鄉先輩中傑然者也某早聞先生長者稱其文極意訪求始于親友陳氏得所性前稿十卷時子自序云新天子即位之十九年年四十有五蓋淳祐癸卯也其詩文各以類從謂是料簡十分之一爾次于金華遊氏見所性藁類分而無卷其所作逮寶祐末似是晚歲全書欲假而不可意嘗慊然也近從葉君審言得所性叢稿起嘉定甲戌止淳祐壬缺惟用編年不復銓序凡三十六卷而第九卷至十六卷缺幸獲傳鈔而又恨其不全因念非得遊氏本不能足之間語葉君君假以來于是復為鈔補而總為目録記之合詩文數千篇為二十册亦盛矣其中有繫于經史者易序贊詩論語孟子贅説讀二漢史雜書戰國䇿雜事篇若其易詩書論孟大義六十餘卷春秋四志八表日記二十餘册皆無所考則今之所得又特其細者而已蓋嘗稽諸成公之教主乎義理而不遺度數之微本乎經術而不廢詞藻之華故舉業課試之文獨麗澤兼行其所以作人蓋本末具舉能進于是者亦戞乎難矣今觀時子之學根極宏深貫穿幽邃凡三代而上皇帝聖賢之奧秦漢而下成敗治亂英雄才智設施之略無所不窺詩出入諸家由盛唐而上追晉魏文用師法泝宋東都以前而逮古作者峻潔精工法度森嚴豈惟雄視吾邦蓋一代之偉才也矧其知尊考亭之學而敬其徒如稱張丈元德李敬子燔先生白鹿洞諸作及吾鄉王何二公之類議論未嘗少悖可謂無忝成公之門者矣年餘五十始登一第用薦者擢史館簡閲未上而罷固其自負高忌者中之所致脫益落落子女俱喪煢然自傷恐枉平生之心乃手自編次具見其所為序冀覽者毋以露才誚我哀而存之愚嘗讀而深察其意往往見其嘆時世之衰叔陽德之標季凛乎旦夕之憂而悲夫嘻嘻者之猶不悟也則其自傷又豈獨文而已哉然異時士以文取顯耀時子之文何啻度越時輩千百而卒窮以死彼其傷時人之不知而猶冀後人之知使後來果有知之者豈不足以慰斯人于九原而塞其悲也哉此豫之所以拳拳而不能自已也比嘗過清江問其故居高甍大第化為飛塵百年文獻掃迹無餘幸是編猶存豈可使泯泯沉沒傳而廣之可也古今作者之文嘗患于多少則易傳時子嘗自料簡豈亦慮此萬一遇賢而有力者依倣昔所料簡為之刋布亦易事耳世未必無其人也姑識于此以俟桞常博所藏禊帖後題定武蘭亭昭陵舊石既亡薛道祖摹刻僅存遂為他本之冠宋季賈似道購求東南士大夫所藏委其客廖瑩中簡較諸本剟取字之善者以磬命國工王用和刻之號為最精亞于薛本餘盡下品也趙公子昻書法妙近世每愛臨禊帖既沒亦為難得今道傳常博具有之聨為一卷真可謂三絶矣薛本初屬瑩中今在申屠大用亷訪家賈本或云史八右丞取去今道傳乃于吳君章副樞家榻得之二刻猶傳定武典刑未泯泯也因念賈氏迷國怙權假文藝粉飾一時以才伎自效若瑩中者蓋深知古人筆意然不特此耳其所校刻九經今亦為天下善本視蘭亭功又過焉是雖不以人廢若其黨附之罪則公以此而少恕也士之所從可不慎哉可不慎哉題胡古愚所作大拙先生傳後栁栁州賦愚溪以愚自命而又言雖不合于俗頗以文墨自慰潄滌萬物牢籠百態而無所避之蓋不甘于愚也他日寓詞乞巧抱拙終身人或以為未然東易胡君古愚為大拙先生陳信作傳大槩言其淡泊迂滯不利進取至稱其能文章喜詩善書則又有不拙者存殆亦愚溪之意夫胡君既自比于古之愚者矣而見大拙則又喜為之書流傳京師諸公從而贊述之以古愚之言不妄故也栁州不能使人信其拙而先生得胡君而信其真拙者歟題東坡所贈李方叔詩真迹後李方叔以文學受知大蘇公知貢舉欲取而失之卒不第而終觀公此詩深自愧咎蓋惜當時之失士而非以為己私略不置嫌疑其間廣大光明有古人之風焉異時方叔祭公文云皇天后土明一生忠義之心名山大川還千古英靈之氣感慨激烈遺佚而不怨兩賢哉大方者字允蹈楊誠齋嘗稱其少作思故鄉賦似耶居實及舉其詩警句數聨云晚以鶡冠為雜買場此卷中或記汪季路語其嘗投謁曾覿覿以啓阜陵不契而罷夫因覿以求知謬矣使其知名托楊公以傳則不為此可也烏乎士之處世或附青雲以顯或附泥塗而汙觀于李氏子孫者可以審所擇矣跋王荆公手書丞相荆公與人書間每有匆匆字先儒謂丞相何緣有許多忙迫時今此帖亦云俗事紛紛滅裂上問豈以為信筆常語而不之察耶公書字學王濛要為蕭散髙逺非餘人所可及也致嚴堂記跋浮屠氏割恩棄愛自放于禮法之外儒者之道判乎不能入也孝經曰祭則致其嚴此儒者之言而祭則儒者之禮也惠本師以是名其堂何居竊聞宏明普照大師者惠本之父也以父為師殁而奉焉故堂所以名之也烏乎父子之道天性也墨者夷之厚葬其親孟子知其心有所不安而故詰之施由親始一言又其本心之明不可得而息者是以卒能慨然而受命今之惠本有取于夫子致嚴之詞其過人逺矣使有孟子者因其明以發之則一歸于正豈出于夷之下哉劉謙字説後題程子曰有其德而不居謂之謙其釋大象曰外卑下而內藴髙大朱子亦曰以卑藴髙謙之象也國子劉生名謙前歐陽祭酒字以藴高且發明有而不居之説以告之其義取程朱正矣頃愚嘗讀易至是卦竊以為一陽在五隂之中九三為成卦之主通一卦觀之則亦小藴大卑藴尊虛藴實之象雖與上下二象地中有山異而義亦無不合故彖經曰謙亨君子有終而傳曰謙尊而光卑而不可踰君子之終也惟九三一爻獨曰君子有終其與彖合聖人之所指亦百在矣因生示此卷故輒附其説以就正于有道焉舒嚕元帥復姓卷跋契丹肇迹唐末盛強于五季舒嚕者其后族姓也又以蕭並稱徵諸史可見金滅遼改舒嚕為舒穆嚕以其國賤者之稱不道甚矣今雲南元帥存道公抗言于朝而復其故雪數百年之恥而攄祖考之憤其志可謂壯矣孟子曰名之曰幽厲雖孝子慈孫百世不能改也以惡姓妄加諸人有不可改乎此所謂自外至者也然卷中有謂舒嚕為蕭系出梁武梁武在江左與朔漠殊絶不知何所據也後世之崛起特興而自為姓或與舊姓同者多矣奚必出于一耶願從存道問焉以祛所疑道源文獻録後題宋慶元中趙忠定公之貶朱子偽學之禁至今言之者未嘗不為之切齒痛心也小人欲空天下之善類者必加以黨之名自司馬文正公主程子而黨論起趙忠簡公復收召程氏門人而道學禁至是復詆以偽凡三變矣馬公幾至斫棺二趙皆死逺方而程朱僅免其禍可謂烈矣夫道喪千數百年至斯人而明大賢固所尊信小人豈能誠服宜其嫉詆而欲害之深也忠定有定䇿大勳誠貫日月當時不察而至此極則尤可憾爾烏乎天不欲道之昌耶則奚為而生斯人也天實生斯人又奚為而滋是禍也此宋之所以不競也崇寧黨碑立而天下為靖康紹興正人逐而國勢為江左慶元偽禁又甚則勢愈􅕚而時益季幸而托胄之誅足以頗申士氣章顯于其後者僅足以矯前失迹其君臣有負于天之啓佑斯道者固已多矣我朝許文正公得朱子之學以佐聖祖夫其地之相絶世之相後也而其志若合符節豈非異哉上賴天縱聰明宏度卓越崇厲表章而程朱氏之書遂衣被四海道之大明未有若今日者兹固排禁扼塞者有以啓之于是而知天意之真有在也忠定諸孫某録其祖之言行出處而并附以諸儒名之曰道源文獻録烏乎朱子之道行則忠定之志不沒兹固相為無窮而其可以為世戒者尤著也是編其有不傳哉跋東坡枯木竹石楊補之墨梅右東坡先生枯木竹石及逃然楊補之墨梅折枝二作雖不同時皆絶品也坡公一代宗工使補之早及其門被賞識豈減文與可李伯時輩者哉然坡公之畫人見之者特以為文章學行之餘事而補之為人有高節文詞字畫皆清雅遒麗而世獨以梅稱士之藝名者真乃不幸哉趙明仲所藏姚子敬書高彥敬詩房山高尚書與吳興姚先生人品高勝故其詞章翰墨自有天趣此卷姚書高詩詩似王維張籍書似楊凝式上沂王大令使人想見其翛然埃壒之表宜夫二人者之相得為深也某于高公聲迹不相及子敬則間東西州皇慶中有孫伯勞者出子敬所書陸氏館中諸詩及手選樂府一帙小楷極精欣慕之甚嘗作詩送孫以末章致意暨趙君明仲往來吾州則知子敬為詳而明仲亦且過稱豫以欺子敬交以未識為恨耳泰定初明仲為常山簿相見則曰子敬亡矣為言其一月前似疾非疾屏居敷山中絶食惟日飲水曰人腸胃穢惡皆食所致吾將以是蕩滌而澿清之家人來候者悉遣歸留一子侍明日語子曰汝知之乎男子不死於婦人之手命扶起坐而逝烏乎其死亡之際如此世之知之者特末耳明仲以豫雅敬之故見輒道子敬事謹識而不忘時距其殁已七年今又十八年矣明仲子肅擕此卷來京師邀豫題因記前語明仲見之能無感乎坡公書東臯子傳昌黎韓公謂醉鄉之徒偃蹇不與世接猶未能平其心于是焉托昏冥以逃者也東坡謫惠州日自釀酒與野人道士同醉殆亦有托焉爾其自言飲少而見人酣適則同其樂者未知視屈大夫餔糟啜醨之意何如也某性不解飲飲不至一合數年前因強飲致目眚腸癖今遂根著不去聞杯􅎆之氣則疾為之動蓋絶交矣然在官居鄉宴集未嘗不與不敢以己之不飲而妨人之飲每低首煦煦導人為歡而與之處者祗見其枯燥嚴冷以為厭苦近覺其然一切謝拒遂無復與為傳侣者雖欲效東臯子東坡翁所為不可得矣因覽此卷為之太息許益之秋夜雜興詩右古詩十二首白雲先生許君益之之所作也乙亥之夏某病目甚劇至秋稍平則以文字承教于君君勸以損讀省思母為此無益也一日忽寄是詩來且以詩言之曰吾欲子之見之爾慎母和也蓋君平時罕作詩以為不發于興趣之真不關于義理之微不病而呻吟者皆非也然則此豈苟作哉觀其文貌音節上泝晉魏而寄興高逺旨味淵泳則有得于紫陽夫子感興之遺者也既不鄙而教我又慮其苦心動疾而愛我君之于我乃至此哉後二年而君卒又二年某歸自江東始克拜其墓下絶響僅存手墨如故嗟九原之不作悼知已之實稀因敘梗槩于後為之輟筆泫然司馬丞相人物記右溫國司馬文正公人物記考其間書元祐元年或書丙寅正公為相時也蓋因其所見所接者記之而時疏其才行賢否于下他日所以黜陟進退者在此亦昔人夾袋之意真宰相職業也當是時公已有疾方延見天下士大夫不舍日夜而又手自疏寫不以為勞則雖周公之吐哺握髮其何以異于此哉天不少延不得究其引用忠賢之志而所記如蔡京卞曾布輩亦未知其何以處之也烏乎惜哉此册有宋孝宗標題史彌逺跋語彌逺能言進賢退不肖為宰相能事而身自戾之亦一鑒也元識二十七葉今缺一二藏貞獻公孫璉家題危太朴所藏諸卷范德機墨迹昔人稱道所美于其人則曰風塵物表于其文則曰不食煙火語于其字畫則曰蕭然有林下風今觀范君德機詞翰而想其人真足以當之矣至治元年某試禮部君時為彌封官已往謁則已赴江西之憲幕矣遂不獲識至今以為恨耳又豫讀范君詩至雨止修竹間流螢夜深至灑然異之聞之太朴曰昔與先生秋夜不寐微步山中得此句喜甚且曰語太幽殆類鬼詩當以他語映帶之因足成此章今觀中仲跋語知竒寶橫前識者無不能辨之也吳草廬遺墨春秋春王正月之説愚嘗按據經傳定以為周正改而未敢自信也竊謂最可據者左氏云王周正月杜征南注周王之正月也因覽征南長厯凡天時星日之紀既無不合則證驗尤顯謂此足以決之矣今觀草廬吳公考律厯志商太甲周文王冬至在十二月周武王師初發以殷十二月戊子後三日得周正月辛卯朔其後大寒在二月驚蟄在三月時以驚蟄為建寅月中氣然後有以信愚説之亦可信也太朴以此示教豈非幸耶又獲觀勉務實學諸詩及往復書翰期奬甚至太朴方以文學名動京師選入延閣繼今發揚推演出其所謂有原者真不負其師之訓哉包恢宏齋所作約齋説約之為義前説詳矣竊觀先儒釋經必以所釋字貼本文又隨其意而上下之然後其義可得而通焉以約之約固為少然曰處少則不順故以窮困釋之約禮之約固為要然曰要之以理則不通若曰反而束之以極其要則善也守約所守者約也説約説到至約也所守者約之約要也説約之約與詳對少而要也是皆不可以不察也詳説之約又專以説言而與諸條不同也夫析理不精則服行必差苟例視之以訓詁之學而務儱侗宏濶之言好同而惡異喜大而恥小其弊可勝既哉文丞相與危公書文丞相後來忠義軒天地人所共知當其在庶僚外郡而與之託交惓惓禮意不少怠若危君子仁者非有過人之識其能若是哉丞相權直學士院時草詔以義切責賈似道忤意遷罷終抗不阿危君宰仁和聞賈欲薦擢之即解印綬去蓋其志節之合如此宜其以類而相求也乃若以夙學碩儒自居而附麗權姦奉行其法以厲民者有之矣視此能無愧乎虞學士書南豐擬峴臺記荆公詩及所作曾文定公祠堂記南豐先生記擬峴臺謂其山溪之形擬乎峴山也使他人屬筆必更引羊叔子事而先生終篇但述風物遊觀之勝與夫裴使君簡靜之治而已蓋衆人之所以必言乃先生之所不必言也王文公詩則終始引羊叔子以致美裴君蓋賦詠之作又與紀實不同各一竒也邵庵虞公並取以書之厥有旨哉又嘗聞先生既為臺記裴畀田若干畝即先生所置義田在今臨川後湖者此亦竒事虞公記先生祠敘義田而不及此何耶范文正置義田于蘇子孫至今遵守不廢嘗嘆以為世之若此者一家耳今讀虞公所著南豐先生祠堂記知先生亦有義田在臨川金溪二縣世守規約與范氏不殊兩家盛德之長異哉夫以范公之忠義功名天下所倚賴而甫參大政以沒位不滿德焉曾氏三兄弟子宣為相子開終翰先生止西掖名位有差子開雖亦賢而魁然以儒學文章重者莫先生若也嗟夫宋之賢人君子若范公之與先生者希矣其君之國不能保而二家之田獨至今存自將傳之無窮則當時不究其施有人足恨而其子孫所以為憑藉扶持者又豈竭其勢力之所可能者觀于此者足以有省矣文定公初置義田令本房子孫不得食文昭公增置田乃令食之太朴熟見其家規約云爾文定之不自私文昭之均其施皆可喜也題牟成父所作鄧平仲小傳及濟邸事略後隆山牟君成父之父祖仕宋皆有列于朝君早侍左右凡典章故實具能言之號稱博洽此其書鄧平仲及濟邸事以遺曹士𢎞者蓋士𢎞以史事自任故屬之如此吳曦之誅實楊巨源結李好義舉義之功為安丙輩媢忌掩沒今陳監丞衆仲跋語舉以為言當矣前代記曦之事詳者惟李心傳嘗讀其朝野雜記亦略于巨源近有續陳均宋編年者頗載巨源事而多舛錯雖能書安丙殺其參議官楊巨源而復以擅殺孫忠鋭之罪歸之大槩當時功歸于丙故其事不白惟俞文豹吹劒録其載巨源本末併所撰治書及丙與彭輅謀奪巨源兵令樊世顯殺之于大安城下又言其妻子流離困苦狀使人憤惋蜀多義士編年亦並載平仲之志壯矣使牟君不記世未必知之也史彌逺廢濟邸罪狀明著宋季諸公文字班班可見鄭清之乃自附于善類者故牟君特發其隱耳韓昌黎所謂誅姦諛于既死發潛德之幽光牟君所記二事有焉然豫又嘗見方回跋某人寶慶録謂濟邸切齒楊后彌逺所為于是彌逺與后密謀廢之彌逺既訪求得理宗楊后欲見其人因䇿士日令理宗入內庭后于簾中審視之計遂定今牟君謂寧宗崩彌逺夜召理宗入使楊谷楊石白后后持不可七往返以危言脅之乃從與方所記異以事推之方記當是也豫疇昔好聽遺老之談説見稗官野史有可以偹紀述者輒不忍棄如俞方所云皆録藏于家今不能悉記姑誦其略以附焉吁牟君豫不及識今不可復作矣吾儕之晚出者亦且老後來尚復有談及此者乎良可慨已答陳衆仲問吹劒録承問俞文豹吹劒録舊在宣城吳子彥家閲其先丞相履齋公藏書見之中載楊巨源誅吳曦事為安丙媢忌殺之讀之使人憤痛又一段陸子遹宰溧陽以田六千餘畝獻史彌逺大為民害其事亦可怒俞括蒼人文字一册著論詆諸葛孔明云其兄文虎嘗以其説應舉又記朱文公列唐仲友仲友在台州時眷一官妓嚴蕊奴者文公捕送獄值某提刑行部問意欲何處去妓賦詞以答有去也如何去住云云遂釋之俞謂文公遷怒見其議論乖異遂不全抄止録楊陸二事及雜説數條于楊事意欲拈出以矯史氏之失其紙雜夾書帙中久不見未能抄上雜記也李好義後為總管嘗于元夕賦望江南云思往事白盡少年鬚曾率三軍平國難沿邊四郡一齊收逆黨竟封矦元宵夜燈火閙啾啾廳上一員間總管門前幾個紙燈毬簫鼓勝皇州此乃久不遷怏怏語一小説中見此而續宋編年乃於曦誅數月後開禧二年二月誅曦載李好義遇毒死又不知如何也方虛谷亦熟前朝事記寧宗崩夜召理宗入內一事尤偹他日執事當筆討論當詳録以呈或可為涓埃之助云爾張氏先世敕黃後題右故宋敕黃三道敷文閣待制張公運與其子監𣙜貨務曼容之所受也張氏世居信貴溪裔出唐相文瓘至待制父子仕南渡後繼有顯者入國朝開府以玄教興偹極寵榮羣從子皆列在守牧開府之孫德隆寶藏此軸不惟見其家世之盛而前代典故如太廟行禮及疏決編排引見差官既除官告身外又復降敕因可考也三敕在紹興二十八年三十一年隆興元年前後首相則湯思退中則陳康伯當秦檜既死孝宗勵志之初而思退復用當時事勢并可知矣𣙜貨交代潘慈明乃吾蘭溪人紹興二十一年進士嘗知江州建濓溪書院朱子為作記者仕至祕書丞荆湖北路轉運判官亦名士宜附于此張氏墓銘後士生有純茂之行被于一家一鄉而不能逹之逺有通敏之才見于一官一事而不能顯于世至于終老隱約漠然不與世聞豫讀餘杭張元甫志銘而考其平生殆若前之所云而深可謂喜幸者有子也君之次子今龍溪主簿舜咨有雋才而多藝長于從政既得祿及見親老夀以沒距今且七年來調官京師歸而營葬懼隱德之弗章也求能文詞者銘以揭諸墓上時陳衆仲監丞張仲舉助教與某同在國子學皆素與舜咨友善者于是仲舉狀其行衆仲為之銘而俾愚書之以助成其志焉嗚呼人子楊名以終孝而能以善繼者揚名之實也君子立言以垂逺而言之足信者傳逺之道也舜咨既能孝而陳張之言皆足以取信矣余之書固不足以為輕重而亦不敢以辭故為之書而識其後以貽之爾蘇御史治獄記獄重事也斷獄難事也愚嘗身親州縣而信其然矣比嵗五府官決囚亦以屬吏詣府受約束見其羣坐一堂之上讞議可否動多牽制而專者又病于愎乃若便文自營曲致疑似以開緩縱應悉論決者必留一二而不肯盡至若幽隱之寃煆鍊之誣往往而有則未嘗究心察之蓋其假活人之名以沽隂德而不知隂德之在此所存既偏則當明者暗此通患也古之論治獄之道者曰明允曰中曰敬曰慎曰審曰勤曰哀矜曰平恕有一于此足以為之本未有不能是而可以司民之命也今觀蘇公伯修為御史時治獄記十餘事竊為之太息公所蒞湖北一道同列者衆矣微公則出入之誤尚誰覺之哉嗚呼獄也者造物不能使之生長吏不能使之死死者可生生者不憾于死其惟蘇公乎吾是以推本為言之也朝廷患獄囚之多滯三嵗遣官一詣諸道決之此良法也近復尼不行殆必有其故矣使人人如蘇公復何慮乎吕文穆公誥詞吕文穆公既相宋其從子文靖公文靖公之子正獻公皆相繼相為名臣世家與宋始終文穆世居河南文靖由夀春徙開封建炎渡江裔孫一派僑居吾婺于是東萊先生出焉先生之祖父暨其季大愚忠公皆葬武義縣之朋招山吕氏遂為婺之望族近益衰微凡譜牒告身遺像之屬為人所購售至冒稱苖裔者有之竊嘗為之嘆息兹來京師獲見文穆進封徐國公加食邑誥一通蓋祥符元年東封泰山霈澤也九世孫某所藏故物宛然典刑如在非賢子孫不能世守也伯溫昆季方進膺華要河南之世復興又安得不為之深喜乎唐鄭渾告身後題唐神䇿禁兵官者典領其將校之選重矣今觀鄭公告身稱左神䇿軍散畨兵馬使押衙銀青光祿大夫簡校國子祭酒兼御史中丞上柱國鄭渾可越州都督府司馬餘如故按兵馬使押衙職事官也銀青光祿大夫階官也祭酒檢校官也中丞兼官也上柱國勳官也今都督府司馬後告下有守字次兼官上唐制職事官高者稱守詞云雅宜進秩則亦非正任也餘如故者他皆無改也與訾守思同制詞云依前件則守思亦授是官也詞云共揚禁壘之威則未嘗出外越府都督必在神䇿軍者遙領無疑也此大順元年十月當昭宗時中人執國柄強臣悍將充斥內外而鄭公乃以忠勤被褒亦異矣今幾五百年子孫猶得承其家寶藏此誥豈非忠勤之世有永而弗替歟裔孫元椿自閩來京介友人缺叔善書求識其卷因以示王伯循待制考訂已悉輒復以所見附于後云汪氏浯村詩跋浯水出琅邪靈門縣元次山中興頌湘江東西中直浯溪蓋磨崖處也浯水罕見稱而浯溪特著則以次山故爾嘗見次山名零陵七泉皆于字旁加水浯溪之浯亦此類至峿臺之加山塘亭之加土可見其皆以意為之也新安汪氏改其所居吳村為吾又加水為浯其慕次山者歟今讀其所自為記謂與世聱牙樂于隱遁叟信乎其慕次山也次山邈矣叟不徒慕乎其外而慕乎其中異時浯村之名亦將大著于世豈獨浯溪也哉辛酉進士題名後題至治初元某參與奏名今二十有二年矣六十有四人者東西南北聲迹之相聞蓋少兹來學館幸睹題名升沉存沒尤不勝其可慨矣惟吾榜得人見稱為盛政事文學布在中外者夫人能厯數之若愚之不才而厠其間則未知指目者之謂何也然前瞻後顧警諫振飭以無貽諸公羞則亦不敢不勉而名位之不逮則非所愧也同年翰林待制趙君伯器以摹本綴帙見示因書其後又至元六年秋某被國子助教之命時李好文惟中自浙東憲僉入為司業同北上繼而惟中别除一時同年多在成均者司業王思誠致道監丞司􅘙彥恭典簿趙璉伯器明年至正改元惟中擢祭酒某亦忝進博士致道彥恭皆以御史選出僉諸道憲伯器遷刑部主事又明年惟中為西臺治書侍御史伯器遷今官至正後自外任入者寶源庫提舉舍克赫子正祕書大監巴圖爾丹至道侍儀使廉惠山哈雅公亮禮部侍郎台哈布哈兼善子正不久卒官兼善近出守紹興今在京師者惟伯器致道公亮暨某四人中間聚散可見自始至今相與最久者伯器耳然某與伯器不但同年之好自其祖貞獻公時受知于今三世餘三十年他人無是也兹其所以為尤厚也歟米元暉雲山圖往年過京口登北固眺金焦俯臨大江時春雨初霽江上諸山雲氣漲漫岡嶺出沒林樹隱見恨無老杜蕩胸之句為之登揮乃今倐見此圖知海嶽菴中人筆力之妙能盡得豫當日所睹掩卷追念不覺惘然書法畫法至元章元暉父子而變蓋其書以放易莊畫以簡代密然于放而得妍簡而不失工則二子之所長也李西臺書唐詩文體凡屢變晚季遂不逮惟書字迄三百年猶有貞觀永徽以來風骨氣韻李西臺雖在宋初實唐人書法之終也過此則益變而下矣乃知古人法度能世守之未有不善者筆札細事爾可以考世變焉題儀禮點本後北山何先生標點儀禮其本用永嘉張淳所校定者某從其曾孫景瞻借得之欲求善本傳繇而不可得一日三衢程國表來相與觀其書自言適有永嘉本當以見遺之未幾果令其子持至為之喜不自勝殆天有以相吾志也時方苦痁疾兩月餘羸瘠委頓又二月既望疸熱雖去而餘症未平陳布朱黃奮然命筆人咸勸其不宜終日僂坐勞手目力者應之曰吾樂此病非所恤也起十七日至二十九日而畢夫以難讀之書使按考注疏切訂文義以分句讀非數月之功不可今蒙先正之成而趣辦于半月之間可謂易矣然自今方熟復詳玩究前人之用心以通十七篇之奧其敢曰易乎哉使吾後之人知得是編之若有相而病且不敢廢學如此則庶其寶愛誦習而亦不敢以易視之尤吾之所望也張淳校本朱子猶有未滿今先生間標一二于字音圈法甚略或發一二字而餘不及蓋使人必其自求之耳今悉仍其舊而不敢有所增也書荀子後頃年因讀史記諸書紀荀子嵗月而有所疑因參考其説今觀唐仲友考定以為卿遊齊去宣王世逺皆在襄王時蓋王一説也性惡一言大本已失唐論澀縮而不敢書末謂李斯韓非非師之過吁何其異也心術之微固可即此而見矣吳郡錢佃耕道刋此書于江西漕司據元豐監本參校自謂特為精好而陳振孫書録亦推其視他本最為完善今考之則文字訛舛甚多二公蓋未嘗細察也校刻之難可不慎歟嘉定中權知隆興滕強恕再取漫滅者新之亦未及此強恕字仁伯金華人再考荀卿嵗月春申君死當楚考烈王二十五年齊王建之二十七年自齊宣王至此為八十六年據鑑大事記宣王在位二十九年則為七十六年上至宣王元年凡一百年大事記宣王十八年書聚學士稷下卿年五十始遊齊必在此後逮春申君死當九十餘不可謂卿不及見宣王也唐氏又以孟子在宣王時卿何不相值按通鑑宣王二十四年孟子適齊二十九年去齊首尾六年卿來或在孟子之先難執此為斷也且齊襄王元年至王建二十七年凡四十六年若卿以五十遊齊至此亦九十餘歲月無以異也大事記襄王五年卿為祭酒書揚子後右揚子法言十三卷晉李軌注錢佃用國子監治平中舊本刋之當時已用宋咸注增入矣今以四注本考之李注簡宋注詳凡李注本其文詳者皆所增入也其明注咸曰而誤以為李注則佃不考之過也如正文淵騫篇一段脫三十六字注字訛誤甚多或問提行處或然或否亦有文未斷而復提者其校定豈得為精也司馬公宋咸唐仲友序附録于後以見諸公之推尊楊子者如此至仲友略及出處而以易之肥遁當之義殊不類蓋亦曲為之辭者吾之所信則有朱子之評在書文中子後程子曰王通隱德君子也其言為人傅會不可謂全書論其粹處非荀楊所及續經之類皆非其作朱子極論續經之僣而又曰至于假卜筮象論語而強引唐初文武名臣以為弟子是乃福畤之所為而非其意二先生所以論王氏者當矣愚嘗觀韓子送王含序謂讀醉鄉記悲其託于昏冥以逃不遇聖人為之歸者以為績蓋通之弟通之學知尊孔氏與韓同科何以無一言及之稱醉鄉之文辭而續經中説乃反不道耶因是而思福郊福畤與其門人既傅會成書當時耳目猶近故藏于家而不敢出意數世之後殆不復有辨之者故劉禹錫李翺始舉其名二人與韓同時而韓獨不見蓋其傳猶未廣唐季皮日休司空圖好之而始章其出沒隱見之故可知矣然其嵗月事實抵牾乖剌終不足以掩後世之耳目也夫子之于親弟子之于師其所以尊崇褒美之者固無不極其至然當以誠心不欺為主虛美誣辭豈所以為愛也哉不惟自陷于妄偽而反為父師之纍至有不信其真有是人者郊畤門人之罪可勝誅哉因書之以為世戒王彥章畫像記後題歐陽公著五代史書王彥章死節事且健其材壯其志竒其言深致意焉蓋亂世忠義之士少所以抑揚之者不得不然然其事梁之罪不可掩也故又曰天下惡梁士不幸生其時不為之臣可也其食人之祿者則必死人之事若彥章者可謂得其死矣此正論也異時記彥章畫像謂于五代書至于公傳未嘗不感憤太息恨舊史殘略不偹喜得家傳而知其詳反復德勝之戰稱以天下偉男子夙昔想見其人而幸獲拜其像以為希慕之至焉者也嗟乎公于彥章何獨惓惓若是哉古之名將效死而不屈者不少矣豈以紀述之故而不能忘情耶然亦太諄復矣春秋之法深治亂賊之黨公之為史也自言有取于春秋此獨未之思耶子路死于孔悝之難君子猶謂其徒知食焉不避其難之為義而不知食輒之食為非義也夫子路特見義之不精豈若彥章黨逆賊而為之用乎權其輕重則死難之美不足以蓋黨賊之惡矣乎凡人有所明亦有所蔽歐公蔽于此故明有所遺韓通不見録也冝哉長安志圖後題長安古都邑之冠也周秦漢唐前後相望其山川城郭宫室之制于法宜書三輔黃圖最古宋敏求之志吕大防之圖記皆後出凡前人所述悉具于此矣同年東明李公惟中治書西臺暇日望南山觀曲江北至漢故城臨渭水慨然興懷取志所書以考其迹更以舊圖較訛舛而補訂之釐為七圖又以自漢及今治所廢置名勝之迹涇渠之利悉附入之總為圖二十有二視昔人益詳且精矣書成以寄豫覽之而有感焉自禹别九州雍田為上周始居豳太王自豳遷于岐文王徙于豐武王都鎬數聖人突起經營因其地勢之雄以興王業豈非灼然有見哉平王遭犬戎之難遷于東都始以其地豫秦凡秦漢間言秦之形勢者乃周之形勢也婁敬淺陋不學但知有秦而不識文武成康全盛之周未足深恨而漢之羣臣舉不知有周一代之治大抵承秦而岐豐忠厚之俗迄變而不返此可為深恨也夫人之見聞詳近而略逺志圖所紀唐視漢為詳于秦已略周則泯泯無考矣人徒見後世窮奢極侈千門萬户以為壯麗意謂先生之制必崇尚儉質不厭卑小無動心駭目之觀不知天子之居自有常尊惟王建國辨方正位一本宏大之規太王為諸矦時綿之詩敘宫室宗廟門社成法井然况于武王鎬京之宅哉周官象魏兩觀五門內外之朝其高大深逺猶可想見而考工記匠人營國之法亦有可稽蓋以法度為威而威亦非不足也班生云工知阿房之造天而不知京洛之有制惜其歸美當時而不曰周室之有制耳今李公作序首言周于漢唐之上且及夫積纍深厚子孫延長之故指周為多獨能推究其本始者故愚得以并發所欲言者焉米元章帖宋初書體未離唐蔡忠惠猶謹守法度至黃太史米南宫始大變矣米公既被徽宗顯賞高宗初愛黃後尤嗜米至貴其子友仁以鑒定所得生死榮遇極矣魯齋王先生嘗論米書謂當于放中求妍蓋他人放則不能妍放而能妍所以為異覽者徒見其欹側怒張之態而不察其秀媚映發之姿此魯齋所以有求妍之説也可謂善評米書者矣此三帖皆竒前一帖崇寧初米為江淮制置發運司勾當時蔡京當國在政路者皆其黨謁禁固不足道開閣待天下士正恐得曲學阿世之徒爾何足望哉禮部集卷十八
