body:
  text: 禮部集卷一元吳師道撰賦望嶧山賦友人黄君晉卿向嘗為予言鄒縣之境東望嶧山峭然孤起孟子實生於是可想見其人焉予過其地睇瞻興懐信斯言之有徵因賦以道之其詞曰濟重江而北征兮漫千里之平陸過邾婁之故墟兮極東鄉以騁目羣山委蛇而奔凑兮青遥遥其相属崒峻峯之孤起兮儼雄踞而特尊絶浮雲而上出兮俯培塿其無隣曰兹惟東魯之嶧山兮實岱宗之陪輔杳日觀其猶未覿兮乃獨快兹先睹表積石之嶙峋兮却朽壤而弗附勢絡繹而綿延兮宜著名于終古惜行邁之靡靡兮盼遼邈而不可登披圖牒而考稽兮嘉詩書之所稱神禹定其職貢兮繄孤桐之挺植魯侯荒於大東兮遂保有以為域彼祖龍其何知兮窮萬里之轍迹升遐巔而頌功兮斯獻諛而助賊咸陽既已飛灰兮野火宜不赦夫頑石侈心忽其安在兮惟樹德之罔極吾獨羨夫山川之精英兮微聖賢其孰當偉孟氏之特起兮在戰國而堂堂氣浩然而剛大兮壓后土而蟠穹蒼雖儗聖之有迹兮邈餘子其奚敢望屹兹山之猶故兮信並立而俱長微予友之昔言兮羌有懐而不見悵欲語其誰同兮徒激昻而増嘆嶧山一名邾嶧山亦名鄒山邾後改鄒故山從邑變史記正義引括地云在兖州鄒縣南二十二里鄒山記云鄒山古之嶧山言絡繹相属也今猶多桐樹然則詩鳬繹之繹書之嶧陽同此山也書蔡傳地志云東海郡下邳縣西有葛嶧山古文以為嶧山下邳今淮陽軍下邳縣此據鄭氏說按此則徐有兩嶧竊恐鄒嶧為是也雲卧八極賦并序集賢都事李君溉之風神髙邁夙有山林之趣題其室曰雲卧八極取太白詩語也且命東陽吳某賦之愚觀君方以才業用而其言將飄然獨往者故為之具道其樂而復因末簡以致意焉其詞曰承𤣥元之遐胄兮復孕靈于長庚夐髙姿之絶塵兮中湛然而潔清餐玉芝以為粮兮吸沆瀣于金莖襲蓀蘭之芳菲兮憂明璫之晶熒渺獨立乎物表兮嗌濁壤之營營羨山林之幽遐兮有白雲之英英攀謝公之遺躅兮契希夷之髙情澹怡恱而自足兮誰與共兹一壑撫盤石以為牀兮翳長林以為幄被純素之幽光兮睨浮游之㝠漠羅孤彈之清琴兮送雙翔之黄鶴嚥飛泉而漱松風兮渺天宇之寥廓歘飛神而輕舉兮凌倒景而上浮建采虹以為旗兮挾迅雷以為輈前飛廉而後豐隆兮並羲和而奔流始發軔于暘谷兮拂予袂兮扶桑遵巽隅而行邁兮遂窮歴乎炎荒軼朱天之曠莽兮直參井之所當跨崑崙而越流沙兮求曜靈之所藏不周呀其欲合兮余超凌以徑度馳闇野之重隂兮命燭龍使先路循尾閭而抵艮維兮復蕩蕩其無終予游曷其有尼兮聊弭節而從容曠一息而萬里兮睇窮髮于咫尺俯齊州之九㸃兮曽不啻夫蟻垤嘅下土之擾擾兮紛萬蚋之起滅志彷徉而廣大兮揆厥初而不越散充溢于無垠兮斂不滿夫錙銖妙元化之於穆兮信機要之有樞擴方宇之内外兮顧何適而非途時動靜而不愆兮與造物而為徒委余心而一致兮又何必遯世而離居亂曰雲蟠林栖荒以寂兮埃壒溷濁不可息兮至人之心不滯于迹兮惟時惟中自大一兮懐别賦留别楊志行待制父子余悲古人之不見兮每撫卷而長嘆幸斯文之未湮兮有作者其猶可觀行四方而歴求兮嗟遇合之良難驅余車于宛陵兮忝卑冗之微官際碩師之戾止兮挾文采之鵷鸞仰門墻之咫尺兮從几杖之盤桓鼓經笥之芳塵兮挹詞海之餘瀾誠内充以自慰兮忘栖栖之解歡既往造夫承明之廬兮邈遐睇乎雲端忽幡然其来歸兮踐良期于歲寒方金匱之紬書兮競羣英之彈冠邇清光以奏伎兮衒竒賈于琅玕何翁季之齊志兮追嘯歌於考槃蹇余抱此幽懐兮憎怫鬱乎肺肝望白雲之悠悠兮昧飛雪之漫漫念不可以此留兮返余舎乎叢蘭惜芳宻而遽暌兮尚勤勸夫加餐俗滔滔而日靡兮慨脩名之孰完時動靜公則然兮夫豈非小子之所安雖千里其非遥兮烱相炤于中丹至治四御史詩成憲甫廉使徵賦至治之元英主當御時崇梵教大啓宫宇都城嗟咨民勞役巨蹇蹇執法四臣列疏臣直伊何由聖明故維時權姦實激霆怒誅竄亟加誣以謗愬粤若古先誹木諫鼓我元造邦責在憲府列聖虛心忠諤繼武偉兹弗褒名節奚樹皇化更新直氣斯吐生榮殁賚寵以異數嗟嗟在位有目斯睹恪恭爾職正直是與明明國是赫赫王度毋利而回毋禍而懼明於一時千載彌著小儒作詩用賛言路山中人二章贈方壽甫并寄尊翁存雅山中人兮幽棲渺仙華兮翠微水㝠㝠兮谷凄凄秋莽蒼兮煙霏緑熊兮𤣥猿吟嘯兮林間楓刁刁兮欲落桂青青兮生寒弔玉女兮寂寞瞻故宫兮㠝岏紛雲旗兮翠蕤儼欲降兮復還復還兮何許愁慘戚兮不得語送滄溟兮白日盡思軒轅兮涕如雨昔粤客兮同遊今獨居兮白頭欲往從兮路阻脩倚秋風兮弗見仰雲空兮悠悠粤客謂謝臯父山中人兮相羊衣芳蓀兮蓉裳佩飛霞兮戛明璫挾兩驂兮上驤飄絳節兮北荒蹇胡為兮石房空原無人兮白雲茫茫山之英兮不来羌日暮兮徊徨歸來兮誰語振雅音兮超前人以騁武揮五絃兮松風洗雙魚兮澗中攀桂枝兮長相従我所思兮微兹人其誰與同南寕軍載酒堂祠神樂章宜春彭君震卿佐治儋耳訪求眉山先生遺跡得故所鑿井渫之又新作載酒堂肖先生像買田奉祀其表賢化俗之志誠非今世為吏者所及諸公為文若詩紀之當矣第想夫考成招薦之初當有樂神之章因補其遺昔韓子為栁栁州羅池廟碑末係以歌而先生作韓碑效之間採韓語輙取斯意即先生所以道韓者還事先生焉先生其吐諸其詞曰荔子丹兮蕉黄瀝桂酒兮芬香昔無席兮今堂聖欲居夷兮賢蹈海時不容兮何害吾未離人兮豈與元氣而齊天睨翻天兮雲濤負瓢以歌兮著屐以遨神彷彿兮猶豪風詩書兮公之教民飲食兮知報井有源兮寧室而淖公神在天兮猶地有泉公昔言之兮我今亦然相此邦兮尚千萬年揆初堂詞揆初兮兹堂思予親兮不忘羅甘毳兮酒漿親不在兮曷其敢甞揆初兮兹日思予親兮罔極吹笙兮鼓瑟親不在兮曷其自逸嗟予身之在兹豈予親之逺而揆予初而惕然盍今歸以為期鶴野詞為蕭存道元帥作鶴東飛兮遼海之涯海澄澄兮不驚波鶴西飛兮蜀山之外山蒼蒼兮草木斾斾鶴飛来兮中州闗河廓兮煙霧收望神京兮魏闕侣威鳳兮遨遊風髙兮月白警清唳兮中夕歘矯翼兮遐征超滇池兮一息嗟昻昻兮爾姿孰在野兮能羈摩層霄兮放八極渺曠逈兮難為期白雲詞贈龍虎山孫道士白雲兮溶溶朝躋兮太空白雲兮冉冉暮歸来兮山之崦斂不盈兮散彌八區變化歘忽兮嗟孰吸而孰噓粤有人兮神明游乘元氣兮上浮洒清泠之甘㴻騰蜿蜒于靈湫鄉人兮歌舞繼自今兮罹熾陽其無苦琳宫兮瑶宇澹逍遥兮容與欲往従之路脩阻雲遥遥兮獨懐人其延佇禮部集卷一
