body:
  text: 禮部集卷四元吳師道撰古詩七言十臺懷古并序友人自杭來示及濟南王君十臺懷古詩讀之感慨不已夫江山故宫歌舞遺迹千載之上英雄遊焉千載之下狐兔行焉俯仰廢興孰能無情而詩人尤甚發為咏歌詞雖不同而意總合若物之鳴以類而應余安得忘言哉余生好遊嘗聞司馬子長杜拾遺覽觀四方山川之勝以壯其文心竊慕之異時浮江淮泝湘沅上巴峽過秦漢故都歷燕趙齊魯之場所見如十臺尚多訪遺老詢故實足以發一時之興快宿昔之願歸而讀馬杜之詩文以證其所得焉耳百花洲上姑蘇臺吳王宴時花正開半空畫燭西子醉三更鐵甲東門來吳波渺渺吳山簇不見嬌顰倚闌曲丹楓落月怨啼烏碧草東風驚走鹿闔閭丘墓相連處應恨夫差迷不悟斷指千年血未乾遊魂夜哭臺前路右姑蘇靈王傾國崇臺宇按劍章華睨中土辨裳伏地走諸侯鐘鼓凌空震三楚騁驕不顧伍子謀落成乞與吳兵遊孤身竟走江上路塊土獨枕山中愁十年霸氣終蕭瑟回首華容歸不得飢魂飄泊啼秋煙細腰却舞新王前右章華神娥縹眇髙唐上楚宫樓閣森相向丹楓蒼桂湧孤闕錦石清江簇連嶂行雲漠漠飛雨寒孤猿咽咽千花間翠旗龍駕杳何處斷魂殘夢愁空山微臣宋玉誇能賦當日襄王豈真遇千古秋風恨未平髙泉飛落三巴怒右朝陽昭王鋭志移青社築土懸金奉賢者四方劍佩集強燕千里風塵空駿馬郭君自舉先羣豪樂生獨步超凡曹酬恩一雪霸國恥建功並倚雲天髙君臣意氣千年少落日荒墟沒秋草黃金買貴滿長安惆悵英雄布衣老右黃金項王戰馬從東來意氣蹴踏全秦摧入關不並沛公轡還鄉却上彭城臺重瞳按劍風雲靡萬匹騰空煙霧起凄涼垓下泣名騅零落江濵十餘騎寄奴千載心爭雄登髙把酒臨秋風詐移晉鼎非男子君看百戰東城死右戲馬沛宫置酒君王歸酒酣思慘風雲飛兒童環臺和擊築父老滿座同沾衣一歌豐沛白日動再歌淮楚長波湧龍髯氣拂半空寒虎士心馳四方勇河山蕭瑟長陵荒野中怒響猶飛揚髙臺未傾風未息故鄉之恨那有極右歌風桐人氣迫前星黯思子宫成歲華晚髙臺有恨碧血新大野無蹤金犢逺一朝弄兵兒罪輕百年鍾愛天倫深戾園魂魄夜寂寂湖城風雨秋隂隂漢宫樓觀連天起方士熏香召仙鬼望思望思終不歸茂陵老泪如傾水右望思半空髙棟翔金雀玉扆繐帷塵漠漠西陵老樹暝色寒建安殘妓春情薄曲終紅袖辭尊前簷傾斷甓飛人間分香淚老恨不滅秋風吹入苔花斑漢家一片當時土肯為姦雄載歌舞銷盡曹瞞萬古魂落日漳河咽寒雨右銅雀金陵王氣飛祥雲鳳凰臺上聲和鳴鳯來春風花冥冥鳯去秋風荒草生嬌娥舞散髙城暮青山迥隔丹丘路斜陽門巷語烏衣細雨汀洲飛白鷺江空天濶鳯影遙謫仙吟罷誰能招六朝宫闕煙蕭蕭月明半夜人吹簫右鳳凰大明天子遊南國紅粉三千臺百尺歌鐘激浪楚日白簾櫳凝樹湘雲碧凌歊髙宴金輿來侍臣狎笑朱顔開臺城宫扉鎖花栁寄奴土障生塵埃昏昏醉夢春風幾不顧江東數千里酒罷歌闌帝業銷青山空映當塗水右凌虛賦烏江山廟巨鹿一呼坤軸折咸陽宫殿紅三月鴻門壯士斗聲飛寶帳佳人劍光裂芒碭雲氣騰真龍縞素三宣明至公八千子弟風雨散拔山扛鼎成何功夭亡戰罪徒云爾欲問英雄呼不起荒祠古木擁蒼煙夕陽長照烏江水促織吟髙秋白露如零雨促織驚寒近床語美人不寐空閨深共向西風訴離苦玉關征人去不歸無書寄與來鴻飛背壁孤燈照清淚誰家急杵敲寒衣寒衣八月當寄時今年獨恨衣成遲天吳顛倒舊繡裂春蠶凍損新絲稀夜長抱膝三太息此懷促織那能知微霜凄凄月欲沒四壁蕭蕭聲轉急吟成錦字長相思萬里秋空凝愁碧曉霜曲空雲黯淡青鱗斜月色慘慘黃鋪沙九天青女曳裾帶笑揉珠露成飛花僵禽淅颯動庭竹城上啼烏怨如哭瑣忩疏簾點輕毳古砌芳花凝碎玉繡帳垂深闕處兩兩金烏噴晴霧春濃入骨不知寒屏外凄風倒回去燭龍破夢驚晴光酒波暖灔酥花香笑看碧瓦凍鴛鴦豈知茆屋悲無裳班姬吟扇圖昭陽歌吹圍春濃秋風蕭蕭長信宫氷紈相對慘愁色焉知與爾同秋風空庭無人緑苔滿搦管凝顰寸心逺孤吟聲入蒼空長行雲日暮含清婉妾泪斑斑扇上詞妾恨綿綿扇上絲輕塵瑣篋素月暗初寒掠幔清霜飛一時凄涼千載惜宛轉餘妍寄丹碧人間恩怨非無心三咏緑衣空嘆息雪夜樓髙夜深風撼扉酒醒雪落寒生衣空山萬水凍雲合隱隱蒼兕鳴聲悲西鄰吹笙晏豪家畫燭搖空光爍爍陽春入髓朱顔酡玉壺催箭東方白閉門凍卧一長歌任渠盈尺無人過袁安髙節世亦有洛陽尹令今無多送陳端叔遊盤山并寄友人一尊三人同吟嘯風雨夕清歡宛在目别思已盈臆天風北鴈吹來書書中問我今何如别時有詩寄君去書來何事新詩無君家有樓名望逺舊約幽人遊歲晚猿啼鶴舞迎長裾雲影泉光浮疊巘山中酒熟梅花開何妨滿引傾千杯髙歌響撼金華洞白石鬱鬱行蒼苔山南山北多詩才想見颯沓飛車來百年盤峯此客少諸君意氣須傾倒殺虎行蘭溪太守令劉昆癡虎有耳胡不聞夜深妥尾古道上日薄搏犬荒城根風吹黃茒走白額獵夫一見歡踴躍亂刃交揮白雪翻雙眸怒迸金丸落後車傳送如獻俘當軒裂肉空須臾長河無蛟惡黨靜里中三害今何如平生意氣多豪野亦欲短衣馳匹馬一掃腥魂險穴空長歌慷慨南山下留别求愛廬括蒼名山列仙窟一洞寒雲扄白日黃精已辦空山糧青鞋欲躡幽人迹荒城九月風雨多兀坐空齋聽蕭瑟溪南木落草色黃千峯蒼蒼老秋色明朝且訪淵明廬琴書四壁一事無菊花滿籬酒滿壺幅巾短笻成畫圖插花傾酒歡何如氣酣目送飛鴻孤長歌西望歸來乎次韻冬夜吟荒城虎號風色變雲翳天星沉不見起呼斗酒拔劍舞照空神光耀流電洪濤屭贔翻東溟空山石裂山鬼驚酒闌匣劍長太息怒氣沖冠鬢髮森風埃茫茫暗六合日月炯炯懸丹心少年意氣浪自喜讀書無功不如已傭奴坐享鍾鼎貴公等政堪溝壑死更長凍雪三尺深抱膝長歌茅屋底夜光橫道驚暗目陽春抗音掩俗耳蒼天千尋兮地萬里嗚呼知己之士真難遇子昻摹韓幹牧馬圖開元內廏多名馬畫手無雙數曹霸弟子韓幹筆意新承恩亦向天墀畫含毫拂練五雲動旋關轉軸羣龍化圉人臨間振金索御鞍初卸收黃帕豐草聯槽晝不嘶飛花卷仗春停駕西風回首征塵生蜀棧青騾愁獨跨趙公何從得此本步武曹韓相上下驪黃掃空四海眼丹青妙續千年話誰云此馬不復存看取匣中光照夜落花行東風吹花花作團美人脈脈憑闌干倦投紅筵逐舞鳳故尋翠袖索叉鸞去年送别城南道城南飛花映芳草關河萬里人未歸風雨一畨春又老抱愁無語還空閨拂叉攬袖香依依緑隂鎖窗蝶影斷空枝弔月鵑聲悲青春不復回遊子不顧期美人掩泪長相思恨身不似花能飛花飛終恨沾塵泥安能與花飛去陽關西寄李坦之幽人一出九鎖山朝吳暮越無時間煙霞縹眇隔清夢風埃慘淡傷朱顔今年閉門穀江滸煮藥髙堂奉慈母春深花落愁不知髙樹新篁響風雨天涯獨鶴少儔侣我時過君得晤語江空日暮孤雲飛西望青山渺懷古山中之人不復回松聲澗水含清哀洛陽年少今亦老漢廷卿相誰憐才人生未遇休慘戚浮榮無根易起息千年間氣文章在半夜髙吟鬼神泣相逢三月一字無近來清思知何如苦旱行三首五月苦旱今未休青空烈火燔新秋雨師不仁龍失職百鬼廟食茫無謀我欲箋天訴時事只恐天公亦昏睡蒼生性命吁可哀風雲何日從天來又皇天不雨一百日千丈空潭斷餘濕連山出火稿葉黃大野揚塵烈風赤田家父子相對泣枯禾一莖血一滴中夜起坐增百憂雲漢蒼蒼星歷歷又吳鄉白波田作湖越鄉赤日溪潭枯衾綢不換一斗米細民食貧衾已無連艘積廪射厚利嗚呼此曹天不誅聞道閩中米價賤南望梗塞悲長途落葉行山忩獨眠抱秋冷四壁無聲中夜醒天清急雨忽萬點月出枯蛇紛衆影開門颯颯非故林滿空亂葉摶愁隂石澗流紅細泉咽蘚䀶掩碧孤蛩吟髙秋共誰聽蕭瑟却憶江南逺遊客楚天搖落白日髙萬里扁舟蕩秋色江南客未歸山中葉亦稀相思繞遍寒樹下有恨願隨秋風吹山空夜寒風漸微慘慘霜露沾人衣哀鴻獨叫殘雲飛春雨晚潮圖昔年曽看錢塘潮龍山山下乘春濤中流回首洲渚變孤塔不動青崖髙雲昏水暗雨陳黑雪噴電轉潮頭白浙江亭逺亂帆飛西興渡暝千花濕空江茫茫魂欲斷歸來十年今復見浩蕩東風滿畫閣淋漓海氣飛人面春深故國芳草生鴟夷遺恨何時平重遊弔古惜未得掩卷歌罷空含情殺虎行濵州胡氏至元間隨夫劉平攜二子戍棗陽暮宿沙河虎至曳平去胡氏掣虎足呼七歲子取車上刀遂殺虎扶平奔季陽堡三日而死季陽趙侯上其事為復其役而旌其閭云劉平夜宿沙河濵猛虎怒曳車中身妻奔掣足兒取刃殺虎扶歸季陽城虎雖已就死平亦不復生婦人義勇驚四海朝家旌節垂千春嗚呼征戍當軍興鋒矢錯落尸縱橫是時不獨虎口死幾人痛惜金叉分太平何鄉非樂土骨肉燈前夜相語願君寫取麒麟與鳯凰傷哉此圖當卷去寄黃晉卿繡湖有客今竒才豫章千丈翻風雷讀書羞坐廣文館騎馬欲上黃金臺石頭城邊訪遺迹長吟不換公卿檄故山藂桂喚君歸十年被褐無人識我遊東城誦佳句風雨深春緑隂暮孤舟落日竟空回去燕來鴻不相遇文章落落俗子嗔賈生謫去揚雄貧一時暫作失意士千載同是非常人相逢車蓋不用傾與君異縣情已親卜鄰未遂三闕去日夜悵望東南雲追和坡翁松風亭梅花三首老坡醉墮南蠻村賦詩喚醒氷姬魂松風亭髙寒瑟瑟羅浮山暝煙昏昏朝雲已空嶺外夢陽春自到江南園主人孤標逈不俗當時盛事今再溫髙歌起踏中夜月不眠坐見空山暾炎荒萬里浪竒絶玉堂回首深君門緑衣飛去梅樹老千載白鶴應能言村居願子且勿出相看痛倒花前尊又平生江南煙水村梅花欲開先惱魂翠氊醉卧花下雪銀燭爛照林間昏頻年旱飢酒禁重病肺抱渴如文園夜寒霜墮月滿屋松風一曲山瓶溫嚼花自咽清澗液吸景不待朝霞暾舊遊俯仰未成夢歲晏蕭條空閉門故人萬里不得見新詩一笑誰堪言水香花落春漲起安得快意浮吾尊又佳人獨立空人村天公與香來返魂朔風倚竹翠袖薄凍雪拂地玄雲昏我居山中卧愁寂十年不醉西湖園水荒月墮破殘夢燈青火白凄餘溫明朝爛漫三尺雪亭亭玉樹迎初暾冷光照映虛白室清氣散溢無窮門此時妙趣誰共領對花宴坐終忘言微吟覔句漫自苦况肯檀板傾金尊後苦旱行青空皛皛月色白竟夕飄風簸城陌禾壟揚塵未足驚千頃滄江亦龜坼前年一旱困未蘇四年三年見所無荒村十空減八九斯人化作溝中枯田廬盡入兼并室妻子存者今為奴空名賑飢不得實並緣官粟私門儲民田無限紛自恣貧弱祗賴天公扶吁嗟旱禍獨爾及天道冥漠知何如答黃晉卿約逰金華三洞不果子從金華遊寄我金華篇金華相望半百里嗟我欲往心茫然涼秋九月天發早芙蓉前峯回路轉僧舍盡澗水不斷松聲環玉女孤墳落葉裡杳杳白鹿鳴空山山空洞窟砑半吐青芝如花溜如乳髙岩覆屋成結搆亂石迎人欲飛舞其餘二洞更逈絶異象殊形閟迹古空窗忽透中夜日飛簾長挂青天雨仙家樓觀何峥嶸赤松霞氣丹光橫初平子安期生相逢一笑應相迎我生胡為墮世網回首白雲空爾情燕子行清江朱樓相對開去年燕子雙歸來東風吹髙社雨歇一日倐忽飛千回翻身初向煙中沒掠地復穿花底出花飛煙散江冥冥城郭參差滿斜日無情遊子去不還短書寄汝秋風前繡簾不卷春色斷空梁泥墮琵琶絃飛檣冉冉瀟湘浦春盡天涯路修阻一夜相思栁色深獨上樓頭淚如雨寄黃晉卿故人别我今何適書來尚作吳興客天目雲愁百里隂太湖浪激三州白孤城渺莽雲浪底髙秋悵望川途隔周南太史終歲滯洛陽年少何人惜似聞幕府招延君法律應須早致身腐儒白首遭笑罵遊戲聊復驚庸人客中得士佳有餘新詩滿幅來起豫人生可樂在知己素心不為食有魚青楓葉赤照野水飛帆翠蓋何時倚念我孤吟五斷腸閉門寂寞秋風裡次韻苦寒行江雲凍黃青日墮苦寒欲禦誰能那蛟髯氷脫僵起立鷁脊風髙退飛過陽春却在五侯家繡被不愁妨睡課捧觴艷眼送一曲閉閣下簾熏百和君莫笑窮詩翁蕭蕭破屋簞瓢空隨陽耻學南征鴻漢時袁安卧雪中至今千載垂清風梅枝拄杖歌槎牙千歲枯梅枝鐵骨孤瘦苔為衣不留花葉混凡木默謝規削含天機嚴陵主人欣得之朝扶暮倚長相隨清餘冬樹雪月艷潤結夏林煙雨姿千峯萬壑同來路飄然今復遊何處已將形影共歲寒肯向風塵爭捷步羅浮花開春正繁安得攜爾同躋攀手招仙人喚緑鳳側身飛去青雲間和李坦之九鎖山聞簫青山九鎖多飛樓仙人吹簫樓上頭洞中鳳舞花羃羃潭上龍聽雲悠悠曲成三弄猶未已夜深月出闌獨倚泛聲流響滿千岩長松怒嘯悲風起一從之子離故山夢憶嫋嫋空濛間錢塘道士紫玉管時復聽之開心顔斯人忽去無消息回首山中亦荆棘憐君獨客向江城青楓墮影天霜白知音之士不可忘感時撫事成永傷莫怪當年向常侍愁來聞笛賦山陽墨竹行贈元生洋州太守天下無墨竹一幅千金俱當今李公得其法聲價絶代傾鴻都元郎眉宇清如水早年放達仍相似靜臨真態燈月下獨玩天機風雨裡渭川千畝春林深瀟湘一片秋雲隂引竿鼓棹咫尺近弔古渺渺愁人心東城重來春欲暮寫遍人家屏與素墨痕醉袖兩淋漓蹀躞馬蹄花滿路古來竒士非畫師能事不受塵埃羈胸盤成竹手不知根源一一葉與枝我生愛竹忘朝飢歸來城南結茅茨當窗萬個志已足安得與子同幽期風帆落日翠袖逺髙歌把卷長相思桐廬夜泊合江庭前秋水清歸人罷市無餘聲燈光隱見隔林薄濕雲閃露青熒熒樓臺漸稀燈漸逺何處吹簫猶未斷凄風涼葉下髙桐半夜仙人來絶巘江霏山氣生白煙忽如飛雨灑我船倚篷獨立久未眠靜看水月搖清圓山樓秋望圖荒崖蒼蒼映髙樹樹缺飛樓秋色露樓中有客獨憑時溪上何人却歸去風埃低垂傷我顔嗟爾乃得專其間晴窗掩卷意未已一夜夢繞江南山飛來峯何年靈鷲西飛來平地湧出青瑶堆老根盤絡樹竒古不著寸土天所栽上有長藤走寒蔭下有積葉粘枯苔懸崖孤撑危屋覆嵌竇上出空窗開山根幽泉行未逺細響激激隨灣洄流風忽起林影亂秋日欲落猿聲哀我來臨流一濯足試歷窽穴窮崔嵬胡然列像森怪惡髙下斫鑿紛岩隈當年眩人懾吳越怒勢方張誰敢摧彤墀朝夷峙堊塔繭紙暮出揚寒灰可憐卷石亦當厄舊觀一失何由回人間好山政無數爾曹錯據彌九垓人區冥冥幻鬼窟更侈金碧傾瓊瑰惟應震蕩再開闢始得一洗無纎埃平生山水興不淺亦擬勝處聊徘徊空亭坐對增嘆息出山始覺心悠哉墻西梅花墻西古梅側敧倒一半花開出官道道傍過者爭注目弄蕊扳枝矜媚好幽姿詎肯隨俗態髙艷何如委凡草心非真契漫相逢計失深藏難自保何如空山荒澗底千年古徑無人到寒香不遣暖蝶知落英惟有春風掃會當移植遂爾性不用哀吟對枯稿梵隆畫番王獻佛圖如來宴息雙跏趺碧海涌座紅蓮敷身如浮雲與枯枝一毫無有寧願餘不知何國被服殊緩耳卷髮黃虬鬚狻猊巨象先後驅寶盤五色摩尼珠歸誠贄貢陳區區拱手傴立顔和愈足明神化羣情趨眇然韋布一懦夫乃獨抗論非空無見之不肯修勤渠羣嘲衆嗤謂爾愚作詩三嘆還君圖題趙守雲壁振衣二亭二首胭脂山北崖光青中含層白雲英英玉煙乍出翠屏裂碧海忽湧銀濤生主人一見淡怡恱收攬竒觀歸千楹仰看垂天作飛雨俯視疊影浮晴泓卷舒萬變真體在動靜不測神機行悠然妙處當自領豈但卜築誇經營武昌亭臺一十萬誰家絃管無新聲青衫不受塵土涴玄賞獨有山林情座間翰林老詞伯健筆一落峯崢嶸舊遊俯仰二十載却驅五馬東州城卷中攜此千仞壁使我想見猶神驚右雲壁人間埃壒紛茫茫染衣能淄眯目黃誰知潔土本無汚有如濁水涵月光武昌參軍庶務劇喧囂牒訴環笞搒九衢障面踏斜日瘦馬湍汗如流漿城隅咫尺有邱壑白雲翠壁搖滄浪危亭直上宇宙濶振衣長嘯天風涼俯視擾擾衆蛟聚仰見矯矯孤鴻翔神怡體曠心目適便欲超忽凌八荒屈平獨清當時笑騷語千載道芬芳羡君拔俗古來少况復餘事攻文章飛霞之佩髙頡頏餘子滅沒誰能望右振衣和申屠子逹春暮田家即事長河無際浮空冥一瀉可溉千村青禾苗蔽日不見土下有清水鳴泠泠白魚肥美新酒熟飲食俾爾老復丁叫囂無聲桴鼓息中夜甘寢何曽醒我來值此良自慶公餘但欲深閭扄歸耕未成強徇祿飯蔬不恨無羶腥修河道中雲穿漲空如刷煤疾風怒雨相隨來我舟中流四無際髙浪掀舞聲喧豗冥冥不復辨咫尺觸樹乃始知灣隈破篷淋漓濕被面想應為我湔塵埃暮投村店雨未已土床漏屋生莓苔跳蛙鳴蚓入我屋四壁聚蚊成殷雷中宵不眠坐達曙嗟豈有意兹徘徊符移聯絡星火急潦水洞決隄防開河渠使者峻督責奈何天意方為災負薪築土非所憚強顔俯仰胡為哉孫孝子保郡新城孫孝子起家掾曹宰百里母病去官如脫屣躬嘗湯劑悲不起結亭塋兆廬且止朝吟暮咽泪穿眥誓言終身守松梓嬛嬛孤姪寡嫂姊割産廩之寧薄已嗟公之行無與比飛書上聞揚厥美華表煌煌著千祀禮墜世季澆風靡披衰肉食怡弗視傾資異教諸非鬼棄喪忘哀亟從仕我深嫉之人所詆誦公此事尤卓偉秉彛與天互終始皇化清明敦孝理公今作宦在風紀願令汚俗歸一洗四海法之循聖矩追和吳玄夫寄韻去年風雨人過門咫尺軟語勤相溫感君此意深到骨泪落聲放不得吞驚心昔别又五載日月歘忽如跳奔一官浪走千里外長淮巨澤波渾渾拏舟循稼逐雁鶩負土卷掃驅蛟黿老親同來竟舍去我足雖縶思騰騫安知一朝竒禍作悔不早計回南轅少年蜂鋭類戰士挾執鞭弭仍櫜鞬祗今憂患黯消落但欲燕坐忘朝昏京華遊泛君最厚篋中手録今猶存雪窗重炕每共宿泥塗軏轡交相援青春忽作慷慨别拂衣便指山之樊九重斜日重回首御溝新栁垂周垣霜蹄暫蹶未為失天路再騁誰能藩索居無人思轉劇鬱鬱莫吐胸中言仙華絶頂有竒觀下睨海日扶桑暾披香試即玉女迹把酒遙酹粵客魂著書築室約歲晚與君霞帔同髙掀大夫最達空足論要以不朽垂乾坤粵客謂謝髙父雪中簡吳子彥北風吹衣馬凌兢岡頭往來降復登敬亭相看最不厭今朝蔽障玄雲層歸來靜聽打窗雪松爐細撥寒灰騰故園梅花入我夢誰遣鐘鼓催晨興吾宗潭潭萬間屋隙宇容容逃嚴凝去年之客豪馮凌美人狎坐酒如澠今年之客貧如僧茗碗瀹雪虀盂氷人生彼此各自適問君誰愛當誰憎只愁歲晏舍我别禮部集卷四
