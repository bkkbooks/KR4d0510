body:
  text: 禮部集卷五元吳師道撰古詩寄張師夔求畫我于山水宿好敦早年畫亦窺其藩却觀作者還自愧一朝棄去無留痕張君妙悟有天趣不待師授知根源宦遊往往得佳勝目力所至氣已吞煙雲莽蒼瀟湘浦樹石慘淡江南村漁梁茅屋帶林薄點綴清妍難具論宛陵城中數相過雜遝縑素方填門謂豫雅愛不見索豈有強求持璵璠君不見燕公一筆靳豪貴王宰不受促迫煩古來竒士多異俗所以千載名長存吾言如斯亦非激君諾已定應無諼舟行得風江豚卬鼻濆驚波秋來江風西北多掣帆鼓篷疾于電銀屋怒擁髙嵯峨江南江北青山色著意相看忽如失我行小遲亦何害人生取快寧多得賈人舟子勿嘯呼野有垂泣耕田夫三月不雨田水枯過池陽逰齊山洞城南飛橋跨清溪度橋並轡千丈堤堤窮水盡翠微出繫馬道傍尋杖藜巉巉石骨不見土一色斫削青玻璃怪岩竒壑紛左右絶頂俯睨長江低當時登髙插菊處至今勝日爭提攜荒亭已頽斷碣仆霜草滿地寒螀啼杜郎風流杳何處秖有兹山仍號齊其間一洞景更絶喜子曽遊知舊溪踰岡陟巘數里險路斷忽復忘東西石芒鈎衣藤罥帽荒榛叢篠交冥迷遙呼野人問不識下趨却踏湖邊畦前瞻佳處似倣佛興倦不惜重攀躋徑穿蒙密得窽穴俯首匍匐膝拄臍日光忽漏天宇小所見政爾如醯雞流蘇垂蓋結髙屋旁入詰曲房與閨卦蓍二碑史氏植欲讀奈此苔蘚泥斯人好事世亦少挽蘿仰視茫無梯崖間名字半磨滅後來遊者猶堪稽洞中風出蝙蝠亂日暮雲氣寒凄凄返尋林麓出山下虎跑歷歷皆新蹄僕夫驚喜行路詫歸來追憶猶神悽平生好竒已成癖世途良倦思岩栖模碑幸寄却細讀我詩仍欲煩鐫題錢舜舉摹李伯時畫鳳頭驄圖汴都五馬來西域當時總入龍眠筆錢郎摹得鳳頭驄想見羣中更殊特大宛渥窪挺龍種開元內廏森天骨超然意氣欲爭雄直比來儀稱瑞物宋人兵力非漢唐裕陵開邊徒擾攘鬼章成禽侈告廟于闐效職修來王吁嗟元祐乃致此信是當國謀謨良諸賢一去寧復得此馬不在吾何傷赤松山圖昔年曽踏山中路路入桃源正春暮落花撲面東風來飛觥遙石流泉去拂衣起隨醉道士為指皇居牧羊處山空石化草芊芊祗有荒祠映髙樹神仙之館多飛樓鋪牀對卧樓上頭松聲澗響兩娛客終夜琴笙不肯休十年身墮黃塵底乍喜歸來山尺咫開圖眼中赤霞起萬嶂千峯翠相倚寄書約我同心子再曳青鞋從此始往年與張子長同遊挹翠軒為監州貫子素作廣文官舍青山圍青山不受人招麾使君胸中有掘竒大揮椽筆坐致之霏煙落几送秋色岩樹排闥呈春姿清英之氣不盈掬淨洗塵土仍充飢紛紛倚席庸妄兒豈比今掾稱能詩一朝為兒發光彩寧復打頭嫌屋卑使君退食常委蛇岸幘燕坐同襟期琴清茗冷半醉後雲去鳥還微咏詩野人來窺門外屨一笑倘許相追隨柴門曉色圖先生早賦歸來篇柴桑草屋依園田重華抆逺泪迸泉聊復以酒陶其天野人田夫相周旋偶失姓字寧非賢清晨扣門來翩翩手中有攜壺負肩更進觴酌雜亂言醉即麾去我欲眠氣韻太古羲皇前祗此自足垂千年匡廬影落晴江邊故墟老木凄荒煙我嘗過之心惘然是圖物色誰摹傳願起九原從執鞭蠶桑圖詩圖草木蟲與魚就中寫出豳風圖忠臣方寸寓物色欲使目擊知艱虞公宫親蠶古遺制手捋青青看風戾四海枝條雨露春萬家機杼升平世誰知後有歌舞荒裁雲剪鳳金煌煌歲輸不了一日費紅女夜泣寒無裳畫師此意誰能識不寫尋常竒麗質數葉姢姢即諫書品目人間當第一仙壇秋月圖宫扇馬逺畫宋寧宗后楊氏題詩自稱楊妹子宫中美人秋思多夜揖明月追仙娥晝闌桂樹倚樓闕碧落天壇飛珮珂畫師不解西風夢筆端便有華陽洞更將妍畫寫清詞輕扇君王心已動炎精季葉堪嘆嗟矧爾妖麗傾其家申生遺禍到濟瀆府中丞相真姦邪吳宫一掃荒煙冷舊事凄涼復誰省百年永鑒不可忘留與人間看扇影元詩人道中秋明月好欲邀同賞意如何華陽洞裡仙壇上今夜清光此處多此白樂天作五月一日即事黑雲滃渤如頽山白雨注地聲潺潺須臾雲散雨亦歇斜陽襯著髙林間林間沉沉萬濃緑影弄微風自相觸新蟬忽作去年鳴使我凄然感心曲歷山尋真觀縣西倚江勢寥曠岡嶺綿延髙作障歷山壤界接東流道家樓觀森南向重華遺迹豈在兹俚俗相傳恣誣誑黃冠尤更緣禮法旁屋卑栖龕帝闕三池人言有靈物禱禜纍纍挈瓶盎我為旱請不敢詰亦惟鞠躬修俯仰煩襟畏景方兩劇臨下憑髙聊一暢隔山遙認舒州山隱隱孤城拍煙浪七月十八日出郊外抵昭潭沿道觀蟲食松葉盡枯感而賦縣南縣北幾百里沿道蒼松半枯死毳蟲無數枝上縣食盡青青成繭子雪霜不朽千年質摧敗一朝天所使殘髯磔磔怒猶張流膏滴滴泣未止頓令林壑少光色政似鱣鯨困螻蟻土人云此實旱兆昔歲逢之旱無比炎風烈日勢轉虐更説飛蝗西北起救災無䇿空自嗟誰能為挽天河洗謝張稅官惠山水圖昔經九華遡清溪還向齊山踏翠微歸來却睹公詡畫夢境恍惚心神飛一官復忝府下邑心勞政拙遭年飢清遊髙咏事遂息遙看數舍徒依依長身張公江海客相逢墮此荒山圍手揮東絹兩巨幅親自持送扣我扉寒林枯木帶雪色春江逺浪搖煙霏挂之空壁淡相對想見盤礴深天機頗聞輕舟數來往應識弄水亭前磯援毫乘興為一寫重與此郡增光輝商征竒贏籌算急白頭落落知音稀胸中磊砢故未減局促肯受塵埃鞿金華幽人亦念我嘆息歲晏何當歸李溉之賦廬山雪夜舊遊商德符畫王郎孤撑剡溪雪謫仙醉吟采石月何如彭蠡雪月舟前望匡廬中夜發松林燈火深幽幽僧窗澗瀑寒颼颼李公之詩商公畫謂是竒絶平生遊乾坤清明浩無際俗子塵襟那得值詩畫同成一段竒彼此天機自深契鄙人好畫復好詩仙舟可望不可追都門昔别二十載展卷動我長相思卧遊八極誰能羈月天雪夜如見之至治辛酉為李公作雲卧八極賦池陽紀事至元四年十月冬池府承命兩馬驄惟池學廪素贍豐十奪七八歸豪雄爾行按核務盡公校官遣偕俱謬庸惟有姚璉心頗同貴池屬邑最近鄉拏舟此去宜先從人言羣惡張其鋒昔歲往者人馬傷焚香再拜先聖宫願依皇靈保微躬沙夾一帶臨大江上有牧地連元戎悍卒夜伏蘆葦茸按行不侵循舊封伏者引去無留蹤官湖周遭十里通數家根據窟其中良田美稼供螟螽按圖詰實辭皆窮歸途却繞山之東小屋突出婦女翁前遮行輿扼其杠白挺四出相奔沖忽擒一夫捽其胸訴兹事者衆所攻捶擊宛轉恣毒凶止之不可徒忡忡為陳法理開其聰稍復散去穿棘蓬古來王官勢穹崇尸取鼠輩須臾空我今有志權不充念之羞憤徒滿容明朝港出新河旁遡江未逺騰顛風排磯怒響如撞舂倉皇未及挂短篷桅檣傾側浪濺忩已分投骨歸魚龍一卒力勝百柁工正帆近岸離奔谼同舟神色方怡融此行不謂有此逢善人每倚天為宗天亦愒我何蒙蒙書生昧事真愚憃猶欲區别見寸功微官已及三年終歸歟歸歟逐輕鴻潘默成鄭北山手帖潘公挺挺立雪松鄭公矯矯當道熊扞排老檜竟死終平生大節將無同豈無他人筆畫工兩公聯比得所從再拜稽首桑梓恭凛然百世猶清風代柬吳子彥提舉將為福建船官相君作楫功有偉誰甘不渡橫野水天上亦有船司空人間莫羡魚蠻子米家書畫光燭天不知定占幾萬錢玄真天隨易約束且放蓮葉浮空仙李龍眠飛騎習射圖龍眠手帖云元豐初點簡南宫試卷畢更預集英殿門應奉廷試因得至衛士班見飛騎習射校毬揚技戲時乘輿將幸寶津令追圖大槩云東都全盛稱元豐天子慷慨思竒功搜兵閲馬振百度坐欲折箠笞羌戎羽林衛士天下選內廏汗血皆飛龍射毬穿栁雖戲劇移置行陳寧非雄從臣絶藝龍眠翁曾候喚仗明光宫斫鬃飛䃂親眼見十年落筆逾精工君不見開元天寶馬蕃庶畫手亦有曹韓同承平涵育賴休澤人與物會真竒逢好頭赤玉五花驄轉首一笑浮雲空盛衰反覆古今夢寶津無樹吹秋風紛更擾擾竟何益禍啓大梁塵再蒙披圖考古三歎息我思聖人憂日中秋山樓觀圖栁道傳嘗傳以荆浩所作巨幅縮成小卷奉常先生客燕都縱閲三館之圖書秋山樓觀忽到眼印章猶是宣和儲當年絶藝洪谷子身在太行秋色裡萬里雲飛木落時遙寫朱闌半空起先生恢廓山水胸紛紛畫史難為工偶窺得意微妙處自出變態經營中蘭亭易用燈展影梓人乃以堵畫宫莫言尺素非巨幅形體雖異精神同京塵歸來二十載篋中寶氣騰晴虹一邱一壑金華下以道卷舒無愧者淡然誰識先生心許我間來時看畫紅玉杯為陳雲嶠太祝賦夷人採玉河源水夜候霞光矗空起持歸萬里售中州琢刻為杯世無比截肪栗色非不竒雞冠通赤希見之筵間乍置爭注目誰復更顧黃金巵小槽新壓真珠滴擎向桃花花下吸但餘落日爭光輝未許妖姬比顔色主人今代陳孟公閉門留客酒不空千金之裘五花馬不惜買醉酬春風公侯家世多珍物獨寶此杯為故笏華堂舞罷飲闌時什襲深藏莫刓缺送逹天山之江浙簡校君家世朔漠來住嚴陵州嚴陵接蘭溪一水清悠悠一水中間不相識數千里共京華遊今晨過門索詩句却挂雲帆向南去禁林祕府歷已周去坐錢塘省中署省署官清秩更優勾檢諸曹贊機務胸中書傳今得試况乃年華未遲莫西湖春水生緑波嚴陵咫尺先經過迎家俱來笑且歌虀鹽老生雙鬢皤手不停披口吟哦無功祗恐遭譏訶都門見栁鄉思多送君行兮將奈何三月十八日張仲舉趙伯器吳伯尚王元肅同遊西山玉泉遂至香山肅清門外春草青背城曼衍趨郊坰西山曉晴出蒼翠髙下不斷如連屏道傍巨家烏鳥噪寒食野祭道羶腥溝深路狹雪泥在緩控瘦馬仍竛竮行行山近寺始見半空碧瓦浮晶熒先朝營構天下冠千門萬户伴宫庭寺前對峙兩飛閣金鋪射日開朱櫺截流纍石作平地修梁雄跨相緯經平臺當前白玉座刻鏤精巧多殊形常時御舟此遊幸清簫妙管魚龍聽沿堤萬栁著新緑未見蒲葦彌煙汀鳬飛鷺起渺空闊使我清思凌滄溟遊船雨兩棹歌起亦有公子攜娉婷主僧説法據髙座撞鍾擊鼓聲發霆欣然肅客道周歷顧瞻幻怪何神靈後園小殿翳花木繡幃香閣猶深扄坐陪方丈談亹亹伊蒲清供分餘馨出門暄風掠人面前趨復歷峴與陘泉乾土徑草樹少祗有廣塔髙亭亭香山蘭若金源舊猶餘大定殘碑銘長松老檜見未有澗水繞屋鳴清泠扳危陟峻劇喘汗却下迅走誰能停班荆列坐杏花底持觴受此香雪零日規漸隱半峯側酒行不盡雙玉瓶衆賞未醉有餘興惟我却飲嗟獨醒疾驅信馬路已熟遙見樓堞塵冥冥歸來門巷未深黑春雲黯黮明踈星廣文官况淡于水矧復聚散如浮萍玉泉頗恨不少住客意更擬同揚舲明朝清遊墮夢境擁書却坐槐隂廳題張仲舉為鄉人作西原隱居記後張公夙有山林趣為愛西原隱居處拄杖穿雲記昔遊結屋臨遊約同住國風詩裡桑十畝太史書中棗千樹故鄉樂土不可忘一笑歸來未遲暮陳教授捕蝗寶坻去年之夏幾生螽捕除分道疾如風寶坻從事心獨苦調選強力休罷癃焚香禱神神與通蝗自相食一夕空大書聯帛擁歸馬兒童父老爭言功我聞開元相姚崇按稽古法畀火攻目前除患事應爾潛孚乃在冥冥中當今明良布德澤四錢米斗何難同近聞遺種時出地若遣督捕無如公分題賦絳守居送王致道僉事之河東昔年好誦絳守文苦厭箋注徒紛紜細推艱辭屬斷句恍若皎日開霾昏姬周文訖西漢絶八代委靡如瀾奔韓門巍巍誰得闖兩馬駒出盧與樊聱牙詰曲漫自喜豈比盤結妙理源重歌月蝕志魁紀似挽竒險歸雄渾南陽遺編盡零落東雍故刻偏完存精華秀發絶塵語豈但嵬眼并淫翻髙才往往或橫出亦有繩削全不煩後來摹擬風更下務以怪勝棘古根平生未識守理所正恐謬訛乖討論中朝御史出持節按轡歷歷咨周爰省風訪古亦乃職為我一弔殘池園柏槐髙下幾歲植虎豹西南何處門蹴墉倣佛隄北努望月想像渠東騫甲辛池泓梁子午逺岡近閭隰復原宴遊賔旅鍾鼓樂亭臺花木闌井軒荒基廢迹應莫辨祇見古流猶入汾鉥心搯胃良亦苦臨風三酹招其魂先生鄒魯文雅馴玉堂潤色美言論咸池大章已髙卷聊遣巴渝充下陳嗟豫宿有好古癖莫笑蹇淺疲精神幸詢故實補遺闕以自娛悅貽童孫百魚圖小魚戢戢同隊嬉羣魚出沒相追隨鯶公掉尾殿其後氣餐變化非凡姿水深蒲藻相因依嗟魚之樂魚自知畫師點綴百態具問爾當日何由窺大罛密網紛如織鬻市何曽持盈尺有生嘗抱竭澤憂相戒徒聞過河泣江湖新水春拍天安得魚我俱悠然聞道君王闢靈沼願繼周頌多魚篇三月草三日南城紀遊分得朝字虀鹽老生雙鬢凋長年挾䇿陪吟謡春光忽盡餘一日休暇幸此同揚鑣南城塔廟不知數往往遺迹傳金遼頽垣廢巷多委曲髙門大館何寂寥舊時宫闕向南路修廊千步應迢迢豐宜門頭楊栁色壞障突兀留雙標人家漸稀野景曠灣回緑水低平橋牡丹藝植此最盛畦連畈接相縈繚望彌數里地如繡千本萬本爭嬌嬈深紅淡白態各異黃紫不數魏與姚雒陽風土詫前代却視幽異偏蕭條天都王氣鍾地脈坐受北面羣花朝徐熙趙昌死不見安得對此圖生綃水繞小亭客可欵置酒折花欣見招霞舒雪卷照四壁時有落絮來飄飄縱談文字送觴酌間以嘲謔更喧囂雲隂慘淡雨欲落祗恐日暮歸途遙須臾點亂草葉動白楊樹逺聲蕭蕭水淋衣裳泥濺帽疾走十里趨城譙同遊莫怨歡事阻天意欲活田間苗觚稜金爵麗斜日曖曖天宇開微霄向來却恨不少住過門下馬仍相邀人生會合豈常得况有師長聯賔僚病憂不飲浪自苦歸來磊磈誰能澆故園桃李夢飛到鍾鼓驚喚催明朝分韻賦二疏供帳圖送王善父司業致仕歸長安城東門雜遝送客車客車數百兩髙蓋蔭華裾西都明主優賢日東海老臣辭位初一家父子信竒事况乃同時還里閭停車下馬坐張次轢牲行酒却躊躇當時送者亦可喜惜哉名字無人書黃塵漫漫長安路疾足髙才恣馳騖祇見人覔公卿來不見人送公卿去朝衣載束挽紼歌薤露何如白首樂故居趣賣黃金日供具賢哉疏大夫此事從古無後來復有楊司業昌黎稱是斯人徒王公官與楊公比一旦飄然亦相似髙節清風凛終始喚取良工續畫圖共仰修名照青史分題賦三髙祠送馮公厲參政之江浙省陶朱半䇿傾強吳功成攜家浮五湖洛陽仙客思蓴鱸秋風挂冠不少須甪里先生傲屠沽日採杞菊充庖厨三人世異出處殊髙哉一節同是今所無吳江之水通具區垂虹千丈修亭孤煙波冥冥七十二峯碧想見精爽不死來往猶躊躇明公出鎮行中書路經祠下斂容趨往來其間豈不可報國未敢辭馳驅福星夜照東南隅顛崖願見蒼生蘇時清無事不須避他年畫取歸去扁舟圖題趙氏得母詩卷安福趙伯深逢原靖康之亂失母所在日飯道流覬覦冥報後從辟夔門道中遇有虎因小憩逢所飯者告以母在瀘南遂尋訪以歸朱公刺血書梵唄趙公施食邀簮佩人言二氏力有神百里歸來母同載嗟哉彼教捐恩愛豈識本真天性大感通祗在五孝篇此道明明毋語怪九月草三日城外紀遊杪秋暇日休絃歌五門城外觀新河斗門決水已數日淺沙漫漫無餘波從橫疏鑿引别派監官督役猶揮呵循堤側足懼疏惡驚見崩坼當盤渦故橋舊市不復識祗有積土髙坡陀城南靡靡度阡陌疏栁掩映連枯荷清臺突兀出天半金光耀日如新磨璣衡遺製此其的衆植環倚森交柯細書深刻皇祐字觀者歎息爭摩挲司天貴重幸不毁回首荆棘悲銅駝長春宫苑最宏麗飛樓湧殿凌層坡喬松夭矯百歲物復有偃蓋低婆娑平生素聞百一帖樂石壁置周簷阿金源中葉盛文物玉堂學士鏘鳴珂旁搜紙墨作藻飾欲與唐晉爭嵯峩至今摹拓傳好事道士却換人間鵝仙杯珍襲巨桃核御畫雲鶴題宣和不知何處有此木偶爾結實良非他瑶池漢殿語茫昧遂使世俗猶傳訛尋幽訪古意未已起視落日歸禽多却趨林亭憩清絶盆菊采采黃金窠蟹螯斫雪新醖碧對此不樂將如何京華酒壚萬歌舞錦韀翠袖迎嬌娥儒冠已受俗子笑况復衰客雙鬢皤下帷閉閣來迹少骯髒不肯侯門過清遊良友幸追逐未忍返棹尋漁蓑今朝不飲心已醉笑看坐客朱顔酡鳳城半掩歸路暝爭道擊轂如飛梭九衢冥濛漲塵霧漸見燈火稀星羅作詩寫實不可緩馬上已復成微哦北山行為方夀父作峩峩仙華峯下有仙人宅右招括蒼之貞士左挽延平之羇客一時山水鄉聚此文章伯君方壯歲清且間日操几杖隨追攀至今倡和猶在耳隱隱澗水松風間衣冠雲散迹如掃白髮垂肩君亦老髙門長鋏不可彈邑西結屋茨生草飛鴻印雪元無據北村之名不忘故時時矯首家山路朝吟暮諷句清新甑無炊米妻孥嗔祗有青山不厭人憶去年去年出神京南向官河路時當二月三月交杏花梨花正無數丹霞素雪彌幾里白日青天映髙樹舟行夾岸看不斷竟日猶疑仍故處可憐春色值人愁血泪沾襟不能賦今年家病劇忽忽春華度一枝不到眼到眼添愁緒卧聽寒食雨三日想見離披委塵土山蹊野隴復幾何向來竒觀真難遇我非世上豪侈翁對花酣酒娛歌鍾祗恨家無千頃地盡栽萬樹開白紅佳事身健無一事更有好友來相從微吟百匝繞花下滿懷浩蕩長春風禮部集卷五
